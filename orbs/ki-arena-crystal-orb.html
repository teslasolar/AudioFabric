<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Crystal Orb</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#crystalForm{font-size:16px;text-shadow:0 0 12px;text-transform:uppercase;letter-spacing:3px}
#rayCount{font-size:11px;color:#888}
#facetInfo{font-size:10px;color:#666}
/* Crystal form pills */
#formPills{position:fixed;right:12px;bottom:12px;z-index:55;
  display:flex;gap:4px;pointer-events:none}
.form-pill{padding:3px 10px;font-size:9px;color:#446;border:1px solid #fff1;
  border-radius:10px;background:rgba(0,0,0,0.4);transition:all 0.3s}
.form-pill.active{color:#fff;border-color:#fff4}
/* Prismatic meter */
#prismMeter{position:fixed;left:12px;bottom:12px;z-index:55;width:6px;height:80px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#prismFill{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f);
  border-radius:3px;transition:height 0.15s}
#prismLabel{position:fixed;left:22px;bottom:12px;z-index:55;font-size:8px;color:#668;
  writing-mode:vertical-rl;pointer-events:none}
/* Coherence bar */
#coherenceBar{position:fixed;left:12px;bottom:100px;z-index:55;width:6px;height:50px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#coherenceFill{position:absolute;bottom:0;left:0;right:0;background:#8af;
  border-radius:3px;transition:height 0.15s}
#coherenceLabel{position:fixed;left:22px;bottom:100px;z-index:55;font-size:8px;color:#668;
  writing-mode:vertical-rl;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:9px;color:#555;letter-spacing:2px">CRYSTAL ORB</div>
    <div id="crystalForm" style="color:#fff">diamond</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="rayCount">0 rays</div>
    <div id="facetInfo">0 facets</div>
  </div>
</div>
<div id="formPills">
  <div class="form-pill active">diamond</div>
  <div class="form-pill">quartz</div>
  <div class="form-pill">emerald</div>
  <div class="form-pill">sapphire</div>
  <div class="form-pill">amethyst</div>
</div>
<div id="prismMeter"><div id="prismFill" style="height:0%"></div></div>
<div id="prismLabel">PRISM</div>
<div id="coherenceBar"><div id="coherenceFill" style="height:0%"></div></div>
<div id="coherenceLabel">ALIGN</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from '../modules/core.js';
import * as Scene from '../modules/scene.js';
import * as VoiceEngine from '../modules/voice-engine.js';
import * as FreqBands from '../modules/freq-bands-12.js';
import * as Synths from '../modules/synths.js';
import * as Resonance from '../modules/resonance.js';
import * as CrystalOrb from '../modules/crystal-orb.js';
import * as MqttNet from '../modules/mqtt-net.js';
import * as WebRTCNet from '../modules/webrtc-net.js';
import * as Presence from '../modules/presence.js';
import * as Chat from '../modules/chat.js';
import * as PlayerProfile from '../modules/player-profile.js';
import * as NavOverlay from '../modules/nav-overlay.js';

const ROOM = 'CRYS-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

const FORM_COLORS = {
  diamond: '#fff', quartz: '#fec', emerald: '#4f8', sapphire: '#48f', amethyst: '#c6f'
};

KI.on('crystal-orb:update', data => {
  const formEl = document.getElementById('crystalForm');
  formEl.textContent = data.crystalForm;
  formEl.style.color = FORM_COLORS[data.crystalForm] || '#fff';
  formEl.style.textShadow = '0 0 12px ' + (FORM_COLORS[data.crystalForm] || '#fff');
  document.getElementById('rayCount').textContent = data.activeRays + ' rays';
  document.getElementById('facetInfo').textContent = data.facetCount + ' facets';
  document.getElementById('prismFill').style.height = data.prismaticSpread + '%';
  document.getElementById('coherenceFill').style.height = data.coherence + '%';
  document.querySelectorAll('.form-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === data.crystalForm);
  });
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 600 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  CrystalOrb.init({ position: [0, 2.5, -3.5] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c CRYSTAL ORB BOOTED ', 'background:#000;color:#c8f;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
