<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Layer Stack</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#presetName{font-size:14px;color:#f80;text-transform:uppercase;letter-spacing:2px}
/* Layer stack display */
#layerPanel{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:55;
  display:flex;flex-direction:column;gap:3px;pointer-events:none;width:140px}
.layer-row{display:flex;align-items:center;gap:6px;padding:4px 8px;
  background:rgba(0,0,0,0.5);border:1px solid #fff1;border-radius:4px;font-size:9px;color:#888;
  transition:border-color 0.3s}
.layer-row.active{border-color:#f804;color:#fc8}
.layer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.layer-name{flex:1}
.layer-opacity{width:30px;text-align:right;font-family:monospace}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:10px;color:#666;letter-spacing:2px">LAYER COMPOSITOR</div>
    <div id="presetName">Ambient</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="layerCount" style="font-size:10px;color:#888">0 layers</div>
  </div>
</div>
<div id="layerPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as LayerStack from './modules/layer-stack.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'LSTACK-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

const PRESET_LABELS = { a:'Ambient', e:'Electric', i:'Interference', o:'Orbital', u:'Ultra' };
const LAYER_COLORS = {
  noise:'#4c8', waveform:'#48f', particlegrid:'#c4c', ringpulse:'#f80', plasma:'#84f', gridwarp:'#4fa'
};

KI.on('layer-stack:update', data => {
  document.getElementById('presetName').textContent = PRESET_LABELS[data.preset] || data.preset;
  document.getElementById('layerCount').textContent = data.layerCount + ' layers';
  const panel = document.getElementById('layerPanel');
  if (panel.children.length !== data.layers.length) {
    panel.innerHTML = '';
    data.layers.forEach((l, i) => {
      const row = document.createElement('div');
      row.className = 'layer-row';
      row.innerHTML = `<div class="layer-dot" style="background:${LAYER_COLORS[l.type]||'#888'}"></div>` +
        `<div class="layer-name">${l.type}</div><div class="layer-opacity">${(l.opacity*100).toFixed(0)}%</div>`;
      panel.appendChild(row);
    });
  } else {
    data.layers.forEach((l, i) => {
      const row = panel.children[i];
      if (row) {
        row.classList.toggle('active', parseFloat(l.opacity) > 0.7);
        row.querySelector('.layer-opacity').textContent = (parseFloat(l.opacity)*100).toFixed(0) + '%';
      }
    });
  }
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 500 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  LayerStack.init({ position: [0, 2, -3] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c LAYER STACK BOOTED ', 'background:#000;color:#f80;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
