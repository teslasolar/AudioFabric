<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebLLM Arena — Voice Emotion AI Chat (Local WebGPU)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080a10;color:#c0d0e0;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* ─── CHAT PANEL ─── */
#chatPanel{position:fixed;right:0;top:0;bottom:0;width:380px;z-index:20;
  background:linear-gradient(225deg,rgba(8,10,20,0.95),rgba(6,8,16,0.92));
  border-left:2px solid #22334488;display:flex;flex-direction:column;
  box-shadow:-4px 0 30px rgba(0,0,0,0.6)}

#chatHead{padding:14px 16px;border-bottom:1px solid #223;display:flex;justify-content:space-between;align-items:center}
#chatHead h2{font-size:14px;color:#4af;letter-spacing:3px}
#modelLabel{font-size:9px;color:#446;text-align:right}

#chatLog{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
#chatLog::-webkit-scrollbar{width:5px}
#chatLog::-webkit-scrollbar-track{background:#080a10}
#chatLog::-webkit-scrollbar-thumb{background:#223;border-radius:3px}

.msg{padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.5;max-width:92%;word-wrap:break-word}
.msg.user{background:#1a2040;border:1px solid #2a3060;align-self:flex-end;color:#aac}
.msg.ai{background:#0a1820;border:1px solid #1a3040;align-self:flex-start;color:#8cb8cc}
.msg.system{background:#101418;border:1px solid #1a1a22;color:#556;font-size:10px;align-self:center;text-align:center}
.msg .emotion-tag{font-size:9px;padding:2px 6px;border-radius:8px;margin-bottom:4px;display:inline-block}
.msg .typing{animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

#chatInput{display:flex;gap:6px;padding:10px;border-top:1px solid #223}
#chatBox{flex:1;background:#0a0c18;border:1px solid #223;color:#c0d0e0;
  padding:8px 10px;font-family:inherit;font-size:12px;border-radius:4px;outline:none;resize:none;height:36px}
#chatBox:focus{border-color:#4af;box-shadow:0 0 8px #4af4}
#chatBox::placeholder{color:#334}
#sendBtn{background:#1a2040;border:1px solid #2a3060;color:#4af;padding:8px 14px;
  font-family:inherit;font-size:11px;border-radius:4px;cursor:pointer;transition:all 0.2s}
#sendBtn:hover{background:#2a3060;border-color:#4af}
#sendBtn:disabled{opacity:0.3;cursor:default}

/* ─── EMOTION HUD ─── */
#emotionHUD{position:fixed;left:12px;top:12px;z-index:20;width:260px;
  background:rgba(8,10,20,0.9);border:1px solid #223;border-radius:8px;padding:12px;
  opacity:0;transition:opacity 0.3s}
#emotionHUD.on{opacity:1}
#emotionHUD h3{font-size:10px;color:#446;letter-spacing:2px;margin-bottom:8px}
#dominantEmotion{font-size:22px;letter-spacing:3px;margin-bottom:6px;transition:color 0.3s}
#emotionDesc{font-size:10px;color:#668;margin-bottom:10px}
.emo-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.emo-label{font-size:9px;color:#668;width:65px;text-align:right}
.emo-track{flex:1;height:5px;background:#111;border-radius:3px;overflow:hidden}
.emo-fill{height:100%;border-radius:3px;transition:width 0.15s,background 0.3s}

/* ─── MIC HUD ─── */
#micHUD{position:fixed;left:12px;top:240px;z-index:20;display:flex;flex-direction:column;
  align-items:center;gap:4px;opacity:0;transition:opacity 0.3s}
#micHUD.on{opacity:1}
#micIcon{font-size:16px;color:#f44;text-shadow:0 0 8px #f44;transition:color 0.2s}
#micIcon.hot{color:#ff0;text-shadow:0 0 12px #ff0}
#micVolBar{width:8px;height:70px;background:#111;border:1px solid #223;border-radius:4px;overflow:hidden;
  display:flex;flex-direction:column-reverse}
#micVolFill{width:100%;background:linear-gradient(0deg,#0a0,#ff0,#f44);border-radius:3px;transition:height 0.05s}
#micPitch{font-size:8px;color:#446}
#micVowel{font-size:14px;color:#4af;text-shadow:0 0 8px #4af4;min-height:18px}

/* ─── VOICE HUD ─── */
#voiceHUD{position:fixed;left:12px;bottom:80px;z-index:20;pointer-events:none;
  opacity:0;transition:opacity 0.3s}
#voiceHUD.on{opacity:1}
#voiceStatus{font-size:8px;color:#446;letter-spacing:2px}
#voiceHeard{font-size:12px;color:#4af;margin-top:2px;max-width:300px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── LOAD OVERLAY ─── */
#loadOverlay{position:fixed;inset:0;z-index:100;background:rgba(4,6,12,0.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center}
#loadOverlay h1{font-size:28px;color:#4af;text-shadow:0 0 20px #4af6;letter-spacing:6px;margin-bottom:4px}
#loadOverlay p{font-size:12px;color:#668;letter-spacing:3px;margin-bottom:30px}
#modelSelect{background:#0a0c18;border:1px solid #223;color:#c0d0e0;padding:8px 12px;
  font-family:inherit;font-size:12px;border-radius:4px;margin-bottom:12px;min-width:280px;outline:none}
#modelSelect:focus{border-color:#4af}
#gpuStatus{font-size:10px;color:#446;margin-bottom:16px;text-align:center}
#startBtn{background:#1a2040;border:2px solid #4af;color:#4af;padding:12px 40px;
  font-family:inherit;font-size:14px;border-radius:6px;cursor:pointer;letter-spacing:3px;
  transition:all 0.2s}
#startBtn:hover{background:#2a3060;box-shadow:0 0 20px #4af4}
#startBtn:disabled{opacity:0.3;cursor:default}

#loadBar{width:320px;height:8px;background:#111;border:1px solid #223;border-radius:4px;
  overflow:hidden;margin-top:20px;display:none}
#loadFill{height:100%;background:linear-gradient(90deg,#4af,#a4f);border-radius:3px;
  transition:width 0.3s;width:0%}
#loadMsg{font-size:10px;color:#668;margin-top:8px;text-align:center;max-width:400px;
  word-wrap:break-word;min-height:30px}

/* ─── CHARGE RING ─── */
#chargeRing{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%);z-index:8;
  pointer-events:none;opacity:0;transition:opacity 0.15s}
#chargeRing.on{opacity:1}

/* ─── MORPH BALL ─── */
#morphBall{position:fixed;left:12px;bottom:12px;z-index:20;pointer-events:none;
  filter:drop-shadow(0 0 12px rgba(68,170,255,0.4))}

/* ─── CENTER INFO ─── */
#centerInfo{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;
  text-align:center;pointer-events:none}
#centerTitle{font-size:20px;color:#4af;text-shadow:0 0 14px #4af4;letter-spacing:4px}
#centerSub{font-size:9px;color:#446;margin-top:2px;letter-spacing:2px}

/* ─── NOTIFY ─── */
#notify{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:60;
  font-size:28px;color:#4af;text-shadow:0 0 20px #4af6;
  letter-spacing:4px;opacity:0;transition:opacity 0.3s;pointer-events:none}

/* ─── HIT FLASH ─── */
#hitFlash{position:fixed;inset:0;z-index:65;pointer-events:none;opacity:0;
  transition:opacity 0.05s}
#hitFlash.flash{opacity:1}

/* ─── TTS INDICATOR ─── */
#ttsInd{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:12;
  font-size:9px;color:#4a8;letter-spacing:2px;opacity:0;transition:opacity 0.3s;pointer-events:none}
#ttsInd.on{opacity:1}

#modeInd{position:fixed;bottom:6px;left:12px;z-index:12;font-size:9px;color:#334;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- LOAD OVERLAY -->
<div id="loadOverlay">
  <h1>WEBLLM ARENA</h1>
  <p>LOCAL AI — VOICE EMOTION — WEBGPU</p>
  <div id="gpuStatus">Checking WebGPU...</div>
  <select id="modelSelect"></select>
  <button id="startBtn" disabled>LOADING...</button>
  <div id="loadBar"><div id="loadFill"></div></div>
  <div id="loadMsg"></div>
</div>

<!-- CHAT PANEL -->
<div id="chatPanel">
  <div id="chatHead">
    <h2>AI CHAT</h2>
    <div id="modelLabel"></div>
  </div>
  <div id="chatLog"></div>
  <div id="chatInput">
    <textarea id="chatBox" placeholder="Type or speak..." rows="1"></textarea>
    <button id="sendBtn" disabled>SEND</button>
  </div>
</div>

<!-- EMOTION HUD -->
<div id="emotionHUD">
  <h3>VOICE EMOTION</h3>
  <div id="dominantEmotion">NEUTRAL</div>
  <div id="emotionDesc">waiting for voice...</div>
  <div id="emotionBars"></div>
</div>

<!-- MIC HUD -->
<div id="micHUD">
  <div id="micIcon">MIC</div>
  <div id="micVolBar"><div id="micVolFill" style="height:0%"></div></div>
  <div id="micPitch">0 Hz</div>
  <div id="micVowel"></div>
</div>

<!-- VOICE HUD -->
<div id="voiceHUD">
  <div id="voiceStatus">LISTENING</div>
  <div id="voiceHeard"></div>
</div>

<canvas id="chargeRing" width="240" height="240"></canvas>
<canvas id="morphBall" width="90" height="90"></canvas>

<div id="centerInfo">
  <div id="centerTitle">WEBLLM ARENA</div>
  <div id="centerSub">LOCAL AI — VOICE EMOTION — WEBGPU</div>
</div>

<div id="notify"></div>
<div id="hitFlash"></div>
<div id="ttsInd">AI SPEAKING</div>
<div id="modeInd"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import * as LLMEngine from './modules/web-llm-engine.js';

const EMOTION_COLORS = {
  excitement: '#ffaa22', calm: '#44aaff', anger: '#ff4444',
  sadness: '#6666cc', joy: '#44ff88', curiosity: '#aa88ff', neutral: '#668899'
};

const ST = {
  started: false, clock: new THREE.Clock(),
  cameraAngle: 0, cameraRadius: 6, cameraY: 2,
  mouseX: 0, mouseY: 0,
  // mic
  micStream: null, analyser: null, micData: null, timeData: null,
  volume: 0, smoothVol: 0, f0: 0, vowel: '',
  sustain: 0, coherence: 0, pDelta: 0, energy: 0, pulseRate: 0,
  prevRms: 0, prevF0: 0, nf: 0.005, lastAmp: 0, onsets: [],
  // ki
  charge: 0, charging: false,
  projectiles: [], blastCount: 0,
  // emotion
  currentEmotion: null,
  // voice recognition
  recognition: null, voiceActive: false,
  // tts
  ttsEnabled: true,
  // 3d
  coreGroup: null, coreGlow: null, coreInner: null,
  orbParticles: null, orbCount: 200
};

let renderer, scene, camera;
const dustParticles = [];

// ─── THREE.JS ───
function initThree() {
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x080a10);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x080a10, 0.04);
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 2, 6);

  scene.add(new THREE.AmbientLight(0x112233, 0.3));
  const pl1 = new THREE.PointLight(0x4488ff, 0.5, 25); pl1.position.set(4, 7, 4); scene.add(pl1);
  const pl2 = new THREE.PointLight(0xaa44ff, 0.3, 20); pl2.position.set(-4, 5, -4); scene.add(pl2);

  // grid
  const gP = [];
  for (let i = -30; i <= 30; i += 2) {
    gP.push(-30,-1.5,i, 30,-1.5,i, i,-1.5,-30, i,-1.5,30);
  }
  const gGeo = new THREE.BufferGeometry();
  gGeo.setAttribute('position', new THREE.Float32BufferAttribute(gP, 3));
  scene.add(new THREE.LineSegments(gGeo, new THREE.LineBasicMaterial({ color:0x112233, transparent:true, opacity:0.25 })));

  // stars
  const sC=1500, sGeo=new THREE.BufferGeometry(), sp=new Float32Array(sC*3), sc=new Float32Array(sC*3);
  for(let i=0;i<sC;i++){
    const r=50+Math.random()*80,th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI;
    sp[i*3]=r*Math.sin(ph)*Math.cos(th);sp[i*3+1]=r*Math.cos(ph)*0.5+8;sp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const w=Math.random();sc[i*3]=0.3+w*0.3;sc[i*3+1]=0.4+w*0.4;sc[i*3+2]=0.7+w*0.3;
  }
  sGeo.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  sGeo.setAttribute('color',new THREE.Float32BufferAttribute(sc,3));
  scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({size:0.4,vertexColors:true,transparent:true,opacity:0.6})));

  // dust
  const dC=300, dGeo=new THREE.BufferGeometry(), dp=new Float32Array(dC*3);
  for(let i=0;i<dC;i++){
    dp[i*3]=(Math.random()-0.5)*24;dp[i*3+1]=Math.random()*8-2;dp[i*3+2]=(Math.random()-0.5)*24;
    dustParticles.push({idx:i,vx:(Math.random()-0.5)*0.012,vy:Math.random()*0.006+0.003,vz:(Math.random()-0.5)*0.012});
  }
  dGeo.setAttribute('position',new THREE.Float32BufferAttribute(dp,3));
  scene.add(new THREE.Points(dGeo,new THREE.PointsMaterial({color:0x4488ff,size:0.04,transparent:true,opacity:0.1,blending:THREE.AdditiveBlending,depthWrite:false})));
  ST.dustGeo=dGeo;

  // AI core sphere (central target)
  buildAICore();

  // orbiting emotion particles
  const orbGeo = new THREE.BufferGeometry();
  const orbPos = new Float32Array(ST.orbCount * 3);
  const orbCol = new Float32Array(ST.orbCount * 3);
  for (let i = 0; i < ST.orbCount; i++) {
    const a = Math.random() * Math.PI * 2, r = 2 + Math.random();
    orbPos[i*3] = Math.cos(a)*r; orbPos[i*3+1] = (Math.random()-0.5)*2; orbPos[i*3+2] = Math.sin(a)*r;
    orbCol[i*3] = 0.3; orbCol[i*3+1] = 0.5; orbCol[i*3+2] = 1;
  }
  orbGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbPos, 3));
  orbGeo.setAttribute('color', new THREE.Float32BufferAttribute(orbCol, 3));
  ST.orbParticles = new THREE.Points(orbGeo, new THREE.PointsMaterial({
    size: 0.06, vertexColors: true, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  scene.add(ST.orbParticles);
  ST.orbGeo = orbGeo;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function buildAICore() {
  ST.coreGroup = new THREE.Group();
  const cGeo = new THREE.IcosahedronGeometry(0.7, 2);
  ST.coreGlow = new THREE.Mesh(cGeo, new THREE.MeshBasicMaterial({
    color: 0x4488ff, wireframe: true, transparent: true, opacity: 0.2,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  ST.coreGroup.add(ST.coreGlow);
  ST.coreInner = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4, 1), new THREE.MeshBasicMaterial({
    color: 0x4488ff, transparent: true, opacity: 0.08,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  ST.coreGroup.add(ST.coreInner);
  ST.coreGroup.position.set(0, 0.5, 0);
  scene.add(ST.coreGroup);
}

// ─── MICROPHONE + VOICE ANALYSIS ───
async function initMic() {
  try {
    ST.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const actx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    const src = actx.createMediaStreamSource(ST.micStream);
    ST.analyser = actx.createAnalyser();
    ST.analyser.fftSize = 2048;
    ST.analyser.smoothingTimeConstant = 0.8;
    src.connect(ST.analyser);
    ST.micData = new Uint8Array(ST.analyser.frequencyBinCount);
    ST.timeData = new Float32Array(2048);
    ST.freqData = new Float32Array(ST.analyser.frequencyBinCount);
    document.getElementById('micHUD').classList.add('on');
    document.getElementById('emotionHUD').classList.add('on');

    // calibrate noise floor
    setTimeout(() => {
      ST.analyser.getFloatTimeDomainData(ST.timeData);
      let r = 0;
      for (let i = 0; i < ST.timeData.length; i++) r += ST.timeData[i] * ST.timeData[i];
      ST.nf = Math.sqrt(r / ST.timeData.length) * 1.5 + 0.005;
    }, 400);
  } catch(e) { console.warn('Mic:', e); }
}

function updateVoiceAnalysis() {
  if (!ST.analyser) return;
  ST.analyser.getFloatTimeDomainData(ST.timeData);
  ST.analyser.getFloatFrequencyData(ST.freqData);
  ST.analyser.getByteFrequencyData(ST.micData);

  // RMS
  let r = 0;
  for (let i = 0; i < ST.timeData.length; i++) r += ST.timeData[i] * ST.timeData[i];
  r = Math.sqrt(r / ST.timeData.length);
  ST.prevRms = ST.volume; ST.volume = r;
  const sounding = r > ST.nf * 2;
  ST.energy += (r - ST.energy) * 0.1;
  ST.smoothVol += (r - ST.smoothVol) * 0.15;

  // pitch (autocorrelation)
  ST.prevF0 = ST.f0;
  ST.f0 = detectF0(ST.timeData, 44100);
  if (ST.f0 > 0 && ST.prevF0 > 0) ST.pDelta = ST.f0 - ST.prevF0;

  // sustain + coherence
  if (sounding) {
    ST.sustain += 0.016;
    if (ST.sustain > 0.3) ST.coherence = Math.min(1, ST.coherence + 0.01);
  } else {
    ST.sustain = 0; ST.coherence *= 0.97;
  }

  // vowel detection (formant peaks)
  const bw = 44100 / (ST.freqData.length * 2);
  const sm = new Float32Array(ST.freqData.length);
  for (let i = 2; i < ST.freqData.length - 2; i++)
    sm[i] = (ST.freqData[i-2]+ST.freqData[i-1]+ST.freqData[i]+ST.freqData[i+1]+ST.freqData[i+2]) / 5;
  const peaks = [];
  const lo = Math.floor(200/bw), hi = Math.min(Math.floor(3000/bw), sm.length-1);
  for (let i = lo+1; i < hi-1; i++)
    if (sm[i] > sm[i-1] && sm[i] > sm[i+1] && sm[i] > -60) peaks.push({ f:i*bw, m:sm[i] });
  peaks.sort((a,b) => b.m - a.m);
  let f1 = peaks[0]?.f || 0, f2 = 0;
  for (let i = 1; i < peaks.length; i++) if (Math.abs(peaks[i].f - f1) > 200) { f2 = peaks[i].f; break; }
  if (f1 > f2 && f2 > 0) { let t=f1; f1=f2; f2=t; }
  ST.vowel = '';
  if (f1 > 0 && f2 > 0) {
    if (f1 < 400 && f2 > 2000) ST.vowel = 'ee';
    else if (f1 > 400 && f1 < 650 && f2 > 1600) ST.vowel = 'eh';
    else if (f1 > 600 && f2 > 900 && f2 < 1500) ST.vowel = 'ah';
    else if (f1 > 350 && f1 < 600 && f2 < 1100) ST.vowel = 'oh';
    else if (f1 < 400 && f2 < 1000) ST.vowel = 'oo';
  }

  // onsets
  const now = performance.now();
  if (r > ST.lastAmp * 1.8 && r > ST.nf * 2) ST.onsets.push(now);
  ST.lastAmp = r;
  while (ST.onsets.length && now - ST.onsets[0] > 2000) ST.onsets.shift();
  ST.pulseRate = ST.onsets.length / 2;

  // update mic UI
  document.getElementById('micVolFill').style.height = Math.min(100, ST.smoothVol * 400) + '%';
  document.getElementById('micIcon').classList.toggle('hot', ST.smoothVol > 0.1);
  document.getElementById('micPitch').textContent = ST.f0 > 0 ? ST.f0.toFixed(0) + ' Hz' : '—';
  document.getElementById('micVowel').textContent = ST.vowel || '';

  // emotion analysis
  ST.currentEmotion = LLMEngine.analyzeEmotion({
    rms: r, f0: ST.f0, pDelta: ST.pDelta, sustain: ST.sustain,
    coherence: ST.coherence, vowel: ST.vowel, pulseRate: ST.pulseRate, energy: ST.energy
  });
  updateEmotionHUD(ST.currentEmotion);

  // ki charge
  if (ST.smoothVol > 0.06) {
    ST.charge = Math.min(1, ST.charge + ST.smoothVol * 0.025);
    ST.charging = true;
  } else {
    if (ST.charging && ST.charge > 0.15) fireKiBlast();
    ST.charge *= 0.93;
    if (ST.charge < 0.05) { ST.charge = 0; ST.charging = false; }
  }
}

function detectF0(buf, sr) {
  const sz = buf.length;
  let r = 0;
  for (let i = 0; i < sz; i++) r += buf[i] * buf[i];
  r = Math.sqrt(r / sz);
  if (r < ST.nf) return 0;
  const mn = Math.floor(sr/1000), mx = Math.floor(sr/50);
  let bc = 0, bl = 0;
  for (let lag = mn; lag < mx && lag < sz; lag++) {
    let c = 0;
    for (let j = 0; j < sz-lag; j++) c += buf[j] * buf[j+lag];
    if (c > bc) { bc = c; bl = lag; }
  }
  return bl === 0 ? 0 : sr / bl;
}

// ─── EMOTION HUD ───
function buildEmotionBars() {
  const container = document.getElementById('emotionBars');
  const emotions = ['excitement','calm','anger','sadness','joy','curiosity'];
  emotions.forEach(em => {
    const row = document.createElement('div');
    row.className = 'emo-bar-row';
    row.innerHTML = `<span class="emo-label">${em}</span><div class="emo-track"><div class="emo-fill" id="emo-${em}" style="width:0%;background:${EMOTION_COLORS[em]}"></div></div>`;
    container.appendChild(row);
  });
}

function updateEmotionHUD(emo) {
  if (!emo) return;
  const domEl = document.getElementById('dominantEmotion');
  domEl.textContent = emo.dominant.toUpperCase();
  domEl.style.color = EMOTION_COLORS[emo.dominant] || '#668899';
  document.getElementById('emotionDesc').textContent = emo.description;
  for (const [name, score] of Object.entries(emo.emotions)) {
    const fill = document.getElementById('emo-' + name);
    if (fill) fill.style.width = (score * 100) + '%';
  }

  // update core color
  if (ST.coreGlow) {
    const c = new THREE.Color(EMOTION_COLORS[emo.dominant] || '#4488ff');
    ST.coreGlow.material.color.copy(c);
    ST.coreInner.material.color.copy(c);
  }

  // update hit flash color
  const hf = document.getElementById('hitFlash');
  const col = EMOTION_COLORS[emo.dominant] || '#4488ff';
  hf.style.background = `radial-gradient(circle,${col}44,transparent 60%)`;
}

// ─── KI BLAST ───
function fireKiBlast() {
  const power = ST.charge;
  ST.charge = 0; ST.charging = false; ST.blastCount++;

  const col = ST.currentEmotion ? EMOTION_COLORS[ST.currentEmotion.dominant] : '#4488ff';
  const color = new THREE.Color(col);
  const size = 0.1 + power * 0.4;
  const blast = new THREE.Mesh(
    new THREE.IcosahedronGeometry(size, 1),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false })
  );
  blast.position.copy(camera.position);
  const tGeo = new THREE.BufferGeometry();
  tGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(24*3), 3));
  const trail = new THREE.Points(tGeo, new THREE.PointsMaterial({ color, size:size*0.3, transparent:true, opacity:0.3, blending:THREE.AdditiveBlending, depthWrite:false }));
  scene.add(trail); scene.add(blast);

  const target = new THREE.Vector3(0, 0.5, 0);
  const dir = new THREE.Vector3().subVectors(target, camera.position).normalize();
  ST.projectiles.push({ mesh:blast, trail, trailGeo:tGeo, trailHistory:[], vel:dir.multiplyScalar(4+power*5), power, life:3 });
}

function updateProjectiles(dt) {
  for (let i = ST.projectiles.length-1; i >= 0; i--) {
    const p = ST.projectiles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.rotation.y += dt * 8;
    p.trailHistory.unshift(p.mesh.position.clone());
    if (p.trailHistory.length > 24) p.trailHistory.pop();
    const tP = p.trailGeo.attributes.position;
    for (let j = 0; j < 24 && j < p.trailHistory.length; j++) tP.setXYZ(j, p.trailHistory[j].x, p.trailHistory[j].y, p.trailHistory[j].z);
    tP.needsUpdate = true;
    if (p.mesh.position.distanceTo(new THREE.Vector3(0,0.5,0)) < 1.0) {
      onHit(p);
      scene.remove(p.mesh); scene.remove(p.trail);
      ST.projectiles.splice(i, 1); continue;
    }
    if (p.life <= 0) { scene.remove(p.mesh); scene.remove(p.trail); ST.projectiles.splice(i, 1); }
  }
}

function onHit(proj) {
  document.getElementById('hitFlash').classList.add('flash');
  setTimeout(() => document.getElementById('hitFlash').classList.remove('flash'), 80);
  if (ST.coreGlow) { ST.coreGlow.scale.setScalar(1.5+proj.power); ST.coreGlow.material.opacity=0.5; }
  // burst particles
  const col = ST.coreGlow ? ST.coreGlow.material.color.getHex() : 0x4488ff;
  for (let i = 0; i < 15; i++) {
    const g = new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false}));
    g.position.set(0,0.5,0);
    const v = new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4);
    scene.add(g);
    ST.burstParticles = ST.burstParticles || [];
    ST.burstParticles.push({mesh:g,vel:v,life:0.8+Math.random()*0.4});
  }
}

// ─── VOICE RECOGNITION ───
function initVoiceRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('voiceStatus').textContent = 'VOICE N/A'; return; }
  const recog = new SR();
  recog.continuous = true; recog.interimResults = true; recog.lang = 'en-US';
  recog.onresult = (e) => {
    let transcript = '', isFinal = false;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
      if (e.results[i].isFinal) isFinal = true;
    }
    document.getElementById('voiceHeard').textContent = transcript.trim();
    document.getElementById('voiceHUD').classList.add('on');
    if (isFinal && transcript.trim().length > 0) {
      sendMessage(transcript.trim());
    }
  };
  recog.onerror = (e) => { if (e.error !== 'no-speech' && e.error !== 'aborted') console.warn('Voice:', e.error); };
  recog.onend = () => { if (ST.started && ST.voiceActive) try { recog.start(); } catch(e) {} };
  ST.recognition = recog;
  try { recog.start(); ST.voiceActive = true; document.getElementById('voiceStatus').textContent = 'LISTENING...'; } catch(e) {}
}

// ─── CHAT ───
async function sendMessage(text) {
  if (!LLMEngine.isReady() || !text.trim()) return;

  addMsg('user', text, ST.currentEmotion);
  document.getElementById('sendBtn').disabled = true;

  // add streaming AI message
  const aiDiv = addMsg('ai', '', null, true);

  try {
    const reply = await LLMEngine.chat(text, ST.currentEmotion, {
      stream: true,
      onChunk: (delta, full) => {
        aiDiv.querySelector('.msg-text').textContent = full;
        aiDiv.scrollIntoView({ block: 'end', behavior: 'smooth' });
      }
    });

    // remove typing indicator
    const typing = aiDiv.querySelector('.typing');
    if (typing) typing.remove();

    // TTS
    if (ST.ttsEnabled && reply) {
      document.getElementById('ttsInd').classList.add('on');
      LLMEngine.speak(reply, {
        rate: 1.0,
        onEnd: () => document.getElementById('ttsInd').classList.remove('on')
      });
    }
  } catch (e) {
    aiDiv.querySelector('.msg-text').textContent = 'Error: ' + e.message;
  }

  document.getElementById('sendBtn').disabled = false;
}

function addMsg(role, text, emotion, streaming = false) {
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  let html = '';
  if (emotion && role === 'user') {
    const col = EMOTION_COLORS[emotion.dominant] || '#668';
    html += `<span class="emotion-tag" style="background:${col}22;color:${col};border:1px solid ${col}44">${emotion.dominant} ${(emotion.intensity*100).toFixed(0)}%</span><br>`;
  }
  html += `<span class="msg-text">${text}</span>`;
  if (streaming) html += `<span class="typing"> ...</span>`;
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

// ─── 2D CANVASES ───
function drawChargeRing(t) {
  const c = document.getElementById('chargeRing'), ctx = c.getContext('2d'), cx=c.width/2, cy=c.height/2;
  ctx.clearRect(0,0,c.width,c.height);
  if (ST.charge < 0.05) { c.classList.remove('on'); return; }
  c.classList.add('on');
  const ch = ST.charge, rad = 30+ch*60;
  const col = ST.currentEmotion ? EMOTION_COLORS[ST.currentEmotion.dominant] : '#4488ff';
  ctx.strokeStyle = col; ctx.globalAlpha = 0.3+ch*0.5; ctx.lineWidth = 2+ch*4;
  ctx.beginPath(); ctx.arc(cx,cy,rad,-Math.PI/2,-Math.PI/2+ch*Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawMorphBall(t) {
  const c = document.getElementById('morphBall'), ctx = c.getContext('2d'), cx=c.width/2, cy=c.height/2;
  ctx.clearRect(0,0,c.width,c.height);
  const e = ST.smoothVol;
  const sides = e > 0.25 ? (e > 0.45 ? (e > 0.65 ? 3 : 4) : 5) : 0;
  const r = 15+e*20;
  const col = ST.currentEmotion ? EMOTION_COLORS[ST.currentEmotion.dominant] : '#4488ff';
  const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.4);
  grad.addColorStop(0, col+'44'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.fillStyle = col+'22';
  ctx.beginPath();
  if (sides===0) ctx.arc(cx,cy,r,0,Math.PI*2);
  else { for(let i=0;i<=sides;i++){const a=t*0.5+(i/sides)*Math.PI*2;const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);} ctx.closePath(); }
  ctx.fill(); ctx.stroke();
}

// ─── UPDATE LOOPS ───
function updateCamera(dt) {
  ST.cameraAngle += dt * 0.05;
  const mx = (ST.mouseX/window.innerWidth-0.5)*0.4;
  const my = (ST.mouseY/window.innerHeight-0.5)*0.25;
  camera.position.x += (Math.cos(ST.cameraAngle+mx)*ST.cameraRadius - camera.position.x)*0.02;
  camera.position.z += (Math.sin(ST.cameraAngle+mx)*ST.cameraRadius - camera.position.z)*0.02;
  camera.position.y += (ST.cameraY+my*2 - camera.position.y)*0.02;
  camera.lookAt(0, 0.5, 0);
}

function updateDust() {
  const pos = ST.dustGeo.attributes.position;
  dustParticles.forEach(p => {
    let x=pos.getX(p.idx)+p.vx, y=pos.getY(p.idx)+p.vy, z=pos.getZ(p.idx)+p.vz;
    if(y>7){y=-2;x=(Math.random()-0.5)*24;z=(Math.random()-0.5)*24;}
    if(Math.abs(x)>12)p.vx*=-1; if(Math.abs(z)>12)p.vz*=-1;
    pos.setXYZ(p.idx,x,y,z);
  });
  pos.needsUpdate=true;
}

function updateCore(t) {
  if (!ST.coreGlow) return;
  ST.coreGlow.rotation.y = t*0.3;
  ST.coreGlow.rotation.x = Math.sin(t*0.2)*0.3;
  const s = ST.coreGlow.scale.x;
  ST.coreGlow.scale.setScalar(s+(1-s)*0.03);
  ST.coreGlow.material.opacity += (0.2-ST.coreGlow.material.opacity)*0.05;
  ST.coreInner.rotation.y = -t*0.5; ST.coreInner.rotation.z = t*0.3;
  if (ST.smoothVol > 0.04) {
    ST.coreGlow.scale.setScalar(1+ST.smoothVol*2);
    ST.coreGlow.material.opacity = 0.2+ST.smoothVol*0.5;
  }
  // update orbiting particles based on emotion
  if (ST.orbGeo) {
    const oPos = ST.orbGeo.attributes.position;
    const oCol = ST.orbGeo.attributes.color;
    const emo = ST.currentEmotion;
    const speed = emo ? 0.3 + emo.intensity * 1.5 : 0.5;
    for (let i = 0; i < ST.orbCount; i++) {
      const x = oPos.getX(i), y = oPos.getY(i), z = oPos.getZ(i);
      const r = Math.sqrt(x*x + z*z);
      const a = Math.atan2(z, x) + speed * 0.016;
      oPos.setXYZ(i, Math.cos(a)*r, y + Math.sin(t+i)*0.005, Math.sin(a)*r);
      if (emo) {
        const c = new THREE.Color(EMOTION_COLORS[emo.dominant] || '#4488ff');
        oCol.setXYZ(i, c.r, c.g, c.b);
      }
    }
    oPos.needsUpdate = true;
    oCol.needsUpdate = true;
  }
}

function updateBursts(dt) {
  if (!ST.burstParticles) return;
  for (let i = ST.burstParticles.length-1; i >= 0; i--) {
    const p = ST.burstParticles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.vel.y -= 2*dt;
    p.mesh.material.opacity = Math.max(0, p.life*0.5);
    if (p.life <= 0) { scene.remove(p.mesh); ST.burstParticles.splice(i,1); }
  }
}

function showNotify(text) {
  const el = document.getElementById('notify');
  el.textContent = text;
  el.style.opacity = '1';
  clearTimeout(ST.notifyTimer);
  ST.notifyTimer = setTimeout(() => el.style.opacity = '0', 1200);
}

// ─── MAIN LOOP ───
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(ST.clock.getDelta(), 0.05);
  const t = ST.clock.getElapsedTime();
  updateVoiceAnalysis();
  updateCamera(dt);
  updateDust();
  updateCore(t);
  updateProjectiles(dt);
  updateBursts(dt);
  drawChargeRing(t);
  drawMorphBall(t);
  renderer.render(scene, camera);
}

// ─── SETUP ───
document.addEventListener('mousemove', (e) => { ST.mouseX=e.clientX; ST.mouseY=e.clientY; });
document.addEventListener('wheel', (e) => {
  if (e.target.closest('#chatPanel')) return;
  ST.cameraRadius = Math.max(3, Math.min(12, ST.cameraRadius + e.deltaY*0.01));
}, { passive:true });
document.getElementById('bg').addEventListener('click', () => {
  if (!ST.started) return;
  ST.charge = 0.4+ST.smoothVol*0.6; fireKiBlast();
});

document.getElementById('chatBox').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = e.target.value.trim();
    if (text) { sendMessage(text); e.target.value = ''; }
  }
});
document.getElementById('sendBtn').addEventListener('click', () => {
  const box = document.getElementById('chatBox');
  const text = box.value.trim();
  if (text) { sendMessage(text); box.value = ''; }
});

// ─── INIT ───
async function init() {
  // check WebGPU
  const gpu = await LLMEngine.checkWebGPU();
  const gpuEl = document.getElementById('gpuStatus');
  if (gpu.supported) {
    gpuEl.textContent = `WebGPU: ${gpu.vendor} — ${gpu.description}`;
    gpuEl.style.color = '#4a8';
  } else {
    gpuEl.textContent = `WebGPU not available: ${gpu.reason}`;
    gpuEl.style.color = '#f44';
  }

  // populate model select
  const sel = document.getElementById('modelSelect');
  LLMEngine.MODELS.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = `${m.label} (${m.vram}MB VRAM, ${m.speed})`;
    sel.appendChild(opt);
  });

  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = false;
  startBtn.textContent = gpu.supported ? 'LOAD MODEL & ENTER' : 'NO WEBGPU — TRY ANYWAY';

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.textContent = 'LOADING...';
    document.getElementById('loadBar').style.display = 'block';

    try {
      await LLMEngine.initEngine(sel.value, {
        onProgress: (pct, msg) => {
          document.getElementById('loadFill').style.width = (pct * 100) + '%';
          document.getElementById('loadMsg').textContent = msg;
        },
        onReady: (model) => {
          document.getElementById('loadOverlay').style.display = 'none';
          document.getElementById('modelLabel').textContent = model.split('-MLC')[0];
          ST.started = true;

          LLMEngine.initTTS();
          initThree();
          buildEmotionBars();
          initMic().then(() => initVoiceRecognition());
          animate();

          document.getElementById('sendBtn').disabled = false;
          document.getElementById('modeInd').textContent =
            'CLICK canvas to blast • SAY anything to chat • VOICE drives emotion';

          addMsg('system', `Model loaded: ${model}. Speak or type to chat!`);
          showNotify('AI READY');
        },
        onError: (e) => {
          document.getElementById('loadMsg').textContent = 'Error: ' + e.message;
          startBtn.disabled = false;
          startBtn.textContent = 'RETRY';
        }
      });
    } catch (e) {
      document.getElementById('loadMsg').textContent = 'Failed: ' + e.message;
      startBtn.disabled = false;
      startBtn.textContent = 'RETRY';
    }
  });
}

init();
</script>
