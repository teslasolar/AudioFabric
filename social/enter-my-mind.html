<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enter My Mind — Global Vagal Sync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030108;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas#cv{position:fixed;top:0;left:0;width:100%;height:100%}

#hud{position:fixed;top:0;left:0;right:0;z-index:50;padding:10px 16px;
  background:linear-gradient(180deg,rgba(3,1,8,.85),transparent);pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-start}
.hud-col{display:flex;flex-direction:column;gap:2px}
.hud-col.right{align-items:flex-end}
#title{font-family:Georgia,serif;font-size:1rem;color:#d4a94a;letter-spacing:3px}
#subtitle{font-size:.5rem;color:#556;letter-spacing:2px}
#myName{font-size:.55rem;color:#0af}
#roomInfo{font-size:.5rem;color:#556}
#peerCount{font-size:.6rem;color:#0af}
#subRoom{font-size:.5rem;color:#d4a94a;cursor:pointer;pointer-events:auto}
#subRoom:hover{color:#fff}

#players{position:fixed;top:70px;right:12px;z-index:55;width:200px;pointer-events:auto}
.player{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:2px 0;
  background:#0001;border:1px solid #ffffff08;border-radius:4px;cursor:pointer;transition:all .2s;font-size:10px}
.player:hover{border-color:#0af44;background:#0af08}
.player .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.player .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player .sync{color:#0f0;font-size:9px;min-width:28px;text-align:right}
.player.in-sub{border-color:#d4a94a44}
.player.me{opacity:.5;cursor:default}

#subPanel{position:fixed;top:70px;left:12px;z-index:55;width:180px;display:none;pointer-events:auto}
#subPanel.on{display:block}
#subTitle{font-size:.55rem;color:#d4a94a;letter-spacing:2px;margin-bottom:6px}
#subMembers{font-size:10px;color:#0af}
#subLeave{font-size:9px;color:#f44;cursor:pointer;margin-top:8px;letter-spacing:1px}
#subLeave:hover{color:#fff}
#subSync{font-size:1.4rem;color:#0f0;text-shadow:0 0 15px #0f0;margin:6px 0}
#subPhase{font-size:.5rem;color:#d4a94a;letter-spacing:1.5px}

#bands{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:6px;pointer-events:none}
.band{display:flex;flex-direction:column;align-items:center;gap:1px;width:32px}
.band-glyph{font-size:11px;opacity:.3;transition:opacity .2s}
.band.synced .band-glyph{opacity:1}
.band-bars{display:flex;gap:1px;height:40px;align-items:flex-end}
.band-bar{width:6px;border-radius:2px;transition:height .08s;min-height:1px}
.band-bar.me{background:#0af}
.band-label{font-size:7px;color:#445;letter-spacing:.5px}

#chat{position:fixed;bottom:60px;right:12px;z-index:60;width:200px;pointer-events:auto}
#chatLog{height:100px;overflow-y:auto;background:#0008;border:1px solid #0af15;border-radius:4px;
  padding:4px;font-size:9px;margin-bottom:3px}
#chatLog::-webkit-scrollbar{width:2px}
#chatLog::-webkit-scrollbar-thumb{background:#0af4;border-radius:2px}
.msg{margin:1px 0;word-wrap:break-word}
.msg .n{font-weight:bold}.msg .t{color:#999}
.msg.sys{color:#d4a94a;font-style:italic;font-size:8px}
#chatRow{display:flex}
#chatIn{flex:1;background:#0002;border:1px solid #0af15;color:#fff;padding:4px 6px;
  font-size:9px;font-family:inherit;border-radius:3px 0 0 3px;outline:none}
#chatSend{background:#0af15;border:1px solid #0af15;color:#0af;padding:4px 8px;
  font-size:9px;cursor:pointer;border-radius:0 3px 3px 0}

#nameModal{position:fixed;inset:0;z-index:300;background:rgba(3,1,8,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#nameModal h1{font-family:Georgia,serif;color:#d4a94a;font-size:1.4rem;letter-spacing:4px}
#nameModal .sub{color:#556;font-size:.55rem;letter-spacing:2px;margin-bottom:10px}
#nameModal input{background:#0001;border:1px solid #d4a94a44;color:#d4a94a;padding:8px 14px;
  font-family:inherit;font-size:.75rem;text-align:center;border-radius:3px;width:200px;letter-spacing:2px}
#nameModal input::placeholder{color:#d4a94a33}
#nameModal button{background:#d4a94a22;border:1px solid #d4a94a;color:#d4a94a;padding:8px 24px;
  font-family:inherit;font-size:.6rem;letter-spacing:3px;cursor:pointer;border-radius:3px}
#nameModal .info{color:#445;font-size:.45rem;max-width:280px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="nameModal">
  <h1>ENTER MY MIND</h1>
  <div class="sub">GLOBAL VAGAL SYNC</div>
  <input id="nameIn" placeholder="your name" maxlength="16" autocomplete="off">
  <button onclick="go()">ENTER</button>
  <div class="info">Global room. Everyone syncs with everyone.<br>
  Click a player to create a private sub-room.<br>
  Sing, hum, breathe — synchronize your 7 rings.</div>
</div>

<div id="hud" style="display:none">
  <div class="hud-col">
    <div id="title">ENTER MY MIND</div>
    <div id="subtitle">GLOBAL ROOM</div>
    <div id="myName"></div>
    <div id="roomInfo">room: MIND-GLOBAL</div>
    <div id="subRoom" onclick="leaveSub()"></div>
  </div>
  <div class="hud-col right">
    <div id="peerCount">0 minds</div>
  </div>
</div>

<div id="players"></div>
<div id="bands"></div>

<div id="subPanel">
  <div id="subTitle">SUB-ROOM</div>
  <div id="subSync">0%</div>
  <div id="subPhase">ATTUNE</div>
  <div id="subMembers"></div>
  <div id="subLeave" onclick="leaveSub()">✕ LEAVE SUB</div>
</div>

<div id="chat" style="display:none">
  <div id="chatLog"></div>
  <div id="chatRow">
    <input id="chatIn" placeholder="..." maxlength="200" autocomplete="off">
    <button id="chatSend" onclick="sendChat()">↵</button>
  </div>
</div>

<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const P=[2,3,5,7,11,13,17], RCOL=['#993366','#00aadd','#ffaa00','#ff4444','#44aa44','#aa44ff','#cccccc'];
const GLYPHS=['●','〜','┃','♡','△','◐','◯'], LAYERS=['gut','vagus','gate','limbic','exec','insula','witness'];
const BROKERS=['wss://broker.emqx.io:8084/mqtt','wss://broker.hivemq.com:8884/mqtt'];
const GLOBAL_ROOM='MIND-GLOBAL', T2=Math.PI*2;
const PHASES=[
  {name:'ATTUNE',threshold:.15},{name:'RESONATE',threshold:.35},
  {name:'HARMONIZE',threshold:.55},{name:'MERGE',threshold:.75},{name:'ENTANGLED',threshold:.9}
];

let myName='', mqttClient=null, connected=false;
let localStream=null, localAnalyser=null, localBands=new Float32Array(7);
let actx=null;

// peers: {name: {bands:[7], lastSeen, color, ringGroup, rings[], orb}}
const peers={};
let currentSub=null; // null=global, or {id,members:[names]}
const PEER_COLORS=['#0af','#f48','#4f8','#fa4','#a4f','#4ff','#ff4','#f4a','#8af','#af8'];
let colorIdx=0;

// ═══ THREE.JS ═══
const scene=new THREE.Scene(), camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,100);
camera.position.set(0,0,14);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
scene.fog=new THREE.FogExp2(0x030108,.015);
scene.add(new THREE.AmbientLight(0x334455,.5));

// my rings (center)
const myGroup=new THREE.Group();
scene.add(myGroup);
const myRings=[], myOrb;
for(let i=0;i<7;i++){
  const r=1+i*.5, col=new THREE.Color(RCOL[i]);
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(r,.035,8,P[i]*6),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.25,blending:THREE.AdditiveBlending}));
  myGroup.add(ring); myRings.push(ring);
}
const _myOrb=new THREE.Mesh(
  new THREE.IcosahedronGeometry(.35,2),
  new THREE.MeshBasicMaterial({color:0x00aaff,transparent:true,opacity:.35,blending:THREE.AdditiveBlending}));
myGroup.add(_myOrb);

function addPeerVisuals(name){
  const col=new THREE.Color(PEER_COLORS[colorIdx%PEER_COLORS.length]);
  colorIdx++;
  const group=new THREE.Group();
  const rings=[];
  for(let i=0;i<7;i++){
    const r=.6+i*.35;
    const ring=new THREE.Mesh(
      new THREE.TorusGeometry(r,.025,6,P[i]*4),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.2,blending:THREE.AdditiveBlending}));
    group.add(ring); rings.push(ring);
  }
  const orb=new THREE.Mesh(
    new THREE.IcosahedronGeometry(.25,1),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.3,blending:THREE.AdditiveBlending}));
  group.add(orb);
  scene.add(group);
  return {group,rings,orb,color:'#'+col.getHexString()};
}

function removePeerVisuals(p){
  if(p.group) scene.remove(p.group);
}

// ═══ AUDIO ═══
function extractBands(analyser,out){
  if(!analyser)return;
  const buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  const n=buf.length, step=Math.floor(n/7);
  for(let i=0;i<7;i++){
    let sum=0; const lo=i*step, hi=Math.min(lo+step,n);
    for(let j=lo;j<hi;j++) sum+=buf[j];
    out[i]=(sum/(hi-lo))/255;
  }
}

// ═══ SYNC ═══
function calcPairSync(a,b){
  let total=0;
  for(let i=0;i<7;i++) total+=Math.max(0,1-Math.abs(a[i]-b[i])*3);
  return total/7;
}

function getPhase(sync){
  for(let i=PHASES.length-1;i>=0;i--) if(sync>=PHASES[i].threshold) return PHASES[i].name;
  return 'ATTUNE';
}

// ═══ MQTT ═══
function topic(sub){ return 'entermymind/'+GLOBAL_ROOM+'/'+sub; }

function connectMQTT(idx){
  if(idx>=BROKERS.length) return;
  mqttClient=mqtt.connect(BROKERS[idx],{
    clientId:'emm-'+Math.random().toString(36).substr(2,8),
    connectTimeout:5000,keepalive:30,clean:true});
  mqttClient.on('connect',()=>{
    connected=true;
    mqttClient.subscribe(topic('presence'));
    mqttClient.subscribe(topic('bands'));
    mqttClient.subscribe(topic('chat'));
    mqttClient.subscribe(topic('sub'));
    sendPresence(); setInterval(sendPresence,3000);
    setInterval(pruneStale,5000);
  });
  mqttClient.on('error',()=>{ mqttClient.end(); connectMQTT(idx+1); });
  mqttClient.on('message',(t,msg)=>{
    try{
      const d=JSON.parse(msg.toString());
      if(d.from===myName) return;
      const kind=t.split('/').pop();
      if(kind==='presence') onPresence(d);
      else if(kind==='bands') onBands(d);
      else if(kind==='chat') onChat(d);
      else if(kind==='sub') onSub(d);
    }catch(e){}
  });
}

function sendPresence(){
  if(!connected) return;
  mqttClient.publish(topic('presence'),JSON.stringify({
    from:myName,t:Date.now(),sub:currentSub?currentSub.id:null}));
}

function onPresence(d){
  if(!peers[d.from]){
    const vis=addPeerVisuals(d.from);
    peers[d.from]={bands:new Float32Array(7),lastSeen:Date.now(),sub:d.sub||null,...vis};
    addMsg('sys',d.from+' entered');
  }
  peers[d.from].lastSeen=Date.now();
  peers[d.from].sub=d.sub||null;
  updatePlayerList();
}

function onBands(d){
  if(!peers[d.from]) return;
  const b=d.b||[];
  for(let i=0;i<7;i++) peers[d.from].bands[i]=b[i]||0;
}

function onChat(d){ addMsg('remote',d.text,d.from,peers[d.from]?peers[d.from].color:'#888'); }

function onSub(d){
  if(d.action==='invite' && d.target===myName){
    // auto-join sub invites
    currentSub={id:d.subId,members:[d.from,myName]};
    mqttClient.publish(topic('sub'),JSON.stringify({from:myName,action:'join',subId:d.subId}));
    showSub();
    addMsg('sys','joined sub-room with '+d.from);
  } else if(d.action==='join' && currentSub && d.subId===currentSub.id){
    if(!currentSub.members.includes(d.from)) currentSub.members.push(d.from);
    showSub();
  } else if(d.action==='leave' && currentSub && d.subId===currentSub.id){
    currentSub.members=currentSub.members.filter(n=>n!==d.from);
    if(currentSub.members.length<=1) leaveSub();
    else showSub();
  }
}

function pruneStale(){
  const now=Date.now();
  Object.keys(peers).forEach(name=>{
    if(now-peers[name].lastSeen>10000){
      removePeerVisuals(peers[name]);
      delete peers[name];
      addMsg('sys',name+' left');
      updatePlayerList();
    }
  });
}

// ═══ SUB-ROOMS ═══
function inviteToSub(name){
  if(name===myName) return;
  const subId=myName+'-'+name+'-'+Date.now().toString(36);
  currentSub={id:subId,members:[myName,name]};
  mqttClient.publish(topic('sub'),JSON.stringify({
    from:myName,action:'invite',target:name,subId:subId}));
  showSub();
  addMsg('sys','created sub-room, invited '+name);
}

function leaveSub(){
  if(!currentSub) return;
  mqttClient.publish(topic('sub'),JSON.stringify({from:myName,action:'leave',subId:currentSub.id}));
  currentSub=null;
  document.getElementById('subPanel').classList.remove('on');
  document.getElementById('subRoom').textContent='';
  updatePlayerList();
}

function showSub(){
  const sp=document.getElementById('subPanel');
  sp.classList.add('on');
  document.getElementById('subMembers').textContent=currentSub.members.join(', ');
  document.getElementById('subRoom').textContent='in sub-room ('+currentSub.members.length+')';
}

// ═══ PLAYER LIST ═══
function updatePlayerList(){
  const container=document.getElementById('players');
  const names=Object.keys(peers);
  document.getElementById('peerCount').textContent=(names.length+1)+' minds';
  let html='';
  // me first
  html+='<div class="player me"><span class="dot" style="background:#0af"></span><span class="name">'+myName+' (you)</span></div>';
  names.forEach(name=>{
    const p=peers[name];
    const sync=calcPairSync(localBands,p.bands);
    const pct=Math.round(sync*100);
    const inSub=currentSub&&currentSub.members.includes(name);
    html+='<div class="player'+(inSub?' in-sub':'')+'" onclick="inviteToSub(\''+name+'\')">';
    html+='<span class="dot" style="background:'+p.color+'"></span>';
    html+='<span class="name">'+name+'</span>';
    html+='<span class="sync" style="color:hsl('+sync*120+',100%,50%)">'+pct+'%</span></div>';
  });
  container.innerHTML=html;
}

// ═══ BAND UI ═══
function buildBandUI(){
  const container=document.getElementById('bands');
  container.innerHTML='';
  for(let i=0;i<7;i++){
    const d=document.createElement('div');
    d.className='band';d.id='band-'+i;
    d.innerHTML='<span class="band-glyph" style="color:'+RCOL[i]+'">'+GLYPHS[i]+'</span>'+
      '<div class="band-bars"><div class="band-bar me" id="bl-'+i+'"></div></div>'+
      '<span class="band-label">'+LAYERS[i]+'</span>';
    container.appendChild(d);
  }
}

// ═══ CHAT ═══
function addMsg(type,text,name,color){
  const log=document.getElementById('chatLog');
  const div=document.createElement('div');
  div.className='msg'+(type==='sys'?' sys':'');
  if(type==='sys') div.textContent=text;
  else div.innerHTML='<span class="n" style="color:'+(color||'#0af')+'">'+name+'</span> <span class="t">'+text+'</span>';
  log.appendChild(div);
  if(log.children.length>100) log.removeChild(log.firstChild);
  log.scrollTop=log.scrollHeight;
}
function sendChat(){
  const inp=document.getElementById('chatIn'), text=inp.value.trim();
  if(!text||!connected) return;
  mqttClient.publish(topic('chat'),JSON.stringify({from:myName,text:text}));
  addMsg('local',text,myName,'#0af');
  inp.value='';
}
document.getElementById('chatIn').addEventListener('keydown',e=>{
  e.stopPropagation(); if(e.key==='Enter') sendChat();
});

// ═══ 3D LOOP ═══
let lastBandSend=0;
function loop(t){
  requestAnimationFrame(loop);
  extractBands(localAnalyser,localBands);

  if(connected && t-lastBandSend>100){
    mqttClient.publish(topic('bands'),JSON.stringify({from:myName,b:Array.from(localBands)}));
    lastBandSend=t;
  }

  // my rings
  for(let i=0;i<7;i++){
    myRings[i].material.opacity=.15+localBands[i]*.5;
    myRings[i].rotation.z+=(.002+localBands[i]*.008)*(i%2?1:-1);
    myRings[i].scale.setScalar(1+localBands[i]*.12);
    const el=document.getElementById('bl-'+i);
    if(el) el.style.height=(localBands[i]*38+1)+'px';
  }
  _myOrb.material.opacity=.25+localBands[3]*.4;
  _myOrb.scale.setScalar(1+localBands[0]*.25);
  myGroup.rotation.y=Math.sin(t*.0003)*.2;
  myGroup.rotation.x=Math.cos(t*.0002)*.08;

  // peer rings — arrange in circle around center
  const names=Object.keys(peers);
  const n=names.length;
  const radius=5+n*.5;
  names.forEach((name,idx)=>{
    const p=peers[name];
    const ang=(idx/Math.max(n,1))*T2 - Math.PI/2;
    const tx=Math.cos(ang)*radius, tz=Math.sin(ang)*radius;

    // if in same sub-room, pull closer
    const inSub=currentSub&&currentSub.members.includes(name);
    const pull=inSub?0.4:1;
    p.group.position.x+=(tx*pull-p.group.position.x)*.05;
    p.group.position.z+=(tz*pull-p.group.position.z)*.05;
    p.group.position.y=Math.sin(t*.001+idx)*.3;

    // look at center
    p.group.lookAt(0,p.group.position.y,0);

    for(let i=0;i<7;i++){
      p.rings[i].material.opacity=.1+p.bands[i]*.4;
      p.rings[i].rotation.z+=(.002+p.bands[i]*.006)*(i%2?-1:1);
      p.rings[i].scale.setScalar(1+p.bands[i]*.1);
    }
    p.orb.material.opacity=.2+p.bands[3]*.4;
    p.orb.scale.setScalar(1+p.bands[0]*.2);
  });

  // sub-room sync display
  if(currentSub&&currentSub.members.length>1){
    let totalSync=0, count=0;
    currentSub.members.forEach(name=>{
      if(name===myName) return;
      if(peers[name]){
        totalSync+=calcPairSync(localBands,peers[name].bands);
        count++;
      }
    });
    const avg=count?totalSync/count:0;
    const pct=Math.round(avg*100);
    document.getElementById('subSync').textContent=pct+'%';
    document.getElementById('subSync').style.color='hsl('+avg*120+',100%,50%)';
    document.getElementById('subPhase').textContent=getPhase(avg);
  }

  // update player list every 500ms
  if(Math.floor(t/500)!==Math.floor((t-16)/500)) updatePlayerList();

  // camera
  camera.position.x=Math.sin(t*.00008)*2;
  camera.position.y=1+Math.cos(t*.0001)*.5;
  camera.position.z=14-n*.3;
  camera.lookAt(0,0,0);

  const bg=new THREE.Color().setHSL(.75,.2,.02);
  renderer.setClearColor(bg);
  renderer.render(scene,camera);
}

// ═══ GO ═══
async function go(){
  myName=document.getElementById('nameIn').value.trim();
  if(!myName) myName='mind-'+Math.random().toString(36).substr(2,4);
  try{localStorage.setItem('emm-name',myName);}catch(e){}

  document.getElementById('nameModal').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('chat').style.display='block';
  document.getElementById('myName').textContent=myName;

  actx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    const src=actx.createMediaStreamSource(localStream);
    localAnalyser=actx.createAnalyser();
    localAnalyser.fftSize=2048; localAnalyser.smoothingTimeConstant=.82;
    src.connect(localAnalyser);
    if(actx.state==='suspended') await actx.resume();
  }catch(e){}

  buildBandUI();
  connectMQTT(0);
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

try{
  const s=localStorage.getItem('emm-name');
  if(s) document.getElementById('nameIn').value=s;
}catch(e){}
</script>
</body>
</html>
