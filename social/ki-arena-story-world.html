<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Story World</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.6),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#room{font-size:11px;color:#0ff}

/* World HUD */
#worldName{font-size:24px;color:#f80;text-shadow:0 0 12px #f60;letter-spacing:3px}
#biomeName{font-size:14px;color:#4af}
#weather{font-size:11px;color:#888}
#chapter{font-size:12px;color:#ff0}
#worldStats{font-size:10px;color:#666}

/* Story narration */
#storyBar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:60;
  text-align:center;pointer-events:none;max-width:600px;width:90%;
  font-size:15px;color:#fff;line-height:1.5;
  text-shadow:0 0 15px rgba(255,200,100,0.5);
  background:linear-gradient(180deg,transparent,rgba(0,0,0,0.7));
  padding:12px 24px;border-radius:12px;
  opacity:0;transition:opacity 0.8s}
#storyBar.show{opacity:1}

/* Biome transition */
#biomeAnnounce{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);z-index:70;
  text-align:center;opacity:0;transition:opacity 0.6s;pointer-events:none}
#biomeTitle{font-size:32px;font-weight:bold;letter-spacing:4px;
  background:linear-gradient(90deg,#f80,#ff0,#0f0,#0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 15px rgba(255,180,0,0.4))}
#biomeSubtitle{font-size:11px;color:#fff6;margin-top:4px;letter-spacing:2px}
#biomeAnnounce.show{opacity:1}

/* Creature spawn notification */
.creature-spawn{position:fixed;right:16px;z-index:55;
  font-size:11px;color:#0f0;text-shadow:0 0 8px #0f0;
  animation:creatureIn 2s ease-out forwards;pointer-events:none}
@keyframes creatureIn{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-30px)}}

#llmStatus{font-size:9px;color:#555}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div id="worldName"></div>
    <div id="biomeName"></div>
    <div id="weather"></div>
    <div id="chapter">Chapter 0</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="room"></div>
    <div id="worldStats"></div>
    <div id="llmStatus"></div>
  </div>
</div>
<div id="storyBar"></div>
<div id="biomeAnnounce"><div id="biomeTitle"></div><div id="biomeSubtitle"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3"></script>
<script type="module">
import { KI } from '../modules/core.js';
import * as Scene from '../modules/scene.js';
import * as VoiceEngine from '../modules/voice-engine.js';
import * as FreqBands from '../modules/freq-bands-12.js';
import * as Synths from '../modules/synths.js';
import * as Resonance from '../modules/resonance.js';
import * as StoryWorld from '../modules/story-world.js';
import * as MqttNet from '../modules/mqtt-net.js';
import * as WebRTCNet from '../modules/webrtc-net.js';
import * as Presence from '../modules/presence.js';
import * as Chat from '../modules/chat.js';
import * as PlayerProfile from '../modules/player-profile.js';
import * as NavOverlay from '../modules/nav-overlay.js';

const ROOM = 'STORY-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
document.getElementById('room').textContent = ROOM;

window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
  }
};

// HUD updates
KI.on('story-world:update', data => {
  document.getElementById('worldName').textContent = data.worldName;
  document.getElementById('biomeName').textContent = data.biome;
  document.getElementById('weather').textContent = data.weather + ' / day ' + data.dayNight;
  document.getElementById('chapter').textContent = 'Chapter ' + data.chapter + ' / Age ' + data.worldAge;
  document.getElementById('worldStats').textContent =
    data.creatures + ' creatures / ' + data.structures + ' structures';
});

// Story narration
let storyTimer = null;
KI.on('story-world:narration', data => {
  const el = document.getElementById('storyBar');
  el.textContent = data.text;
  el.classList.add('show');
  clearTimeout(storyTimer);
  storyTimer = setTimeout(() => el.classList.remove('show'), 8000);
});

// Biome transitions
let biomeTimer = null;
KI.on('story-world:biome-change', data => {
  const el = document.getElementById('biomeAnnounce');
  document.getElementById('biomeTitle').textContent = data.biome;
  document.getElementById('biomeSubtitle').textContent = 'chapter ' + data.chapter;
  el.classList.add('show');
  clearTimeout(biomeTimer);
  biomeTimer = setTimeout(() => el.classList.remove('show'), 3000);
});

// Creature spawns
let spawnY = 60;
KI.on('story-world:creature-spawn', data => {
  if (!data.name) return;
  const el = document.createElement('div');
  el.className = 'creature-spawn';
  el.textContent = data.name + ' appeared (' + data.count + ')';
  el.style.top = spawnY + 'px';
  spawnY += 18;
  if (spawnY > 200) spawnY = 60;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
});

KI.on('story-world:llm-ready', () => {
  document.getElementById('llmStatus').textContent = 'NARRATOR ACTIVE';
  document.getElementById('llmStatus').style.color = '#0f0';
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 1500 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init();
  Synths.init();
  Resonance.init();
  StoryWorld.init({ position: [0, 0, 0] });
  MqttNet.init({ room: ROOM });
  WebRTCNet.init({ room: ROOM });
  Presence.init();
  Chat.init();
  PlayerProfile.init();
  NavOverlay.init();

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c STORY WORLD BOOTED ', 'background:#000;color:#f80;font-size:22px;padding:12px;text-shadow:0 0 20px #f60');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
