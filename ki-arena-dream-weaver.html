<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Dream Weaver</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.4),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#room{font-size:11px;color:#0ff}

/* Dream HUD */
#dreamTheme{font-size:20px;letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(90deg,#80f,#f08,#08f);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(128,68,255,0.4))}
#dreamDepth{font-size:11px;color:#a8f}
#dreamLucidity{font-size:11px;color:#f8a}
#dreamStability{font-size:11px;color:#8af}
#dreamOrbs{font-size:10px;color:#666}
#dreamSeq{font-size:10px;color:#555}

/* Dream journal entry */
#journalEntry{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:60;
  text-align:center;pointer-events:none;max-width:550px;width:90%;
  font-size:14px;font-style:italic;color:#c8b0ff;line-height:1.6;
  text-shadow:0 0 20px rgba(128,68,255,0.3);
  padding:12px 24px;
  opacity:0;transition:opacity 1s}
#journalEntry.show{opacity:1}

/* Depth meter */
#depthMeter{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:55;
  width:4px;height:200px;background:#111;border-radius:2px;pointer-events:none}
#depthFill{position:absolute;bottom:0;left:0;right:0;border-radius:2px;
  background:linear-gradient(0deg,#80f,#f08);transition:height 0.3s}
#depthLabel{position:absolute;left:10px;bottom:0;font-size:8px;color:#a8f;white-space:nowrap}

/* Lucidity meter */
#lucidityMeter{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:55;
  width:4px;height:200px;background:#111;border-radius:2px;pointer-events:none}
#lucidityFill{position:absolute;bottom:0;left:0;right:0;border-radius:2px;
  background:linear-gradient(0deg,#333,#ff0);transition:height 0.3s}
#lucidityLabel{position:absolute;right:10px;bottom:0;font-size:8px;color:#ff8;white-space:nowrap}

/* Theme transition */
#themeFlash{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:70;
  text-align:center;opacity:0;transition:opacity 0.8s;pointer-events:none;
  font-size:28px;letter-spacing:8px;text-transform:uppercase;
  color:#fff;text-shadow:0 0 30px rgba(128,68,255,0.6)}
#themeFlash.show{opacity:1}

#llmStatus{font-size:9px;color:#555}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div id="dreamTheme">DREAM</div>
    <div id="dreamDepth">depth 0.0</div>
    <div id="dreamLucidity">lucidity 0.0</div>
    <div id="dreamStability">stability 0.0</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="room"></div>
    <div id="dreamOrbs"></div>
    <div id="dreamSeq"></div>
    <div id="llmStatus"></div>
  </div>
</div>
<div id="depthMeter"><div id="depthFill"></div><div id="depthLabel">depth</div></div>
<div id="lucidityMeter"><div id="lucidityFill"></div><div id="lucidityLabel">lucid</div></div>
<div id="journalEntry"></div>
<div id="themeFlash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as DreamWeaver from './modules/dream-weaver.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'DREAM-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
document.getElementById('room').textContent = ROOM;

window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
  }
};

// HUD updates
KI.on('dream-weaver:update', data => {
  document.getElementById('dreamTheme').textContent = data.theme;
  document.getElementById('dreamDepth').textContent = 'depth ' + data.depth.toFixed(2);
  document.getElementById('dreamLucidity').textContent = 'lucidity ' + data.lucidity.toFixed(2);
  document.getElementById('dreamStability').textContent = 'stability ' + data.stability.toFixed(2);
  document.getElementById('dreamOrbs').textContent = data.orbCount + ' orbs';
  document.getElementById('dreamSeq').textContent = 'sequence #' + data.sequence + ' / ' + data.journalLength + ' entries';
  // Meters
  document.getElementById('depthFill').style.height = (data.depth * 100) + '%';
  document.getElementById('lucidityFill').style.height = (data.lucidity * 100) + '%';
});

// Dream journal
let journalTimer = null;
KI.on('dream-weaver:entry', data => {
  const el = document.getElementById('journalEntry');
  el.textContent = '"' + data.text + '"';
  el.classList.add('show');
  clearTimeout(journalTimer);
  journalTimer = setTimeout(() => el.classList.remove('show'), 10000);
});

// Theme transitions
let themeTimer = null;
KI.on('dream-weaver:theme-change', data => {
  const el = document.getElementById('themeFlash');
  el.textContent = data.theme;
  el.classList.add('show');
  clearTimeout(themeTimer);
  themeTimer = setTimeout(() => el.classList.remove('show'), 3000);
});

KI.on('dream-weaver:llm-ready', () => {
  document.getElementById('llmStatus').textContent = 'DREAM AI ACTIVE';
  document.getElementById('llmStatus').style.color = '#a8f';
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 800 }); // minimal stars for dreamlike feel
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init();
  Synths.init();
  Resonance.init();
  DreamWeaver.init({ position: [0, 1, -1] });
  MqttNet.init({ room: ROOM });
  WebRTCNet.init({ room: ROOM });
  Presence.init();
  Chat.init();
  PlayerProfile.init();
  NavOverlay.init();

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c DREAM WEAVER BOOTED ', 'background:#000;color:#a8f;font-size:22px;padding:12px;text-shadow:0 0 20px #80f');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
