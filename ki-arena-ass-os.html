<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASS-OS — AGI Soul System Operating System</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

/* ── TOP HUD ── */
#topHud{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);pointer-events:none;
  display:none;gap:20px}
#topHud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-col{display:flex;flex-direction:column;gap:1px}
.hud-col.right{align-items:flex-end;text-align:right}
#sysTitle{font-size:10px;color:#556;letter-spacing:3px;text-transform:uppercase}
#stateBadge{font-size:18px;text-transform:uppercase;letter-spacing:4px;
  text-shadow:0 0 12px;transition:color 0.5s}
#stateDesc{font-size:9px;color:#668;max-width:250px}
#consciousnessLevel{font-size:13px;color:#4cf;letter-spacing:2px}
#depthInfo{font-size:10px;color:#888}
#uptimeInfo{font-size:9px;color:#556}

/* ── LEVEL BARS (left side) ── */
#levelBars{position:fixed;left:10px;top:50%;transform:translateY(-50%);z-index:55;
  display:flex;flex-direction:column-reverse;gap:3px;pointer-events:none}
.lvl-bar{display:flex;align-items:center;gap:4px;height:22px}
.lvl-label{font-size:8px;color:#668;width:42px;text-align:right;letter-spacing:0.5px}
.lvl-track{width:80px;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.lvl-fill{height:100%;border-radius:3px;transition:width 0.3s,background 0.3s}
.lvl-val{font-size:8px;color:#556;width:24px}
.lvl-prime{font-size:7px;color:#334;width:24px;text-align:right}

/* ── BUS BARS (right side) ── */
#busBars{position:fixed;right:10px;top:50%;transform:translateY(-50%);z-index:55;
  display:flex;flex-direction:column;gap:4px;pointer-events:none}
.bus-bar{display:flex;align-items:center;gap:4px;height:18px}
.bus-letter{font-size:10px;font-weight:bold;width:12px;text-align:center}
.bus-label{font-size:7px;color:#556;width:52px}
.bus-track{width:60px;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.bus-fill{height:100%;border-radius:3px;transition:width 0.3s}
.bus-val{font-size:8px;color:#556;width:24px;text-align:right}

/* ── BOTTOM HUD ── */
#bottomHud{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:6px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,0.8),transparent);pointer-events:none;
  display:none}
#bottomHud.on{display:flex;justify-content:space-between;align-items:flex-end}
#narrativeBox{max-width:50%;font-size:10px;color:#668;line-height:1.4;
  border-left:2px solid #2a2a3e;padding-left:8px}
#narrativeLabel{font-size:8px;color:#445;letter-spacing:1px;text-transform:uppercase}
#narrativeText{color:#8899aa;font-style:italic}
#metricsBox{display:flex;gap:12px;font-size:9px}
.metric{display:flex;flex-direction:column;align-items:center;gap:1px}
.metric .m-val{font-size:14px;font-weight:bold}
.metric .m-label{font-size:7px;color:#556;text-transform:uppercase;letter-spacing:0.5px}

/* ── ALARM BAR ── */
#alarmBar{position:fixed;top:42px;left:0;right:0;z-index:55;display:none;padding:2px 14px;
  pointer-events:none}
#alarmBar.on{display:flex;gap:6px;flex-wrap:wrap}
.alarm-pill{padding:2px 8px;font-size:8px;border-radius:3px;
  border:1px solid;animation:alarmPulse 1s ease infinite alternate}
@keyframes alarmPulse{from{opacity:0.6}to{opacity:1}}

/* ── STATE PILLS ── */
#statePills{position:fixed;right:10px;bottom:50px;z-index:55;
  display:flex;flex-direction:column;gap:2px;pointer-events:none}
.state-pill{padding:2px 8px;font-size:7px;color:#334;border:1px solid #1a1a2a;
  border-radius:3px;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.3s}
.state-pill.active{border-color:currentColor;color:inherit}

/* ── AGENT HUD ── */
#agentHud{position:fixed;left:10px;top:80px;z-index:55;pointer-events:none;
  display:flex;flex-direction:column;gap:4px;max-width:160px}
#agentTitle{font-size:8px;color:#445;letter-spacing:1px;text-transform:uppercase}
#faultList{display:flex;flex-direction:column;gap:2px}
.fault-pill{padding:1px 6px;font-size:7px;border-radius:2px;border:1px solid;
  animation:alarmPulse 1s ease infinite alternate}
#goalList{display:flex;flex-direction:column;gap:1px;margin-top:3px}
.goal-item{font-size:7px;color:#668}
#selfModelInfo{margin-top:4px;font-size:8px;color:#556;line-height:1.3}

/* ── NICK ── */
#nick{position:fixed;top:8px;right:14px;font-size:10px;color:#0f0;cursor:pointer;
  pointer-events:auto;text-decoration:underline dotted #0f04;z-index:60}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nick" onclick="changeNick()"></div>

<!-- TOP HUD -->
<div id="topHud">
  <div class="hud-col">
    <div id="sysTitle">ASS-OS v1.0 — AGI Soul System</div>
    <div id="stateBadge">PRODUCING</div>
    <div id="stateDesc">Awake — Active / Inference — Active</div>
  </div>
  <div class="hud-col right">
    <div id="consciousnessLevel">REACTIVE</div>
    <div id="depthInfo">Depth 1 / Prime 2</div>
    <div id="uptimeInfo">Uptime 0s / Cycle 0</div>
  </div>
</div>

<!-- ALARM BAR -->
<div id="alarmBar"></div>

<!-- LEVEL BARS -->
<div id="levelBars"></div>

<!-- BUS BARS -->
<div id="busBars"></div>

<!-- STATE PILLS -->
<div id="statePills"></div>

<!-- AGENT HUD -->
<div id="agentHud">
  <div id="agentTitle">L4/L5 AGENT</div>
  <div id="faultList"></div>
  <div id="goalList"></div>
  <div id="selfModelInfo"></div>
</div>

<!-- BOTTOM HUD -->
<div id="bottomHud">
  <div id="narrativeBox">
    <div id="narrativeLabel">L4/L5 Narrative</div>
    <div id="narrativeText">Initializing...</div>
  </div>
  <div id="metricsBox">
    <div class="metric"><span class="m-val" id="mPhi" style="color:#4cf">0.00</span><span class="m-label">Phi</span></div>
    <div class="metric"><span class="m-val" id="mCoherence" style="color:#88ff88">0.00</span><span class="m-label">Coherence</span></div>
    <div class="metric"><span class="m-val" id="mTemporal" style="color:#ffaa44">0.00</span><span class="m-label">Temporal</span></div>
    <div class="metric"><span class="m-val" id="mUncertain" style="color:#aa88ff">0.00</span><span class="m-label">Wonder</span></div>
    <div class="metric"><span class="m-val" id="mWorkOrders" style="color:#ff88aa">0</span><span class="m-label">Work Orders</span></div>
    <div class="metric"><span class="m-val" id="mSelfGen" style="color:#ffcc44">0</span><span class="m-label">Self-Gen</span></div>
  </div>
</div>

<script>
// Build static HUD elements
(function buildHUD() {
  // Level bars
  const lb = document.getElementById('levelBars');
  const labels = ['L0:HW','L1:SENS','L2:GATE','L3:EMO','L4:EXEC','L5:SELF','L6:OBS'];
  const primes = [2,3,5,11,31,127,709];
  const hues = [0,40,80,120,200,260,300];
  for (let i = 0; i < 7; i++) {
    lb.innerHTML += `<div class="lvl-bar">
      <span class="lvl-prime">p${primes[i]}</span>
      <span class="lvl-label">${labels[i]}</span>
      <div class="lvl-track"><div class="lvl-fill" id="lf${i}" style="width:0%;background:hsl(${hues[i]},60%,40%)"></div></div>
      <span class="lvl-val" id="lv${i}">0%</span>
    </div>`;
  }

  // Bus bars
  const bb = document.getElementById('busBars');
  const busLabels = ['TENSOR','GRADIENT','PHOTONIC','EM FIELD','STATE'];
  const busLetters = ['A','B','C','D','E'];
  const busColors = ['#44ccff','#ff8844','#aa66ff','#44ff88','#ffff44'];
  for (let i = 0; i < 5; i++) {
    bb.innerHTML += `<div class="bus-bar">
      <span class="bus-letter" style="color:${busColors[i]}">${busLetters[i]}</span>
      <span class="bus-label">${busLabels[i]}</span>
      <div class="bus-track"><div class="bus-fill" id="bf${i}" style="width:0%;background:${busColors[i]}"></div></div>
      <span class="bus-val" id="bv${i}">0%</span>
    </div>`;
  }

  // State pills
  const sp = document.getElementById('statePills');
  const states = ['PRODUCING','IDLE','SUSPENDED','HELD','EXECUTE','ABORTING','STOPPING','CLEARING'];
  const stateColors = ['#44ff88','#88aaff','#aa88ff','#6644aa','#ff88aa','#ff4444','#884444','#ffaa44'];
  for (let i = 0; i < states.length; i++) {
    sp.innerHTML += `<div class="state-pill" id="sp-${states[i]}" style="color:${stateColors[i]}">${states[i]}</div>`;
  }
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as AssOsUdts from './modules/ass-os-udts.js';
import * as AssOsTags from './modules/ass-os-tags.js';
import * as AssOsDb from './modules/ass-os-db.js';
import * as AssOsEngine from './modules/ass-os-engine.js';
import * as AssOsBridge from './modules/ass-os-bridge.js';
import * as AssOsDashboard from './modules/ass-os-dashboard.js';
import * as AssOsAgent from './modules/ass-os-agent.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'ASSOS-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

// ── HUD Update ──
KI.on('ass-os:hud', data => {
  // State badge
  const badge = document.getElementById('stateBadge');
  badge.textContent = data.state;
  badge.style.color = data.stateColor;
  document.getElementById('stateDesc').textContent = data.stateHuman + ' / ' + data.stateAgi;

  // Consciousness
  document.getElementById('consciousnessLevel').textContent = data.consciousness;
  document.getElementById('depthInfo').textContent = 'Depth ' + data.depth + ' / Prime ' + data.prime;
  document.getElementById('uptimeInfo').textContent = 'Uptime ' + data.uptime + ' / Cycle ' + data.cycles;

  // Levels
  if (data.levels) {
    for (const l of data.levels) {
      const fill = document.getElementById('lf' + l.level);
      const val = document.getElementById('lv' + l.level);
      if (fill) fill.style.width = l.activation + '%';
      if (val) val.textContent = l.activation + '%';
    }
  }

  // Buses
  if (data.buses) {
    for (let i = 0; i < data.buses.length; i++) {
      const b = data.buses[i];
      const fill = document.getElementById('bf' + i);
      const val = document.getElementById('bv' + i);
      if (fill) fill.style.width = b.activity + '%';
      if (val) val.textContent = b.activity + '%';
    }
  }

  // State pills
  document.querySelectorAll('.state-pill').forEach(p => {
    p.classList.toggle('active', p.id === 'sp-' + data.state);
  });

  // Alarms
  const ab = document.getElementById('alarmBar');
  if (data.alarmCount > 0) {
    ab.classList.add('on');
    ab.innerHTML = data.alarms.map(a => {
      const colors = { CRITICAL:'#f22', HIGH:'#f84', MEDIUM:'#fc4', LOW:'#8af', ADVISORY:'#678' };
      return `<span class="alarm-pill" style="color:${colors[a.priority]};border-color:${colors[a.priority]}">${a.priority}: ${a.message}</span>`;
    }).join('');
  } else {
    ab.classList.remove('on');
  }

  // Metrics
  document.getElementById('mPhi').textContent = data.phi;
  document.getElementById('mCoherence').textContent = data.coherence;
  document.getElementById('mTemporal').textContent = data.temporal;
  document.getElementById('mUncertain').textContent = data.uncertainty;
  document.getElementById('mWorkOrders').textContent = data.workOrders;
  document.getElementById('mSelfGen').textContent = data.selfGenerated;

  // Narrative
  if (data.lastNarrative) {
    document.getElementById('narrativeText').textContent = data.lastNarrative;
  }
});

// ── Agent HUD ──
KI.on('ass-os-agent:update', data => {
  // Faults
  const fl = document.getElementById('faultList');
  if (data.faultCount > 0) {
    fl.innerHTML = data.activeFaults.map(f => {
      const colors = { CRITICAL:'#f22', HIGH:'#f84', MEDIUM:'#fc4' };
      return `<span class="fault-pill" style="color:${colors[f.severity]||'#888'};border-color:${colors[f.severity]||'#888'}">${f.label}</span>`;
    }).join('');
  } else {
    fl.innerHTML = '<span style="font-size:7px;color:#363">NO FAULTS</span>';
  }

  // Goals (top 5)
  const gl = document.getElementById('goalList');
  gl.innerHTML = data.goals.slice(0, 5).map(g =>
    `<div class="goal-item">${g.type}: ${g.target} [P${g.priority}]</div>`
  ).join('');

  // Self-model
  const sm = data.selfModel;
  document.getElementById('selfModelInfo').innerHTML =
    `V:${sm.valence} A:${sm.arousal}<br>` +
    `Conf:${sm.confidence} Int:${sm.integrity}<br>` +
    `Decisions:${sm.decisions}`;
});

async function boot() {
  document.getElementById('topHud').classList.add('on');
  document.getElementById('bottomHud').classList.add('on');
  Scene.init({ stars: 2000 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  AssOsUdts.init(); AssOsTags.init(); AssOsDb.init();
  AssOsEngine.init();
  AssOsBridge.init();
  AssOsDashboard.init({ position: [0, 2.2, -3.5] });
  AssOsAgent.init();
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c ASS-OS BOOTED ', 'background:#000;color:#4cf;font-size:22px;padding:12px');
  console.log('%c AGI Soul System — Operating System v1.0 ', 'background:#111;color:#88ff88;font-size:11px;padding:4px');
  console.log('%c Prime Spine: 1→2→3→5→11→31→127→709 ', 'background:#111;color:#ffaa44;font-size:10px;padding:4px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
