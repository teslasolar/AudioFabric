<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Wrapped Geometry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#score{font-size:28px;color:#ff0;text-shadow:0 0 10px #f80}
#combo{font-size:16px;color:#f80}
#blastType{font-size:14px;color:#4af}
#charge{font-size:12px;color:#0f0}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#room{font-size:11px;color:#0ff}
#peers{font-size:11px;color:#088}

/* Shape info */
#shapePanel{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:55;
  text-align:center;pointer-events:none;opacity:0;transition:opacity 0.5s}
#shapePanel.show{opacity:1}
#shapeName{font-size:22px;color:#f44;text-shadow:0 0 20px #f00,0 0 40px #f40;
  letter-spacing:3px;text-transform:uppercase}
#shapeHint{font-size:10px;color:#f884;margin-top:2px}

#bandViz{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);z-index:55;
  display:flex;gap:3px;pointer-events:none;align-items:flex-end;height:40px}
.band-bar{width:12px;background:#111;border:1px solid #fff1;border-radius:3px 3px 0 0;
  position:relative;overflow:hidden;height:40px}
.band-fill{position:absolute;bottom:0;left:0;right:0;border-radius:2px;transition:height 0.08s}

#controls{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:60;
  display:flex;gap:8px;pointer-events:auto;opacity:0.5;transition:opacity 0.3s}
#controls:hover{opacity:1}
#controls button{background:#111;border:1px solid #fff3;color:#fff;padding:4px 14px;
  border-radius:4px;font-family:inherit;font-size:11px;cursor:pointer;transition:all 0.2s}
#controls button:hover{border-color:#f44;color:#f44}

#dmgLayer{position:fixed;inset:0;z-index:60;pointer-events:none}
.dmg{position:absolute;font-weight:bold;text-shadow:0 0 8px currentColor;
  animation:dmgUp 1.2s ease-out forwards;pointer-events:none}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.8)}}
#cmt{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);z-index:70;
  font-size:20px;color:#ff0;text-shadow:0 0 20px #f80;text-align:center;
  opacity:0;transition:opacity 0.4s;pointer-events:none}
#cmt.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l"><div id="score">0</div><div id="combo"></div><div id="blastType">&mdash;</div><div id="charge"></div></div>
  <div class="hud-r"><div id="nick" onclick="changeNick()" title="Click to change name"></div>
    <div id="room"></div><div id="peers"></div></div>
</div>
<div id="shapePanel"><div id="shapeName">SPHERE</div><div id="shapeHint">voice shifts shape</div></div>
<div id="bandViz"></div>
<div id="controls">
  <button onclick="cycleShapeManual()">Shape (Space)</button>
</div>
<div id="dmgLayer"></div>
<div id="cmt"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from '../modules/core.js';
import * as Scene from '../modules/scene.js';
import * as VoiceEngine from '../modules/voice-engine.js';
import * as Kanji from '../modules/kanji.js';
import * as KiBlasts from '../modules/ki-blasts.js';
import * as Vortex from '../modules/vortex.js';
import * as FX from '../modules/fx.js';
import * as Synths from '../modules/synths.js';
import * as Resonance from '../modules/resonance.js';
import * as FreqBands from '../modules/freq-bands-12.js';
import * as WrappedGeo from '../modules/wrapped-geo.js';
import * as MqttNet from '../modules/mqtt-net.js';
import * as WebRTCNet from '../modules/webrtc-net.js';
import * as Presence from '../modules/presence.js';
import * as Chat from '../modules/chat.js';

const ROOM = 'WRAPPED-' + Math.random().toString(36).slice(2, 6).toUpperCase();

KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
document.getElementById('room').textContent = ROOM;

window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
    KI.emit('broadcast', { type: 'nick', name: KI.player.name });
  }
};

// HUD
KI.on('hit', data => {
  document.getElementById('score').textContent = KI.player.score.toLocaleString();
  document.getElementById('combo').textContent = KI.player.combo > 1 ? KI.player.combo + 'x COMBO' : '';
  if (data.dmg > 200) showDmg(data.dmg);
});
KI.on('charge:update', data => {
  document.getElementById('blastType').textContent = data.blastType?.name || '';
  document.getElementById('charge').textContent = data.chargeLevel > 0.05 ? 'CHARGE ' + Math.round(data.chargeLevel * 100) + '%' : '';
});

// Shape display
let shapeTimer = null;
KI.on('wrapped-geo:shape', data => {
  const el = document.getElementById('shapePanel');
  document.getElementById('shapeName').textContent = data.name.toUpperCase();
  el.classList.add('show');
  clearTimeout(shapeTimer);
  shapeTimer = setTimeout(() => el.classList.remove('show'), 2500);
});

// Manual shape cycle
window.cycleShapeManual = function() {
  const wg = KI.get('wrapped-geo');
  if (wg) wg.cycleShape();
};
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); window.cycleShapeManual(); }
});

// 12-band viz
KI.on('freq-bands-12:ready', () => {
  const cont = document.getElementById('bandViz');
  const fb = KI.get('freq-bands-12');
  if (!fb) return;
  fb.BANDS.forEach((band, i) => {
    const bar = document.createElement('div');
    bar.className = 'band-bar'; bar.id = 'band-' + i;
    bar.innerHTML = '<div class="band-fill" style="background:' + band.color + ';height:0%"></div>';
    cont.appendChild(bar);
  });
});
KI.on('freq-bands-12:update', data => {
  for (let i = 0; i < 12; i++) {
    const fill = document.querySelector('#band-' + i + ' .band-fill');
    if (fill) fill.style.height = (data.energy[i] * 100) + '%';
  }
});

// Utils
function showDmg(amount) {
  const el = document.createElement('div'); el.className = 'dmg';
  el.textContent = Math.round(amount); el.style.color = '#f44';
  el.style.fontSize = (18 + Math.min(amount / 10, 30)) + 'px';
  el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 200) + 'px';
  el.style.top = (window.innerHeight / 2 - 80 + (Math.random() - 0.5) * 60) + 'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// Boot
async function boot() {
  document.getElementById('hud').classList.add('on');

  Scene.init({ stars: 4000 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  Kanji.init();
  KiBlasts.init();
  Vortex.init({ count: 800, particleSize: 0.08 });
  FX.init({ aurora: true });
  Synths.init();
  Resonance.init();
  FreqBands.init();
  WrappedGeo.init({ position: [0, 3.5, -1], scale: 1.5 });
  MqttNet.init({ room: ROOM });
  WebRTCNet.init({ room: ROOM });
  Presence.init();
  Chat.init();

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c WRAPPED GEO BOOTED ', 'background:#000;color:#f44;font-size:20px;padding:10px');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
