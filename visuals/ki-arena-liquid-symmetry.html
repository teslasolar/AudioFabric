<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Liquid Symmetry</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
/* Symmetry display */
#symOrder{font-size:28px;color:#0fa;text-shadow:0 0 15px #0fa;font-weight:bold}
#symLabel{font-size:9px;color:#666;letter-spacing:1px}
#waveInfo{font-size:10px;color:#888}
/* Wave type indicator */
#waveViz{position:fixed;left:12px;bottom:12px;z-index:55;
  background:rgba(0,0,0,0.7);border:1px solid #fff1;border-radius:6px;
  padding:8px 12px;pointer-events:none}
#waveType{font-size:12px;color:#0fa;text-transform:uppercase;letter-spacing:2px}
#crystalCount{font-size:10px;color:#af8}
#nodalCount{font-size:10px;color:#888}
/* Symmetry rosette (visual indicator of current symmetry) */
#rosette{position:fixed;right:12px;bottom:12px;z-index:55;width:80px;height:80px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div id="symLabel">FOLD SYMMETRY</div>
    <div id="symOrder">4</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="waveInfo"></div>
  </div>
</div>
<div id="waveViz">
  <div id="waveType">sine</div>
  <div id="crystalCount">0 crystals</div>
  <div id="nodalCount">0 nodal points</div>
</div>
<canvas id="rosette" width="80" height="80"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from '../modules/core.js';
import * as Scene from '../modules/scene.js';
import * as VoiceEngine from '../modules/voice-engine.js';
import * as FreqBands from '../modules/freq-bands-12.js';
import * as Synths from '../modules/synths.js';
import * as Resonance from '../modules/resonance.js';
import * as LiquidSymmetry from '../modules/liquid-symmetry.js';
import * as MqttNet from '../modules/mqtt-net.js';
import * as WebRTCNet from '../modules/webrtc-net.js';
import * as Presence from '../modules/presence.js';
import * as Chat from '../modules/chat.js';
import * as PlayerProfile from '../modules/player-profile.js';
import * as NavOverlay from '../modules/nav-overlay.js';

const ROOM = 'CYMTC-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

const rosetteCanvas = document.getElementById('rosette');
const rCtx = rosetteCanvas.getContext('2d');

function drawRosette(order) {
  rCtx.clearRect(0, 0, 80, 80);
  const cx = 40, cy = 40, r = 30;
  rCtx.strokeStyle = '#0fa';
  rCtx.lineWidth = 1;
  rCtx.globalAlpha = 0.4;
  for (let i = 0; i < order; i++) {
    const a1 = (i / order) * Math.PI * 2 - Math.PI / 2;
    const a2 = ((i + 1) / order) * Math.PI * 2 - Math.PI / 2;
    rCtx.beginPath();
    rCtx.moveTo(cx, cy);
    rCtx.lineTo(cx + Math.cos(a1) * r, cy + Math.sin(a1) * r);
    rCtx.stroke();
    // Arc
    rCtx.beginPath();
    rCtx.arc(cx, cy, r, a1, a2);
    rCtx.stroke();
    // Source dot
    rCtx.fillStyle = '#0fa';
    rCtx.beginPath();
    rCtx.arc(cx + Math.cos(a1) * r, cy + Math.sin(a1) * r, 3, 0, Math.PI * 2);
    rCtx.fill();
  }
  rCtx.globalAlpha = 0.2;
  rCtx.fillStyle = '#0fa';
  rCtx.font = '10px monospace';
  rCtx.textAlign = 'center';
  rCtx.fillText(order + '-fold', cx, cy + 3);
}

KI.on('liquid-symmetry:update', data => {
  document.getElementById('symOrder').textContent = data.symmetryOrder;
  document.getElementById('waveInfo').textContent = 'freq ' + data.waveFreq + ' / ' + data.sourceCount + ' sources';
  document.getElementById('waveType').textContent = data.waveType;
  document.getElementById('crystalCount').textContent = data.crystalCount + ' crystals';
  document.getElementById('nodalCount').textContent = data.nodalCount + ' nodal points';
  drawRosette(data.symmetryOrder);
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 600 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  LiquidSymmetry.init({ position: [0, 1.5, -3] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  drawRosette(4);
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c LIQUID SYMMETRY BOOTED ', 'background:#000;color:#0fa;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
