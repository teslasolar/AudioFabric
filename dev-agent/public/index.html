<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFabric Dev Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080f;--panel:#0d0d18;--panel2:#111122;--border:#1a1a2a;--border2:#252538;
  --accent:#44aaff;--green:#44ff88;--orange:#ffaa22;--red:#ff4455;--purple:#aa88ff;--pink:#ff66aa;
  --text:#ccd;--dim:#556;--xdim:#334
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Courier New',monospace;font-size:13px}
button,input,select,textarea{font:inherit;color:inherit}

/* ── TOP BAR ── */
#topbar{height:38px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:10px;user-select:none}
.logo{color:var(--accent);font-weight:bold;font-size:14px;letter-spacing:1px}
.logo .sub{color:var(--pink);font-size:10px}
#branchBadge{color:var(--orange);font-size:10px;background:rgba(255,170,34,.06);
  padding:2px 8px;border-radius:3px;border:1px solid rgba(255,170,34,.12)}
.tb-btn{background:rgba(255,255,255,.03);color:var(--dim);border:1px solid var(--border);
  padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;transition:all .2s}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.green:hover{border-color:var(--green);color:var(--green)}
.tb-btn.orange:hover{border-color:var(--orange);color:var(--orange)}
#statusMsg{margin-left:auto;font-size:10px;color:var(--dim);max-width:300px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}

/* ── MAIN GRID ── */
#grid{display:grid;grid-template-columns:220px 1fr 360px;height:calc(100vh - 38px);gap:1px;background:var(--border)}

/* ── LEFT PANEL ── */
#leftPanel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.panelHead{padding:6px 10px;border-bottom:1px solid var(--border);font-size:10px;
  text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;
  justify-content:space-between;user-select:none;flex-shrink:0}
.panelHead.files{color:var(--accent)}.panelHead.git{color:var(--orange)}
.panelHead.arenas{color:var(--pink)}.panelHead.mods{color:var(--purple)}

/* File tree */
#fileTree{flex:1;overflow-y:auto;padding:2px 0}
.tree-item{padding:3px 6px 3px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;
  font-size:11px;border-left:2px solid transparent;transition:all .12s}
.tree-item:hover{background:rgba(68,170,255,.06)}
.tree-item.active{background:rgba(68,170,255,.1);border-left-color:var(--accent)}
.tree-item .icon{font-size:9px;width:12px;text-align:center;flex-shrink:0}
.tree-item .icon.dir{color:var(--orange)}.tree-item .icon.js{color:#ffdd44}
.tree-item .icon.html{color:#ff6644}.tree-item .icon.css{color:#44aaff}
.tree-item .icon.other{color:var(--dim)}
.tree-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-item .sz{color:var(--xdim);font-size:9px}
.tree-dir{padding-left:10px}

/* Git section */
#gitSection{border-top:1px solid var(--border);max-height:200px;overflow-y:auto;flex-shrink:0}
.git-file{padding:2px 10px;font-size:10px;display:flex;gap:6px}
.git-file .gs{width:16px;text-align:center;font-weight:bold}
.gs.M{color:var(--orange)}.gs.A{color:var(--green)}.gs.D{color:var(--red)}.gs.U{color:var(--purple)}

/* Arena gallery */
#arenaSection{border-top:1px solid var(--border);max-height:220px;overflow-y:auto;flex-shrink:0}
.arena-item{padding:3px 10px;cursor:pointer;font-size:10px;display:flex;align-items:center;gap:5px;
  transition:background .12s}
.arena-item:hover{background:rgba(255,102,170,.06)}
.arena-item .arena-dot{width:6px;height:6px;border-radius:50%;background:var(--pink)}
.arena-item .arena-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CENTER: EDITOR + PREVIEW ── */
#center{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
#edTabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);
  overflow-x:auto;min-height:28px;align-items:flex-end;flex-shrink:0}
.ed-tab{padding:4px 10px;cursor:pointer;color:var(--dim);font-size:11px;white-space:nowrap;
  border-bottom:2px solid transparent;display:flex;align-items:center;gap:4px;transition:all .12s}
.ed-tab:hover{color:var(--text)}.ed-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ed-tab .close{font-size:12px;color:var(--dim);cursor:pointer}.ed-tab .close:hover{color:var(--red)}
#viewBtns{display:flex;gap:2px;margin-left:auto;padding-right:8px;align-items:center}
.vbtn{padding:2px 6px;cursor:pointer;font-size:9px;color:var(--dim);border:1px solid transparent;
  border-radius:3px;transition:all .12s}
.vbtn:hover{color:var(--text)}.vbtn.active{color:var(--accent);border-color:var(--accent)}

#edBody{flex:1;display:flex;overflow:hidden}
#codePane{flex:1;overflow:hidden;display:flex;flex-direction:column}
#codeArea{flex:1;width:100%;background:var(--bg);color:var(--text);border:none;resize:none;
  padding:8px 12px;font:12px/1.5 'Courier New',monospace;outline:none;tab-size:2}
#previewPane{flex:1;overflow:hidden;display:none;border-left:1px solid var(--border)}
#previewPane.show{display:block}
#previewFrame{width:100%;height:100%;border:none;background:#000}

#edStatus{height:20px;display:flex;align-items:center;padding:0 10px;font-size:9px;color:var(--dim);
  border-top:1px solid var(--border);background:var(--panel);gap:10px;flex-shrink:0}

/* ── RIGHT: CHAT / AGENT ── */
#rightPanel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
#chatMessages{flex:1;overflow-y:auto;padding:8px}
.msg{margin-bottom:8px;padding:6px 8px;border-radius:6px;font-size:11px;line-height:1.5;
  white-space:pre-wrap;word-wrap:break-word}
.msg.user{background:rgba(68,170,255,.08);border-left:2px solid var(--accent)}
.msg.agent{background:rgba(68,255,136,.06);border-left:2px solid var(--green)}
.msg.system{background:rgba(170,136,255,.06);border-left:2px solid var(--purple);font-size:10px}
.msg.error{background:rgba(255,68,85,.08);border-left:2px solid var(--red)}
.msg .role{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;
  color:var(--dim)}
.msg code{background:rgba(255,255,255,.05);padding:1px 4px;border-radius:2px;font-size:11px}
.msg pre{background:rgba(0,0,0,.3);padding:6px;border-radius:4px;margin:4px 0;overflow-x:auto;
  font-size:10px}

/* Settings section */
#settingsSection{border-top:1px solid var(--border);padding:6px 8px;flex-shrink:0;display:none}
#settingsSection.show{display:block}
#settingsSection label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
#settingsSection input,#settingsSection select{width:100%;background:var(--bg);border:1px solid var(--border);
  padding:3px 6px;font-size:11px;border-radius:3px;margin:2px 0 6px 0}
#settingsSection input:focus,#settingsSection select:focus{border-color:var(--accent);outline:none}

/* Chat input */
#chatInput{display:flex;border-top:1px solid var(--border);background:var(--panel2);flex-shrink:0}
#chatInput textarea{flex:1;background:transparent;border:none;padding:8px 10px;font-size:12px;
  resize:none;outline:none;min-height:40px;max-height:120px}
#chatInput button{background:var(--accent);color:#000;border:none;padding:6px 14px;cursor:pointer;
  font-weight:bold;font-size:11px;transition:opacity .2s}
#chatInput button:hover{opacity:0.8}

/* Tool badges */
#toolBar{display:flex;flex-wrap:wrap;gap:3px;padding:4px 8px;border-top:1px solid var(--border);
  flex-shrink:0}
.tool-badge{padding:2px 6px;font-size:8px;border:1px solid var(--border);border-radius:3px;
  cursor:pointer;color:var(--dim);transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.tool-badge:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">AudioFabric <span class="sub">DEV AGENT</span></span>
  <span id="branchBadge">loading...</span>
  <button class="tb-btn" onclick="refreshAll()">Refresh</button>
  <button class="tb-btn green" onclick="gitCommitPush()">Commit + Push</button>
  <button class="tb-btn orange" onclick="scaffoldOrb()">+ New Orb</button>
  <button class="tb-btn" onclick="toggleSettings()">Settings</button>
  <span id="statusMsg">starting...</span>
</div>

<!-- MAIN GRID -->
<div id="grid">
  <!-- LEFT: File tree + git + arenas -->
  <div id="leftPanel">
    <div class="panelHead files">Files <span id="fileCount" style="color:var(--dim);font-size:9px"></span></div>
    <div id="fileTree"></div>
    <div class="panelHead git">Git <span id="gitFileCount" style="color:var(--dim);font-size:9px"></span></div>
    <div id="gitSection"></div>
    <div class="panelHead arenas">Arenas <span id="arenaCount" style="color:var(--dim);font-size:9px"></span></div>
    <div id="arenaSection"></div>
  </div>

  <!-- CENTER: Editor + Preview -->
  <div id="center">
    <div id="edTabs">
      <div id="viewBtns">
        <span class="vbtn active" data-view="code" onclick="setView('code')">Code</span>
        <span class="vbtn" data-view="split" onclick="setView('split')">Split</span>
        <span class="vbtn" data-view="preview" onclick="setView('preview')">Preview</span>
      </div>
    </div>
    <div id="edBody">
      <div id="codePane"><textarea id="codeArea" spellcheck="false" placeholder="Select a file..."></textarea></div>
      <div id="previewPane"><iframe id="previewFrame"></iframe></div>
    </div>
    <div id="edStatus">
      <span id="edPath">No file</span>
      <span id="edSize"></span>
      <span id="edLang"></span>
    </div>
  </div>

  <!-- RIGHT: Chat Agent -->
  <div id="rightPanel">
    <div class="panelHead" style="color:var(--green)">Agent Chat</div>
    <div id="settingsSection">
      <label>Provider</label>
      <select id="llmProvider">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="local">Local (no API key)</option>
      </select>
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-... or sk-ant-...">
      <label>Model</label>
      <input type="text" id="llmModel" placeholder="auto">
    </div>
    <div id="chatMessages"></div>
    <div id="toolBar">
      <span class="tool-badge" onclick="runTool('git_status')">git status</span>
      <span class="tool-badge" onclick="runTool('list_modules')">modules</span>
      <span class="tool-badge" onclick="runTool('search',{query:'TODO'})">find TODOs</span>
      <span class="tool-badge" onclick="loadArenaList()">arenas</span>
      <span class="tool-badge" onclick="scaffoldOrb()">scaffold orb</span>
    </div>
    <div id="chatInput">
      <textarea id="chatText" placeholder="Ask the agent... (Enter to send)" rows="2"></textarea>
      <button onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin
let openFiles = new Map();  // path -> content
let activeFile = null;
let chatHistory = [];
let currentView = 'code';

// ═══ INIT ═══
async function init() {
  status('Loading...');
  // Load saved settings
  const savedKey = localStorage.getItem('af-api-key');
  const savedProvider = localStorage.getItem('af-provider');
  if (savedKey) document.getElementById('apiKey').value = savedKey;
  if (savedProvider) document.getElementById('llmProvider').value = savedProvider;

  await Promise.all([loadFileTree(), loadGitStatus(), loadArenaList()]);
  addSystemMsg('AudioFabric Dev Agent ready. ' +
    'Use chat to ask questions, scaffold modules, manage git, or explore the codebase.');
  status('Ready');

  // Save settings on change
  document.getElementById('apiKey').addEventListener('change', saveSettings);
  document.getElementById('llmProvider').addEventListener('change', saveSettings);
}

function saveSettings() {
  localStorage.setItem('af-api-key', document.getElementById('apiKey').value);
  localStorage.setItem('af-provider', document.getElementById('llmProvider').value);
}

// ═══ FILE TREE ═══
async function loadFileTree() {
  const resp = await fetch(API + '/api/files/tree?depth=3');
  const data = await resp.json();
  renderTree(data.tree, document.getElementById('fileTree'), 0);
  document.getElementById('fileCount').textContent = '(' + countFiles(data.tree) + ')';
}

function countFiles(tree) {
  let n = 0;
  for (const item of tree) {
    if (item.type === 'file') n++;
    else if (item.children) n += countFiles(item.children);
  }
  return n;
}

function renderTree(tree, container, depth) {
  container.innerHTML = '';
  for (const item of tree) {
    const el = document.createElement('div');
    el.className = 'tree-item';
    el.style.paddingLeft = (10 + depth * 12) + 'px';

    const iconCls = item.type === 'dir' ? 'dir' :
      item.ext === '.js' ? 'js' : item.ext === '.html' ? 'html' :
      item.ext === '.css' ? 'css' : 'other';
    const icon = item.type === 'dir' ? '▸' : '◆';

    el.innerHTML = `<span class="icon ${iconCls}">${icon}</span>` +
      `<span class="name">${item.name}</span>` +
      (item.size ? `<span class="sz">${formatSize(item.size)}</span>` : '');

    if (item.type === 'file') {
      el.onclick = () => openFile(item.path);
    } else if (item.children?.length) {
      const childDiv = document.createElement('div');
      childDiv.className = 'tree-dir';
      childDiv.style.display = 'none';
      renderTree(item.children, childDiv, depth + 1);
      el.onclick = () => {
        const show = childDiv.style.display === 'none';
        childDiv.style.display = show ? 'block' : 'none';
        el.querySelector('.icon').textContent = show ? '▾' : '▸';
      };
      container.appendChild(el);
      container.appendChild(childDiv);
      continue;
    }
    container.appendChild(el);
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'b';
  return (bytes / 1024).toFixed(1) + 'k';
}

// ═══ FILE OPERATIONS ═══
async function openFile(path) {
  status('Loading ' + path + '...');
  const resp = await fetch(API + '/api/files/read?path=' + encodeURIComponent(path));
  const data = await resp.json();
  if (!data.ok) { status('Error: ' + data.error); return; }

  openFiles.set(path, data.content);
  activeFile = path;
  document.getElementById('codeArea').value = data.content;
  document.getElementById('edPath').textContent = path;
  document.getElementById('edSize').textContent = formatSize(data.size);
  document.getElementById('edLang').textContent = path.split('.').pop();

  updateTabs();

  // If HTML, update preview
  if (path.endsWith('.html')) {
    document.getElementById('previewFrame').src = '/repo/' + path;
  }
  status('Opened ' + path);
}

async function saveFile() {
  if (!activeFile) return;
  const content = document.getElementById('codeArea').value;
  status('Saving ' + activeFile + '...');
  const resp = await fetch(API + '/api/files/write', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: activeFile, content })
  });
  const data = await resp.json();
  if (data.ok) {
    openFiles.set(activeFile, content);
    status('Saved ' + activeFile);
    loadGitStatus();
  } else {
    status('Error: ' + data.error);
  }
}

function updateTabs() {
  const tabsEl = document.getElementById('edTabs');
  // Remove existing file tabs (keep view buttons)
  tabsEl.querySelectorAll('.ed-tab').forEach(t => t.remove());
  const viewBtns = document.getElementById('viewBtns');

  for (const [path] of openFiles) {
    const tab = document.createElement('div');
    tab.className = 'ed-tab' + (path === activeFile ? ' active' : '');
    tab.innerHTML = `${path.split('/').pop()} <span class="close" onclick="event.stopPropagation();closeTab('${path}')">×</span>`;
    tab.onclick = () => openFile(path);
    tabsEl.insertBefore(tab, viewBtns);
  }
}

function closeTab(path) {
  openFiles.delete(path);
  if (activeFile === path) {
    activeFile = openFiles.size > 0 ? [...openFiles.keys()][0] : null;
    if (activeFile) openFile(activeFile);
    else {
      document.getElementById('codeArea').value = '';
      document.getElementById('edPath').textContent = 'No file';
    }
  }
  updateTabs();
}

// Ctrl+S to save
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
});

// ═══ EDITOR VIEW ═══
function setView(mode) {
  currentView = mode;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.toggle('active', b.dataset.view === mode));
  const code = document.getElementById('codePane');
  const preview = document.getElementById('previewPane');
  if (mode === 'code') { code.style.display = 'flex'; preview.classList.remove('show'); }
  else if (mode === 'preview') { code.style.display = 'none'; preview.classList.add('show'); }
  else { code.style.display = 'flex'; preview.classList.add('show'); }
}

// ═══ GIT ═══
async function loadGitStatus() {
  const resp = await fetch(API + '/api/git/status');
  const data = await resp.json();
  document.getElementById('branchBadge').textContent = data.branch;

  const gitEl = document.getElementById('gitSection');
  gitEl.innerHTML = '';
  for (const f of data.files) {
    const div = document.createElement('div');
    div.className = 'git-file';
    const statusChar = f.status.charAt(0) || f.status;
    div.innerHTML = `<span class="gs ${statusChar}">${f.status}</span><span>${f.path}</span>`;
    div.style.cursor = 'pointer';
    div.onclick = () => openFile(f.path);
    gitEl.appendChild(div);
  }
  document.getElementById('gitFileCount').textContent = '(' + data.files.length + ' changed)';
}

async function gitCommitPush() {
  const msg = prompt('Commit message:');
  if (!msg) return;
  status('Adding files...');
  await fetch(API + '/api/git/add', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: ['.'] }) });
  status('Committing...');
  const commitResp = await fetch(API + '/api/git/commit', { method: 'POST',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
  const commitData = await commitResp.json();
  if (!commitData.ok) { status('Commit failed: ' + JSON.stringify(commitData.result)); return; }
  status('Pushing...');
  const pushResp = await fetch(API + '/api/git/push', { method: 'POST',
    headers: { 'Content-Type': 'application/json' } });
  const pushData = await pushResp.json();
  status(pushData.ok ? 'Pushed to ' + pushData.branch : 'Push failed');
  loadGitStatus();
  addAgentMsg('Committed and pushed: "' + msg + '"');
}

// ═══ ARENAS ═══
async function loadArenaList() {
  const resp = await fetch(API + '/api/arenas/list');
  const data = await resp.json();
  const el = document.getElementById('arenaSection');
  el.innerHTML = '';
  for (const a of data.arenas) {
    const div = document.createElement('div');
    div.className = 'arena-item';
    div.innerHTML = `<span class="arena-dot"></span><span class="arena-name">${a.name}</span>`;
    div.onclick = () => {
      document.getElementById('previewFrame').src = '/repo/' + a.file;
      setView('preview');
    };
    el.appendChild(div);
  }
  document.getElementById('arenaCount').textContent = '(' + data.count + ')';
}

// ═══ SCAFFOLD ═══
async function scaffoldOrb() {
  const name = prompt('Orb name (e.g. "magma-orb"):');
  if (!name) return;
  const desc = prompt('Short description:', name + ' voice-reactive orb');
  const modesStr = prompt('5 vowel modes (comma-separated):', 'alpha,beta,gamma,delta,omega');
  const modes = modesStr ? modesStr.split(',').map(m => m.trim()) : ['alpha','beta','gamma','delta','omega'];

  status('Scaffolding ' + name + '...');
  const resp = await fetch(API + '/api/scaffold/orb', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, description: desc, vowelModes: modes })
  });
  const data = await resp.json();
  if (data.ok) {
    status('Created ' + data.module + ' + ' + data.arena);
    addAgentMsg('Scaffolded new orb:\n  Module: ' + data.module + '\n  Arena: ' + data.arena +
      '\n  Modes: ' + modes.join(', ') + '\n\nRemember to add to arena-assembler.js!');
    await Promise.all([loadFileTree(), loadArenaList(), loadGitStatus()]);
    openFile(data.module);
  } else {
    status('Error: ' + (data.error || 'Unknown'));
  }
}

// ═══ CHAT / AGENT ═══
function addSystemMsg(text) {
  appendMsg('system', text);
}
function addAgentMsg(text) {
  appendMsg('agent', text);
}
function addUserMsg(text) {
  appendMsg('user', text);
}
function addErrorMsg(text) {
  appendMsg('error', text);
}

function appendMsg(role, text) {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = role === 'user' ? 'You' : role === 'agent' ? 'Agent' : role === 'error' ? 'Error' : 'System';
  // Basic markdown: code blocks, inline code, bold
  let html = escapeHtml(text)
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  div.innerHTML = `<div class="role">${label}</div>${html}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendChat() {
  const input = document.getElementById('chatText');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMsg(text);
  chatHistory.push({ role: 'user', content: text });

  // Check for quick local commands
  const lower = text.toLowerCase();
  if (lower.startsWith('/save')) { saveFile(); return; }
  if (lower.startsWith('/commit')) { gitCommitPush(); return; }
  if (lower.startsWith('/status')) { runTool('git_status'); return; }
  if (lower.startsWith('/modules')) { runTool('list_modules'); return; }
  if (lower.startsWith('/scaffold')) { scaffoldOrb(); return; }
  if (lower.startsWith('/open ')) {
    const path = text.slice(6).trim();
    openFile(path);
    return;
  }
  if (lower.startsWith('/preview ')) {
    const arena = text.slice(9).trim();
    document.getElementById('previewFrame').src = '/repo/ki-arena-' + arena + '.html';
    setView('preview');
    addAgentMsg('Previewing ki-arena-' + arena + '.html');
    return;
  }
  if (lower === '/help') {
    addSystemMsg('Commands:\n  /save - Save current file\n  /commit - Commit + push\n  /status - Git status\n  /modules - List modules\n  /scaffold - Create new orb\n  /open <path> - Open file\n  /preview <name> - Preview arena\n  /help - This help\n\nOr just type natural language to chat with the LLM agent.');
    return;
  }

  // Send to LLM
  const provider = document.getElementById('llmProvider').value;
  const apiKey = document.getElementById('apiKey').value;
  const model = document.getElementById('llmModel').value;

  status('Thinking...');
  try {
    const resp = await fetch(API + '/api/llm/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chatHistory.slice(-20),
        provider, apiKey: apiKey || undefined, model: model || undefined
      })
    });
    const data = await resp.json();
    if (data.ok) {
      addAgentMsg(data.response);
      chatHistory.push({ role: 'assistant', content: data.response });
      if (data.note) status(data.note);
      else status('Ready');

      // Check if response contains tool calls (simple pattern matching)
      await processAgentActions(data.response);
    } else {
      addErrorMsg(data.error || 'Unknown error');
      status('Error');
    }
  } catch (e) {
    addErrorMsg('Network error: ' + e.message);
    status('Error');
  }
}

async function processAgentActions(response) {
  // Simple pattern: if agent mentions creating a file or running a tool, auto-execute
  const toolMatch = response.match(/\[TOOL:(\w+)\s+([\s\S]*?)\]/);
  if (toolMatch) {
    const [, tool, argsStr] = toolMatch;
    try {
      const args = JSON.parse(argsStr);
      await runTool(tool, args);
    } catch (e) { /* ignore parse errors */ }
  }
}

// ═══ TOOL EXECUTION ═══
async function runTool(tool, args = {}) {
  status('Running ' + tool + '...');
  try {
    const resp = await fetch(API + '/api/llm/tool', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tool, args })
    });
    const data = await resp.json();
    addAgentMsg(`[${tool}]\n${data.result || 'Done'}`);
    status('Ready');

    // Refresh relevant panels
    if (tool.startsWith('git')) loadGitStatus();
    if (tool === 'list_modules' || tool === 'scaffold_orb') { loadFileTree(); loadArenaList(); }
  } catch (e) {
    addErrorMsg('Tool error: ' + e.message);
    status('Error');
  }
}

// ═══ UI HELPERS ═══
function status(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

function toggleSettings() {
  document.getElementById('settingsSection').classList.toggle('show');
}

function refreshAll() {
  loadFileTree(); loadGitStatus(); loadArenaList();
  status('Refreshed');
}

// Enter to send in chat
document.getElementById('chatText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// Boot
init();
</script>
