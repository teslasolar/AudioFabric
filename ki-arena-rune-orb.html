<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Rune Orb</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#runeSchool{font-size:16px;color:#f90;text-shadow:0 0 12px #f90;text-transform:uppercase;letter-spacing:3px}
#sigilCount{font-size:11px;color:#888}
#glowInfo{font-size:10px;color:#666}
#schoolPills{position:fixed;right:12px;bottom:12px;z-index:55;display:flex;gap:4px;pointer-events:none}
.sch-pill{padding:3px 10px;font-size:9px;color:#664;border:1px solid #fff1;
  border-radius:10px;background:rgba(0,0,0,0.4);transition:all 0.3s}
.sch-pill.active{border-color:#f904}
.sch-pill[data-school="ELDER"].active{color:#f90}
.sch-pill[data-school="VOID"].active{color:#a6f}
.sch-pill[data-school="CELESTIAL"].active{color:#4cf}
.sch-pill[data-school="BLOOD"].active{color:#f44}
.sch-pill[data-school="ARCANE"].active{color:#f4c}
#glowMeter{position:fixed;left:12px;bottom:12px;z-index:55;width:6px;height:80px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#glowFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#420,#f90,#fca);
  border-radius:3px;transition:height 0.15s}
#glowLabel{position:fixed;left:22px;bottom:12px;z-index:55;font-size:8px;color:#864;
  writing-mode:vertical-rl;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:9px;color:#555;letter-spacing:2px">RUNE ORB</div>
    <div id="runeSchool">ELDER</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="sigilCount">0/24 sigils</div>
    <div id="glowInfo">glow 0%</div>
  </div>
</div>
<div id="schoolPills">
  <div class="sch-pill active" data-school="ELDER">elder</div>
  <div class="sch-pill" data-school="VOID">void</div>
  <div class="sch-pill" data-school="CELESTIAL">celestial</div>
  <div class="sch-pill" data-school="BLOOD">blood</div>
  <div class="sch-pill" data-school="ARCANE">arcane</div>
</div>
<div id="glowMeter"><div id="glowFill" style="height:0%"></div></div>
<div id="glowLabel">RUNE</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as RuneOrb from './modules/rune-orb.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'RUNE-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

const SCHOOL_COLORS = {
  ELDER: '#f90', VOID: '#a6f', CELESTIAL: '#4cf', BLOOD: '#f44', ARCANE: '#f4c'
};

KI.on('rune-orb:update', data => {
  const schoolEl = document.getElementById('runeSchool');
  schoolEl.textContent = data.runeSchool;
  schoolEl.style.color = SCHOOL_COLORS[data.runeSchool] || '#f90';
  schoolEl.style.textShadow = '0 0 12px ' + (SCHOOL_COLORS[data.runeSchool] || '#f90');
  document.getElementById('sigilCount').textContent = data.activeSigils + '/' + data.totalSigils + ' sigils';
  document.getElementById('glowInfo').textContent = 'glow ' + data.runeGlow + '%';
  document.getElementById('glowFill').style.height = data.runeGlow + '%';
  document.querySelectorAll('.sch-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.school === data.runeSchool);
  });
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 800 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  RuneOrb.init({ position: [0, 2.5, -3.5] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c RUNE ORB BOOTED ', 'background:#000;color:#f90;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
