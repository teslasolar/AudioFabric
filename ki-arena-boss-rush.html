<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena BOSS RUSH — Solo Voice Boss Battles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

/* === TOP HUD === */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:12px 20px;
  background:linear-gradient(180deg,rgba(0,0,0,0.85),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-c,.hud-r{display:flex;flex-direction:column;gap:3px}
.hud-c{align-items:center}
.hud-r{align-items:flex-end;text-align:right}
#score{font-size:32px;color:#ff0;text-shadow:0 0 12px #f80}
#combo{font-size:18px;color:#f80}
#blastType{font-size:14px;color:#4af}
#waveLabel{font-size:16px;color:#f44;letter-spacing:3px;text-shadow:0 0 10px #f44}
#bossName{font-size:22px;color:#ff0;text-shadow:0 0 14px #f80;letter-spacing:2px}
#waveSub{font-size:10px;color:#fff5}

/* === BOSS HP BAR === */
#bossHPBar{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:55;
  width:500px;max-width:80%;pointer-events:none;opacity:0;transition:opacity 0.3s}
#bossHPBar.on{opacity:1}
#bossHPLabel{display:flex;justify-content:space-between;font-size:10px;color:#fff8;margin-bottom:3px}
#bossHPTrack{height:14px;background:#111;border:1px solid #f44;border-radius:7px;overflow:hidden;
  position:relative}
#bossHPFill{height:100%;background:linear-gradient(90deg,#f44,#ff4444);border-radius:6px;
  transition:width 0.15s;width:100%;position:relative}
#bossHPFill::after{content:'';position:absolute;inset:0 0 0 0;
  background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent);border-radius:6px}
#bossHPPhases{position:absolute;top:0;left:0;right:0;bottom:0;display:flex}
.boss-phase-mark{height:100%;border-right:2px solid rgba(0,0,0,0.5);flex:1}

/* === PLAYER HP BAR === */
#playerHP{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:55;
  width:300px;max-width:60%;pointer-events:none}
#playerHPLabel{font-size:9px;color:#0f08;text-align:center;margin-bottom:2px}
#playerHPTrack{height:8px;background:#111;border:1px solid #0f04;border-radius:4px;overflow:hidden}
#playerHPFill{height:100%;background:linear-gradient(90deg,#0a0,#0f0);border-radius:3px;
  transition:width 0.15s;width:100%}

/* === RESONANCE HUD === */
#resHUD{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0;transition:opacity 0.4s}
#resHUD.on{opacity:1}
#resKanji{font-size:80px;line-height:1;text-shadow:0 0 30px currentColor,0 0 60px currentColor;
  text-align:center;transition:color 0.3s}
#resLabel{font-size:9px;color:#fff5;text-align:center;margin-top:3px;letter-spacing:2px}
#resDepth{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.depth-layer{display:flex;align-items:center;gap:6px;opacity:0.2;transition:opacity 0.3s,transform 0.3s}
.depth-layer.active{opacity:1;transform:translateX(4px)}
.depth-layer.peak{opacity:1;transform:translateX(8px)}
.depth-dot{width:10px;height:10px;border-radius:50%;border:1px solid;transition:background 0.3s,box-shadow 0.3s}
.depth-layer.active .depth-dot{box-shadow:0 0 8px currentColor}
.depth-layer.peak .depth-dot{background:currentColor;box-shadow:0 0 12px currentColor,0 0 24px currentColor}
.depth-name{font-size:9px;letter-spacing:1px}
.depth-mult{font-size:8px;color:#ff08;margin-left:auto}
#resProgress{width:100%;height:2px;background:#111;border-radius:1px;margin-top:5px;overflow:hidden}
#resProgressFill{height:100%;width:0%;background:#fff;transition:width 0.08s,background 0.3s}
#resSustain{font-size:8px;color:#fff3;text-align:center;margin-top:3px;font-variant-numeric:tabular-nums}
#resMultiplier{font-size:20px;color:#ff0;text-align:center;margin-top:4px;
  text-shadow:0 0 10px #f80;opacity:0;transition:opacity 0.3s}
#resMultiplier.on{opacity:1}

/* === KANJI HUD === */
#kanjiHUD{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:55;
  text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s}
#kanjiHUD.on{opacity:1}
#kanjiChar{font-size:60px;line-height:1;text-shadow:0 0 25px currentColor,0 0 50px currentColor}
#kanjiName{font-size:9px;color:#fff8;margin-top:3px}
#kanjiReading{font-size:7px;color:#fff4}

/* === MORPH BALL === */
#morphBall{position:fixed;right:16px;bottom:60px;z-index:55;pointer-events:none;
  filter:drop-shadow(0 0 16px rgba(255,200,0,0.4))}

/* === BOSS ATTACK WARNING === */
#bossAtk{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:80;
  font-size:28px;color:#f44;text-shadow:0 0 20px #f44,0 0 40px #f004;letter-spacing:6px;
  opacity:0;transition:opacity 0.15s;pointer-events:none}
#bossAtk.show{opacity:1;animation:atkPulse 0.6s ease-in-out}
@keyframes atkPulse{0%{transform:translate(-50%,-50%) scale(0.5)}
  50%{transform:translate(-50%,-50%) scale(1.3)}100%{transform:translate(-50%,-50%) scale(1)}}

/* === BOSS INTRO OVERLAY === */
#bossIntro{position:fixed;inset:0;z-index:150;display:none;
  background:rgba(0,0,0,0.9);align-items:center;justify-content:center;flex-direction:column}
#bossIntro.show{display:flex}
#introWave{font-size:16px;color:#f448;letter-spacing:6px;margin-bottom:10px}
#introName{font-size:50px;color:#ff0;text-shadow:0 0 30px #f80,0 0 60px #ff04;letter-spacing:4px}
#introTitle{font-size:14px;color:#f44;margin-top:8px;letter-spacing:3px}
#introHP{font-size:12px;color:#fff4;margin-top:20px}
#introWeakness{font-size:11px;color:#0ff;margin-top:6px}

/* === GAME OVER === */
#gameOver{position:fixed;inset:0;z-index:200;display:none;
  background:rgba(0,0,0,0.9);align-items:center;justify-content:center;flex-direction:column}
#gameOver.show{display:flex}
#goTitle{font-size:60px;color:#f44;text-shadow:0 0 30px #f44}
#goScore{font-size:22px;color:#ff0;margin-top:16px}
#goWaves{font-size:16px;color:#0ff;margin-top:8px}
#goBtn{margin-top:30px;padding:12px 32px;font-size:16px;background:#f44;color:#fff;
  border:none;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:2px}
#goBtn:hover{background:#f66}

/* === VICTORY === */
#victory{position:fixed;inset:0;z-index:200;display:none;
  background:rgba(0,0,0,0.85);align-items:center;justify-content:center;flex-direction:column}
#victory.show{display:flex}
#vicTitle{font-size:50px;color:#ff0;text-shadow:0 0 40px #f80,0 0 80px #ff04;letter-spacing:4px}
#vicSub{font-size:18px;color:#0f0;margin-top:12px}
#vicScore{font-size:22px;color:#0ff;margin-top:16px}
#vicBtn{margin-top:30px;padding:12px 32px;font-size:16px;background:#ff0;color:#000;
  border:none;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:2px}
#vicBtn:hover{background:#fc0}

/* === DAMAGE LAYER === */
#dmgLayer{position:fixed;inset:0;z-index:60;pointer-events:none}
.dmg{position:absolute;font-weight:bold;text-shadow:0 0 10px currentColor,0 0 20px currentColor;
  animation:dmgUp 1.4s ease-out forwards;pointer-events:none}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-140px) scale(2)}}

/* === COMMENTARY === */
#cmt{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:70;
  background:rgba(0,0,0,0.85);border:2px solid #ff0;border-radius:14px;padding:10px 24px;
  font-size:18px;color:#ff0;text-shadow:0 0 12px #f80;text-align:center;
  max-width:600px;opacity:0;transition:opacity 0.3s;pointer-events:none}
#cmt.show{opacity:1}

/* === SCREEN FLASH === */
#hitFlash{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;
  background:radial-gradient(circle,rgba(255,0,0,0.3),transparent 60%)}
#hitFlash.flash{opacity:1;animation:flashOut 0.4s ease-out forwards}
@keyframes flashOut{0%{opacity:0.6}100%{opacity:0}}

/* === MODULE BADGES === */
#modBadges{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:6px;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:80%}
.mod-badge{background:#0002;border:1px solid #f803;border-radius:4px;padding:2px 8px;
  font-size:8px;color:#f808;letter-spacing:1px}
.mod-badge.active{color:#f80;border-color:#f804}

#version{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:50;
  font-size:9px;color:#333;letter-spacing:3px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-l">
    <div id="score">0</div>
    <div id="combo"></div>
    <div id="blastType">—</div>
  </div>
  <div class="hud-c">
    <div id="waveLabel">WAVE 1</div>
    <div id="bossName">—</div>
    <div id="waveSub">Get Ready</div>
  </div>
  <div class="hud-r"></div>
</div>

<!-- BOSS HP BAR -->
<div id="bossHPBar">
  <div id="bossHPLabel"><span id="bossHPName">BOSS</span><span id="bossHPPct">100%</span></div>
  <div id="bossHPTrack">
    <div id="bossHPFill"></div>
    <div id="bossHPPhases"></div>
  </div>
</div>

<!-- PLAYER HP -->
<div id="playerHP">
  <div id="playerHPLabel">YOUR SPIRIT</div>
  <div id="playerHPTrack"><div id="playerHPFill"></div></div>
</div>

<!-- RESONANCE HUD -->
<div id="resHUD">
  <div id="resKanji">気</div>
  <div id="resLabel">RESONANCE</div>
  <div id="resDepth"></div>
  <div id="resProgress"><div id="resProgressFill"></div></div>
  <div id="resSustain">0.0s</div>
  <div id="resMultiplier">1x</div>
</div>

<!-- KANJI HUD -->
<div id="kanjiHUD">
  <div id="kanjiChar">気</div>
  <div id="kanjiName">Spirit</div>
  <div id="kanjiReading">KI</div>
</div>

<!-- MORPH BALL -->
<canvas id="morphBall" width="150" height="150"></canvas>

<!-- BOSS ATTACK WARNING -->
<div id="bossAtk">INCOMING!</div>

<!-- BOSS INTRO -->
<div id="bossIntro">
  <div id="introWave">WAVE 1</div>
  <div id="introName">—</div>
  <div id="introTitle">—</div>
  <div id="introHP">HP: —</div>
  <div id="introWeakness">WEAKNESS: —</div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
  <div id="goTitle">DEFEATED</div>
  <div id="goScore">Score: 0</div>
  <div id="goWaves">Waves Cleared: 0</div>
  <button id="goBtn" onclick="restartRush()">TRY AGAIN</button>
</div>

<!-- VICTORY -->
<div id="victory">
  <div id="vicTitle">全勝 ALL BOSSES DEFEATED</div>
  <div id="vicSub">Ultimate Voice Warrior!</div>
  <div id="vicScore">Score: 0</div>
  <button id="vicBtn" onclick="restartRush()">PLAY AGAIN</button>
</div>

<div id="dmgLayer"></div>
<div id="cmt"></div>
<div id="hitFlash"></div>
<div id="modBadges"></div>
<div id="version">KI ARENA BOSS RUSH</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
// ============================================================
// KI ARENA BOSS RUSH — SOLO BOSS BATTLES
//
// Features:
//   - 7 escalating boss fights with unique patterns
//   - Boss HP bar with phase marks
//   - Player HP with damage from boss attacks
//   - Boss intro screens
//   - Attack warnings
//   - Resonance depth combat (deeper layers = more boss damage)
//   - Morphing ki-balls
//   - Boss weakness system (certain vowels do bonus damage)
// ============================================================

import { KI } from './modules/core.js';
import * as Scene from './modules/hd-scene.js';
import * as Vortex from './modules/hd-vortex.js';
import * as FX from './modules/hd-fx.js';
import * as Resonance from './modules/resonance.js';
import * as ResonanceSynths from './modules/resonance-synths.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as Kanji from './modules/kanji.js';
import * as KiBlasts from './modules/ki-blasts.js';
import * as EmojiSystem from './modules/emoji-system.js';

// ============================================================
// BOSS DEFINITIONS
// ============================================================
const BOSSES = [
  {
    name: 'KAZE NO SENSHI', title: 'Wind Warrior',
    hp: 2000, atkInterval: 3.0, atkDmg: 40, atkName: 'GALE SLASH',
    color: '#44ffaa', weakness: 'eh', weakMult: 2.0,
    phases: 1, desc: 'Weak to wind vowel (eh)'
  },
  {
    name: 'HINOTE', title: 'The Ember',
    hp: 3500, atkInterval: 2.5, atkDmg: 55, atkName: 'FLAME BURST',
    color: '#ff4444', weakness: 'ah', weakMult: 2.0,
    phases: 2, desc: 'Weak to fire vowel (ah)'
  },
  {
    name: 'RAIJŪ', title: 'Thunder Beast',
    hp: 5000, atkInterval: 2.0, atkDmg: 65, atkName: 'LIGHTNING FANG',
    color: '#ffff00', weakness: 'ee', weakMult: 1.8,
    phases: 2, desc: 'Weak to lightning vowel (ee)'
  },
  {
    name: 'MIZUCHI', title: 'Water Dragon',
    hp: 7000, atkInterval: 2.2, atkDmg: 70, atkName: 'TIDAL WAVE',
    color: '#4488ff', weakness: 'oo', weakMult: 1.8,
    phases: 3, desc: 'Weak to water vowel (oo)'
  },
  {
    name: 'DAIDARABOTCHI', title: 'The Mountain Giant',
    hp: 10000, atkInterval: 3.5, atkDmg: 120, atkName: 'EARTHQUAKE',
    color: '#aa6622', weakness: 'mm', weakMult: 2.0,
    phases: 3, desc: 'Slow but devastating. Weak to earth vowel (mm)'
  },
  {
    name: 'YAMI NO KAGE', title: 'The Shadow',
    hp: 12000, atkInterval: 1.5, atkDmg: 50, atkName: 'VOID SLICE',
    color: '#8800ff', weakness: 'oh', weakMult: 1.5,
    phases: 4, desc: 'Lightning fast attacks. Weak to spirit vowel (oh)'
  },
  {
    name: 'AMATERASU', title: 'Sun Goddess — Final Boss',
    hp: 18000, atkInterval: 1.8, atkDmg: 90, atkName: 'DIVINE RAY',
    color: '#ffffff', weakness: null, weakMult: 1.0,
    phases: 5, desc: 'No weakness. Master all elements to survive.'
  }
];

// ============================================================
// RUSH STATE
// ============================================================
const RUSH = {
  wave: 0,
  bossHP: 0,
  bossMaxHP: 0,
  playerHP: 1000,
  maxPlayerHP: 1000,
  boss: null,
  phase: 0,
  atkTimer: 0,
  active: false,
  introTimer: 0,
  totalDmgDealt: 0,
  wavesCleared: 0,
  bossEnraged: false
};

// === BUILD RESONANCE HUD ===
function buildResHUD() {
  const cont = document.getElementById('resDepth');
  Resonance.LAYERS.forEach((layer, i) => {
    const d = document.createElement('div');
    d.className = 'depth-layer'; d.id = 'dL-' + i;
    const c6 = '#' + layer.color.toString(16).padStart(6, '0');
    d.innerHTML =
      '<div class="depth-dot" style="color:'+c6+';border-color:'+c6+'"></div>' +
      '<span class="depth-name" style="color:'+c6+'">' + layer.name.toUpperCase() + '</span>' +
      '<span class="depth-mult">' + layer.mult + 'x</span>';
    cont.appendChild(d);
  });
}

// === RESONANCE HUD UPDATES ===
let currentLayer = -1;
KI.on('resonance:update', data => {
  const resHUD = document.getElementById('resHUD');
  if (data.activeLayer >= 0 || data.sustainTime > 0.1) resHUD.classList.add('on');
  else resHUD.classList.remove('on');

  Resonance.LAYERS.forEach((layer, i) => {
    const el = document.getElementById('dL-' + i);
    if (!el) return;
    el.classList.toggle('active', i <= data.activeLayer);
    el.classList.toggle('peak', i === data.peakLayer && data.activeLayer >= 0);
  });

  const fill = document.getElementById('resProgressFill');
  fill.style.width = (data.layerProgress * 100) + '%';
  if (data.activeLayer >= 0)
    fill.style.background = '#' + Resonance.LAYERS[data.activeLayer].color.toString(16).padStart(6, '0');

  document.getElementById('resSustain').textContent = data.sustainTime.toFixed(1) + 's';

  const multEl = document.getElementById('resMultiplier');
  if (data.multiplier > 1) {
    multEl.classList.add('on');
    multEl.textContent = Math.round(data.multiplier * 10) / 10 + 'x';
    multEl.style.color = data.activeLayer >= 0 ?
      '#' + Resonance.LAYERS[data.activeLayer].color.toString(16).padStart(6, '0') : '#ff0';
  } else { multEl.classList.remove('on'); }

  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[data.vowel];
  if (kj && data.activeLayer >= 0) {
    document.getElementById('resKanji').textContent = kj.char;
    document.getElementById('resKanji').style.color =
      '#' + Resonance.LAYERS[data.activeLayer].color.toString(16).padStart(6, '0');
    document.getElementById('resLabel').textContent =
      Resonance.LAYERS[Math.max(0, data.activeLayer)].name.toUpperCase();
  }
  currentLayer = data.activeLayer;
});

// === RESONANCE RELEASE -> BOSS DAMAGE ===
KI.on('resonance:release', data => {
  if (!RUSH.active || !RUSH.boss) return;

  const auraPos = KI._scene?.aura?.position || new THREE.Vector3(0, 2.5, 5);
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[data.vowel];
  const blastType = kj?.blast || 'kiball';

  KI.voice.chargeLevel = Math.min(1, data.multiplier / 8);
  KI.voice.energy = Math.max(KI.voice.energy, data.multiplier * 0.05);

  const blastMod = KI.get('ki-blasts');
  if (blastMod) blastMod.fireBlast(blastType, Math.min(1, data.multiplier / 4), auraPos);

  // calculate boss damage
  let bossDmg = data.multiplier * 35 * (1 + data.coherenceBonus);

  // weakness bonus
  if (RUSH.boss.weakness && data.vowel === RUSH.boss.weakness) {
    bossDmg *= RUSH.boss.weakMult;
    showCmt('SUPER EFFECTIVE! ' + (kj?.char || '') + ' x' + RUSH.boss.weakMult + '!');
  }

  // layer bonus
  bossDmg *= (1 + data.layer * 0.3);

  RUSH.bossHP -= bossDmg;
  RUSH.totalDmgDealt += bossDmg;
  KI.player.score += Math.round(bossDmg);
  document.getElementById('score').textContent = KI.player.score.toLocaleString();
  showBossDmg(bossDmg, data.vowel);
  updateBossHP();

  // check boss phase transitions
  const hpPct = RUSH.bossHP / RUSH.bossMaxHP;
  const newPhase = Math.floor((1 - hpPct) * RUSH.boss.phases);
  if (newPhase > RUSH.phase) {
    RUSH.phase = newPhase;
    RUSH.boss.atkInterval *= 0.85; // faster attacks each phase
    RUSH.boss.atkDmg *= 1.15;     // harder hits
    showCmt(RUSH.boss.name + ' ENRAGES! Phase ' + (RUSH.phase + 1) + '!');
    // boss flash
    const bossBar = document.getElementById('bossHPFill');
    bossBar.style.background = 'linear-gradient(90deg,' + RUSH.boss.color + ',#fff,' + RUSH.boss.color + ')';
    setTimeout(() => {
      bossBar.style.background = 'linear-gradient(90deg,' + RUSH.boss.color + ',' + RUSH.boss.color + 'aa)';
    }, 500);
  }

  // check boss death
  if (RUSH.bossHP <= 0) {
    RUSH.bossHP = 0;
    updateBossHP();
    RUSH.wavesCleared++;
    RUSH.wave++;
    KI.player.score += 500 * RUSH.wave;
    document.getElementById('score').textContent = KI.player.score.toLocaleString();

    if (RUSH.wave >= BOSSES.length) {
      // ALL BOSSES DEFEATED
      showVictory();
    } else {
      showCmt(RUSH.boss.name + ' DEFEATED! +' + (500 * RUSH.wave) + ' bonus!');
      // heal player partially
      RUSH.playerHP = Math.min(RUSH.maxPlayerHP, RUSH.playerHP + 300);
      updatePlayerHP();
      setTimeout(() => startBoss(RUSH.wave), 3000);
    }
    RUSH.active = false;
  }

  if (data.layer >= 4) showCmt('SINGULARITY vs ' + RUSH.boss.name + '!');
  else if (data.layer >= 3) showCmt('OVERTONE BARRAGE!');
});

// === CHARGE HUD ===
KI.on('charge:update', data => {
  document.getElementById('blastType').textContent = data.blastType.name;
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const khud = document.getElementById('kanjiHUD');
  if (KI.voice.vowel && KI.voice.sounding && KANJI[KI.voice.vowel]) {
    const kj = KANJI[KI.voice.vowel];
    khud.classList.add('on');
    document.getElementById('kanjiChar').textContent = kj.char;
    document.getElementById('kanjiChar').style.color = kj.color;
    document.getElementById('kanjiName').textContent = kj.name;
    document.getElementById('kanjiReading').textContent = kj.reading;
  } else { khud.classList.remove('on'); }
});

// === HIT SCORING ===
KI.on('hit', data => {
  document.getElementById('score').textContent = KI.player.score.toLocaleString();
  document.getElementById('combo').textContent = KI.player.combo > 1 ? KI.player.combo + 'x COMBO' : '';
});

// ============================================================
// BOSS FIGHT LOGIC
// ============================================================
function startBoss(idx) {
  const boss = { ...BOSSES[idx] };
  RUSH.boss = boss;
  RUSH.bossHP = boss.hp;
  RUSH.bossMaxHP = boss.hp;
  RUSH.phase = 0;
  RUSH.atkTimer = boss.atkInterval;
  RUSH.bossEnraged = false;

  // show boss intro
  showBossIntro(idx, boss);
}

function showBossIntro(idx, boss) {
  RUSH.active = false;
  const intro = document.getElementById('bossIntro');
  document.getElementById('introWave').textContent = 'WAVE ' + (idx + 1);
  document.getElementById('introName').textContent = boss.name;
  document.getElementById('introName').style.color = boss.color;
  document.getElementById('introTitle').textContent = boss.title;
  document.getElementById('introHP').textContent = 'HP: ' + boss.hp.toLocaleString();
  document.getElementById('introWeakness').textContent = boss.weakness ?
    'WEAKNESS: ' + boss.weakness.toUpperCase() + ' vowel' : 'NO WEAKNESS';
  intro.classList.add('show');

  setTimeout(() => {
    intro.classList.remove('show');
    RUSH.active = true;
    // setup boss HP bar
    document.getElementById('bossHPBar').classList.add('on');
    document.getElementById('bossHPName').textContent = boss.name;
    document.getElementById('bossHPFill').style.background =
      'linear-gradient(90deg,' + boss.color + ',' + boss.color + 'aa)';
    // phase marks
    const phasesCont = document.getElementById('bossHPPhases');
    phasesCont.innerHTML = '';
    for (let i = 0; i < boss.phases; i++) {
      const m = document.createElement('div');
      m.className = 'boss-phase-mark';
      phasesCont.appendChild(m);
    }
    updateBossHP();
    // HUD
    document.getElementById('waveLabel').textContent = 'WAVE ' + (idx + 1);
    document.getElementById('bossName').textContent = boss.name;
    document.getElementById('bossName').style.color = boss.color;
    document.getElementById('waveSub').textContent = boss.desc;
  }, 3000);
}

function updateBossHP() {
  const pct = Math.max(0, RUSH.bossHP / RUSH.bossMaxHP);
  document.getElementById('bossHPFill').style.width = (pct * 100) + '%';
  document.getElementById('bossHPPct').textContent = Math.round(pct * 100) + '%';
}

function updatePlayerHP() {
  const pct = Math.max(0, RUSH.playerHP / RUSH.maxPlayerHP);
  document.getElementById('playerHPFill').style.width = (pct * 100) + '%';
  if (pct < 0.3) {
    document.getElementById('playerHPFill').style.background = 'linear-gradient(90deg,#f44,#f66)';
  } else {
    document.getElementById('playerHPFill').style.background = 'linear-gradient(90deg,#0a0,#0f0)';
  }
}

// === BOSS ATTACK CYCLE ===
function updateBoss(dt) {
  if (!RUSH.active || !RUSH.boss) return;

  RUSH.atkTimer -= dt;
  if (RUSH.atkTimer <= 0) {
    RUSH.atkTimer = RUSH.boss.atkInterval;

    // boss attacks player
    const dmg = RUSH.boss.atkDmg * (1 + Math.random() * 0.3);
    RUSH.playerHP -= dmg;
    updatePlayerHP();

    // show attack warning
    const atk = document.getElementById('bossAtk');
    atk.textContent = RUSH.boss.atkName + '!';
    atk.style.color = RUSH.boss.color;
    atk.classList.remove('show');
    void atk.offsetWidth;
    atk.classList.add('show');
    setTimeout(() => atk.classList.remove('show'), 800);

    // hit flash
    const flash = document.getElementById('hitFlash');
    flash.classList.remove('flash');
    void flash.offsetWidth;
    flash.classList.add('flash');

    showDmg(dmg, 'boss');

    // check player death
    if (RUSH.playerHP <= 0) {
      RUSH.playerHP = 0;
      updatePlayerHP();
      RUSH.active = false;
      showGameOver();
    }
  }

  // enrage at 20% HP
  if (!RUSH.bossEnraged && RUSH.bossHP / RUSH.bossMaxHP < 0.2) {
    RUSH.bossEnraged = true;
    RUSH.boss.atkInterval *= 0.6;
    RUSH.boss.atkDmg *= 1.5;
    showCmt(RUSH.boss.name + ' IS ENRAGED! FINISH IT!');
  }
}

// === GAME OVER / VICTORY ===
function showGameOver() {
  document.getElementById('bossHPBar').classList.remove('on');
  document.getElementById('goScore').textContent = 'Score: ' + KI.player.score.toLocaleString();
  document.getElementById('goWaves').textContent = 'Waves Cleared: ' + RUSH.wavesCleared + '/' + BOSSES.length;
  document.getElementById('gameOver').classList.add('show');
}

function showVictory() {
  document.getElementById('bossHPBar').classList.remove('on');
  document.getElementById('vicScore').textContent = 'Score: ' + KI.player.score.toLocaleString() +
    ' | Total Damage: ' + Math.round(RUSH.totalDmgDealt).toLocaleString();
  document.getElementById('victory').classList.add('show');
  showCmt('全勝 ALL BOSSES DEFEATED!');
}

window.restartRush = function() {
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('victory').classList.remove('show');
  RUSH.wave = 0;
  RUSH.playerHP = 1000;
  RUSH.wavesCleared = 0;
  RUSH.totalDmgDealt = 0;
  RUSH.bossEnraged = false;
  KI.player.score = 0;
  document.getElementById('score').textContent = '0';
  updatePlayerHP();
  startBoss(0);
};

// === MORPH BALL ===
const morphCanvas = document.getElementById('morphBall');
const mCtx = morphCanvas.getContext('2d');

function drawMorphBall(t) {
  const W = 150, cx = W / 2, cy = W / 2;
  mCtx.clearRect(0, 0, W, W);

  const layer = Math.max(0, currentLayer);
  const lc = Resonance.LAYERS[layer]?.color || 0x4488ff;
  const r = (lc >> 16) & 0xff, g = (lc >> 8) & 0xff, b = lc & 0xff;
  const sides = [0, 60, 5, 4, 3][layer];
  const baseR = 32 + currentLayer * 5;
  const wobble = Math.sin(t * 3) * 3;

  // glow
  const grad = mCtx.createRadialGradient(cx, cy, baseR * 0.4, cx, cy, baseR * 2);
  grad.addColorStop(0, 'rgba('+r+','+g+','+b+',0.3)');
  grad.addColorStop(1, 'rgba('+r+','+g+','+b+',0)');
  mCtx.fillStyle = grad;
  mCtx.beginPath(); mCtx.arc(cx, cy, baseR * 2, 0, Math.PI * 2); mCtx.fill();

  // shape
  mCtx.save();
  mCtx.translate(cx, cy);
  mCtx.rotate(t * 0.5);
  mCtx.beginPath();
  if (sides === 0) {
    mCtx.arc(0, 0, baseR + wobble, 0, Math.PI * 2);
  } else {
    for (let i = 0; i <= sides; i++) {
      const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
      const rr = baseR + wobble + Math.sin(t * 5 + i) * 2;
      if (i === 0) mCtx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else mCtx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    mCtx.closePath();
  }
  mCtx.fillStyle = 'rgba('+r+','+g+','+b+',0.5)';
  mCtx.strokeStyle = 'rgb('+r+','+g+','+b+')';
  mCtx.lineWidth = 2;
  mCtx.fill(); mCtx.stroke();

  // core
  const cG = mCtx.createRadialGradient(0, 0, 0, 0, 0, baseR * 0.5);
  cG.addColorStop(0, 'rgba(255,255,255,0.8)');
  cG.addColorStop(1, 'rgba('+r+','+g+','+b+',0)');
  mCtx.fillStyle = cG;
  mCtx.beginPath(); mCtx.arc(0, 0, baseR * 0.5, 0, Math.PI * 2); mCtx.fill();

  // sparks
  for (let i = 0; i < 3 + layer * 2; i++) {
    const a = (i / (3 + layer * 2)) * Math.PI * 2 + t * 2;
    const sr = baseR + 10 + Math.sin(t * 4 + i * 2) * 6;
    mCtx.beginPath();
    mCtx.arc(Math.cos(a) * sr, Math.sin(a) * sr, 1.5, 0, Math.PI * 2);
    mCtx.fillStyle = 'rgba(255,255,255,0.6)';
    mCtx.fill();
  }

  // boss weakness indicator on ball
  if (RUSH.boss?.weakness && KI.voice?.vowel === RUSH.boss.weakness) {
    mCtx.strokeStyle = RUSH.boss.color;
    mCtx.lineWidth = 3;
    mCtx.beginPath();
    mCtx.arc(0, 0, baseR + 16, 0, Math.PI * 2);
    mCtx.stroke();
    mCtx.fillStyle = RUSH.boss.color + '66';
    mCtx.font = 'bold 10px monospace';
    mCtx.textAlign = 'center';
    mCtx.fillText('SUPER EFFECTIVE', 0, baseR + 30);
  }

  mCtx.restore();
}

// === DAMAGE DISPLAY ===
function showDmg(amount, type) {
  const el = document.createElement('div'); el.className = 'dmg';
  if (type === 'boss') {
    el.textContent = '-' + Math.round(amount);
    el.style.color = RUSH.boss?.color || '#f44';
    el.style.left = (KI.W / 2 + (Math.random() - 0.5) * 100) + 'px';
    el.style.top = (KI.H * 0.6 + (Math.random() - 0.5) * 30) + 'px';
  } else {
    el.textContent = Math.round(amount);
    el.style.color = '#ff0';
    el.style.left = (KI.W / 2 + (Math.random() - 0.5) * 140) + 'px';
    el.style.top = (KI.H / 2 - 60 + (Math.random() - 0.5) * 50) + 'px';
  }
  el.style.fontSize = (18 + Math.min(amount / 8, 30)) + 'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function showBossDmg(amount, vowel) {
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[vowel || 'mm'];
  const el = document.createElement('div'); el.className = 'dmg';
  const isWeak = RUSH.boss?.weakness === vowel;
  el.textContent = (kj ? kj.char + ' ' : '') + Math.round(amount) + (isWeak ? '!' : '');
  el.style.color = isWeak ? '#0f0' : '#ff0';
  el.style.fontSize = (20 + Math.min(amount / 6, 36) + (isWeak ? 8 : 0)) + 'px';
  el.style.left = (KI.W / 2 + (Math.random() - 0.5) * 160) + 'px';
  el.style.top = (80 + (Math.random() - 0.5) * 40) + 'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// === COMMENTARY ===
let cmtTimeout = null;
function showCmt(text) {
  if (cmtTimeout) clearTimeout(cmtTimeout);
  if (text.length > 80) text = text.slice(0, 80) + '...';
  const el = document.getElementById('cmt'); el.textContent = text; el.classList.add('show');
  cmtTimeout = setTimeout(() => { el.classList.remove('show'); cmtTimeout = null; }, 3000);
}

function showModuleBadge(name) {
  const b = document.createElement('div'); b.className = 'mod-badge active';
  b.textContent = name.toUpperCase();
  document.getElementById('modBadges').appendChild(b);
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  document.getElementById('hud').classList.add('on');

  // 1. HD Scene
  Scene.init({ stars: 6000 });
  showModuleBadge('hd-scene');

  // 2. Kanji
  Kanji.init();
  showModuleBadge('kanji');

  // 3. Resonance
  Resonance.init();
  buildResHUD();
  showModuleBadge('resonance');

  // 4. HD Vortex
  Vortex.init({ count: 3000, particleSize: 0.12 });
  showModuleBadge('hd-vortex');

  // 5. Ki Blasts
  KiBlasts.init();
  showModuleBadge('blasts');

  // 6. Emoji
  EmojiSystem.init();
  showModuleBadge('emoji');

  // 7. HD FX
  FX.init({ aurora: true });
  showModuleBadge('hd-fx');

  // 8. Resonance Synths
  ResonanceSynths.init();
  showModuleBadge('res-synths');

  // 9. Voice engine
  try {
    await VoiceEngine.init();
    showModuleBadge('voice');
  } catch (e) { console.warn('Voice init failed:', e); }

  updatePlayerHP();

  // Start first boss
  setTimeout(() => startBoss(0), 1500);

  // === MAIN LOOP ===
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    updateBoss(dt);
    drawMorphBall(t);
    KI.renderer.render(KI.scene, KI.camera);
  })();

  console.log('%c KI ARENA BOSS RUSH ', 'background:#200;color:#f80;font-size:22px;padding:12px;text-shadow:0 0 10px #f80');
}

window.addEventListener('load', boot);
