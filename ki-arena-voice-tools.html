<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Voice Tools</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}

/* LLM loading */
#llmBar{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;
  text-align:center;background:rgba(0,0,0,0.9);border:1px solid #0f03;border-radius:12px;
  padding:20px 40px;max-width:400px;transition:opacity 0.5s}
#llmBar.hidden{opacity:0;pointer-events:none}
#llmProgress{width:300px;height:4px;background:#111;border-radius:2px;margin:8px auto;overflow:hidden}
#llmFill{height:100%;width:0%;background:linear-gradient(90deg,#0f0,#0ff);border-radius:2px;transition:width 0.2s}
#llmMsg{font-size:11px;color:#888}
#llmTitle{font-size:14px;color:#0f0;margin-bottom:6px}

/* Tool panel */
#toolPanel{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:55;
  display:flex;flex-direction:column;gap:6px;pointer-events:auto}
.tool-btn{background:rgba(0,40,0,0.6);border:1px solid #0f03;border-radius:6px;
  padding:6px 12px;font-size:10px;color:#0f0;cursor:pointer;font-family:'Courier New',monospace;
  transition:all 0.2s}
.tool-btn:hover{background:rgba(0,80,0,0.6);border-color:#0f06}
.tool-btn.active{background:rgba(0,100,0,0.4);border-color:#0f0;color:#ff0}

/* Transcript */
#transcript{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:60;
  text-align:center;max-width:600px;width:90%;font-size:13px;color:#0ff;
  text-shadow:0 0 10px #08f;background:rgba(0,0,40,0.5);border:1px solid #0ff2;
  border-radius:8px;padding:8px 16px;opacity:0;transition:opacity 0.3s;pointer-events:none}
#transcript.show{opacity:1}

/* Response */
#response{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;
  text-align:center;max-width:600px;width:90%;font-size:12px;color:#0f0;
  background:rgba(0,20,0,0.5);border:1px solid #0f02;border-radius:8px;
  padding:8px 16px;opacity:0;transition:opacity 0.5s;pointer-events:none}
#response.show{opacity:1}

/* Code display */
#codeDisplay{position:fixed;right:12px;top:80px;z-index:55;width:320px;max-height:60vh;
  overflow:auto;background:rgba(0,0,0,0.8);border:1px solid #fff1;border-radius:6px;
  padding:8px;font-size:10px;line-height:1.4;color:#aaa;display:none;pointer-events:auto}
#codeDisplay.show{display:block}
#codeDisplay pre{margin:0;white-space:pre-wrap;word-break:break-all}
#codeLang{font-size:9px;color:#4af;margin-bottom:4px}

/* API display */
#apiDisplay{position:fixed;right:12px;bottom:12px;z-index:55;width:280px;
  background:rgba(0,0,0,0.8);border:1px solid #fff1;border-radius:6px;
  padding:8px;font-size:9px;color:#888;display:none;pointer-events:auto}
#apiDisplay.show{display:block}
.ep-entry{padding:2px 0;border-bottom:1px solid #fff1}
.ep-method{font-weight:bold;margin-right:4px}
.ep-get{color:#0f0} .ep-post{color:#48f} .ep-put{color:#f80} .ep-delete{color:#f44}

/* Data display */
#dataDisplay{position:fixed;left:12px;bottom:12px;z-index:55;width:250px;
  background:rgba(0,0,0,0.8);border:1px solid #fff1;border-radius:6px;
  padding:8px;font-size:9px;color:#888;display:none;pointer-events:auto}
#dataDisplay.show{display:block}

/* MCP status */
#mcpStatus{font-size:9px;color:#555}
/* Status indicators */
#voiceStatus{font-size:10px;color:#0f0}
#toolStatus{font-size:10px;color:#4af}
#micBtn{font-size:11px;color:#f44;cursor:pointer;pointer-events:auto;padding:4px 8px;
  border:1px solid #f442;border-radius:4px;background:rgba(255,0,0,0.1)}
#micBtn.on{color:#0f0;border-color:#0f04;background:rgba(0,255,0,0.1)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div id="voiceStatus">VOICE OFF</div>
    <div id="toolStatus">0 tools</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="micBtn" onclick="toggleMic()">MIC OFF</div>
    <div id="mcpStatus">MCP: init</div>
  </div>
</div>

<div id="llmBar">
  <div id="llmTitle">Loading AI Model...</div>
  <div id="llmProgress"><div id="llmFill"></div></div>
  <div id="llmMsg">Initializing...</div>
</div>

<div id="toolPanel">
  <div class="tool-btn active" onclick="setTool('code')">CODE</div>
  <div class="tool-btn" onclick="setTool('api')">API</div>
  <div class="tool-btn" onclick="setTool('data')">DATA</div>
  <div class="tool-btn" onclick="setTool('general')">CHAT</div>
</div>

<div id="transcript"></div>
<div id="response"></div>
<div id="codeDisplay"><div id="codeLang">JavaScript</div><pre id="codeContent"></pre></div>
<div id="apiDisplay"></div>
<div id="dataDisplay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as VoiceAICore from './modules/voice-ai-core.js';
import * as VoiceCode from './modules/voice-code.js';
import * as VoiceAPI from './modules/voice-api.js';
import * as VoiceData from './modules/voice-data.js';
import * as VoiceMCP from './modules/voice-mcp-server.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'TOOLS-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;

window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
  }
};

let activeTool = 'code';
window.setTool = function(t) {
  activeTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === t));
  document.getElementById('codeDisplay').classList.toggle('show', t === 'code');
  document.getElementById('apiDisplay').classList.toggle('show', t === 'api');
  document.getElementById('dataDisplay').classList.toggle('show', t === 'data');
};

let micOn = false;
window.toggleMic = function() {
  const core = KI.get('voice-ai-core');
  if (!core) return;
  micOn = !micOn;
  if (micOn) core.startListening();
  else core.stopListening();
  document.getElementById('micBtn').textContent = micOn ? 'MIC ON' : 'MIC OFF';
  document.getElementById('micBtn').classList.toggle('on', micOn);
};

// LLM loading progress
KI.on('voice-ai-core:loading', data => {
  document.getElementById('llmFill').style.width = (data.progress * 100) + '%';
  document.getElementById('llmMsg').textContent = data.message;
});

KI.on('voice-ai-core:ready', () => {
  document.getElementById('llmBar').classList.add('hidden');
  document.getElementById('voiceStatus').textContent = 'AI READY';
  document.getElementById('voiceStatus').style.color = '#0f0';
});

KI.on('voice-ai-core:error', data => {
  document.getElementById('llmTitle').textContent = 'AI Load Failed';
  document.getElementById('llmMsg').textContent = data.error;
  document.getElementById('llmTitle').style.color = '#f44';
});

// Transcript
let transcriptTimer = null;
KI.on('voice-ai-core:transcript', data => {
  const el = document.getElementById('transcript');
  el.textContent = data.text;
  el.classList.add('show');
  clearTimeout(transcriptTimer);
  transcriptTimer = setTimeout(() => el.classList.remove('show'), 3000);
});

// Response
let responseTimer = null;
KI.on('voice-ai-core:response', data => {
  const el = document.getElementById('response');
  el.textContent = data.text;
  el.classList.add('show');
  clearTimeout(responseTimer);
  responseTimer = setTimeout(() => el.classList.remove('show'), 6000);
});

KI.on('voice-ai-core:tool-result', data => {
  const el = document.getElementById('response');
  const text = typeof data.result === 'object' ? JSON.stringify(data.result, null, 2).slice(0, 200) : String(data.result);
  el.textContent = `[${data.tool}] ${text}`;
  el.classList.add('show');
  clearTimeout(responseTimer);
  responseTimer = setTimeout(() => el.classList.remove('show'), 6000);
});

// Code display
KI.on('voice-code:update', data => {
  if (activeTool === 'code') {
    document.getElementById('codeLang').textContent = data.language + ' — ' + data.lineCount + ' lines';
    document.getElementById('codeContent').textContent = data.code || '(empty)';
  }
});

// API display
KI.on('voice-api:update', data => {
  if (activeTool === 'api') {
    const el = document.getElementById('apiDisplay');
    el.innerHTML = '<b style="color:#0f0">API Endpoints (' + data.endpointCount + ')</b><br>' +
      data.endpoints.map(e => {
        const [method] = e.split(' ');
        return `<div class="ep-entry"><span class="ep-method ep-${method.toLowerCase()}">${method}</span>${e.split(' ').slice(1).join(' ')}</div>`;
      }).join('');
  }
});

// Data display
KI.on('voice-data:update', data => {
  if (activeTool === 'data') {
    document.getElementById('dataDisplay').innerHTML =
      `<b style="color:#4af">Data Explorer</b><br>` +
      `Dataset: ${data.activeDataset}<br>` +
      `Chart: ${data.chartType} (${data.dataPoints} points)<br>` +
      `Datasets: ${data.datasetCount}`;
  }
});

// Tool + MCP status
KI.on('voice-ai-core:update', data => {
  document.getElementById('toolStatus').textContent = data.toolCount + ' tools / ' + data.historyCount + ' calls';
  if (data.recognizing) {
    document.getElementById('voiceStatus').textContent = data.speaking ? 'SPEAKING' : 'LISTENING';
  }
});

KI.on('voice-mcp-server:update', data => {
  document.getElementById('mcpStatus').textContent = `MCP: ${data.toolCount} tools / ${data.messageCount} msgs`;
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 1500 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init();
  Synths.init();
  Resonance.init();
  VoiceAICore.init();
  VoiceCode.init({ position: [-2, 2, -3] });
  VoiceAPI.init({ position: [2, 2, -3] });
  VoiceData.init({ position: [0, 0, -4] });
  VoiceMCP.init();
  MqttNet.init({ room: ROOM });
  WebRTCNet.init({ room: ROOM });
  Presence.init();
  Chat.init();
  PlayerProfile.init();
  NavOverlay.init();

  setTool('code');

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c VOICE TOOLS BOOTED ', 'background:#000;color:#0f0;font-size:22px;padding:12px;text-shadow:0 0 20px #0f0');
  console.log('%c MCP available: window.afMCP.call("tools/list") ', 'color:#0ff');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
