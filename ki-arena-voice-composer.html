<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Voice Composer</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.6),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#room{font-size:11px;color:#0ff}

/* Music HUD */
#musicKey{font-size:22px;color:#4af;text-shadow:0 0 10px #48f}
#musicChord{font-size:28px;color:#ff0;text-shadow:0 0 12px #f80}
#musicScale{font-size:12px;color:#0f0}
#musicBpm{font-size:14px;color:#f80}
#musicInfo{font-size:10px;color:#888}
#dynamics{font-size:11px;color:#aaa}

/* Suggestion bar */
#suggestion{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:60;
  text-align:center;pointer-events:none;max-width:500px;
  font-size:13px;color:#88aaff;text-shadow:0 0 10px #48f;
  background:rgba(0,0,40,0.5);border:1px solid #48f3;border-radius:12px;
  padding:8px 20px;opacity:0;transition:opacity 0.5s}
#suggestion.show{opacity:1}

/* Chord progression display */
#progDisplay{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:4px;pointer-events:none}
.prog-chord{padding:4px 10px;border-radius:4px;font-size:12px;
  background:rgba(0,0,0,0.5);border:1px solid #fff2;color:#fff6}
.prog-chord.active{color:#ff0;border-color:#ff04;text-shadow:0 0 8px #f80}

/* Phrase flash */
.phrase-flash{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:65;
  font-size:20px;color:#0ff;text-shadow:0 0 20px #0ff;text-align:center;
  opacity:0;animation:phraseIn 2s ease-out forwards;pointer-events:none}
@keyframes phraseIn{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-80%) scale(1.3)}}

#llmStatus{font-size:9px;color:#555}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div id="musicChord">C</div>
    <div id="musicKey">C Major</div>
    <div id="musicScale"></div>
    <div id="musicBpm">90 BPM</div>
    <div id="dynamics"></div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="room"></div>
    <div id="musicInfo"></div>
    <div id="llmStatus"></div>
  </div>
</div>
<div id="suggestion"></div>
<div id="progDisplay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as VoiceComposer from './modules/voice-composer.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'COMPOSE-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
document.getElementById('room').textContent = ROOM;

window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
  }
};

// Build chord progression display
let progEls = [];
function buildProgDisplay(chords) {
  const cont = document.getElementById('progDisplay');
  cont.innerHTML = '';
  progEls = [];
  chords.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'prog-chord';
    el.textContent = ch;
    cont.appendChild(el);
    progEls.push(el);
  });
}

KI.on('voice-composer:update', data => {
  document.getElementById('musicChord').textContent = data.chord;
  document.getElementById('musicKey').textContent = data.key + ' ' + data.scale;
  document.getElementById('musicBpm').textContent = data.bpm + ' BPM';
  document.getElementById('musicInfo').textContent =
    data.noteCount + ' notes / m' + data.measure;
  document.getElementById('dynamics').textContent =
    'dynamics ' + data.dynamics + ' / consonance ' + data.consonance;
});

KI.on('voice-composer:chord-change', data => {
  progEls.forEach((el, i) => el.classList.toggle('active', el.textContent === data.chord));
});

KI.on('voice-composer:scale-change', data => {
  document.getElementById('musicScale').textContent = 'Scale → ' + data.scale;
  setTimeout(() => document.getElementById('musicScale').textContent = '', 2000);
});

KI.on('voice-composer:phrase', data => {
  const el = document.createElement('div');
  el.className = 'phrase-flash';
  el.textContent = 'Phrase: ' + data.notes.map(n => ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][n]).join(' ');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
});

let suggTimer = null;
KI.on('voice-composer:suggestion', data => {
  const el = document.getElementById('suggestion');
  el.textContent = data.text;
  el.classList.add('show');
  clearTimeout(suggTimer);
  suggTimer = setTimeout(() => el.classList.remove('show'), 8000);
});

KI.on('voice-composer:llm-ready', () => {
  document.getElementById('llmStatus').textContent = 'AI COMPOSER ACTIVE';
  document.getElementById('llmStatus').style.color = '#0f0';
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 2000 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init();
  Synths.init();
  Resonance.init();
  VoiceComposer.init({ position: [0, 1, -3] });
  MqttNet.init({ room: ROOM });
  WebRTCNet.init({ room: ROOM });
  Presence.init();
  Chat.init();
  PlayerProfile.init();
  NavOverlay.init();

  // Initial progression display
  buildProgDisplay(['C', 'F', 'G', 'C']);

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c VOICE COMPOSER BOOTED ', 'background:#000;color:#48f;font-size:22px;padding:12px;text-shadow:0 0 20px #04f');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
