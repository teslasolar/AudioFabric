<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Tone Genesis</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.6),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#score{font-size:28px;color:#ff0;text-shadow:0 0 10px #f80}
#combo{font-size:16px;color:#f80}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#room{font-size:11px;color:#0ff}

/* HP bar */
#hpWrap{width:120px;height:6px;background:#111;border-radius:3px;overflow:hidden;margin-top:2px}
#hpFill{height:100%;width:100%;background:linear-gradient(90deg,#f00,#0f0);border-radius:3px;transition:width 0.2s}
#hpText{font-size:10px;color:#888}

/* Param display */
#paramPanel{position:fixed;left:12px;bottom:12px;z-index:55;pointer-events:none;
  font-size:9px;line-height:1.4;color:#fff4;max-width:200px;opacity:0.6}
#paramPanel.active{opacity:1;color:#fff8}

/* Narration */
#narration{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:60;
  text-align:center;pointer-events:none;max-width:500px;
  font-size:14px;color:#fff;text-shadow:0 0 20px currentColor;
  opacity:0;transition:opacity 0.8s}
#narration.show{opacity:1}

/* Entity count */
#entityInfo{font-size:10px;color:#4af}

/* Damage flash */
#dmgLayer{position:fixed;inset:0;z-index:60;pointer-events:none}
.dmg{position:absolute;font-weight:bold;text-shadow:0 0 8px currentColor;
  animation:dmgUp 1.2s ease-out forwards;pointer-events:none}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.8)}}

/* Collect flash */
.collect-flash{position:absolute;font-weight:bold;color:#0f0;text-shadow:0 0 8px #0f0;
  animation:collectUp 0.8s ease-out forwards;pointer-events:none}
@keyframes collectUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}

/* LLM status */
#llmStatus{font-size:9px;color:#555}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div id="score">0</div>
    <div id="combo"></div>
    <div id="entityInfo"></div>
    <div id="hpWrap"><div id="hpFill"></div></div>
    <div id="hpText">HP 100</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="room"></div>
    <div id="llmStatus"></div>
  </div>
</div>
<div id="paramPanel"></div>
<div id="narration"></div>
<div id="dmgLayer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3"></script>
<script type="module">
import { KI } from '../modules/core.js';
import * as Scene from '../modules/scene.js';
import * as VoiceEngine from '../modules/voice-engine.js';
import * as FreqBands from '../modules/freq-bands-12.js';
import * as Synths from '../modules/synths.js';
import * as Resonance from '../modules/resonance.js';
import * as ToneGenesis from '../modules/tone-genesis.js';
import * as MqttNet from '../modules/mqtt-net.js';
import * as WebRTCNet from '../modules/webrtc-net.js';
import * as Presence from '../modules/presence.js';
import * as Chat from '../modules/chat.js';
import * as PlayerProfile from '../modules/player-profile.js';
import * as NavOverlay from '../modules/nav-overlay.js';

const ROOM = 'TGENESIS-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
document.getElementById('room').textContent = ROOM;

window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
  }
};

// HUD updates from tone-genesis
KI.on('tone-genesis:update', data => {
  document.getElementById('score').textContent = data.score.toLocaleString();
  document.getElementById('combo').textContent = data.combo > 1 ? data.combo + 'x COMBO' : '';
  document.getElementById('hpFill').style.width = Math.max(0, data.hp) + '%';
  document.getElementById('hpText').textContent = 'HP ' + Math.max(0, Math.round(data.hp));
  document.getElementById('entityInfo').textContent =
    data.entityCount + ' entities / ' + data.collectibleCount + ' items';

  // Param display
  const P = data.params;
  const pp = document.getElementById('paramPanel');
  pp.className = P.energy > 0.1 ? 'active' : '';
  pp.innerHTML =
    `<b>RECURSIVE PARAMS</b><br>` +
    `hue ${P.hue.toFixed(2)} sat ${P.saturation.toFixed(2)} lit ${P.lightness.toFixed(2)}<br>` +
    `gravity ${P.gravity.toFixed(1)} friction ${P.friction.toFixed(3)} bounce ${P.bounce.toFixed(2)}<br>` +
    `player ${P.playerSides}gon r${P.playerRadius.toFixed(2)}<br>` +
    `enemy ${P.enemySides}gon bhv ${P.enemyBehavior.toFixed(2)}<br>` +
    `world r${P.worldRadius.toFixed(1)} spin ${P.worldSpin.toFixed(2)}<br>` +
    `noise ${P.bgNoiseScale.toFixed(1)} warp ${P.bgWarp.toFixed(2)}<br>` +
    `fractal d${P.fractalDepth} chaos ${P.chaosLevel.toFixed(2)}<br>` +
    `score x${P.scoreMultiplier.toFixed(1)} harmonic ${P.harmonic.toFixed(2)}`;
});

// Collect flash
KI.on('tone-genesis:collect', data => {
  const el = document.createElement('div');
  el.className = 'collect-flash';
  el.textContent = '+' + data.points;
  el.style.left = (innerWidth / 2 + (Math.random() - 0.5) * 160) + 'px';
  el.style.top = (innerHeight / 2 + (Math.random() - 0.5) * 60) + 'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(() => el.remove(), 800);
});

// Hit flash
KI.on('tone-genesis:hit', data => {
  const el = document.createElement('div');
  el.className = 'dmg';
  el.textContent = '-' + Math.round(data.damage);
  el.style.color = '#f44';
  el.style.fontSize = (16 + Math.min(data.damage, 30)) + 'px';
  el.style.left = (innerWidth / 2 + (Math.random() - 0.5) * 120) + 'px';
  el.style.top = (innerHeight / 2 + (Math.random() - 0.5) * 40) + 'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(() => el.remove(), 1200);
});

// LLM narration
let narrTimer = null;
KI.on('tone-genesis:narration', data => {
  const el = document.getElementById('narration');
  el.textContent = data.text;
  el.classList.add('show');
  clearTimeout(narrTimer);
  narrTimer = setTimeout(() => el.classList.remove('show'), 6000);
});

KI.on('tone-genesis:llm-ready', () => {
  document.getElementById('llmStatus').textContent = 'LLM ACTIVE';
  document.getElementById('llmStatus').style.color = '#0f0';
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 200 }); // minimal stars — fractal bg is the background
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init();
  Synths.init();
  Resonance.init();
  ToneGenesis.init({ position: [0, 0, 0], scale: 1 });
  MqttNet.init({ room: ROOM });
  WebRTCNet.init({ room: ROOM });
  Presence.init();
  Chat.init();
  PlayerProfile.init();
  NavOverlay.init();

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c TONE GENESIS BOOTED ', 'background:#000;color:#f0f;font-size:22px;padding:12px;text-shadow:0 0 20px #80f');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
