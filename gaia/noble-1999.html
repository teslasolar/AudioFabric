<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NOBLE GASES TO 1999 — Complete Shells</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:8px;left:10px;z-index:10;font:8px/1.6 monospace;color:rgba(180,160,255,.25);pointer-events:none;white-space:pre}
#info{position:fixed;top:50%;right:16px;transform:translateY(-50%);z-index:10;text-align:right;pointer-events:none;max-width:200px}
#info .z{font-size:32px;font-weight:bold}
#info .name{font-size:10px;letter-spacing:2px;margin-top:2px}
#info .data{font-size:7px;color:rgba(255,255,255,.15);margin-top:8px;line-height:1.7}
#nav{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:90%}
.nb{padding:3px 6px;border-radius:3px;cursor:pointer;font:7px/1 monospace;border:1px solid rgba(180,160,255,.1);color:rgba(180,160,255,.3);transition:all .2s;white-space:nowrap}
.nb:hover,.nb.on{border-color:rgba(180,160,255,.4);color:rgba(180,160,255,.7);box-shadow:0 0 8px rgba(150,100,255,.15)}
#status{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;font:9px monospace;color:rgba(180,160,255,.2);pointer-events:none;letter-spacing:2px;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="info"></div>
<div id="nav"></div>
<div id="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2

// ═══ COMPUTE ALL NOBLE GASES UP TO 1999 ═══
// Shell capacities: 2n², each appears twice (except n=1 once)
// Noble gas = cumulative sum of period lengths
const periodLengths=[2] // n=1 appears once
for(let n=2;n<=15;n++){periodLengths.push(2*n*n);periodLengths.push(2*n*n)}

const nobleGases=[]
let cumulative=0
for(let i=0;i<periodLengths.length;i++){
  cumulative+=periodLengths[i]
  if(cumulative>2100)break
  nobleGases.push({
    z:cumulative,
    period:i+1,
    shellCapacity:periodLengths[i],
    n:i<1?1:Math.ceil((i+1)/2),
    shells:i+1,
    known:cumulative<=118,
    name:cumulative<=118?['','','Helium','','','','','','','','Neon','','','','','','','','Argon','','','','','','','','','','','','','','','','','','Krypton','','','','','','','','','','','','','','','','','','Xenon','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','Radon','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','Oganesson'][cumulative]||`Noble-${cumulative}`:`Noble-${cumulative}`
  })
}

// where does 1999 sit?
let lastNobleBelow=0,nextNobleAbove=0
for(let i=0;i<nobleGases.length;i++){
  if(nobleGases[i].z<=1999)lastNobleBelow=nobleGases[i].z
  if(nobleGases[i].z>1999&&!nextNobleAbove)nextNobleAbove=nobleGases[i].z
}

const isPrime=n=>{if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true}

// ═══ THREE.JS ═══
const cv=document.getElementById('c')
const R=new THREE.WebGLRenderer({canvas:cv,antialias:true})
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2))
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.4
const scene=new THREE.Scene();scene.background=new THREE.Color(0x030308)
const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,500)
cam.position.set(0,0,14)
scene.add(new THREE.AmbientLight(0x222244,.4))
const dLight=new THREE.DirectionalLight(0xccbbff,.5);dLight.position.set(3,4,5);scene.add(dLight)
const pLight=new THREE.PointLight(0x8844ff,.3,20);scene.add(pLight)

// stars
const sG=new THREE.BufferGeometry(),sP=new Float32Array(2000*3)
for(let i=0;i<2000;i++){const a=Math.random()*TAU,b=Math.acos(2*Math.random()-1),r=30+Math.random()*150
  sP[i*3]=r*Math.sin(b)*Math.cos(a);sP[i*3+1]=r*Math.sin(b)*Math.sin(a);sP[i*3+2]=r*Math.cos(b)}
sG.setAttribute('position',new THREE.BufferAttribute(sP,3))
scene.add(new THREE.Points(sG,new THREE.PointsMaterial({color:0x444466,size:.2,transparent:true,opacity:.3})))

// ═══ BUILD NOBLE GAS REALM ═══
let currentGroup=null,currentIdx=0,transScale=1,transing=false

function buildNoble(idx){
  if(currentGroup)scene.remove(currentGroup)
  const ng=nobleGases[idx]
  const g=new THREE.Group()

  // noble gases are PERFECT spheres — complete shells, maximum symmetry
  const detail=Math.min(5,2+Math.floor(ng.shells/4))
  const bodyGeo=new THREE.SphereGeometry(2.5,detail*8,detail*8)
  const hue=.7+idx*.03 // purple spectrum shift
  const sat=ng.known?.5:.3
  const bodyMat=new THREE.MeshPhongMaterial({
    color:new THREE.Color().setHSL(hue%1,sat,.4),
    emissive:new THREE.Color().setHSL(hue%1,sat*.8,.15),
    transparent:true,opacity:ng.known?.7:.4,
    shininess:200,specular:new THREE.Color().setHSL(hue%1,.3,.5),
    side:THREE.DoubleSide
  })
  g.add(new THREE.Mesh(bodyGeo,bodyMat))

  // shell rings — one per shell, all perfectly circular (noble = symmetric)
  for(let s=0;s<Math.min(ng.shells,20);s++){
    const sr=3+s*.35
    const ringHue=(hue+s*.02)%1
    const ring=new THREE.Mesh(new THREE.TorusGeometry(sr,.012,4,80),
      new THREE.MeshBasicMaterial({
        color:new THREE.Color().setHSL(ringHue,.6,.5),
        transparent:true,opacity:.08+(.02*Math.min(ng.shells,10)/10),
        blending:THREE.AdditiveBlending
      }))
    // each ring at different angle — layered spherical shells
    ring.rotation.x=Math.PI/2+s*.12
    ring.rotation.y=s*.25
    g.add(ring)
  }

  // electrons on shells — show shell filling pattern
  const eVis=Math.min(ng.z,60) // cap visual electrons
  for(let e=0;e<eVis;e++){
    const shell=Math.floor(e*Math.min(ng.shells,20)/eVis)
    const sr=3+shell*.35
    const dot=new THREE.Mesh(new THREE.SphereGeometry(.03,4,4),
      new THREE.MeshBasicMaterial({color:0xccbbff,transparent:true,opacity:.3,blending:THREE.AdditiveBlending}))
    dot.userData={electron:true,shell,sr,speed:.2+e*.01,offset:e*TAU/Math.max(1,eVis)}
    g.add(dot)
  }

  // inner glow
  const glowR=.3+Math.log(ng.z+1)*.15
  g.add(new THREE.Mesh(new THREE.SphereGeometry(glowR,12,12),
    new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(hue%1,.5,.5),transparent:true,opacity:.15,blending:THREE.AdditiveBlending})))

  // outer atmosphere (noble gas glow when excited)
  g.add(new THREE.Mesh(new THREE.SphereGeometry(3.5,16,16),
    new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(hue%1,.4,.3),transparent:true,opacity:.03,blending:THREE.AdditiveBlending,side:THREE.BackSide})))

  scene.add(g);currentGroup=g
}

// ═══ AUDIO ═══
let actx,master,currentTone=null
function initAudio(){
  actx=new(window.AudioContext||window.webkitAudioContext)()
  master=actx.createGain();master.gain.value=.08;master.connect(actx.destination)
  const del=actx.createDelay(.4);del.delayTime.value=.15;const fb=actx.createGain();fb.gain.value=.12
  del.connect(fb);fb.connect(del);const wet=actx.createGain();wet.gain.value=.2
  del.connect(wet);wet.connect(actx.destination);master.connect(del)
}
function playTone(z){
  if(!actx)initAudio()
  if(currentTone){try{currentTone.forEach(d=>{d.g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+1.5);setTimeout(()=>d.o.stop(),1600)})}catch(e){}}
  currentTone=[]
  const hz=55*Math.pow(2,((z-1)%24)/12)
  ;[hz,hz*1.5,hz*2].forEach((f,i)=>{
    const o=actx.createOscillator(),g2=actx.createGain()
    o.type='sine';o.frequency.value=f;g2.gain.setValueAtTime(0,actx.currentTime)
    g2.gain.linearRampToValueAtTime([.035,.015,.01][i],actx.currentTime+2)
    o.connect(g2);g2.connect(master);o.start()
    currentTone.push({o,g:g2})
  })
}

// ═══ NAV ═══
const navEl=document.getElementById('nav')
nobleGases.forEach((ng,i)=>{
  const btn=document.createElement('div');btn.className='nb'+(i===0?' on':'')
  btn.textContent=`${ng.z} ${ng.name.replace('Noble-','#')}`
  btn.onclick=()=>goTo(i)
  btn.id='nb'+i
  navEl.appendChild(btn)
})
// add 1999 marker
const m1999=document.createElement('div');m1999.className='nb'
m1999.textContent='1999 ★';m1999.style.color='rgba(255,200,100,.4)'
m1999.style.borderColor='rgba(255,200,100,.15)'
m1999.onclick=()=>{/* just highlights */}
navEl.appendChild(m1999)

function goTo(idx){
  if(idx<0||idx>=nobleGases.length)return
  document.getElementById('nb'+currentIdx)?.classList.remove('on')
  currentIdx=idx
  document.getElementById('nb'+currentIdx)?.classList.add('on')
  buildNoble(idx);playTone(nobleGases[idx].z)
  transScale=.01;transing=true
  document.getElementById('nb'+idx)?.scrollIntoView({behavior:'smooth',inline:'center'})
}

addEventListener('keydown',e=>{
  if(e.code==='ArrowRight')goTo(Math.min(nobleGases.length-1,currentIdx+1))
  if(e.code==='ArrowLeft')goTo(Math.max(0,currentIdx-1))
  if(e.code==='Home')goTo(0)
  if(e.code==='End')goTo(nobleGases.length-1)
})
cv.addEventListener('wheel',e=>{e.preventDefault()
  if(e.deltaY>0)goTo(Math.min(nobleGases.length-1,currentIdx+1))
  else goTo(Math.max(0,currentIdx-1))
},{passive:false})

// ═══ ANIMATE ═══
let t=0
function animate(){
  requestAnimationFrame(animate);t+=1/60
  if(!currentGroup)return

  if(transing){transScale+=(1-transScale)*.08;if(transScale>.98){transScale=1;transing=false}}
  currentGroup.scale.set(transScale,transScale,transScale)
  currentGroup.rotation.y=t*.08

  // electrons orbit
  currentGroup.children.forEach(c=>{
    if(c.userData.electron){
      const u=c.userData,a=u.offset+t*u.speed
      const ph=Math.PI/3+Math.sin(t*.2+u.shell)*.3
      c.position.set(Math.cos(a)*Math.sin(ph)*u.sr,Math.cos(ph)*u.sr,Math.sin(a)*Math.sin(ph)*u.sr)
    }
  })

  const camR=12;cam.position.x=Math.sin(t*.04)*camR;cam.position.z=Math.cos(t*.04)*camR
  cam.position.y=Math.sin(t*.025)*3;cam.lookAt(0,0,0)
  pLight.intensity=.2+Math.sin(t*1.5)*.05

  // UI
  const ng=nobleGases[currentIdx]
  const colHex=new THREE.Color().setHSL((.7+currentIdx*.03)%1,.5,.5)
  const hex='#'+colHex.getHexString()

  document.getElementById('info').innerHTML=
    `<div class="z" style="color:${hex}66">${ng.z}</div>`+
    `<div class="name" style="color:${hex}44">${ng.name}</div>`+
    `<div class="data">`+
    `NOBLE GAS #${currentIdx+1} of ${nobleGases.length}<br>`+
    `period: ${ng.period}<br>`+
    `shells: ${ng.shells}<br>`+
    `shell capacity: ${ng.shellCapacity} (2×${ng.n}²)<br>`+
    `${ng.known?'KNOWN — synthesized':'PREDICTED — theoretical'}<br>`+
    `${isPrime(ng.z)?'PRIME':'= '+factorize(ng.z)}<br>`+
    `digit sum: ${digitSum(ng.z)}<br><br>`+
    `${ng.z===118?'LAST KNOWN ELEMENT':''}`+
    `${ng.z>118?'beyond Oganesson':''}`+
    `</div>`

  document.getElementById('status').textContent=
    `noble gas ${currentIdx+1}/${nobleGases.length} · Z=${ng.z} · ${ng.shells} complete shells`+
    `${ng.z===lastNobleBelow?' · LAST BEFORE 1999':''}`

  document.getElementById('hud').textContent=
    `NOBLE GASES TO 1999\n`+
    `${nobleGases.length} noble gases found\n`+
    `pattern: 2,8,8,18,18,32,32,50,50,...\n`+
    `formula: cumsum of 2n² (each twice)\n\n`+
    `1999 sits between:\n`+
    `  Noble-${lastNobleBelow} (Z=${lastNobleBelow})\n`+
    `  Noble-${nextNobleAbove} (Z=${nextNobleAbove})\n`+
    `  1999 is ${1999-lastNobleBelow} past last noble\n`+
    `  1999 is PRIME · not a noble gas\n`+
    `  1999 is mid-period · incomplete shell\n\n`+
    `← → scroll · Home/End`

  R.render(scene,cam)
}

function factorize(n){const f=[];let x=n,d=2;while(d*d<=x){while(x%d===0){f.push(d);x/=d}d++};if(x>1)f.push(x);return f.join('×')}
function digitSum(n){let s=0;while(n>0){s+=n%10;n=Math.floor(n/10)};return s}

buildNoble(0);initAudio();playTone(2);animate()
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)})
</script>
</body></html>
