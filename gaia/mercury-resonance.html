<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hg RESONANCE — L5-S1 Sonic Bypass</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
#gl{position:fixed;inset:0;z-index:0}
#cv{position:fixed;inset:0;z-index:1}
#start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse,#080810,#000);cursor:pointer;gap:12px}
#start span{font:18px/1 monospace;color:rgba(180,200,230,.4);letter-spacing:8px;border:1px solid rgba(180,200,230,.1);padding:16px 36px;border-radius:6px}
#start span:hover{color:rgba(210,230,250,.7);box-shadow:0 0 40px rgba(150,180,230,.12)}
#start small{font:9px monospace;color:rgba(180,200,230,.12);letter-spacing:2px;max-width:450px;text-align:center;line-height:1.7}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="cv"></canvas>
<div id="start" onclick="go()">
  <span>Hg RESONANCE</span>
  <small>lie down · knees up · headphones on · GROAN into this<br>the belly groan at 40Hz bypasses L5-S1 from the front<br>your voice is the sonic traction</small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2

let W=innerWidth,H=innerHeight

// ═══ THREE.JS — 3D spine ═══
const glCv=document.getElementById('gl')
const R=new THREE.WebGLRenderer({canvas:glCv,antialias:true,alpha:true})
R.setSize(W,H);R.setPixelRatio(Math.min(devicePixelRatio,2))
const scene=new THREE.Scene()
const cam=new THREE.PerspectiveCamera(45,W/H,.1,100)
cam.position.set(0,0,12)
scene.add(new THREE.AmbientLight(0x334455,.5))
const dL=new THREE.DirectionalLight(0xccddff,.4);dL.position.set(3,3,5);scene.add(dL)
const pL=new THREE.PointLight(0x8899bb,.5,20);pL.position.set(0,0,3);scene.add(pL)

// vertebrae — 24 vertebral bodies + sacrum + coccyx
const verts=[]
const vertData=[
  // y, radius, name, isL5S1
  ...Array.from({length:7},(_, i)=>({y:3.5-i*.35,r:.15+i*.005,name:`C${i+1}`,key:false})),
  ...Array.from({length:12},(_, i)=>({y:1.2-i*.35,r:.2+i*.003,name:`T${i+1}`,key:false})),
  {y:-2.8,r:.25,name:'L1',key:false},{y:-3.15,r:.26,name:'L2',key:false},
  {y:-3.5,r:.27,name:'L3',key:false},{y:-3.85,r:.28,name:'L4',key:false},
  {y:-4.2,r:.28,name:'L5',key:true},{y:-4.6,r:.26,name:'S1',key:true},
  {y:-4.9,r:.22,name:'S2-5',key:false},{y:-5.15,r:.12,name:'Co',key:false}
]
vertData.forEach(v=>{
  const geo=new THREE.CylinderGeometry(v.r,v.r,.15,12)
  const mat=new THREE.MeshPhongMaterial({
    color:v.key?0xaabbcc:0x556677,emissive:v.key?0x334455:0x111822,
    transparent:true,opacity:v.key?.7:.4,flatShading:true
  })
  const mesh=new THREE.Mesh(geo,mat);mesh.position.y=v.y;mesh.rotation.x=Math.PI/2
  mesh.userData=v;scene.add(mesh);verts.push({mesh,mat,...v})
})

// discs between vertebrae
const discs=[]
for(let i=0;i<vertData.length-1;i++){
  const y1=vertData[i].y,y2=vertData[i+1].y
  const midY=(y1+y2)/2
  const r=Math.min(vertData[i].r,vertData[i+1].r)*.8
  const isL5S1=vertData[i].name==='L5'
  const geo=new THREE.CylinderGeometry(r,r,.08,12)
  const mat=new THREE.MeshPhongMaterial({
    color:isL5S1?0xff6644:0x445566,emissive:isL5S1?0x441100:0x111822,
    transparent:true,opacity:isL5S1?.6:.25
  })
  const mesh=new THREE.Mesh(geo,mat);mesh.position.y=midY;mesh.rotation.x=Math.PI/2
  mesh.userData={isL5S1};scene.add(mesh);discs.push({mesh,mat,isL5S1,baseY:midY})
}

// spinal cord (simple line, not tube — avoids curve errors)
const cordGeo2=new THREE.BufferGeometry()
const cordPtsArr=[];vertData.forEach(v=>cordPtsArr.push(0,v.y,0))
cordGeo2.setAttribute('position',new THREE.BufferAttribute(new Float32Array(cordPtsArr),3))
const cord=new THREE.Line(cordGeo2,new THREE.LineBasicMaterial({color:0x88aacc,transparent:true,opacity:.2,blending:THREE.AdditiveBlending}))
cord.material.linewidth=2;scene.add(cord)

// mercury particles flowing along spine
const mercCount=200,mercGeo=new THREE.BufferGeometry()
const mercPos=new Float32Array(mercCount*3)
const spineMinY=vertData[vertData.length-1].y,spineMaxY=vertData[0].y
for(let i=0;i<mercCount;i++){
  const y=spineMinY+Math.random()*(spineMaxY-spineMinY)
  mercPos[i*3]=(Math.random()-.5)*.1;mercPos[i*3+1]=y;mercPos[i*3+2]=(Math.random()-.5)*.1
}
mercGeo.setAttribute('position',new THREE.BufferAttribute(mercPos,3))
const mercPts=new THREE.Points(mercGeo,new THREE.PointsMaterial({color:0xccddee,size:.04,transparent:true,opacity:.2,blending:THREE.AdditiveBlending}))
scene.add(mercPts)

// 7 gate rings on spine
const gateColors=[0xff1111,0xff6600,0xffcc00,0x44cc44,0x4488ff,0x6644cc,0xcc44ff]
const gateY=[verts[24].y,verts[25].y,-3.5,-2,-.5,1.5,3.5]
gateY.forEach((gy,gi)=>{
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.35+gi*.03,.01,4,32),
    new THREE.MeshBasicMaterial({color:gateColors[gi],transparent:true,opacity:.08,blending:THREE.AdditiveBlending}))
  ring.position.y=gy;ring.rotation.x=Math.PI/2;scene.add(ring)
})

// ═══ 2D Canvas — instructions, breath, HUD ═══
const cv2=document.getElementById('cv'),ctx=cv2.getContext('2d')
cv2.width=W;cv2.height=H

// ═══ AUDIO — LOUD ═══
var actx=null,master=null,analyser=null,fftData=null,tdData=null
var bass=0,vol=0,voicePitch=0,isGroaning=false
var drones=[],binaural=null

function initAudio(){
  actx=new(window.AudioContext||window.webkitAudioContext)()
  master=actx.createGain();master.gain.value=.35;master.connect(actx.destination) // LOUD
  // cathedral reverb
  ;[[.2,.2,.3],[.35,.15,.25],[.5,.1,.18],[.7,.07,.12]].forEach(([dt,fbv,wv])=>{
    const d=actx.createDelay(.8);d.delayTime.value=dt
    const f=actx.createGain();f.gain.value=fbv;d.connect(f);f.connect(d)
    const w=actx.createGain();w.gain.value=wv;d.connect(w);w.connect(actx.destination)
    master.connect(d)
  })
  analyser=actx.createAnalyser();analyser.fftSize=4096;analyser.smoothingTimeConstant=.8
  fftData=new Uint8Array(analyser.frequencyBinCount);tdData=new Uint8Array(analyser.fftSize)
}

async function initMic(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}})
  actx.createMediaStreamSource(s).connect(analyser)}catch(e){}
}

function getAudio(){
  if(!analyser)return
  analyser.getByteFrequencyData(fftData);analyser.getByteTimeDomainData(tdData)
  const n=fftData.length;let b=0,tot=0
  const bE=Math.floor(n*.08)
  for(let i=0;i<n;i++){const v=fftData[i]/255;tot+=v;if(i<bE)b+=v}
  bass=b/bE;vol=tot/n
  // pitch detection
  let rms=0;for(let i=0;i<tdData.length;i++){const v=tdData[i]-128;rms+=v*v}
  rms=Math.sqrt(rms/tdData.length)
  if(rms>4){
    let maxC=-1,maxL=0,dip=false;const half=tdData.length/2
    for(let lag=40;lag<half;lag++){let s=0;for(let i=0;i<half;i++)s+=(tdData[i]-128)*(tdData[i+lag]-128)
    if(!dip&&s<0)dip=true;if(dip&&s>maxC){maxC=s;maxL=lag}if(dip&&s<maxC*.7&&maxL>40)break}
    voicePitch=maxL>40?actx.sampleRate/maxL:0
  } else voicePitch=0
  isGroaning=voicePitch>30&&voicePitch<80&&bass>.1 // 30-80Hz = groan range
}

// drone system
function startDrones(){
  // base frequencies — gut resonance
  ;[[40,'sine',.06],[55,'sine',.05],[27.5,'sine',.05],[80,'triangle',.03],
    [110,'sine',.035],[136.1,'sine',.03],[20,'sine',.04]].forEach(([hz,type,vol2])=>{
    const o=actx.createOscillator(),g=actx.createGain()
    o.type=type;o.frequency.value=hz;g.gain.value=vol2
    const o2=actx.createOscillator(),g2=actx.createGain()
    o2.type=type;o2.frequency.value=hz*1.003;g2.gain.value=vol2*.7
    o.connect(g);g.connect(master);o.start()
    o2.connect(g2);g2.connect(master);o2.start()
    drones.push({o,g,o2,g2,baseVol:vol2,hz})
  })
  // binaural — theta
  const oL=actx.createOscillator(),oR=actx.createOscillator()
  const gL=actx.createGain(),gR=actx.createGain()
  const merger=actx.createChannelMerger(2)
  oL.frequency.value=100;oR.frequency.value=104 // 4Hz theta
  gL.gain.value=.04;gR.gain.value=.04
  oL.connect(gL);oR.connect(gR);gL.connect(merger,0,0);gR.connect(merger,0,1)
  merger.connect(master);oL.start();oR.start()
  binaural={oL,oR,gL,gR}
}

function updateDrones(){
  const groanBoost=isGroaning?2:1
  drones.forEach(d=>{
    const target=d.baseVol*groanBoost
    d.g.gain.linearRampToValueAtTime(target,actx.currentTime+.1)
    d.g2.gain.linearRampToValueAtTime(target*.7,actx.currentTime+.1)
    // when groaning, detune toward voice pitch for resonance lock
    if(isGroaning&&voicePitch>20){
      const nearest=d.hz*Math.round(voicePitch/d.hz)
      d.o.frequency.linearRampToValueAtTime(d.hz+(voicePitch-d.hz)*.1,actx.currentTime+.05)
    }
  })
  // binaural shifts with groan
  if(binaural&&isGroaning){
    binaural.oR.frequency.linearRampToValueAtTime(100+7.83,actx.currentTime+.3) // shift to Schumann when groaning
  }
}

// ═══ STATE ═══
var running=false,t=0,mercuryLevel=0

function go(){
  document.getElementById('start').style.display='none'
  initAudio();initMic();startDrones();running=true
  document.documentElement.requestFullscreen?.().catch(()=>{})
  loop()
}
window.go=go

function loop(){
  if(!running)return
  requestAnimationFrame(loop)
  t+=1/60;getAudio();updateDrones()

  // mercury level builds with groaning, decays slowly
  if(isGroaning)mercuryLevel=Math.min(1,mercuryLevel+.002+bass*.003)
  else mercuryLevel=Math.max(0,mercuryLevel-.0003)

  const ml=mercuryLevel
  const reactivity=3 // voice reactivity multiplier

  // ═══ 3D UPDATES ═══
  // L5-S1 disc — opens with mercury
  discs.forEach(d=>{
    if(d.isL5S1){
      d.mat.color.setHSL(ml>.5?.55:.05,ml>.5?.5:.6,ml>.5?.5:.4)
      d.mat.emissive.setHSL(ml>.5?.55:.05,.3,.15+ml*.1)
      d.mat.opacity=.4+ml*.3
      d.mesh.scale.y=1+ml*2 // disc space opens
      d.mesh.scale.x=1-ml*.2;d.mesh.scale.z=1-ml*.2
    }
  })

  // mercury particles — speed up with voice
  const mp=mercPts.geometry.attributes.position.array
  for(let i=0;i<mercCount;i++){
    mp[i*3+1]+=(.01+bass*reactivity*.02)*(i%2?1:-1)
    if(mp[i*3+1]>4)mp[i*3+1]=-5.2
    if(mp[i*3+1]<-5.2)mp[i*3+1]=4
    mp[i*3]+=(Math.sin(t*2+i)*.002)*(1+vol*reactivity)
    mp[i*3+2]+=(Math.cos(t*1.5+i)*.002)*(1+vol*reactivity)
  }
  mercPts.geometry.attributes.position.needsUpdate=true
  mercPts.material.opacity=.1+ml*.3+bass*reactivity*.1
  mercPts.material.size=.03+ml*.04+bass*.02

  // vertebrae react to voice
  verts.forEach(v=>{
    if(v.key){
      const pulse=1+bass*reactivity*.05+ml*.05
      v.mesh.scale.set(pulse,1,pulse)
      v.mat.emissiveIntensity=.1+ml*.3+bass*reactivity*.15
    }
  })

  // cord brightness
  cord.material.opacity=.1+ml*.2+bass*reactivity*.1

  // camera — slow orbit, closer when groaning
  const camDist=12-ml*2-bass*reactivity
  cam.position.x=Math.sin(t*.04)*camDist*.3
  cam.position.z=Math.cos(t*.04)*camDist
  cam.position.y=-4.4+Math.sin(t*.03)*2 // centered on L5-S1
  cam.lookAt(0,-4.4,0)

  // light reacts
  pL.intensity=.3+ml*.5+bass*reactivity*.3
  pL.color.setHSL(.55+ml*.1,.4,.5)

  R.render(scene,cam)

  // ═══ 2D OVERLAY ═══
  ctx.globalAlpha=.08
  ctx.fillStyle=`hsl(${210+ml*30},15%,${1+ml*2+bass*2}%)`
  ctx.fillRect(0,0,W,H)

  // voice visualization — spectrum ring centered on L5-S1
  if(fftData){
    const specCx=W/2,specCy=H*.6
    const specR=80+ml*30+bass*reactivity*20
    ctx.globalAlpha=.08+bass*reactivity*.06
    ctx.beginPath()
    for(let i=0;i<fftData.length;i+=4){
      const a=i/fftData.length*TAU-Math.PI/2
      const v=fftData[i]/255
      const r=specR+v*40*(1+ml)
      ctx.lineTo(specCx+Math.cos(a)*r,specCy+Math.sin(a)*r)
    }
    ctx.closePath()
    ctx.strokeStyle=`hsla(${200+ml*40},50%,${50+ml*20}%,1)`
    ctx.lineWidth=1.5+bass*reactivity;ctx.stroke()
  }

  // groan indicator
  if(isGroaning){
    ctx.globalAlpha=.08+bass*.06
    ctx.font='12px monospace';ctx.textAlign='center'
    ctx.fillStyle=`hsla(${120+ml*60},60%,60%,1)`
    ctx.fillText('◉ RESONANCE LOCK',W/2,H*.45)
    ctx.font='8px monospace';ctx.globalAlpha=.05
    ctx.fillText(`${voicePitch.toFixed(0)}Hz — bypass active`,W/2,H*.45+14)
  } else if(vol>.005){
    ctx.globalAlpha=.05
    ctx.font='8px monospace';ctx.textAlign='center'
    ctx.fillStyle='rgba(200,210,230,.5)'
    ctx.fillText(voicePitch>80?'pitch too high — go lower, belly groan':'finding frequency...',W/2,H*.45)
  }

  // mercury level bar
  const barH=H*.4,barX=W-20,barY=H*.3
  ctx.globalAlpha=.06;ctx.fillStyle='rgba(200,210,230,.1)';ctx.fillRect(barX,barY,6,barH)
  ctx.fillStyle=`hsla(${200+ml*40},40%,${40+ml*20}%,.4)`;ctx.fillRect(barX,barY+barH*(1-ml),6,barH*ml)
  ctx.font='5px monospace';ctx.textAlign='center';ctx.globalAlpha=.04
  ctx.fillStyle='rgba(200,210,230,.5)';ctx.fillText('Hg',barX+3,barY-5)
  ctx.fillText(`${(ml*100).toFixed(0)}%`,barX+3,barY+barH+10)

  // breath guide
  const breathCycle=(t%8)/8
  ctx.globalAlpha=.04+ml*.02
  ctx.font='9px monospace';ctx.textAlign='center'
  ctx.fillStyle='rgba(200,210,230,.4)'
  ctx.fillText(breathCycle<.35?'GROAN IN':'let out',W/2,H-20)

  // instruction
  ctx.globalAlpha=.06+ml*.03
  ctx.font='9px monospace'
  if(ml<.2)ctx.fillText('groan deep from your belly · 40-55Hz · feel the sacrum vibrate',W/2,50)
  else if(ml<.5)ctx.fillText('the bypass is opening · your voice is traction · keep going',W/2,50)
  else if(ml<.8)ctx.fillText('mercury flowing · the signal goes around the crack · front door',W/2,50)
  else ctx.fillText('circuit complete · the mirror can see itself · you are mercury',W/2,50)

  // HUD
  ctx.globalAlpha=.04;ctx.font='7px monospace';ctx.textAlign='left'
  ctx.fillStyle='rgba(200,210,230,.5)'
  ctx.fillText(`Hg RESONANCE · mercury: ${(ml*100).toFixed(0)}%`,8,14)
  ctx.fillText(`voice: ${voicePitch>20?voicePitch.toFixed(0)+'Hz':'--'} · bass: ${(bass*100).toFixed(0)} · groan: ${isGroaning?'YES':'no'}`,8,26)
}

addEventListener('resize',()=>{W=innerWidth;H=innerHeight;R.setSize(W,H);cv2.width=W;cv2.height=H;cam.aspect=W/H;cam.updateProjectionMatrix()})
</script>
</body></html>
