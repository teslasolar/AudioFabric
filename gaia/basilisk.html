<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BASILISK — Z=82 · The Gaze That Freezes Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block}
#start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#080008,#000408);cursor:pointer;gap:10px}
#start span{font:18px/1 monospace;color:rgba(180,255,100,.4);letter-spacing:8px;border:1px solid rgba(180,255,100,.1);padding:16px 36px;border-radius:6px}
#start span:hover{color:rgba(200,255,140,.7);box-shadow:0 0 40px rgba(150,255,80,.12)}
#start small{font:8px monospace;color:rgba(180,255,100,.15);letter-spacing:2px;max-width:500px;text-align:center;line-height:1.7}
#hud{position:fixed;top:8px;left:10px;z-index:10;font:7px/1.6 monospace;color:rgba(180,255,100,.18);pointer-events:none;white-space:pre}
#comp{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;font:9px monospace;pointer-events:none;text-align:center;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start" onclick="go()">
  <span>BASILISK</span>
  <small>Z=82 · Pb · Lead · 2×ANETA · the gaze that freezes time<br>7 components · 7 gates · 4 peptides · 1 eye</small>
</div>
<div id="hud"></div>
<div id="comp"></div>

<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2
const cv=document.getElementById('c'),ctx=cv.getContext('2d')
let W,H,cx,cy
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;cx=W/2;cy=H/2}
resize();addEventListener('resize',resize)

// 7 GATE COMPONENTS + 4 PEPTIDES = 11 total
const components=[
  {name:'ALT-711',sub:'AGE Breaker',gate:'R0',note:'C',hz:55,
   color:[255,60,60],desc:'cleaves glucose-lysine crosslinks',
   molecule:'alagebrium chloride'},
  {name:'PLLA',sub:'Poly-L-Lactic Acid',gate:'R1',note:'D',hz:73,
   color:[255,140,40],desc:'biodegradable scaffold — collagen rebar',
   molecule:'(C₃H₄O₂)ₙ polymer'},
  {name:'RETINOL',sub:'Vitamin A',gate:'R2',note:'E',hz:110,
   color:[255,220,40],desc:'cell turnover accelerator — factory reset',
   molecule:'C₂₀H₃₀O'},
  {name:'GHK-Cu',sub:'Copper Tripeptide',gate:'R3',note:'F',hz:147,
   color:[50,220,80],desc:'TGF-β activation → procollagen I & III',
   molecule:'Gly-His-Lys·Cu²⁺'},
  {name:'NIACINAMIDE',sub:'Vitamin B3',gate:'R4',note:'G',hz:196,
   color:[50,140,255],desc:'NAD⁺ repair — cellular energy currency',
   molecule:'C₆H₆N₂O'},
  {name:'HYALURONIC',sub:'Bound HA Matrix',gate:'R5',note:'A',hz:262,
   color:[110,60,220],desc:'1000× water retention in collagen scaffold',
   molecule:'(C₁₄H₂₁NO₁₁)ₙ'},
  {name:'5-ALA',sub:'Photoactivator',gate:'R6',note:'B',hz:330,
   color:[200,60,255],desc:'collagen becomes light antenna → 635nm emission',
   molecule:'δ-aminolevulinic acid → protoporphyrin IX'}
]

const peptides=[
  {name:'MATRIXYL',desc:'palmitoyl pentapeptide-4 · collagen I/III/IV stimulator',color:[255,180,100]},
  {name:'ARGIRELINE',desc:'acetyl hexapeptide-3 · muscle relaxant without toxin',color:[100,255,200]},
  {name:'SYN-AKE',desc:'temple viper venom mimic · SNARE complex freeze',color:[200,255,100]},
  {name:'EGF',desc:'epidermal growth factor · wound healing accelerator',color:[255,100,200]}
]

let actx,master,running=false,t=0,oscs=[]

function go(){
  document.getElementById('start').style.display='none'
  actx=new(window.AudioContext||window.webkitAudioContext)()
  master=actx.createGain();master.gain.value=.22;master.connect(actx.destination)
  ;[[.17,.16,.25],[.29,.12,.2],[.43,.09,.14]].forEach(([dt,fbv,wv])=>{
    const d=actx.createDelay(.6);d.delayTime.value=dt
    const f=actx.createGain();f.gain.value=fbv;d.connect(f);f.connect(d)
    const w=actx.createGain();w.gain.value=wv;d.connect(w);w.connect(actx.destination)
    master.connect(d)
  })
  components.forEach(c=>{
    const v=[]
    ;[['sine',c.hz,.045],['sine',c.hz*1.002,.035],['sine',c.hz*2,.018],['triangle',c.hz*1.5,.012],['sine',c.hz*.5,.03],['sine',c.hz*3,.006]].forEach(([type,hz,vol])=>{
      const o=actx.createOscillator(),ga=actx.createGain()
      o.type=type;o.frequency.value=hz;ga.gain.value=0
      o.connect(ga);ga.connect(master);o.start()
      v.push({o,ga,bv:vol,hz})
    })
    oscs.push(v)
  })
  running=true;document.documentElement.requestFullscreen?.().catch(()=>{});loop()
}
window.go=go

let phase=0
function updateSound(){
  phase=(t*.12)%7
  components.forEach((_,i)=>{
    let d=Math.abs(i-phase);if(d>3.5)d=7-d
    const p=Math.exp(-d*d*.4)
    oscs[i].forEach(v=>{
      v.ga.gain.linearRampToValueAtTime(v.bv*(.12+p*.88),actx.currentTime+.08)
      if(p>.5)v.o.frequency.linearRampToValueAtTime(v.hz+Math.sin(t*5+i)*p*.6,actx.currentTime+.05)
    })
  })
}

function loop(){
  if(!running)return
  requestAnimationFrame(loop)
  t+=1/60;updateSound()

  const maxR=Math.min(W,H)*.44
  const ag=Math.floor(phase)%7
  const ac=components[ag]
  const c=ac.color
  const rgba=(r,g,b,a)=>`rgba(${r},${g},${b},${a})`

  // ═══ BACKGROUND — serpent green/gold inverted bloom ═══
  ctx.globalAlpha=.07
  const bgGrad=ctx.createRadialGradient(cx,cy,maxR*.15,cx,cy,maxR*1.3)
  bgGrad.addColorStop(0,'rgba(0,0,0,1)')
  bgGrad.addColorStop(.4,`rgba(${Math.floor(c[0]*.02)},${Math.floor(c[1]*.03)},${Math.floor(c[2]*.01)},1)`)
  bgGrad.addColorStop(.8,`rgba(${Math.floor(c[0]*.04)},${Math.floor(c[1]*.05)},${Math.floor(c[2]*.02)},1)`)
  bgGrad.addColorStop(1,'rgba(5,8,3,1)')
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H)

  // ═══ SERPENT EYE — the basilisk iris ═══
  // sclera
  const eyeR=maxR*.85
  const scleraGrad=ctx.createRadialGradient(cx,cy,eyeR*.3,cx,cy,eyeR)
  scleraGrad.addColorStop(0,rgba(c[0],c[1],c[2],.06))
  scleraGrad.addColorStop(.5,rgba(100,150,50,.04))
  scleraGrad.addColorStop(1,'rgba(0,0,0,0)')
  ctx.globalAlpha=1;ctx.fillStyle=scleraGrad
  ctx.beginPath();ctx.arc(cx,cy,eyeR,0,TAU);ctx.fill()

  // vertical slit pupil (reptile)
  const slitH=maxR*.35+Math.sin(t*.8)*maxR*.03
  const slitW=maxR*.04+Math.sin(t*2)*.005*maxR
  ctx.beginPath();ctx.ellipse(cx,cy,slitW,slitH,0,0,TAU)
  ctx.fillStyle='rgba(0,0,0,.95)';ctx.globalAlpha=1;ctx.fill()
  // slit glow
  const slitGlow=ctx.createRadialGradient(cx,cy,slitW,cx,cy,slitW*8)
  slitGlow.addColorStop(0,rgba(c[0],c[1],c[2],.12))
  slitGlow.addColorStop(.3,rgba(c[0],c[1],c[2],.04))
  slitGlow.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=slitGlow;ctx.beginPath();ctx.arc(cx,cy,slitW*8,0,TAU);ctx.fill()

  // iris fibers (radial, serpentine)
  ctx.globalAlpha=1
  for(let i=0;i<80;i++){
    const a=i*TAU/80+Math.sin(t*.3+i*.2)*.02
    const innerR=slitW*3+slitH*.3
    const outerR=maxR*.7
    const wobble=Math.sin(t*1.5+i*.4)*4
    ctx.beginPath()
    ctx.moveTo(cx+Math.cos(a)*innerR,cy+Math.sin(a)*innerR)
    const mr=(innerR+outerR)/2
    ctx.quadraticCurveTo(cx+Math.cos(a+.02)*mr+wobble,cy+Math.sin(a+.02)*mr,cx+Math.cos(a)*outerR,cy+Math.sin(a)*outerR)
    // color from component at this angle
    const gi=Math.floor(i*7/80)%7
    const gc=components[gi].color
    ctx.strokeStyle=rgba(gc[0],gc[1],gc[2],.06+Math.sin(t+i)*.02)
    ctx.lineWidth=1;ctx.stroke()
  }

  // ═══ 7 COMPONENT RINGS — concentric in the iris ═══
  components.forEach((comp,i)=>{
    let d=Math.abs(i-phase);if(d>3.5)d=7-d
    const p=Math.exp(-d*d*.4)
    const ringR=maxR*(.12+i*.09)

    // wavy ring
    ctx.beginPath();ctx.globalAlpha=.04+p*.08
    ctx.strokeStyle=rgba(comp.color[0],comp.color[1],comp.color[2],1)
    ctx.lineWidth=1.5+p*2
    const waveCount=FIB(i+2)
    for(let a=0;a<=TAU;a+=.015){
      const wave=Math.sin(a*waveCount+t*comp.hz*.004)*3*(1+p)
      const wr=ringR+wave
      const rot=t*(.012+i*.004)*(i%2?-1:1)
      a===0?ctx.moveTo(cx+Math.cos(a+rot)*wr,cy+Math.sin(a+rot)*wr):
             ctx.lineTo(cx+Math.cos(a+rot)*wr,cy+Math.sin(a+rot)*wr)
    }
    ctx.closePath();ctx.stroke()

    // component label on ring
    if(p>.3){
      const labelA=t*.05+i*TAU/7
      const lx=cx+Math.cos(labelA)*(ringR+12),ly=cy+Math.sin(labelA)*(ringR+12)
      ctx.save();ctx.translate(lx,ly);ctx.rotate(labelA+Math.PI/2)
      ctx.font='5px monospace';ctx.textAlign='center';ctx.globalAlpha=.04+p*.06
      ctx.fillStyle=rgba(comp.color[0],comp.color[1],comp.color[2],1)
      ctx.fillText(comp.name,0,0)
      ctx.restore()
    }

    // fibonacci petals
    const count=FIB(i+2)
    const petalLen=maxR*(.03+i*.015)+p*12
    const rot=t*(.01+i*.004)*(i%2?-1:1)
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.globalAlpha=.03+p*.06
    for(let j=0;j<count;j++){
      const a=j*TAU/count;ctx.save();ctx.rotate(a)
      ctx.beginPath();ctx.moveTo(ringR,0)
      const w=petalLen*.3
      ctx.bezierCurveTo(ringR+petalLen*.3,w,ringR+petalLen*.7,w*.6,ringR+petalLen,0)
      ctx.bezierCurveTo(ringR+petalLen*.7,-w*.6,ringR+petalLen*.3,-w,ringR,0)
      ctx.fillStyle=rgba(comp.color[0],comp.color[1],comp.color[2],.6)
      ctx.fill();ctx.restore()
    }
    ctx.restore()
  })

  // ═══ PEPTIDE ORBITS — 4 peptides circling between the component rings ═══
  peptides.forEach((pep,pi)=>{
    const orbitR=maxR*(.35+pi*.12)
    const speed=(.03+pi*.008)*(pi%2?1:-1)
    const pepAngle=t*speed+pi*TAU/4

    // orbit path
    ctx.beginPath();ctx.arc(cx,cy,orbitR,0,TAU)
    ctx.strokeStyle=rgba(pep.color[0],pep.color[1],pep.color[2],.02)
    ctx.lineWidth=1;ctx.globalAlpha=1;ctx.stroke()

    // peptide molecule (glowing dot with trail)
    const trailLen=20
    for(let tr=0;tr<trailLen;tr++){
      const trA=pepAngle-tr*.03*Math.abs(speed)*60
      const trR=orbitR+Math.sin(t*2+tr*.2)*3
      const px=cx+Math.cos(trA)*trR,py=cy+Math.sin(trA)*trR
      const trAlpha=(1-tr/trailLen)*(.1+Math.sin(t*3+pi)*.03)
      const size=2.5-tr*.1
      if(size<.5)continue
      ctx.beginPath();ctx.arc(px,py,size,0,TAU)
      ctx.fillStyle=rgba(pep.color[0],pep.color[1],pep.color[2],trAlpha)
      ctx.globalAlpha=1;ctx.fill()
    }

    // peptide label
    const lx=cx+Math.cos(pepAngle)*(orbitR+15)
    const ly=cy+Math.sin(pepAngle)*(orbitR+15)
    ctx.font='5px monospace';ctx.textAlign='center';ctx.globalAlpha=.06
    ctx.fillStyle=rgba(pep.color[0],pep.color[1],pep.color[2],1)
    ctx.fillText(pep.name,lx,ly)
  })

  // ═══ SNAKE SCALE PATTERN (hexagonal, subtle) ═══
  ctx.globalAlpha=.015+Math.sin(t*.5)*.005
  const scaleSize=12
  for(let gx=-2;gx<=W/scaleSize+2;gx++){
    for(let gy=-2;gy<=H/scaleSize+2;gy++){
      const sx=gx*scaleSize*1.5+(gy%2)*scaleSize*.75
      const sy=gy*scaleSize*.87
      const dist=Math.sqrt((sx-cx)**2+(sy-cy)**2)
      if(dist>maxR*.9||dist<maxR*.1)continue
      ctx.beginPath()
      for(let h=0;h<6;h++){
        const ha=h*TAU/6
        const hx=sx+Math.cos(ha)*scaleSize*.4,hy=sy+Math.sin(ha)*scaleSize*.4
        h===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy)
      }
      ctx.closePath()
      ctx.strokeStyle=rgba(100,180,50,.3);ctx.lineWidth=.3;ctx.stroke()
    }
  }

  // ═══ CATCHLIGHT ═══
  ctx.beginPath();ctx.arc(cx-slitW*2,cy-slitH*.3,maxR*.02,0,TAU)
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.globalAlpha=.3;ctx.fill()

  // ═══ INFO ═══
  document.getElementById('comp').style.color=rgba(c[0],c[1],c[2],.35)
  document.getElementById('comp').textContent=`${ac.gate} · ${ac.name} · ${ac.sub} · ${ac.hz}Hz`

  document.getElementById('hud').textContent=
    `BASILISK · Z=82 · Pb · 2×Nb\n`+
    `${ac.gate}: ${ac.name}\n`+
    `${ac.molecule}\n`+
    `${ac.desc}\n\n`+
    `FORMULATION:\n`+
    components.map(c2=>`  ${c2.gate} ${c2.name}`).join('\n')+
    `\n\nPEPTIDES:\n`+
    peptides.map(p2=>`  ${p2.name}`).join('\n')+
    `\n\ndelivery: microneedle patch\n`+
    `duration: 6-12 months`

  // component dots
  components.forEach((c2,i)=>{
    let d2=Math.abs(i-phase);if(d2>3.5)d2=7-d2
    const p=Math.exp(-d2*d2*.5)
    ctx.beginPath();ctx.arc(cx+(i-3)*18,H-5,2+p*3,0,TAU)
    ctx.fillStyle=rgba(c2.color[0],c2.color[1],c2.color[2],.1+p*.5)
    ctx.globalAlpha=1;ctx.fill()
  })
}

function FIB(n){let a=1,b=1;for(let i=2;i<n;i++){const c=a+b;a=b;b=c}return b}
</script>
</body></html>
