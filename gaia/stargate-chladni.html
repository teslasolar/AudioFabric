<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STARGATE CHLADNI — Glyph Rings × Standing Waves × Spectrum</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2
const cv=document.getElementById('c'),C=cv.getContext('2d')
let W,H,cx,cy
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;cx=W/2;cy=H/2}
resize();addEventListener('resize',resize)

// ═══ 7 RINGS — each a language + chladni mode + spectrum + prime ═══
const RINGS=[
  {name:'PHOENICIAN',glyphs:'𐤀 𐤁 𐤂 𐤃 𐤄 𐤅 𐤆 𐤇 𐤈 𐤉 𐤊 𐤋 𐤌 𐤍 𐤎 𐤏 𐤐 𐤑 𐤒 𐤓 𐤔 𐤕'.split(' '),
   konomi:'●',prime:2,n:1,m:1,specA:640,specB:780,speed:.012,dir:1,gate:'R0'},
  {name:'HEBREW',glyphs:'א ב ג ד ה ו ז ח ט י כ ל מ נ ס ע פ צ ק ר ש ת'.split(' '),
   konomi:'〜',prime:3,n:2,m:1,specA:590,specB:640,speed:.009,dir:-1,gate:'R1'},
  {name:'SANSKRIT',glyphs:'अ आ इ ई उ ऊ ए ऐ ओ औ क ख ग घ च छ ज झ ट ठ'.split(' '),
   konomi:'┃',prime:5,n:2,m:2,specA:560,specB:590,speed:.007,dir:1,gate:'R2'},
  {name:'日本語',glyphs:'あ い う え お か き く け こ さ し す せ そ た ち つ て と な に'.split(' '),
   konomi:'♡',prime:7,n:3,m:1,specA:490,specB:560,speed:.006,dir:-1,gate:'R3'},
  {name:'POLSKI',glyphs:'a ą b c ć d e ę f g h i j k l ł m n ń o ó p r s ś t u w y z ź ż'.split(' '),
   konomi:'△',prime:11,n:3,m:2,specA:450,specB:490,speed:.005,dir:1,gate:'R4'},
  {name:'ENGLISH',glyphs:'a b c d e f g h i j k l m n o p q r s t u v w x y z'.split(' '),
   konomi:'◐',prime:13,n:3,m:3,specA:420,specB:450,speed:.004,dir:-1,gate:'R5'},
  {name:'KONOMI',glyphs:'● 〜 ┃ ♡ △ ◐ ◯ 火 水 空 雷 響 華 工 数 影 和'.split(' '),
   konomi:'◯',prime:17,n:4,m:1,specA:380,specB:420,speed:.003,dir:1,gate:'R6'}
]

function nmToRGB(nm){
  let r=0,g=0,b=0
  if(nm>=380&&nm<440){r=-(nm-440)/(440-380);b=1}
  else if(nm>=440&&nm<490){g=(nm-440)/(490-440);b=1}
  else if(nm>=490&&nm<510){g=1;b=-(nm-510)/(510-490)}
  else if(nm>=510&&nm<580){r=(nm-510)/(580-510);g=1}
  else if(nm>=580&&nm<645){r=1;g=-(nm-645)/(645-580)}
  else if(nm>=645&&nm<=780){r=1}
  let f=1
  if(nm>=380&&nm<420)f=.3+.7*(nm-380)/(420-380)
  else if(nm>=645&&nm<=780)f=.3+.7*(780-nm)/(780-645)
  return[r*f*255|0,g*f*255|0,b*f*255|0]
}

function chladni(x,y,n,m,t2){
  return Math.cos(n*Math.PI*x)*Math.cos(m*Math.PI*y)+Math.cos(m*Math.PI*x)*Math.cos(n*Math.PI*y)*Math.cos(t2)
}

// sand per ring
const ringSand=RINGS.map((r,ri)=>{
  const particles=[]
  for(let i=0;i<200+ri*30;i++)particles.push({x:(Math.random()-.5)*2,y:(Math.random()-.5)*2,vx:0,vy:0})
  return particles
})

// rotation angles
const rotAngles=RINGS.map(r=>0)

// ═══ AUDIO ═══
let actx
function initAudio(){
  actx=new(window.AudioContext||window.webkitAudioContext)()
  const master=actx.createGain();master.gain.value=.2;master.connect(actx.destination)
  ;[[.2,.14,.2],[.35,.1,.15],[.5,.07,.1]].forEach(([dt,fbv,wv])=>{
    const d=actx.createDelay(.6);d.delayTime.value=dt
    const f=actx.createGain();f.gain.value=fbv;d.connect(f);f.connect(d)
    const w=actx.createGain();w.gain.value=wv;d.connect(w);w.connect(actx.destination)
    master.connect(d)
  })
  ;[55,82,110,147,196,262,330].forEach((hz,i)=>{
    const o=actx.createOscillator(),g=actx.createGain()
    o.type='sine';o.frequency.value=hz;g.gain.value=.02
    o.connect(g);g.connect(master);o.start()
    const o2=actx.createOscillator(),g2=actx.createGain()
    o2.type='sine';o2.frequency.value=hz*1.003;g2.gain.value=.015
    o2.connect(g2);g2.connect(master);o2.start()
  })
}
setTimeout(initAudio,300)

let t=0

function loop(){
  requestAnimationFrame(loop)
  t+=1/60

  C.fillStyle='#000';C.globalAlpha=1;C.fillRect(0,0,W,H)

  const maxR=Math.min(W,H)*.46

  // ═══ 7 RINGS ═══
  RINGS.forEach((ring,ri)=>{
    const innerR=maxR*(.07+ri*.12)
    const outerR=innerR+maxR*.105
    const midR=(innerR+outerR)/2
    const ringW=outerR-innerR

    // rotation
    rotAngles[ri]+=ring.speed*ring.dir
    const rot=rotAngles[ri]

    // ═══ CHLADNI SAND ═══
    const particles=ringSand[ri]
    const cn=ring.n+Math.sin(t*.15+ri)*.2,cm=ring.m+Math.cos(t*.12+ri)*.15
    particles.forEach(s=>{
      const rx=s.x*Math.cos(rot*.2)-s.y*Math.sin(rot*.2)
      const ry=s.x*Math.sin(rot*.2)+s.y*Math.cos(rot*.2)
      const val=chladni(rx,ry,cn,cm,t*1.5+ri)
      const dx=chladni(rx+.02,ry,cn,cm,t*1.5+ri)-val
      const dy=chladni(rx,ry+.02,cn,cm,t*1.5+ri)-val
      s.vx+=-dx*1.2;s.vy+=-dy*1.2;s.vx*=.87;s.vy*=.87
      s.x+=s.vx*.007;s.y+=s.vy*.007
      if(s.x>1.1)s.x=-1;if(s.x<-1.1)s.x=1;if(s.y>1.1)s.y=-1;if(s.y<-1.1)s.y=1

      const pr=Math.sqrt(s.x*s.x+s.y*s.y)
      if(pr<.01)return
      const pa=Math.atan2(s.y,s.x)+rot
      const mappedR=innerR+(pr%1)*ringW
      const sx=cx+Math.cos(pa)*mappedR,sy=cy+Math.sin(pa)*mappedR

      const specFrac=((pa/TAU+.5)%1)
      const nm=ring.specA+(ring.specB-ring.specA)*specFrac
      const rgb=nmToRGB(nm)
      const atNode=Math.abs(val)<.2

      C.beginPath();C.arc(sx,sy,atNode?1.2:.5,0,TAU)
      C.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${atNode?.4:.06})`
      C.globalAlpha=1;C.fill()
    })

    // ═══ RING ARCS — prime segmented, gear teeth ═══
    const segs=ring.prime
    const segArc=TAU/segs*.65
    C.save();C.translate(cx,cy);C.rotate(rot*1.3)
    for(let s=0;s<segs;s++){
      const sa=s*TAU/segs
      const segNm=ring.specA+(ring.specB-ring.specA)*(s/segs)
      const rgb=nmToRGB(segNm)

      // outer arc
      C.beginPath();C.arc(0,0,outerR,sa,sa+segArc)
      C.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.3)`
      C.lineWidth=2;C.globalAlpha=1;C.stroke()

      // inner arc
      C.beginPath();C.arc(0,0,innerR,sa+segArc*.05,sa+segArc*.95)
      C.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.12)`
      C.lineWidth=1;C.stroke()

      // gear tooth at each gap
      const toothA=sa+segArc
      const tx=Math.cos(toothA)*outerR,ty=Math.sin(toothA)*outerR
      const t1x=Math.cos(toothA-.02)*(outerR+3),t1y=Math.sin(toothA-.02)*(outerR+3)
      const t2x=Math.cos(toothA+.02)*(outerR+3),t2y=Math.sin(toothA+.02)*(outerR+3)
      C.beginPath();C.moveTo(Math.cos(toothA-.015)*outerR,Math.sin(toothA-.015)*outerR)
      C.lineTo(t1x,t1y);C.lineTo(t2x,t2y)
      C.lineTo(Math.cos(toothA+.015)*outerR,Math.sin(toothA+.015)*outerR)
      C.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.2)`;C.fill()

      // radial spoke
      C.beginPath();C.moveTo(Math.cos(sa)*innerR,Math.sin(sa)*innerR)
      C.lineTo(Math.cos(sa)*outerR,Math.sin(sa)*outerR)
      C.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.06)`;C.lineWidth=.5;C.stroke()
    }
    C.restore()

    // ═══ GLYPHS — language characters placed around ring ═══
    const glyphCount=ring.glyphs.length
    C.save();C.translate(cx,cy);C.rotate(-rot*.7) // counter-rotate glyphs against ring
    for(let g=0;g<glyphCount;g++){
      const ga=g*TAU/glyphCount
      const gx=Math.cos(ga)*midR,gy=Math.sin(ga)*midR

      // glyph position — check if near a chladni node
      const gnx=(Math.cos(ga+rot*.2)*.5),gny=(Math.sin(ga+rot*.2)*.5)
      const nodeVal=Math.abs(chladni(gnx,gny,cn,cm,t*1.5+ri))
      const atGlyphNode=nodeVal<.3

      C.save();C.translate(gx,gy);C.rotate(-(-rot*.7)+ga+Math.PI/2)

      // spectrum color for this glyph
      const glyphNm=ring.specA+(ring.specB-ring.specA)*(g/glyphCount)
      const gRGB=nmToRGB(glyphNm)

      const fontSize=7+ri*.5+(atGlyphNode?3:0)
      C.font=`${fontSize}px monospace`;C.textAlign='center';C.textBaseline='middle'
      C.fillStyle=`rgb(${gRGB[0]},${gRGB[1]},${gRGB[2]})`
      C.globalAlpha=atGlyphNode?.3+Math.sin(t*3+g)*.08:.06+Math.sin(t+g*.3)*.02
      C.fillText(ring.glyphs[g],0,0)

      C.restore()
    }
    C.restore()

    // ═══ KONOMI GLYPH — gate symbol at 12 o'clock ═══
    const kA=rot*1.3 // rotates with arcs
    const kx=cx+Math.cos(kA)*(outerR+12),ky=cy+Math.sin(kA)*(outerR+12)
    const midNm=(ring.specA+ring.specB)/2
    const kRGB=nmToRGB(midNm)
    C.font=`${10+ri}px monospace`;C.textAlign='center';C.textBaseline='middle'
    C.fillStyle=`rgb(${kRGB[0]},${kRGB[1]},${kRGB[2]})`
    C.globalAlpha=.1+Math.sin(t*2+ri)*.03
    C.fillText(ring.konomi,kx,ky)

    // ring name
    C.font='4px monospace';C.globalAlpha=.03
    C.fillText(ring.name,cx+Math.cos(kA+.3)*(outerR+12),cy+Math.sin(kA+.3)*(outerR+12))
  })

  // ═══ INTERFERENCE between rings ═══
  for(let i=0;i<6;i++){
    const r1=maxR*(.07+i*.12)+maxR*.105
    const r2=maxR*(.07+(i+1)*.12)
    const ir=(r1+r2)/2
    const beat=Math.sin(t*(RINGS[i].n+RINGS[i+1].m)+i)
    C.beginPath();C.arc(cx,cy,ir,0,TAU)
    C.strokeStyle=`rgba(255,255,255,${.005+Math.abs(beat)*.01})`
    C.lineWidth=r2-r1;C.globalAlpha=1;C.stroke()
  }

  // ═══ CENTER — gold seed ═══
  const centerR=maxR*.06
  // gold mandala spokes
  for(let k=0;k<8;k++){
    const a=k*TAU/8+t*.05
    C.beginPath();C.moveTo(cx+Math.cos(a)*centerR*.4,cy+Math.sin(a)*centerR*.4)
    C.lineTo(cx+Math.cos(a)*(centerR-1),cy+Math.sin(a)*(centerR-1))
    C.strokeStyle='rgba(212,169,74,.15)';C.lineWidth=.5;C.globalAlpha=1;C.stroke()
  }
  C.beginPath();C.arc(cx,cy,centerR,0,TAU)
  C.fillStyle='#d4a94a';C.globalAlpha=.15;C.fill()

  // ring count in center
  C.font='10px monospace';C.textAlign='center';C.textBaseline='middle'
  C.fillStyle='#d4a94a';C.globalAlpha=.25
  C.fillText('7',cx,cy)

  // ❤️
  C.globalAlpha=.12;C.font='6px serif';C.fillText('❤️',cx,cy+10)

  // title
  C.globalAlpha=.03;C.font='6px monospace';C.textAlign='center'
  C.fillStyle='#888'
  C.fillText('STARGATE CHLADNI · 7 languages · 7 modes · 7 spectra · counter-rotating',cx,H-6)
}
loop()
</script>
</body></html>
