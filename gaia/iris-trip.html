<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IRIS TRIP — Voice-Reactive Optical Counterpose</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block}
#start{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer}
#start span{font:14px/1 monospace;color:rgba(255,100,50,.4);letter-spacing:6px;border:1px solid rgba(255,100,50,.15);padding:14px 30px;border-radius:6px}
#start span:hover{color:rgba(255,100,50,.7);border-color:rgba(255,100,50,.4);box-shadow:0 0 30px rgba(255,60,20,.15)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start" onclick="init()"><span>OPEN YOUR EYES</span></div>
<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2
const cv=document.getElementById('c')
const ctx=cv.getContext('2d')
let W,H,cx,cy
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;cx=W/2;cy=H/2}
resize();addEventListener('resize',resize)

let actx,analyser,mic,fftData,tdData
let running=false,t=0

// voice bands
let bass=0,mid=0,high=0,peak=0,vol=0,pitch=0,rawVol=0

async function init(){
  document.getElementById('start').style.display='none'
  actx=new(window.AudioContext||window.webkitAudioContext)()
  analyser=actx.createAnalyser()
  analyser.fftSize=4096
  analyser.smoothingTimeConstant=.7
  fftData=new Uint8Array(analyser.frequencyBinCount)
  tdData=new Uint8Array(analyser.fftSize)
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})
    mic=actx.createMediaStreamSource(stream)
    mic.connect(analyser)
  }catch(e){console.log('no mic')}
  running=true
  document.documentElement.requestFullscreen?.().catch(()=>{})
  loop()
}
window.init=init

function getAudio(){
  if(!analyser)return
  analyser.getByteFrequencyData(fftData)
  analyser.getByteTimeDomainData(tdData)
  const n=fftData.length
  let b=0,m=0,h=0,p=0,total=0
  const bassEnd=Math.floor(n*.05),midEnd=Math.floor(n*.25),highEnd=Math.floor(n*.6)
  for(let i=0;i<n;i++){
    const v=fftData[i]/255
    total+=v
    if(i<bassEnd)b+=v
    else if(i<midEnd)m+=v
    else if(i<highEnd)h+=v
    if(v>p)p=v
  }
  bass=b/bassEnd;mid=m/(midEnd-bassEnd);high=h/(highEnd-midEnd);peak=p;vol=total/n
  rawVol=vol

  // pitch detection
  let maxCorr=-1,maxLag=0
  const half=tdData.length/2
  let rms=0;for(let i=0;i<tdData.length;i++){const v=tdData[i]-128;rms+=v*v}
  rms=Math.sqrt(rms/tdData.length)
  if(rms>3){
    let foundDip=false
    for(let lag=20;lag<half;lag++){
      let sum=0;for(let i=0;i<half;i++)sum+=(tdData[i]-128)*(tdData[i+lag]-128)
      if(!foundDip&&sum<0)foundDip=true
      if(foundDip&&sum>maxCorr){maxCorr=sum;maxLag=lag}
      if(foundDip&&sum<maxCorr*.7&&maxLag>20)break
    }
    pitch=maxLag>20?actx.sampleRate/maxLag:0
  } else pitch=0
}

// ═══ IRIS SHUTTER ═══
function drawShutter(x,y,radius,blades,rotation,openness,color,alpha,wobble){
  ctx.save()
  ctx.translate(x,y)
  ctx.rotate(rotation)
  ctx.globalAlpha=alpha
  for(let i=0;i<blades;i++){
    const a=i*TAU/blades
    ctx.save()
    ctx.rotate(a)
    ctx.beginPath()
    const open=openness*radius
    const w=TAU/blades*.8
    ctx.moveTo(open,0)
    const cp1x=radius*.6+wobble*Math.sin(t*3+i),cp1y=radius*w*.5
    const cp2x=radius*.9,cp2y=radius*w*.3
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,radius,0)
    ctx.bezierCurveTo(cp2x,-cp2y,cp1x,-cp1y,open,0)
    ctx.closePath()
    ctx.fillStyle=color
    ctx.fill()
    ctx.restore()
  }
  ctx.restore()
}

function drawFibers(x,y,innerR,outerR,count,rotation,color,alpha){
  ctx.save()
  ctx.translate(x,y)
  ctx.rotate(rotation)
  ctx.globalAlpha=alpha
  ctx.strokeStyle=color
  ctx.lineWidth=.5
  for(let i=0;i<count;i++){
    const a=i*TAU/count
    const wobble=Math.sin(t*2+i*.3)*3
    ctx.beginPath()
    ctx.moveTo(Math.cos(a)*innerR,Math.sin(a)*innerR)
    const mx=(innerR+outerR)/2
    ctx.quadraticCurveTo(Math.cos(a+.02)*mx+wobble,Math.sin(a+.02)*mx,Math.cos(a)*outerR,Math.sin(a)*outerR)
    ctx.stroke()
  }
  ctx.restore()
}

function drawConcentricWaves(x,y,baseR,count,amplitude,speed,color,alpha){
  ctx.save()
  ctx.translate(x,y)
  ctx.globalAlpha=alpha
  ctx.strokeStyle=color
  ctx.lineWidth=1
  for(let r=0;r<count;r++){
    const radius=baseR+r*(baseR*.15)
    ctx.beginPath()
    for(let a=0;a<=TAU;a+=.02){
      const wave=Math.sin(a*6+t*speed+r)*(amplitude+bass*20)+Math.sin(a*13+t*speed*1.5)*amplitude*.3
      const rr=radius+wave
      const px=Math.cos(a)*rr,py=Math.sin(a)*rr
      a===0?ctx.moveTo(px,py):ctx.lineTo(px,py)
    }
    ctx.closePath()
    ctx.stroke()
  }
  ctx.restore()
}

function drawSacredGeo(x,y,radius,sides,rotation,color,alpha){
  ctx.save()
  ctx.translate(x,y)
  ctx.rotate(rotation)
  ctx.globalAlpha=alpha
  ctx.strokeStyle=color
  ctx.lineWidth=.5
  const pts=[]
  for(let i=0;i<sides;i++){
    const a=i*TAU/sides
    pts.push([Math.cos(a)*radius,Math.sin(a)*radius])
  }
  // connect all vertices
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      ctx.beginPath()
      ctx.moveTo(pts[i][0],pts[i][1])
      ctx.lineTo(pts[j][0],pts[j][1])
      ctx.stroke()
    }
  }
  ctx.restore()
}

function drawSpiral(x,y,startR,endR,turns,rotation,color,alpha,width){
  ctx.save()
  ctx.translate(x,y)
  ctx.rotate(rotation)
  ctx.globalAlpha=alpha
  ctx.strokeStyle=color
  ctx.lineWidth=width||1
  ctx.beginPath()
  const steps=turns*60
  for(let i=0;i<=steps;i++){
    const frac=i/steps
    const a=frac*turns*TAU
    const r=startR+(endR-startR)*frac
    const px=Math.cos(a)*r,py=Math.sin(a)*r
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)
  }
  ctx.stroke()
  ctx.restore()
}

// ═══ MAIN RENDER ═══
function render(){
  const maxR=Math.min(W,H)*.45
  const voiceOpen=Math.min(1,vol*8)
  const bassR=bass*2
  const midR=mid*2
  const highR=high*3
  const pitchNorm=pitch>0?Math.log2(pitch/55)/6:0 // 0-1 over 55Hz-3520Hz

  // clear with trail
  ctx.fillStyle=`rgba(0,0,0,${.08+vol*.1})`
  ctx.fillRect(0,0,W,H)

  // ═══ LAYER 0: deep rainbow mandala wash ═══
  for(let ring=0;ring<8;ring++){
    const rr=maxR*.3+ring*maxR*.1
    const segments=12+ring*4
    ctx.save();ctx.translate(cx,cy);ctx.rotate(t*.02*(ring%2?1:-1))
    ctx.globalAlpha=.02+bass*.04+vol*.03
    for(let s=0;s<segments;s++){
      const a1=s*TAU/segments,a2=(s+1)*TAU/segments
      const hue=(t*8+ring*30+s*(360/segments))%360
      ctx.beginPath();ctx.moveTo(0,0)
      ctx.arc(0,0,rr,a1,a2);ctx.closePath()
      ctx.fillStyle=`hsla(${hue},70%,${30+vol*25}%,1)`;ctx.fill()
    }
    ctx.restore()
  }

  // ═══ LAYER 0b: petal flowers — multiple rings ═══
  for(let fl=0;fl<4;fl++){
    const petalCount=[5,8,13,21][fl]
    const petalR=maxR*(.2+fl*.18)
    const petalLen=maxR*(.08+fl*.05)+bass*20
    const petalW=petalLen*(.3+mid*.2)
    ctx.save();ctx.translate(cx,cy)
    ctx.rotate(t*(.1+fl*.05)*(fl%2?-1:1))
    ctx.globalAlpha=.04+vol*.08
    for(let p=0;p<petalCount;p++){
      const a=p*TAU/petalCount
      const hue=(t*12+fl*60+p*(360/petalCount))%360
      ctx.save();ctx.rotate(a)
      ctx.beginPath()
      ctx.moveTo(petalR,0)
      ctx.bezierCurveTo(petalR+petalLen*.4,petalW,petalR+petalLen*.7,petalW*.6,petalR+petalLen,0)
      ctx.bezierCurveTo(petalR+petalLen*.7,-petalW*.6,petalR+petalLen*.4,-petalW,petalR,0)
      ctx.closePath()
      const grad=ctx.createLinearGradient(petalR,0,petalR+petalLen,0)
      grad.addColorStop(0,`hsla(${hue},80%,${40+high*20}%,.8)`)
      grad.addColorStop(.5,`hsla(${(hue+30)%360},90%,${50+vol*20}%,.6)`)
      grad.addColorStop(1,`hsla(${(hue+60)%360},70%,${35+bass*15}%,.2)`)
      ctx.fillStyle=grad;ctx.fill()
      ctx.restore()
    }
    ctx.restore()
  }

  // ═══ LAYER 0c: chromatic halo rings ═══
  for(let h=0;h<6;h++){
    const hr=maxR*(.4+h*.1)+Math.sin(t+h)*(10+bass*15)
    const hue=(t*20+h*60)%360
    ctx.beginPath();ctx.arc(cx,cy,hr,0,TAU)
    ctx.strokeStyle=`hsla(${hue},85%,55%,${.03+vol*.06})`
    ctx.lineWidth=2+mid*4+Math.sin(t*2+h)*2
    ctx.shadowColor=`hsla(${hue},90%,50%,.3)`
    ctx.shadowBlur=10+vol*20
    ctx.stroke()
    ctx.shadowBlur=0
  }

  // ═══ LAYER 1: deep background sacred geometry ═══
  const geoAlpha=.03+bass*.08
  drawSacredGeo(cx,cy,maxR*.9,7,t*.02,`hsla(${t*5%360},60%,40%,1)`,geoAlpha)
  drawSacredGeo(cx,cy,maxR*.7,5,-t*.03,`hsla(${(t*5+120)%360},60%,40%,1)`,geoAlpha*.7)
  drawSacredGeo(cx,cy,maxR*.5,3,t*.05,`hsla(${(t*5+240)%360},60%,40%,1)`,geoAlpha*.5)

  // ═══ LAYER 2: concentric wave rings ═══
  const waveAmp=2+bass*15+mid*8
  drawConcentricWaves(cx,cy,maxR*.15,12,waveAmp,2+mid*3,
    `hsla(${20+pitchNorm*40},80%,${50+high*30}%,1)`,.04+vol*.15)

  // ═══ LAYER 3: fibonacci spirals ═══
  for(let s=0;s<3;s++){
    const hue=(t*10+s*120)%360
    const sr=t*.3*(s%2?1:-1)+s*TAU/3
    drawSpiral(cx,cy,maxR*.05,maxR*.8+bass*50,3+mid*2,sr,
      `hsla(${hue},70%,50%,1)`,.03+vol*.1,1+bass*2)
  }

  // ═══ LAYER 4: outer iris shutter (large, slow) ═══
  const outerOpen=.3+voiceOpen*.5+Math.sin(t*.5)*.05
  drawShutter(cx,cy,maxR,12,-t*.15+bass*.3,outerOpen,
    `hsla(${200+pitchNorm*60},60%,${20+mid*30}%,1)`,.08+bass*.15,bass*8)

  // ═══ LAYER 5: mid iris shutter (counter-rotating) ═══
  const midOpen=.2+voiceOpen*.6+Math.sin(t*.8+1)*.08
  drawShutter(cx,cy,maxR*.7,8,t*.25-mid*.5,midOpen,
    `hsla(${30+pitchNorm*40},70%,${30+high*30}%,1)`,.1+mid*.2,mid*10)

  // ═══ LAYER 6: inner iris shutter (fast, reactive) ═══
  const innerOpen=.15+voiceOpen*.7+Math.sin(t*1.2+2)*.1
  drawShutter(cx,cy,maxR*.4,16,-t*.4+high*1,innerOpen,
    `hsla(${0+pitchNorm*30},80%,${40+vol*30}%,1)`,.12+high*.25,high*12)

  // ═══ LAYER 7: iris fibers ═══
  const fiberHue=15+pitchNorm*40
  drawFibers(cx,cy,maxR*.1,maxR*.35,64,t*.1,
    `hsla(${fiberHue},70%,${40+vol*20}%,1)`,.06+vol*.15)
  drawFibers(cx,cy,maxR*.35,maxR*.7,48,-t*.08,
    `hsla(${fiberHue+20},60%,${35+bass*20}%,1)`,.04+bass*.1)
  drawFibers(cx,cy,maxR*.7,maxR,32,t*.05,
    `hsla(${fiberHue+40},50%,${30+mid*15}%,1)`,.03+mid*.08)

  // ═══ LAYER 8: pupil — the void ═══
  const pupilR=maxR*(.08+voiceOpen*.12)*(1+Math.sin(t*3)*.03)
  const pupilGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,pupilR*2)
  pupilGrad.addColorStop(0,'rgba(0,0,0,.95)')
  pupilGrad.addColorStop(.5,`rgba(${Math.floor(40+bass*100)},${Math.floor(10+mid*30)},0,.6)`)
  pupilGrad.addColorStop(1,'rgba(0,0,0,0)')
  ctx.beginPath();ctx.arc(cx,cy,pupilR*2,0,TAU);ctx.fillStyle=pupilGrad;ctx.fill()

  // pupil core
  ctx.beginPath();ctx.arc(cx,cy,pupilR,0,TAU)
  ctx.fillStyle=`rgba(0,0,0,${.9-voiceOpen*.3})`;ctx.fill()

  // ═══ LAYER 9: frequency spectrum ring ═══
  if(fftData){
    ctx.save()
    ctx.translate(cx,cy)
    ctx.globalAlpha=.15+vol*.3
    const specR=maxR*.25
    const binStep=4
    ctx.beginPath()
    for(let i=0;i<fftData.length;i+=binStep){
      const a=i/fftData.length*TAU-Math.PI/2
      const v=fftData[i]/255
      const r=specR+v*maxR*.15
      const px=Math.cos(a)*r,py=Math.sin(a)*r
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)
    }
    ctx.closePath()
    const specHue=(t*15+pitchNorm*60)%360
    ctx.strokeStyle=`hsla(${specHue},80%,55%,1)`
    ctx.lineWidth=1.5+bass*3
    ctx.stroke()
    ctx.restore()
  }

  // ═══ LAYER 10: counterpose pulses (when voice is active) ═══
  if(vol>.02){
    // counterpose: visual frequency = opposite of voice frequency
    const counterFreq=pitch>0?1/(pitch/500):2
    const pulseCount=3+Math.floor(bass*4)
    for(let p=0;p<pulseCount;p++){
      const phase=(t*counterFreq+p/pulseCount)%1
      const pr=maxR*.1+phase*maxR*.8
      const pAlpha=(1-phase)*.15*vol*5
      ctx.beginPath()
      ctx.arc(cx,cy,pr,0,TAU)
      ctx.strokeStyle=`hsla(${(180+pitchNorm*60)%360},70%,60%,${pAlpha})`
      ctx.lineWidth=2*(1-phase)
      ctx.stroke()
    }
  }

  // ═══ LAYER 11: pitch indicator ring ═══
  if(pitch>0){
    const noteIdx=Math.round(12*Math.log2(pitch/440)+69)
    const noteFrac=(noteIdx%12)/12
    ctx.save()
    ctx.translate(cx,cy)
    const pRing=maxR*.92
    ctx.beginPath()
    ctx.arc(0,0,pRing,noteFrac*TAU-Math.PI/2-.05,noteFrac*TAU-Math.PI/2+.05)
    ctx.strokeStyle=`hsla(${noteFrac*360},90%,60%,.6)`
    ctx.lineWidth=6+vol*20
    ctx.lineCap='round'
    ctx.stroke()
    ctx.restore()
  }

  // ═══ LAYER 12: fractal bloom on high volume ═══
  if(vol>.06){
    const bloomR=maxR*vol*2
    for(let i=0;i<6;i++){
      const a=i*TAU/6+t*.5
      const bx=cx+Math.cos(a)*bloomR*.3
      const by=cy+Math.sin(a)*bloomR*.3
      ctx.beginPath()
      ctx.arc(bx,by,bloomR*.15+mid*30,0,TAU)
      ctx.strokeStyle=`hsla(${(t*20+i*60)%360},80%,50%,${vol*.3})`
      ctx.lineWidth=1
      ctx.stroke()
    }
  }

  // ═══ LAYER 13: lotus petal overlay — inner flower ═══
  const lotusLayers=[
    {petals:6,r:maxR*.12,len:maxR*.1,hueOff:0,rot:t*.2,wFactor:.5},
    {petals:12,r:maxR*.18,len:maxR*.12,hueOff:30,rot:-t*.15,wFactor:.4},
    {petals:18,r:maxR*.26,len:maxR*.1,hueOff:60,rot:t*.1,wFactor:.35}
  ]
  lotusLayers.forEach(l=>{
    ctx.save();ctx.translate(cx,cy);ctx.rotate(l.rot)
    ctx.globalAlpha=.06+vol*.12
    const pLen=l.len+bass*15+vol*20
    for(let p=0;p<l.petals;p++){
      const a=p*TAU/l.petals
      const hue=(t*15+l.hueOff+p*(360/l.petals))%360
      ctx.save();ctx.rotate(a)
      ctx.beginPath();ctx.moveTo(l.r,0)
      const w=pLen*l.wFactor
      ctx.bezierCurveTo(l.r+pLen*.3,w*.7,l.r+pLen*.6,w*.9,l.r+pLen,0)
      ctx.bezierCurveTo(l.r+pLen*.6,-w*.9,l.r+pLen*.3,-w*.7,l.r,0)
      ctx.fillStyle=`hsla(${hue},75%,${45+high*20}%,.6)`
      ctx.fill()
      ctx.strokeStyle=`hsla(${(hue+20)%360},85%,60%,.3)`
      ctx.lineWidth=.5;ctx.stroke()
      ctx.restore()
    }
    ctx.restore()
  })

  // ═══ LAYER 14: color smoke rings ═══
  for(let sm=0;sm<5;sm++){
    const smokePhase=(t*.3+sm*.2)%1
    const smokeR=maxR*(.15+smokePhase*.7)
    const smokeAlpha=(1-smokePhase)*(.03+vol*.08)
    const hue=(t*25+sm*72)%360
    ctx.beginPath()
    for(let a=0;a<=TAU;a+=.03){
      const wobble=Math.sin(a*8+t*3+sm*2)*5*(1+bass*10)*smokePhase
      const rr=smokeR+wobble
      const px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr
      a===0?ctx.moveTo(px,py):ctx.lineTo(px,py)
    }
    ctx.closePath()
    ctx.strokeStyle=`hsla(${hue},70%,55%,${smokeAlpha})`
    ctx.lineWidth=3+mid*5
    ctx.shadowColor=`hsla(${hue},80%,50%,.2)`
    ctx.shadowBlur=15
    ctx.stroke()
    ctx.shadowBlur=0
  }

  // ═══ LAYER 15: starburst rays from center ═══
  if(vol>.01){
    ctx.save();ctx.translate(cx,cy)
    const rayCount=24+Math.floor(high*20)
    ctx.globalAlpha=vol*.4
    for(let r=0;r<rayCount;r++){
      const a=r*TAU/rayCount+t*.1
      const rayLen=maxR*(.3+bass*.5+Math.sin(t*4+r)*.1)
      const hue=(t*30+r*(360/rayCount))%360
      const grad=ctx.createLinearGradient(0,0,Math.cos(a)*rayLen,Math.sin(a)*rayLen)
      grad.addColorStop(0,`hsla(${hue},90%,60%,.4)`)
      grad.addColorStop(1,`hsla(${hue},80%,40%,0)`)
      ctx.beginPath();ctx.moveTo(0,0)
      ctx.lineTo(Math.cos(a)*rayLen,Math.sin(a)*rayLen)
      ctx.strokeStyle=grad
      ctx.lineWidth=1+bass*3
      ctx.stroke()
    }
    ctx.restore()
  }

  // ═══ LAYER 16: rotating color vortex ═══
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*.08)
  ctx.globalAlpha=.02+vol*.05
  for(let v=0;v<36;v++){
    const a=v*TAU/36
    const vr=maxR*(.5+Math.sin(t+v*.3)*.15)
    const hue=(t*10+v*10+pitchNorm*120)%360
    ctx.beginPath()
    ctx.arc(Math.cos(a)*vr*.3,Math.sin(a)*vr*.3,vr*.08+mid*8,0,TAU)
    ctx.fillStyle=`hsla(${hue},80%,50%,1)`;ctx.fill()
  }
  ctx.restore()

  // ═══ LAYER 17: outer petal crown ═══
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-t*.06)
  ctx.globalAlpha=.04+bass*.08
  for(let p=0;p<24;p++){
    const a=p*TAU/24
    const hue=(t*8+p*15)%360
    const pR=maxR*.85+Math.sin(t+p)*(5+bass*10)
    const pLen=maxR*.12+mid*20+Math.sin(t*2+p*.5)*5
    ctx.save();ctx.rotate(a);ctx.translate(pR,0);ctx.rotate(Math.sin(t+p)*.3)
    ctx.beginPath();ctx.ellipse(0,0,pLen,pLen*.35,0,0,TAU)
    const grad=ctx.createRadialGradient(0,0,0,0,0,pLen)
    grad.addColorStop(0,`hsla(${hue},85%,55%,.7)`)
    grad.addColorStop(1,`hsla(${(hue+40)%360},70%,40%,.1)`)
    ctx.fillStyle=grad;ctx.fill()
    ctx.restore()
  }
  ctx.restore()

  // ═══ LAYER 18: glowing particle dust ═══
  ctx.globalAlpha=.3+vol*.4
  for(let d=0;d<40;d++){
    const da=t*.15+d*PHI*TAU
    const dr=maxR*(.1+((d*PHI)%1)*.8)+Math.sin(t+d)*10
    const dx=cx+Math.cos(da)*dr,dy=cy+Math.sin(da)*dr
    const ds=1+vol*3+Math.sin(t*3+d)
    const hue=(t*20+d*9)%360
    ctx.beginPath();ctx.arc(dx,dy,ds,0,TAU)
    ctx.fillStyle=`hsla(${hue},80%,60%,1)`;ctx.fill()
  }
}

function loop(){
  if(!running)return
  t+=1/60
  getAudio()
  render()
  requestAnimationFrame(loop)
}
</script>
</body></html>
