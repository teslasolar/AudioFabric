const NAMES=['','Hydrogen','Helium','Lithium','Beryllium','Boron','Carbon','Nitrogen','Oxygen','Fluorine','Neon','Sodium','Magnesium','Aluminum','Silicon','Phosphorus','Sulfur','Chlorine','Argon','Potassium','Calcium','Scandium','Titanium','Vanadium','Chromium','Manganese','Iron','Cobalt','Nickel','Copper','Zinc','Gallium','Germanium','Arsenic','Selenium','Bromine','Krypton','Rubidium','Strontium','Yttrium','Zirconium','Niobium','Molybdenum','Technetium','Ruthenium','Rhodium','Palladium','Silver','Cadmium','Indium','Tin','Antimony','Tellurium','Iodine','Xenon','Cesium','Barium','Lanthanum','Cerium','Praseodymium','Neodymium','Promethium','Samarium','Europium','Gadolinium','Terbium','Dysprosium','Holmium','Erbium','Thulium','Ytterbium','Lutetium','Hafnium','Tantalum','Tungsten','Rhenium','Osmium','Iridium','Platinum','Gold','Mercury','Thallium','Lead','Bismuth','Polonium','Astatine','Radon','Francium','Radium','Actinium','Thorium','Protactinium','Uranium','Neptunium','Plutonium','Americium','Curium','Berkelium','Californium','Einsteinium','Fermium','Mendelevium','Nobelium','Lawrencium','Rutherfordium','Dubnium','Seaborgium','Bohrium','Hassium','Meitnerium','Darmstadtium','Roentgenium','Copernicium','Nihonium','Flerovium','Moscovium','Livermorium','Tennessine','Oganesson']

function el(z){return z>=1&&z<=118?{z,sym:EL[z],name:NAMES[z]}:{z,sym:'?'+z,name:'beyond known'}}
function elHTML(z,note){const e=el(z);return `<div class="elem"><span class="z">${e.z}</span><span class="sym">${e.sym}</span><span class="name">${e.name.toUpperCase()}</span>${note?'<span class="note">'+note+'</span>':''}</div>`}

function isPrime(n){if(n<2)return false;if(n<4)return true;if(n%2===0||n%3===0)return false;for(let i=5;i*i<=n;i+=6)if(n%i===0||n%(i+2)===0)return false;return true}
function factorize(n){const f=[];let x=n,d=2;while(d*d<=x){while(x%d===0){f.push(d);x/=d}d++}if(x>1)f.push(x);return f}
function digitSum(n){let s=0,x=n;while(x>0){s+=x%10;x=Math.floor(x/10)}return s}
function digitalRoot(n){while(n>=10)n=digitSum(n);return n}
function nthPrime(n){let count=0,num=1;while(count<n){num++;if(isPrime(num))count++}return num}

// ═══ GENERATE PRIMES (sieve for super-prime chain) ═══
const SIEVE_LIMIT=700000
const sieve=new Uint8Array(SIEVE_LIMIT)
sieve[0]=1;sieve[1]=1
for(let i=2;i*i<SIEVE_LIMIT;i++){if(!sieve[i])for(let j=i*i;j<SIEVE_LIMIT;j+=i)sieve[j]=1}
const primeList=[]
for(let i=2;i<SIEVE_LIMIT;i++)if(!sieve[i])primeList.push(i)

function primeAt(n){return n<=primeList.length?primeList[n-1]:null}

// ═══ SUPER-PRIME CHAIN: a(n+1) = prime(a(n)) ═══
;(function(){
  const chain=[2]
  for(let i=0;i<10;i++){
    const next=primeAt(chain[chain.length-1])
    if(next)chain.push(next);else break
  }

  let h=`<h2>SUPER-PRIME CHAIN — a(n+1) = prime(a(n))</h2>`
  h+=`<div class="eq">Start with <b>2</b>. Take the 2nd prime → <b>3</b>. Take the 3rd prime → <b>5</b>. Take the 5th prime → <b>11</b>. Each step indexes deeper into the primes.</div>`
  h+=`<div class="eq">This is the <b>prime-indexed prime sequence</b> — primes selecting primes selecting primes. Self-referential recursion through the fundamental theorem.</div>`

  h+=`<div class="seq-row">`
  chain.forEach((v,i)=>{
    const z=(v%118)||118
    const e=el(z)
    h+=`<div class="seq-item" style="background:rgba(255,100,50,.05);border:1px solid rgba(255,100,50,.15)">`
    h+=`<span class="si">a(${i+1})</span>`
    h+=`<span class="sn" style="color:rgba(255,180,100,.8)">${v.toLocaleString()}</span>`
    h+=`<span class="se" style="color:rgba(255,200,100,.5)">${e.sym} (${z})</span>`
    h+=`</div>`
    if(i<chain.length-1)h+=`<span class="arrow">→</span>`
  })
  h+=`</div>`

  h+=`<div class="eq" style="margin-top:8px"><b>The chain reads</b>:</div>`
  h+=`<div class="row">`
  chain.forEach((v,i)=>{
    const z=(v%118)||118
    h+=elHTML(z,'a('+(i+1)+')='+v.toLocaleString())
  })
  h+=`</div>`

  // growth analysis
  h+=`<div class="deep"><h3>GROWTH ANALYSIS</h3>`
  h+=`<div class="eq"><b>Ratios</b> a(n+1)/a(n):</div>`
  for(let i=1;i<chain.length;i++){
    const ratio=(chain[i]/chain[i-1]).toFixed(4)
    h+=`<div class="eq">a(${i+1})/a(${i}) = ${chain[i].toLocaleString()}/${chain[i-1].toLocaleString()} = <b>${ratio}</b></div>`
  }
  h+=`<div class="eq" style="margin-top:6px">Growth rate ≈ <b>n·ln(n)</b> by prime number theorem. Each step multiplies by roughly <b>ln(a(n))</b>.</div>`
  h+=`<div class="eq">After 10 steps we're at <b>${chain[chain.length-1].toLocaleString()}</b> — exponential acceleration through the primes.</div>`

  // Mersenne connection
  h+=`<div class="eq" style="margin-top:8px"><b>Mersenne intersection</b>: a(6) = <b>127</b> = M₇ = 2⁷-1 — the chain hits a Mersenne prime!</div>`
  h+=`<div class="eq">127 is simultaneously the 31st prime AND 2⁷-1. Two deep structures collide at one number.</div>`
  h+=`</div>`

  // which elements appear
  h+=`<div class="deep"><h3>ELEMENTAL IDENTITY OF THE CHAIN</h3>`
  const unique=new Set(chain.map(v=>(v%118)||118))
  h+=`<div class="eq"><b>${unique.size} unique elements</b> visited by the first ${chain.length} terms:</div>`
  chain.forEach((v,i)=>{
    const z=(v%118)||118;const e=el(z)
    h+=`<div class="eq">a(${i+1}) = ${v.toLocaleString()} → <b>${z}</b> = ${e.sym} (${e.name})`
    if(z===77)h+=` ← <span style="color:#fda">IRIDIUM</span>`
    if(z===88)h+=` ← <span style="color:#fda">RADIUM</span>`
    if(z===79)h+=` ← <span style="color:#fda">GOLD</span>`
    if(z===82)h+=` ← <span style="color:#fda">LEAD (SATURN)</span>`
    if(z===50)h+=` ← <span style="color:#fda">TIN (JUPITER)</span>`
    h+=`</div>`
  })
  h+=`</div>`

  document.getElementById('schain').innerHTML=h
})()

// ═══ 3D BACKGROUND — super-prime spiral ═══
const cv=document.getElementById('c')
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true})
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2))
const sc=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,2000)
camera.position.set(0,0,30)

// spiral: prime-indexed positions
const spiralCount=2000,spiralGeo=new THREE.BufferGeometry()
const spiralPos=new Float32Array(spiralCount*3),spiralCol=new Float32Array(spiralCount*3)
for(let i=0;i<spiralCount;i++){
  const p=isPrime(i+1)
  const th=(i+1)*.15
  const r=p?2+i*.006:.5+i*.004
  const y=(i/spiralCount-.5)*25
  spiralPos[i*3]=Math.cos(th)*r
  spiralPos[i*3+1]=y
  spiralPos[i*3+2]=Math.sin(th)*r
  const c=new THREE.Color().setHSL(p?.08:.6,p?.9:.3,p?.6:.25)
  spiralCol[i*3]=c.r;spiralCol[i*3+1]=c.g;spiralCol[i*3+2]=c.b
}
spiralGeo.setAttribute('position',new THREE.BufferAttribute(spiralPos,3))
spiralGeo.setAttribute('color',new THREE.BufferAttribute(spiralCol,3))
sc.add(new THREE.Points(spiralGeo,new THREE.PointsMaterial({size:.15,transparent:true,opacity:.25,vertexColors:true,blending:THREE.AdditiveBlending})))

function animate(ts){
  requestAnimationFrame(animate)
  const t=ts*.001
  sc.rotation.y=t*.03
  camera.position.y=-(window.scrollY||0)*.008
  renderer.render(sc,camera)
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})
animate(0)
</script>
