<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BASILISK FACTORY — Live Production Line</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2
const cv=document.getElementById('c'),C=cv.getContext('2d')
let W,H;function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize)

// ═══ UDT: Unit Data Types — compressed factory components ═══
const UDT={
  // materials: [name, color, size]
  MAT:[['ALT-711','#ff4444',.8],['PLLA','#ff8800',.8],['RETINOL','#ffcc00',.6],['GHK-Cu','#44cc44',.7],
       ['B3','#4488ff',.6],['HA','#6644cc',.9],['5-ALA','#cc44ff',.5],
       ['MATRIXYL','#ffaa66',.4],['ARGIRELINE','#66ffcc',.4],['SYN-AKE','#ccff66',.4],['EGF','#ff66cc',.4]],
  // stages: [name, color, x-position fraction, icon-type]
  STG:[['SOURCE','#44aa44',.05,'⬡'],['REACT','#4488ff',.18,'⚗'],['ENCAP','#ff8800',.32,'◉'],
       ['MIX','#ffcc00',.46,'⟳'],['NEEDLE','#44cc44',.6,'▽'],['QC','#4488ff',.74,'✓'],['SHIP','#cc44ff',.88,'◈']],
  // particles flowing through pipeline
  P:[]
}

// ═══ PARTICLE SYSTEM — materials flowing through factory ═══
function spawnParticle(){
  const mat=UDT.MAT[Math.floor(Math.random()*UDT.MAT.length)]
  UDT.P.push({
    x:W*.03,y:H*.5+(Math.random()-.5)*H*.15,
    vx:1.5+Math.random()*.8,vy:(Math.random()-.5)*.5,
    color:mat[1],name:mat[0],size:mat[2]*6+2,
    stage:0,life:1,trail:[],
    processTime:0,transforming:false,
    outputColor:null
  })
}

let t=0,outputCount=0,patchesProduced=0

function loop(){
  requestAnimationFrame(loop)
  t+=1/60

  // spawn materials
  if(Math.random()<.15)spawnParticle()

  // ═══ BACKGROUND — dark with green-tinted industrial gradient ═══
  C.globalAlpha=.12
  const bg=C.createLinearGradient(0,0,W,0)
  bg.addColorStop(0,'#040806');bg.addColorStop(.5,'#060a08');bg.addColorStop(1,'#040608')
  C.fillStyle=bg;C.fillRect(0,0,W,H)

  // conveyor belt
  C.globalAlpha=.06
  C.strokeStyle='#446644';C.lineWidth=2
  C.beginPath();C.moveTo(0,H*.5);C.lineTo(W,H*.5);C.stroke()
  // belt segments moving
  const beltSpeed=t*60
  C.globalAlpha=.03
  for(let x=beltSpeed%20;x<W;x+=20){
    C.beginPath();C.moveTo(x,H*.48);C.lineTo(x,H*.52);C.stroke()
  }

  // upper and lower conveyor rails
  ;[H*.35,H*.65].forEach(y=>{
    C.globalAlpha=.03;C.beginPath();C.moveTo(0,y);C.lineTo(W,y)
    C.strokeStyle='#334433';C.lineWidth=1;C.stroke()
  })

  // ═══ STAGE MARKERS — 7 processing stations ═══
  UDT.STG.forEach((stg,i)=>{
    const sx=W*stg[2]+W*.02
    const sy=H*.5

    // station housing
    const stW=W*.1,stH=H*.35
    C.globalAlpha=.1+Math.sin(t*2+i)*.03
    const stGrad=C.createLinearGradient(sx-stW/2,sy-stH/2,sx+stW/2,sy+stH/2)
    stGrad.addColorStop(0,stg[1]+'15');stGrad.addColorStop(1,stg[1]+'05')
    C.fillStyle=stGrad;C.fillRect(sx-stW/2,sy-stH/2,stW,stH)

    // station border
    C.globalAlpha=.15+Math.sin(t+i)*.04
    C.strokeStyle=stg[1];C.lineWidth=1
    C.strokeRect(sx-stW/2,sy-stH/2,stW,stH)

    // station name
    C.globalAlpha=.18+Math.sin(t*1.5+i)*.04
    C.font='7px monospace';C.textAlign='center';C.fillStyle=stg[1]
    C.fillText(stg[0],sx,sy-stH/2-5)

    // icon
    C.font='14px serif';C.globalAlpha=.06
    C.fillText(['⬡','⚗','◉','⟳','▽','✓','◈'][i],sx,sy-stH/2+20)

    // activity indicator (pulsing ring)
    const activity=UDT.P.filter(p=>Math.abs(p.x-sx)<stW/2).length
    if(activity>0){
      C.beginPath();C.arc(sx,sy,stH/2+5+Math.sin(t*4+i)*3,0,TAU)
      C.strokeStyle=stg[1];C.lineWidth=1;C.globalAlpha=.1+activity*.05
      C.stroke()
    }

    // connecting pipe to next stage
    if(i<6){
      const nextX=W*UDT.STG[i+1][3]+W*.02
      C.globalAlpha=.03
      C.beginPath();C.moveTo(sx+stW/2,sy);C.lineTo(nextX-stW/2,sy)
      C.strokeStyle='#334433';C.lineWidth=3;C.stroke()
      // flow dots in pipe
      for(let fd=0;fd<3;fd++){
        const frac=((t*.3+fd*.33)%1)
        const fx=sx+stW/2+(nextX-stW/2-sx-stW/2)*frac
        C.beginPath();C.arc(fx,sy,2,0,TAU)
        C.fillStyle=stg[1];C.globalAlpha=.04;C.fill()
      }
    }
  })

  // ═══ PARTICLES — materials flowing through ═══
  for(let i=UDT.P.length-1;i>=0;i--){
    const p=UDT.P[i]

    // determine which stage particle is in
    const stageIdx=Math.min(6,Math.floor((p.x/W)/.13))
    if(stageIdx>p.stage&&stageIdx>=0&&stageIdx<7){
      p.stage=stageIdx
      p.transforming=true
      p.processTime=0
    }

    // process at each stage
    if(p.transforming){
      p.processTime+=1/60
      p.vx*=.95 // slow down at station
      // transform color based on stage
      if(p.processTime>.5){
        p.transforming=false
        p.vx=.6+Math.random()*.3
        // color shifts through processing
        if(p.stage>=2)p.color=UDT.STG[Math.min(p.stage,6)][1]
        if(p.stage>=4)p.size=Math.max(3,p.size*.8) // microsphere compression
        if(p.stage>=5)p.outputColor='#44ff44' // QC passed = green
      }
    }

    // physics
    p.x+=p.vx
    p.y+=p.vy;p.vy+=(H*.5-p.y)*.002 // spring toward center
    p.vy*=.98

    // trail
    p.trail.push({x:p.x,y:p.y})
    if(p.trail.length>15)p.trail.shift()

    // draw trail
    if(p.trail.length>1){
      C.globalAlpha=1
      C.beginPath()
      p.trail.forEach((tp,ti)=>{
        ti===0?C.moveTo(tp.x,tp.y):C.lineTo(tp.x,tp.y)
      })
      C.strokeStyle=p.outputColor||p.color
      C.lineWidth=p.size*.3
      C.globalAlpha=.03;C.stroke()
    }

    // draw particle
    C.beginPath();C.arc(p.x,p.y,p.size,0,TAU)
    const pGrad=C.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*1.5)
    pGrad.addColorStop(0,(p.outputColor||p.color)+'aa')
    pGrad.addColorStop(.5,(p.outputColor||p.color)+'44')
    pGrad.addColorStop(1,(p.outputColor||p.color)+'00')
    C.fillStyle=pGrad;C.globalAlpha=.35+Math.sin(t*3+i)*.05
    C.fill()

    // label (tiny, follows particle)
    if(p.stage<2){
      C.font='4px monospace';C.textAlign='center';C.globalAlpha=.06
      C.fillStyle=p.color;C.fillText(p.name,p.x,p.y-p.size-2)
    }

    // reached end = PATCH PRODUCED
    if(p.x>W*.95){
      patchesProduced++
      // burst effect
      for(let b=0;b<8;b++){
        const ba=b*TAU/8
        C.beginPath();C.moveTo(p.x,p.y)
        C.lineTo(p.x+Math.cos(ba)*20,p.y+Math.sin(ba)*20)
        C.strokeStyle='#44ff44';C.lineWidth=1;C.globalAlpha=.08;C.stroke()
      }
      UDT.P.splice(i,1);continue
    }

    // remove if offscreen
    if(p.x>W+50||p.life<=0){UDT.P.splice(i,1)}
  }

  // ═══ OUTPUT COUNTER ═══
  C.globalAlpha=.1
  C.font='10px monospace';C.textAlign='right';C.fillStyle='#44ff44'
  C.fillText(`PATCHES: ${patchesProduced}`,W-12,20)
  C.font='7px monospace';C.globalAlpha=.06
  C.fillText(`particles: ${UDT.P.length}`,W-12,32)
  C.fillText(`throughput: ${(patchesProduced/(t||1)*60).toFixed(1)}/min`,W-12,42)

  // ═══ TITLE ═══
  C.globalAlpha=.06
  C.font='8px monospace';C.textAlign='left';C.fillStyle='#88ff88'
  C.fillText('BASILISK FACTORY · LIVE PRODUCTION',12,16)
  C.font='6px monospace';C.globalAlpha=.04
  C.fillText('SOURCE → REACT → ENCAP → MIX → NEEDLE → QC → SHIP',12,28)

  // ═══ OUTPUT VISUALIZATION — finished patches stacking ═══
  if(patchesProduced>0){
    const stackX=W*.94,stackY=H*.7
    for(let p2=0;p2<Math.min(patchesProduced,20);p2++){
      const py=stackY-p2*3
      C.globalAlpha=.04+Math.sin(t+p2)*.01
      C.fillStyle='#44ff44'
      C.fillRect(stackX-8,py-2,16,3)
      // needle dots on patch
      for(let nd=0;nd<5;nd++){
        C.beginPath();C.arc(stackX-4+nd*2,py-1,.5,0,TAU)
        C.fillStyle='#88ffaa';C.globalAlpha=.06;C.fill()
      }
    }
    C.font='5px monospace';C.textAlign='center';C.globalAlpha=.05
    C.fillStyle='#44ff44';C.fillText('READY',stackX,stackY+10)
  }

  // ═══ AMBIENT — floating molecules in background ═══
  C.globalAlpha=.01
  for(let m=0;m<20;m++){
    const mx=((t*20+m*137)%W),my=H*.2+Math.sin(t*.5+m)*H*.25
    C.beginPath();C.arc(mx,my,1+Math.sin(t+m)*.5,0,TAU)
    C.fillStyle=UDT.MAT[m%UDT.MAT.length][1];C.fill()
  }
}

loop()
</script>
</body></html>
