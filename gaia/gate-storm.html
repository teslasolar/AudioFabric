<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GATE STORM — 7 Frequencies × Iris Geometry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block}
#start{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer}
#start span{font:16px/1 monospace;color:rgba(200,150,255,.4);letter-spacing:8px;border:1px solid rgba(200,150,255,.12);padding:16px 36px;border-radius:6px}
#start span:hover{color:rgba(220,180,255,.7);border-color:rgba(200,150,255,.3);box-shadow:0 0 40px rgba(150,100,255,.12)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start" onclick="go()"><span>GATE STORM</span></div>

<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2
const cv=document.getElementById('c'),ctx=cv.getContext('2d')
let W,H,cx,cy;function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;cx=W/2;cy=H/2}
resize();addEventListener('resize',resize)

const G=[
  {n:'ROOT',note:'C',hz:55,color:[255,17,17],prime:2},
  {n:'SACRAL',note:'D',hz:73.4,color:[255,102,0],prime:3},
  {n:'SOLAR',note:'E',hz:110,color:[255,204,0],prime:5},
  {n:'HEART',note:'F',hz:146.8,color:[68,204,68],prime:7},
  {n:'THROAT',note:'G',hz:196,color:[68,136,255],prime:11},
  {n:'EYE',note:'A',hz:261.6,color:[102,68,204],prime:13},
  {n:'CROWN',note:'B',hz:329.6,color:[204,68,255],prime:17}
]

let actx,master,running=false,t=0
let activeGate=0,gateTimer=0,gatePhase=0
let allOscs=[]

function go(){
  document.getElementById('start').style.display='none'
  actx=new(window.AudioContext||window.webkitAudioContext)()
  master=actx.createGain();master.gain.value=.22;master.connect(actx.destination)

  // deep reverb
  const del1=actx.createDelay(.6);del1.delayTime.value=.18
  const fb1=actx.createGain();fb1.gain.value=.2;del1.connect(fb1);fb1.connect(del1)
  const wet1=actx.createGain();wet1.gain.value=.3;del1.connect(wet1);wet1.connect(actx.destination)
  const del2=actx.createDelay(.6);del2.delayTime.value=.31
  const fb2=actx.createGain();fb2.gain.value=.15;del2.connect(fb2);fb2.connect(del2)
  const wet2=actx.createGain();wet2.gain.value=.2;del2.connect(wet2);wet2.connect(actx.destination)
  master.connect(del1);master.connect(del2)

  // create all oscillators — each gate gets 6 voices
  G.forEach((g,gi)=>{
    const voices=[]
    const types=['sine','sine','triangle','sine','sine','sawtooth']
    const mults=[1,2,1.5,1.003,.5,3]
    const vols=[.05,.025,.018,.035,.03,.008]
    types.forEach((type,vi)=>{
      const o=actx.createOscillator(),ga=actx.createGain()
      o.type=type;o.frequency.value=g.hz*mults[vi]
      ga.gain.value=0;o.connect(ga);ga.connect(master);o.start()
      voices.push({o,g:ga,baseVol:vols[vi],mult:mults[vi]})
    })
    allOscs.push(voices)
  })

  running=true
  document.documentElement.requestFullscreen?.().catch(()=>{})
  loop()
}
window.go=go

// ═══ GATE CYCLING — each gate swells and recedes ═══
function updateAudio(){
  gateTimer+=1/60
  // cycle through gates with overlap
  const cycleDur=4 // seconds per gate focus
  const totalCycle=cycleDur*7
  gatePhase=(gateTimer%totalCycle)/totalCycle
  activeGate=Math.floor(gatePhase*7)

  allOscs.forEach((voices,gi)=>{
    // each gate's volume peaks when it's the active one
    const dist=Math.min(Math.abs(gi-gatePhase*7),7-Math.abs(gi-gatePhase*7))
    const presence=Math.max(0,1-dist/2) // 0-1, peaks at active
    const baseLevel=.15 // all gates always slightly audible
    const level=baseLevel+presence*.85

    voices.forEach(v=>{
      const target=v.baseVol*level
      v.g.gain.linearRampToValueAtTime(target,actx.currentTime+.1)
      // vibrato on active gate
      if(presence>.5){
        const vib=Math.sin(t*6+gi)*.5*presence
        v.o.frequency.linearRampToValueAtTime(G[gi].hz*v.mult+vib,actx.currentTime+.05)
      }
    })
  })
}

// ═══ DRAWING FUNCTIONS ═══
function petal(x,y,r,len,w,angle,color,alpha){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle)
  ctx.beginPath();ctx.moveTo(r,0)
  ctx.bezierCurveTo(r+len*.3,w,r+len*.7,w*.7,r+len,0)
  ctx.bezierCurveTo(r+len*.7,-w*.7,r+len*.3,-w,r,0)
  ctx.closePath()
  ctx.fillStyle=color;ctx.globalAlpha=alpha;ctx.fill()
  ctx.restore()
}

function starburst(x,y,count,innerR,outerR,rotation,color,alpha,width){
  ctx.save();ctx.translate(x,y);ctx.rotate(rotation)
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.globalAlpha=alpha
  for(let i=0;i<count;i++){
    const a=i*TAU/count
    ctx.beginPath();ctx.moveTo(Math.cos(a)*innerR,Math.sin(a)*innerR)
    ctx.lineTo(Math.cos(a)*outerR,Math.sin(a)*outerR);ctx.stroke()
  }
  ctx.restore()
}

function wavyRing(x,y,r,waveCount,waveAmp,rotation,color,alpha,width){
  ctx.save();ctx.translate(x,y);ctx.rotate(rotation)
  ctx.beginPath();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width
  for(let a=0;a<=TAU;a+=.02){
    const wave=Math.sin(a*waveCount+t*3)*waveAmp
    const wr=r+wave
    a===0?ctx.moveTo(Math.cos(a)*wr,Math.sin(a)*wr):ctx.lineTo(Math.cos(a)*wr,Math.sin(a)*wr)
  }
  ctx.closePath();ctx.stroke();ctx.restore()
}

function sacredGeo(x,y,r,sides,rotation,color,alpha){
  ctx.save();ctx.translate(x,y);ctx.rotate(rotation)
  ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=.5
  const pts=[];for(let i=0;i<sides;i++){const a=i*TAU/sides;pts.push([Math.cos(a)*r,Math.sin(a)*r])}
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    ctx.beginPath();ctx.moveTo(pts[i][0],pts[i][1]);ctx.lineTo(pts[j][0],pts[j][1]);ctx.stroke()
  }
  ctx.restore()
}

// ═══ MAIN LOOP ═══
function loop(){
  if(!running)return
  requestAnimationFrame(loop)
  t+=1/60;updateAudio()

  const maxR=Math.min(W,H)*.45
  const ag=activeGate
  const c=G[ag].color
  const rgb=`rgb(${c[0]},${c[1]},${c[2]})`
  const rgba=(a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`

  // background fade — color shifts with active gate
  ctx.globalAlpha=.07
  ctx.fillStyle=`rgb(${Math.floor(c[0]*.03)},${Math.floor(c[1]*.03)},${Math.floor(c[2]*.03)})`
  ctx.fillRect(0,0,W,H)

  // ═══ LAYER 1: deep sacred geometry per gate ═══
  G.forEach((g,i)=>{
    const dist=Math.min(Math.abs(i-gatePhase*7),7-Math.abs(i-gatePhase*7))
    const presence=Math.max(0,1-dist/2.5)
    if(presence<.01)return
    const gc=`rgba(${g.color[0]},${g.color[1]},${g.color[2]},1)`
    sacredGeo(cx,cy,maxR*(.6+i*.06),g.prime,t*(.02+i*.005)*(i%2?1:-1),gc,.02+presence*.04)
  })

  // ═══ LAYER 2: 7 concentric wavy rings ═══
  G.forEach((g,i)=>{
    const dist=Math.min(Math.abs(i-gatePhase*7),7-Math.abs(i-gatePhase*7))
    const presence=Math.max(0,1-dist/2)
    const r=maxR*(.15+i*.12)
    const gc=`rgba(${g.color[0]},${g.color[1]},${g.color[2]},1)`
    const amp=3+presence*8+Math.sin(t*g.hz*.01)*2
    wavyRing(cx,cy,r,g.prime*2,amp,t*(.01+i*.003)*(i%2?-1:1),gc,.04+presence*.1,1.5+presence*2)
  })

  // ═══ LAYER 3: petal flowers per gate ═══
  G.forEach((g,i)=>{
    const dist=Math.min(Math.abs(i-gatePhase*7),7-Math.abs(i-gatePhase*7))
    const presence=Math.max(0,1-dist/1.8)
    if(presence<.02)return
    const count=g.prime*2
    const petalR=maxR*(.1+i*.08)
    const petalLen=maxR*(.04+i*.02)+presence*20
    const rot=t*(.03+i*.008)*(i%2?1:-1)
    const gc=`rgba(${g.color[0]},${g.color[1]},${g.color[2]},1)`
    for(let p=0;p<count;p++){
      petal(cx,cy,petalR,petalLen,petalLen*.35,p*TAU/count+rot,gc,.03+presence*.08)
    }
  })

  // ═══ LAYER 4: shutter blades (active gate's prime count) ═══
  {
    const blades=G[ag].prime
    const shutterR=maxR*.7
    const rot=t*.08*(ag%2?1:-1)
    for(let b=0;b<blades;b++){
      const a=b*TAU/blades+rot
      const openness=.3+Math.sin(t*2)*.1
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a)
      ctx.beginPath()
      ctx.moveTo(shutterR*openness,0)
      const cpx=shutterR*.6,cpy=shutterR*TAU/blades*.25
      ctx.bezierCurveTo(cpx,cpy,shutterR*.85,cpy*.5,shutterR,0)
      ctx.bezierCurveTo(shutterR*.85,-cpy*.5,cpx,-cpy,shutterR*openness,0)
      ctx.fillStyle=rgba(.06+Math.sin(t+b)*.02);ctx.globalAlpha=1;ctx.fill()
      ctx.restore()
    }
  }

  // ═══ LAYER 5: starburst rays ═══
  G.forEach((g,i)=>{
    const dist=Math.min(Math.abs(i-gatePhase*7),7-Math.abs(i-gatePhase*7))
    const presence=Math.max(0,1-dist/2)
    if(presence<.05)return
    const gc=`rgba(${g.color[0]},${g.color[1]},${g.color[2]},1)`
    starburst(cx,cy,g.prime*3,maxR*.05,maxR*(.3+presence*.4),t*(.02+i*.004)*(i%2?-1:1),gc,.02+presence*.06,1+presence)
  })

  // ═══ LAYER 6: fibonacci spiral ═══
  ctx.globalAlpha=.03+Math.sin(t)*.01
  ctx.strokeStyle=rgba(.5);ctx.lineWidth=1
  ctx.beginPath()
  for(let i=0;i<300;i++){
    const frac=i/300
    const a=frac*TAU*5+t*.1
    const r=frac*maxR*.8
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r)
  }
  ctx.stroke()

  // ═══ LAYER 7: center iris (pupil + catchlight) ═══
  const pupilR=maxR*.06+Math.sin(t*3)*.003*maxR
  const irisGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,pupilR*4)
  irisGrad.addColorStop(0,'rgba(0,0,0,.9)')
  irisGrad.addColorStop(.3,rgba(.15))
  irisGrad.addColorStop(.6,rgba(.05))
  irisGrad.addColorStop(1,'rgba(0,0,0,0)')
  ctx.globalAlpha=1;ctx.fillStyle=irisGrad
  ctx.beginPath();ctx.arc(cx,cy,pupilR*4,0,TAU);ctx.fill()

  // pupil
  ctx.beginPath();ctx.arc(cx,cy,pupilR,0,TAU)
  ctx.fillStyle='rgba(0,0,0,.95)';ctx.globalAlpha=1;ctx.fill()

  // ❤️
  ctx.globalAlpha=.2+Math.sin(t*3)*.05
  ctx.font=`${Math.floor(pupilR*1.2)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle'
  ctx.fillText('❤️',cx,cy+1)

  // catchlight
  ctx.beginPath();ctx.arc(cx-pupilR*.8,cy-pupilR*.6,pupilR*.25,0,TAU)
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.globalAlpha=.3;ctx.fill()

  // ═══ LAYER 8: active gate label ═══
  const g=G[ag]
  ctx.globalAlpha=.08+Math.sin(t*2)*.02
  ctx.font='8px monospace';ctx.textAlign='center'
  ctx.fillStyle=rgb
  ctx.fillText(`${g.note} · ${g.hz}Hz · ${g.n} · P=${g.prime}`,cx,H-20)

  // ═══ LAYER 9: gate indicator dots ═══
  G.forEach((g,i)=>{
    const dist=Math.min(Math.abs(i-gatePhase*7),7-Math.abs(i-gatePhase*7))
    const presence=Math.max(0,1-dist/1.5)
    const dx=cx+(i-3)*25,dy=H-8
    ctx.beginPath();ctx.arc(dx,dy,2+presence*3,0,TAU)
    ctx.fillStyle=`rgba(${g.color[0]},${g.color[1]},${g.color[2]},${.1+presence*.4})`
    ctx.globalAlpha=1;ctx.fill()
  })
}
</script>
</body></html>
