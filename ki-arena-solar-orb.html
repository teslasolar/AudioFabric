<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Solar Orb</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#solarMode{font-size:16px;color:#fa0;text-shadow:0 0 12px #fa0;text-transform:uppercase;letter-spacing:3px}
#stellarClass{font-size:13px;color:#cc8;letter-spacing:2px}
#flareInfo{font-size:11px;color:#888}
#surfaceInfo{font-size:10px;color:#666}
#modePills{position:fixed;right:12px;bottom:12px;z-index:55;display:flex;gap:4px;pointer-events:none}
.mode-pill{padding:3px 10px;font-size:9px;color:#864;border:1px solid #fff1;
  border-radius:10px;background:rgba(0,0,0,0.4);transition:all 0.3s}
.mode-pill.active{color:#fa0;border-color:#fa04}
#tempMeter{position:fixed;left:12px;bottom:12px;z-index:55;width:6px;height:80px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#tempFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#800,#fa0,#ff8);
  border-radius:3px;transition:height 0.15s}
#tempLabel{position:fixed;left:22px;bottom:12px;z-index:55;font-size:8px;color:#864;
  writing-mode:vertical-rl;pointer-events:none}
#coronaMeter{position:fixed;left:12px;bottom:100px;z-index:55;width:6px;height:50px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#coronaFill{position:absolute;bottom:0;left:0;right:0;background:#fa8;
  border-radius:3px;transition:height 0.15s}
#coronaLabel{position:fixed;left:22px;bottom:100px;z-index:55;font-size:8px;color:#864;
  writing-mode:vertical-rl;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:9px;color:#555;letter-spacing:2px">SOLAR ORB</div>
    <div id="solarMode">calm</div>
    <div id="stellarClass">Class G</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="flareInfo">0 flares / 0 spots</div>
    <div id="surfaceInfo">temp 0%</div>
  </div>
</div>
<div id="modePills">
  <div class="mode-pill active">calm</div>
  <div class="mode-pill">active</div>
  <div class="mode-pill">flare</div>
  <div class="mode-pill">eclipse</div>
  <div class="mode-pill">supernova</div>
</div>
<div id="tempMeter"><div id="tempFill" style="height:0%"></div></div>
<div id="tempLabel">TEMP</div>
<div id="coronaMeter"><div id="coronaFill" style="height:0%"></div></div>
<div id="coronaLabel">CORONA</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as SolarOrb from './modules/solar-orb.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'SOLR-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

KI.on('solar-orb:update', data => {
  document.getElementById('solarMode').textContent = data.solarMode;
  document.getElementById('stellarClass').textContent = 'Class ' + data.stellarClass;
  document.getElementById('flareInfo').textContent = data.flareCount + ' flares / ' + data.spotCount + ' spots';
  document.getElementById('surfaceInfo').textContent = 'temp ' + data.surfaceTemp + '%';
  document.getElementById('tempFill').style.height = data.surfaceTemp + '%';
  document.getElementById('coronaFill').style.height = data.coronaGlow + '%';
  document.querySelectorAll('.mode-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === data.solarMode);
  });
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 400 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  SolarOrb.init({ position: [0, 2.5, -3.5] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c SOLAR ORB BOOTED ', 'background:#000;color:#fa0;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
