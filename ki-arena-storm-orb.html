<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Storm Orb</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#stormType{font-size:16px;color:#aaf;text-shadow:0 0 12px #aaf;text-transform:uppercase;letter-spacing:3px}
#boltInfo{font-size:11px;color:#888}
#windInfo{font-size:10px;color:#666}
#typePills{position:fixed;right:12px;bottom:12px;z-index:55;display:flex;gap:4px;pointer-events:none}
.type-pill{padding:3px 10px;font-size:9px;color:#446;border:1px solid #fff1;
  border-radius:10px;background:rgba(0,0,0,0.4);transition:all 0.3s}
.type-pill.active{color:#aaf;border-color:#aaf4}
#intensityMeter{position:fixed;left:12px;bottom:12px;z-index:55;width:6px;height:80px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#intensityFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#224,#aaf,#fff);
  border-radius:3px;transition:height 0.15s}
#intensityLabel{position:fixed;left:22px;bottom:12px;z-index:55;font-size:8px;color:#668;
  writing-mode:vertical-rl;pointer-events:none}
#vortexMeter{position:fixed;left:12px;bottom:100px;z-index:55;width:6px;height:50px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#vortexFill{position:absolute;bottom:0;left:0;right:0;background:#8af;
  border-radius:3px;transition:height 0.15s}
#vortexLabel{position:fixed;left:22px;bottom:100px;z-index:55;font-size:8px;color:#668;
  writing-mode:vertical-rl;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:9px;color:#555;letter-spacing:2px">STORM ORB</div>
    <div id="stormType">thunder</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="boltInfo">0 bolts</div>
    <div id="windInfo">wind 0%</div>
  </div>
</div>
<div id="typePills">
  <div class="type-pill active">thunder</div>
  <div class="type-pill">hurricane</div>
  <div class="type-pill">tornado</div>
  <div class="type-pill">blizzard</div>
  <div class="type-pill">monsoon</div>
</div>
<div id="intensityMeter"><div id="intensityFill" style="height:0%"></div></div>
<div id="intensityLabel">STORM</div>
<div id="vortexMeter"><div id="vortexFill" style="height:0%"></div></div>
<div id="vortexLabel">VORTEX</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as StormOrb from './modules/storm-orb.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'STRM-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

KI.on('storm-orb:update', data => {
  document.getElementById('stormType').textContent = data.stormType;
  document.getElementById('boltInfo').textContent = data.activeBolts + ' bolts';
  document.getElementById('windInfo').textContent = 'wind ' + data.windSpeed + '%';
  document.getElementById('intensityFill').style.height = data.intensity + '%';
  document.getElementById('vortexFill').style.height = data.vortexStrength + '%';
  document.querySelectorAll('.type-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === data.stormType);
  });
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 200 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  StormOrb.init({ position: [0, 2.5, -3.5] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c STORM ORB BOOTED ', 'background:#000;color:#aaf;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
