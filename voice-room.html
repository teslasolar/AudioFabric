<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFabric — Voice Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

/* Top bar */
#topBar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.7);
  border-bottom:1px solid #0ff2}
#roomName{font-size:14px;color:#0ff;letter-spacing:2px}
#userCount{font-size:11px;color:#088}
#topControls{display:flex;gap:8px}
.ctrl-btn{background:#0002;border:1px solid #0ff3;color:#0ff;padding:5px 12px;
  cursor:pointer;font-size:10px;font-family:monospace;border-radius:4px;letter-spacing:1px}
.ctrl-btn:hover{background:#0ff1}
.ctrl-btn.active{color:#0f0;border-color:#0f04;background:#0f01}
.ctrl-btn.danger{color:#f44;border-color:#f442}

/* Participant grid overlay */
#participantGrid{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:90%;pointer-events:none}
.participant-card{background:#000a;border:1px solid #0ff2;border-radius:8px;padding:6px;
  width:120px;text-align:center;pointer-events:auto;transition:border-color 0.3s,box-shadow 0.3s}
.participant-card.speaking{border-color:#0f0;box-shadow:0 0 12px #0f04}
.participant-card .p-name{font-size:10px;color:#0ff;margin-bottom:4px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.participant-card .p-vowel{font-size:24px;line-height:1;margin:4px 0;transition:color 0.2s}
.participant-card .p-layer{font-size:8px;color:#ff08;letter-spacing:1px}
.participant-card .p-energy{height:3px;background:#111;border-radius:2px;margin-top:4px;overflow:hidden}
.participant-card .p-energy-fill{height:100%;background:#0ff;border-radius:2px;transition:width 0.1s}

/* Bottom bar */
#bottomBar{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:center;gap:12px;padding:10px;background:rgba(0,0,0,0.8);border-top:1px solid #0ff1}
.bottom-btn{background:#111;border:1px solid #fff2;color:#fff;padding:8px 18px;
  cursor:pointer;font-size:11px;font-family:monospace;border-radius:20px;
  display:flex;align-items:center;gap:6px;transition:all 0.2s}
.bottom-btn:hover{background:#222}
.bottom-btn.active{background:#0f02;border-color:#0f04;color:#0f0}
.bottom-btn.muted{background:#f002;border-color:#f004;color:#f44}
.bottom-btn .icon{font-size:16px}

/* Voice visualizer ring */
#voiceRing{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;
  width:200px;height:200px;pointer-events:none;opacity:0;transition:opacity 0.3s}
#voiceRing.on{opacity:1}
#voiceRingCanvas{width:100%;height:100%}

#version{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:45;
  font-size:8px;color:#222;letter-spacing:3px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="topBar">
  <div>
    <span id="roomName">VOICE ROOM</span>
    <span id="userCount" style="margin-left:12px">connecting...</span>
  </div>
  <div id="topControls">
    <button class="ctrl-btn" onclick="copyInvite()">COPY INVITE</button>
    <button class="ctrl-btn" id="cameraToggle" onclick="toggleCamera()">CAM OFF</button>
    <button class="ctrl-btn" id="screenToggle" onclick="toggleScreen()">SHARE</button>
  </div>
</div>

<div id="participantGrid"></div>

<div id="bottomBar">
  <button class="bottom-btn active" id="micBtn" onclick="toggleMic()">
    <span class="icon">&#9899;</span> MIC ON
  </button>
  <button class="bottom-btn" id="camBtn" onclick="toggleCamera()">
    <span class="icon">&#9673;</span> CAM
  </button>
  <button class="bottom-btn" id="shareBtn2" onclick="toggleScreen()">
    <span class="icon">&#9707;</span> SCREEN
  </button>
  <button class="bottom-btn danger" onclick="leaveRoom()">
    <span class="icon">&#10005;</span> LEAVE
  </button>
</div>

<div id="voiceRing"><canvas id="voiceRingCanvas" width="200" height="200"></canvas></div>
<div id="version">AUDIOFABRIC VOICE ROOM</div>
<!-- hidden peers element for MQTT module -->
<div id="peers" style="display:none"></div>
<div id="lbRows" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
// ============================================================
// AUDIOFABRIC — VOICE ROOM
// P2P video/voice chat where everyone's voice creates
// 3D reactive particle avatars in shared space
// ============================================================

import { KI } from './modules/core.js';
import * as Scene from './modules/hd-scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as Kanji from './modules/kanji.js';
import * as Vortex from './modules/hd-vortex.js';
import * as Resonance from './modules/resonance.js';
import * as ResonanceSynths from './modules/resonance-synths.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Camera from './modules/camera.js';
import * as ScreenShare from './modules/screen-share.js';
import * as Chat from './modules/chat.js';

// === ROOM SETUP ===
const urlParams = new URLSearchParams(location.search);
const ROOM = urlParams.get('room') || 'ROOM-' + Math.random().toString(36).slice(2,6).toUpperCase();
if (!urlParams.has('room')) history.replaceState(null, '', '?room=' + ROOM);

KI.player.name = localStorage.getItem('vr_nick') || KI.genHash();

window.copyInvite = () => {
  navigator.clipboard.writeText(location.href).then(() => {
    document.querySelector('#topControls .ctrl-btn').textContent = 'COPIED!';
    setTimeout(() => document.querySelector('#topControls .ctrl-btn').textContent = 'COPY INVITE', 2000);
  });
};

let micActive = true, camActive = false;
window.toggleMic = () => {
  micActive = !micActive;
  const btn = document.getElementById('micBtn');
  if (micActive) { btn.className = 'bottom-btn active'; btn.innerHTML = '<span class="icon">&#9899;</span> MIC ON'; }
  else { btn.className = 'bottom-btn muted'; btn.innerHTML = '<span class="icon">&#9898;</span> MUTED'; }
  if (KI.stream) KI.stream.getAudioTracks().forEach(t => t.enabled = micActive);
};

window.toggleCamera = async () => {
  const cam = KI.get('camera');
  if (!cam) return;
  if (camActive) { cam.stopLocal(); camActive = false; }
  else { await cam.startLocal(); camActive = true; }
  document.getElementById('cameraToggle').classList.toggle('active', camActive);
  document.getElementById('camBtn').classList.toggle('active', camActive);
};

window.toggleScreen = () => {
  const ss = KI.get('screen-share');
  if (ss) ss.toggleShare();
};

window.leaveRoom = () => { KI.running = false; location.href = 'about:blank'; };

// === PARTICIPANT TRACKING ===
const participants = new Map();

function updateParticipantCard(name, data) {
  let card = document.getElementById('p-' + name);
  if (!card) {
    card = document.createElement('div');
    card.className = 'participant-card';
    card.id = 'p-' + name;
    card.innerHTML = `<div class="p-name">${escHtml(name)}</div>` +
      `<div class="p-vowel">&#9898;</div>` +
      `<div class="p-layer"></div>` +
      `<div class="p-energy"><div class="p-energy-fill" style="width:0%"></div></div>`;
    document.getElementById('participantGrid').appendChild(card);
  }
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[data.vowel];
  card.classList.toggle('speaking', data.energy > 0.02);
  card.querySelector('.p-vowel').textContent = kj ? kj.char : '\u26AA';
  card.querySelector('.p-vowel').style.color = kj ? kj.color : '#555';
  card.querySelector('.p-layer').textContent = data.layer >= 0 ?
    Resonance.LAYERS[data.layer].name.toUpperCase() + ' ' + Resonance.LAYERS[data.layer].mult + 'x' : '';
  card.querySelector('.p-energy-fill').style.width = Math.min(100, data.energy * 500) + '%';
}

function removeParticipantCard(name) {
  const el = document.getElementById('p-' + name);
  if (el) el.remove();
}

// Remote avatar spheres in 3D
const remoteAvatars = {};
const AVATAR_POSITIONS = [
  [-4,2.5,3],[4,2.5,3],[-6,2.5,0],[6,2.5,0],
  [-3,2.5,6],[3,2.5,6],[-7,2.5,-2],[7,2.5,-2],
  [-5,3.5,5],[5,3.5,5],[-2,2.5,-3],[2,2.5,-3]
];

function getOrCreateAvatar(name) {
  if (remoteAvatars[name]) return remoteAvatars[name];
  const scene = KI.scene;
  if (!scene) return null;
  const idx = Object.keys(remoteAvatars).length;
  const pos = AVATAR_POSITIONS[idx % AVATAR_POSITIONS.length];

  const group = new THREE.Group();
  group.position.set(pos[0], pos[1], pos[2]);

  // core sphere
  const cg = new THREE.SphereGeometry(0.5, 20, 20);
  const cm = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.3,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const core = new THREE.Mesh(cg, cm);
  group.add(core);

  // outer glow
  const og = new THREE.SphereGeometry(0.8, 16, 16);
  const om = new THREE.MeshBasicMaterial({ color: 0x2244aa, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
  const outer = new THREE.Mesh(og, om);
  group.add(outer);

  // name label
  const lc = document.createElement('canvas'); lc.width = 256; lc.height = 48;
  const lx = lc.getContext('2d');
  lx.fillStyle = '#000'; lx.fillRect(0,0,256,48);
  lx.fillStyle = '#0ff'; lx.font = '16px monospace'; lx.textAlign = 'center';
  lx.fillText(name, 128, 32);
  const lm = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true });
  const ls = new THREE.Sprite(lm);
  ls.scale.set(1.5, 0.35, 1);
  ls.position.y = 1.2;
  group.add(ls);

  scene.add(group);
  remoteAvatars[name] = { group, core, outer, energy: 0, vowel: '', layer: -1 };
  return remoteAvatars[name];
}

// === VOICE RING VISUALIZER ===
const ringCanvas = document.getElementById('voiceRingCanvas');
const ringCtx = ringCanvas.getContext('2d');
function drawVoiceRing() {
  const v = KI.voice;
  ringCtx.clearRect(0, 0, 200, 200);
  if (!v.sounding) { document.getElementById('voiceRing').classList.remove('on'); return; }
  document.getElementById('voiceRing').classList.add('on');

  const res = KI.get('resonance');
  const layer = res ? res.state.activeLayer : -1;
  const cx = 100, cy = 100;

  // draw concentric rings for each active layer
  for (let i = 0; i <= Math.max(0, layer); i++) {
    const ld = Resonance.LAYERS[i];
    const r = 30 + i * 15;
    const pulse = 1 + Math.sin(performance.now() * 0.003 * (i+1)) * 0.08;
    ringCtx.beginPath();
    ringCtx.arc(cx, cy, r * pulse, 0, Math.PI * 2);
    ringCtx.strokeStyle = '#' + ld.color.toString(16).padStart(6,'0') + '88';
    ringCtx.lineWidth = 2 + (i === layer ? 2 : 0);
    ringCtx.stroke();
  }

  // center kanji
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[v.vowel];
  if (kj) {
    ringCtx.font = '36px serif';
    ringCtx.textAlign = 'center';
    ringCtx.textBaseline = 'middle';
    ringCtx.fillStyle = kj.color;
    ringCtx.shadowColor = kj.color;
    ringCtx.shadowBlur = 15;
    ringCtx.fillText(kj.char, cx, cy);
    ringCtx.shadowBlur = 0;
  }
}

// === BROADCAST STATE ===
let broadcastTimer = 0;
function broadcastState(dt) {
  broadcastTimer += dt;
  if (broadcastTimer < 0.1) return;
  broadcastTimer = 0;
  const v = KI.voice;
  const res = KI.get('resonance');
  KI.emit('broadcast', {
    type: 'state',
    name: KI.player.name,
    energy: v.energy,
    vowel: v.vowel,
    pn: v.pn,
    layer: res ? res.state.activeLayer : -1,
    sounding: v.sounding
  });
}

// === HANDLE REMOTE STATE ===
KI.on('rtc:data', data => {
  if (data.type === 'state' && data.name && data.name !== KI.player.name) {
    const av = getOrCreateAvatar(data.name);
    if (av) {
      av.energy = data.energy || 0;
      av.vowel = data.vowel || '';
      av.layer = data.layer ?? -1;
    }
    updateParticipantCard(data.name, data);
  }
});

KI.on('remote:state', data => {
  const av = getOrCreateAvatar(data.name);
  if (av) {
    av.energy = data.energy || 0;
    av.vowel = data.vowel || '';
    av.layer = data.layer ?? -1;
  }
  updateParticipantCard(data.name, data);
});

KI.on('rtc:peerDisconnect', ({ peerId }) => {
  Object.keys(remoteAvatars).forEach(name => {
    // fade out, will be cleaned eventually
  });
});

// === UPDATE AVATARS ===
function updateAvatars(dt, t) {
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  Object.keys(remoteAvatars).forEach(name => {
    const av = remoteAvatars[name];
    const kj = KANJI[av.vowel];
    const color = kj ? kj.hex : 0x4488ff;
    av.core.material.color.setHex(color);
    av.core.material.opacity = 0.2 + av.energy * 2;
    av.outer.material.color.setHex(color);
    av.outer.material.opacity = av.energy * 0.3;
    const scale = 1 + av.energy * 3 + (av.layer >= 0 ? av.layer * 0.2 : 0);
    av.core.scale.setScalar(scale);
    av.outer.scale.setScalar(scale * 1.3);
    av.group.position.y = 2.5 + Math.sin(t + av.group.id * 0.3) * 0.15;
  });

  // own participant card
  const v = KI.voice;
  const res = KI.get('resonance');
  updateParticipantCard(KI.player.name, {
    energy: v.energy, vowel: v.vowel,
    layer: res ? res.state.activeLayer : -1
  });
  const ownCard = document.getElementById('p-' + KI.player.name);
  if (ownCard) ownCard.querySelector('.p-name').textContent = KI.player.name + ' (you)';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// === BOOT ===
async function boot() {
  document.getElementById('roomName').textContent = 'ROOM: ' + ROOM;

  // prompt for name
  const savedName = localStorage.getItem('vr_nick');
  if (!savedName) {
    const n = prompt('Enter your name:', KI.player.name);
    if (n && n.trim()) { KI.player.name = n.trim().slice(0, 16); localStorage.setItem('vr_nick', KI.player.name); }
  }

  Scene.init({ stars: 4000, fogDensity: 0.006 });
  Kanji.init();
  Resonance.init();
  Vortex.init({ count: 1500 });
  ResonanceSynths.init();

  try { await VoiceEngine.init(); } catch(e) { console.warn('Mic failed:', e); }

  MqttNet.init({ room: 'VR-' + ROOM });
  WebRTCNet.init({ room: 'VR-' + ROOM });
  Camera.init();
  ScreenShare.init();
  Chat.init();

  document.getElementById('userCount').textContent = '1 in room';

  // count peers
  KI.on('rtc:peerConnect', () => {
    const ct = (KI.get('webrtc-net')?.getPeerCount?.() || 0) + 1;
    document.getElementById('userCount').textContent = ct + ' in room';
  });
  KI.on('rtc:peerDisconnect', () => {
    const ct = Math.max(1, (KI.get('webrtc-net')?.getPeerCount?.() || 0) + 1);
    document.getElementById('userCount').textContent = ct + ' in room';
  });

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    broadcastState(dt);
    updateAvatars(dt, t);
    drawVoiceRing();
    KI.renderer.render(KI.scene, KI.camera);
  })();

  console.log('%c AUDIOFABRIC VOICE ROOM ', 'background:#0a0a14;color:#0ff;font-size:18px;padding:8px');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
