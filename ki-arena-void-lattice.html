<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Void Lattice</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#distortName{font-size:18px;color:#0f4;text-shadow:0 0 12px #0f4;text-transform:uppercase;letter-spacing:3px}
/* Gravity indicator */
#gravityMeter{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:55;
  display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none}
#gravStr{font-size:20px;color:#f80;text-shadow:0 0 10px #f80;font-weight:bold}
#gravLabel{font-size:8px;color:#666;letter-spacing:1px}
.grav-seg{width:8px;height:12px;border:1px solid #fff1;border-radius:2px;
  background:rgba(0,20,0,0.3);transition:background 0.2s}
.grav-seg.lit{background:rgba(255,100,0,0.4);border-color:#f804}
/* Distortion type pills */
#distortPills{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:55;
  display:flex;flex-direction:column;gap:3px;pointer-events:none}
.dist-pill{padding:3px 10px;font-size:9px;color:#344;border:1px solid #fff1;
  border-radius:10px;background:rgba(0,0,0,0.4);transition:all 0.3s}
.dist-pill.active{color:#0f4;border-color:#0f44;background:rgba(0,40,10,0.4)}
/* Grid stats */
#gridStats{position:fixed;right:12px;bottom:12px;z-index:55;font-size:9px;color:#555;
  text-align:right;pointer-events:none}
/* Distortion wave overlay */
#distortWave{position:fixed;inset:0;z-index:44;pointer-events:none;opacity:0;
  transition:opacity 0.5s}
#distortWave.gravity{opacity:0.15;background:radial-gradient(circle at var(--gx,50%) 50%,rgba(255,80,0,0.1),transparent 40%)}
#distortWave.ripple{opacity:0.1;background:radial-gradient(circle at 50% 50%,transparent 20%,rgba(0,255,100,0.05) 30%,transparent 40%,rgba(0,255,100,0.03) 50%,transparent 60%)}
#distortWave.tear{opacity:0.15;background:linear-gradient(90deg,transparent 45%,rgba(255,0,255,0.1) 49%,rgba(255,0,255,0.15) 50%,rgba(255,0,255,0.1) 51%,transparent 55%)}
#distortWave.fold{opacity:0.1;background:linear-gradient(0deg,rgba(0,100,255,0.05),rgba(0,100,255,0.1) 50%,rgba(0,100,255,0.05))}
#distortWave.vortex{opacity:0.1;background:conic-gradient(from 0deg at 50% 50%,transparent,rgba(0,255,100,0.08),transparent,rgba(0,255,100,0.05),transparent)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:10px;color:#555;letter-spacing:2px">SPACETIME GRID</div>
    <div id="distortName">gravity</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
  </div>
</div>
<!-- Gravity strength meter -->
<div id="gravityMeter">
  <div id="gravStr">0.0</div>
  <div class="grav-seg" id="gs9"></div>
  <div class="grav-seg" id="gs8"></div>
  <div class="grav-seg" id="gs7"></div>
  <div class="grav-seg" id="gs6"></div>
  <div class="grav-seg" id="gs5"></div>
  <div class="grav-seg" id="gs4"></div>
  <div class="grav-seg" id="gs3"></div>
  <div class="grav-seg" id="gs2"></div>
  <div class="grav-seg" id="gs1"></div>
  <div class="grav-seg" id="gs0"></div>
  <div id="gravLabel">DISTORTION</div>
</div>
<div id="distortPills">
  <div class="dist-pill active">gravity</div>
  <div class="dist-pill">ripple</div>
  <div class="dist-pill">tear</div>
  <div class="dist-pill">fold</div>
  <div class="dist-pill">vortex</div>
</div>
<div id="gridStats"></div>
<div id="distortWave"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as VoidLattice from './modules/void-lattice.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'VOID-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

KI.on('void-lattice:update', data => {
  document.getElementById('distortName').textContent = data.distortType;
  const str = parseFloat(data.gravityStrength);
  document.getElementById('gravStr').textContent = str.toFixed(1);

  // Gravity meter segments
  const segs = Math.min(10, Math.floor(str * 3.3));
  for (let i = 0; i < 10; i++) {
    document.getElementById('gs' + i).classList.toggle('lit', i < segs);
  }

  // Distort type pills
  document.querySelectorAll('.dist-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === data.distortType);
  });

  // Grid stats
  document.getElementById('gridStats').textContent =
    data.gridLines + ' lines / ' + data.stressNodes + ' nodes';

  // Background distortion overlay
  const wave = document.getElementById('distortWave');
  wave.className = str > 0.3 ? data.distortType : '';
  // Position gravity center
  const gx = parseFloat(data.gravityPos[0]);
  wave.style.setProperty('--gx', (50 + gx * 8) + '%');
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 400 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  VoidLattice.init({ position: [0, 0, -2] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c VOID LATTICE BOOTED ', 'background:#000;color:#0f4;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
