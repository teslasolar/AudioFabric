<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFabric — COMBAT</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
body{overflow-y:auto;overflow-x:hidden}
canvas#c{position:fixed;z-index:0;pointer-events:none}
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.9),transparent);pointer-events:none}
#header *{pointer-events:auto}
#back{font-size:11px;color:#666;cursor:pointer;text-decoration:none;letter-spacing:2px}
#back:hover{color:#f44}
#cat-title{font-size:16px;letter-spacing:4px;text-transform:uppercase;color:#f44}
#cat-sub{font-size:9px;color:#555;letter-spacing:2px}
#main{position:relative;z-index:10;padding:70px 24px 40px;max-width:1000px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:20px}
.card{background:rgba(255,255,255,0.02);border:1px solid #1a1a2e;border-radius:10px;padding:18px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#f44;opacity:0.5;border-radius:10px 10px 0 0}
.card:hover{border-color:#f4444;transform:translateY(-2px);box-shadow:0 4px 20px #f4411}
.card h3{font-size:14px;color:#f44;margin-bottom:4px}
.card p{font-size:10px;color:#666;line-height:1.4}
#voice-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:200px;height:3px;background:#111;border-radius:2px;overflow:hidden;z-index:50}
#voice-fill{height:100%;width:0%;background:linear-gradient(90deg,#f44,#fff);border-radius:2px;transition:width 0.1s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="header">
  <a id="back" href="../">&#x2190; AUDIOFABRIC</a>
  <div style="text-align:right">
    <div id="cat-title">&#x1F4A5; COMBAT</div>
    <div id="cat-sub">5 experiences</div>
  </div>
</div>
<div id="main">
  <div class="grid" id="grid"></div>
</div>
<div id="voice-bar"><div id="voice-fill"></div></div>
<div id="af-toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import { KI } from '../modules/core.js';
import * as Scene from '../modules/scene.js';
import * as VoiceEngine from '../modules/voice-engine.js';

const FILES = [
  { file: 'kamehameha.html', name: 'Kamehameha', desc: 'Charge energy beams' },
  { file: 'kamehameha-duel.html', name: 'Kamehameha Duel', desc: 'P2P voice fighting' },
  { file: 'pvp-battle.html', name: 'PvP Battle', desc: 'Real-time PvP' },
  { file: 'voice-duel.html', name: 'Voice Duel', desc: '1v1 voice combat' },
  { file: 'ki-arena-voice-royale-v2.html', name: 'Voice Royale v2', desc: 'Battle royale v2' },
];

const grid = document.getElementById('grid');
for (const f of FILES) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h3>${f.name}</h3><p>${f.desc}</p>`;
  card.onclick = () => { document.body.style.opacity='0'; setTimeout(()=>location.href=f.file, 300); };
  grid.appendChild(card);
}

async function boot() {
  Scene.init({ stars: 1500 });
  try { await VoiceEngine.init(); } catch(e) {}
  KI.running = true;
  const clock = KI.clock;
  (function anim() {
    requestAnimationFrame(anim);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    const e = KI.voice.energy || 0;
    const fill = document.getElementById('voice-fill');
    if (fill) fill.style.width = (e * 100) + '%';
    KI.renderer.render(KI.scene, KI.camera);
  })();
}
window.addEventListener('load', boot);
</script>
</body>
</html>
