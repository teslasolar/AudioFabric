<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena BOSS VOID — Dark Matter Entity Battles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:12px 20px;
  background:linear-gradient(180deg,rgba(0,0,0,0.85),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-c,.hud-r{display:flex;flex-direction:column;gap:3px}
.hud-c{align-items:center}
.hud-r{align-items:flex-end;text-align:right}
#score{font-size:32px;color:#c080ff;text-shadow:0 0 12px #80f}
#combo{font-size:18px;color:#a060dd}
#blastType{font-size:14px;color:#80f}
#waveLabel{font-size:16px;color:#80f;letter-spacing:3px;text-shadow:0 0 10px #80f}
#bossName{font-size:24px;color:#c0a0ff;text-shadow:0 0 14px #80f;letter-spacing:2px}
#waveSub{font-size:10px;color:#fff4}

/* BOSS HP */
#bossHPBar{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:55;
  width:520px;max-width:82%;pointer-events:none;opacity:0;transition:opacity 0.3s}
#bossHPBar.on{opacity:1}
#bossHPLabel{display:flex;justify-content:space-between;font-size:10px;color:#fff8;margin-bottom:3px}
#bossHPTrack{height:14px;background:#0a0010;border:2px solid #80f4;border-radius:8px;overflow:hidden}
#bossHPFill{height:100%;background:linear-gradient(90deg,#400080,#8000ff);border-radius:6px;
  transition:width 0.15s;width:100%}

/* PLAYER HP */
#playerHP{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:55;
  width:300px;max-width:60%;pointer-events:none}
#playerHPLabel{font-size:9px;color:#0f08;text-align:center;margin-bottom:2px}
#playerHPTrack{height:8px;background:#111;border:1px solid #0f04;border-radius:4px;overflow:hidden}
#playerHPFill{height:100%;background:linear-gradient(90deg,#0a0,#0f0);border-radius:3px;
  transition:width 0.15s;width:100%}

/* RESONANCE HUD */
#resHUD{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0;transition:opacity 0.4s}
#resHUD.on{opacity:1}
#resKanji{font-size:80px;line-height:1;text-shadow:0 0 30px currentColor,0 0 60px currentColor;
  text-align:center;transition:color 0.3s}
#resLabel{font-size:9px;color:#fff5;text-align:center;margin-top:3px;letter-spacing:2px}
#resDepth{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.depth-layer{display:flex;align-items:center;gap:6px;opacity:0.2;transition:opacity 0.3s,transform 0.3s}
.depth-layer.active{opacity:1;transform:translateX(4px)}
.depth-layer.peak{opacity:1;transform:translateX(8px)}
.depth-dot{width:10px;height:10px;border-radius:50%;border:1px solid;transition:background 0.3s,box-shadow 0.3s}
.depth-layer.active .depth-dot{box-shadow:0 0 8px currentColor}
.depth-layer.peak .depth-dot{background:currentColor;box-shadow:0 0 12px currentColor,0 0 24px currentColor}
.depth-name{font-size:9px;letter-spacing:1px}
.depth-mult{font-size:8px;color:#ff08;margin-left:auto}
#resMultiplier{font-size:20px;color:#c080ff;text-align:center;margin-top:4px;
  text-shadow:0 0 10px #80f;opacity:0;transition:opacity 0.3s}
#resMultiplier.on{opacity:1}

/* KANJI HUD */
#kanjiHUD{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:55;
  text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s}
#kanjiHUD.on{opacity:1}
#kanjiChar{font-size:60px;line-height:1;text-shadow:0 0 25px currentColor,0 0 50px currentColor}
#kanjiName{font-size:9px;color:#fff8;margin-top:3px}
#kanjiReading{font-size:7px;color:#fff4}

/* MORPH BALL */
#morphBall{position:fixed;right:16px;bottom:50px;z-index:55;pointer-events:none;
  filter:drop-shadow(0 0 16px rgba(128,0,255,0.4))}

/* VOID DISTORTION OVERLAY */
#voidOverlay{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(circle at 50% 35%, transparent 30%, rgba(20,0,40,0.3) 100%);
  mix-blend-mode:multiply}

/* BOSS ATTACK */
#bossAtk{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);z-index:80;
  font-size:30px;color:#c060ff;text-shadow:0 0 20px #80f,0 0 40px #4008;letter-spacing:6px;
  opacity:0;transition:opacity 0.15s;pointer-events:none}
#bossAtk.show{opacity:1;animation:atkPulse 0.6s ease-in-out}
@keyframes atkPulse{0%{transform:translate(-50%,-50%) scale(0.5)}
  50%{transform:translate(-50%,-50%) scale(1.3)}100%{transform:translate(-50%,-50%) scale(1)}}

/* BOSS INTRO */
#bossIntro{position:fixed;inset:0;z-index:150;display:none;
  background:rgba(5,0,15,0.95);align-items:center;justify-content:center;flex-direction:column}
#bossIntro.show{display:flex}
#introWave{font-size:16px;color:#80f8;letter-spacing:6px;margin-bottom:10px}
#introName{font-size:48px;color:#c0a0ff;text-shadow:0 0 30px #80f,0 0 60px #4008;letter-spacing:4px}
#introTitle{font-size:14px;color:#a060dd;margin-top:8px;letter-spacing:3px}
#introDesc{font-size:12px;color:#8080ff;margin-top:20px;max-width:420px;text-align:center;line-height:1.6}

/* GAME OVER / VICTORY */
#gameOver,#victory{position:fixed;inset:0;z-index:200;display:none;
  background:rgba(5,0,15,0.93);align-items:center;justify-content:center;flex-direction:column}
#gameOver.show,#victory.show{display:flex}
#goTitle{font-size:60px;color:#80f;text-shadow:0 0 30px #80f}
#goScore,#vicScore{font-size:22px;color:#c080ff;margin-top:16px}
#goWaves{font-size:16px;color:#80f;margin-top:8px}
#vicTitle{font-size:46px;color:#c0a0ff;text-shadow:0 0 40px #80f;letter-spacing:4px}
#vicSub{font-size:18px;color:#a060dd;margin-top:12px}
.retry-btn{margin-top:30px;padding:12px 32px;font-size:16px;border:none;border-radius:8px;
  cursor:pointer;font-weight:bold;letter-spacing:2px}
#goBtn{background:#80f;color:#fff}
#vicBtn{background:#c0a0ff;color:#000}

/* DAMAGE */
#dmgLayer{position:fixed;inset:0;z-index:60;pointer-events:none}
.dmg{position:absolute;font-weight:bold;text-shadow:0 0 10px currentColor,0 0 20px currentColor;
  animation:dmgUp 1.4s ease-out forwards;pointer-events:none}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-140px) scale(2)}}

#cmt{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:70;
  background:rgba(10,0,30,0.9);border:2px solid #80f;border-radius:14px;padding:10px 24px;
  font-size:18px;color:#c0a0ff;text-shadow:0 0 12px #80f;text-align:center;
  max-width:600px;opacity:0;transition:opacity 0.3s;pointer-events:none}
#cmt.show{opacity:1}

#hitFlash{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;
  background:radial-gradient(circle,rgba(128,0,255,0.4),transparent 60%)}
#hitFlash.flash{opacity:1;animation:flashOut 0.4s ease-out forwards}
@keyframes flashOut{0%{opacity:0.6}100%{opacity:0}}

#modBadges{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:6px;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:80%}
.mod-badge{background:#0a001a;border:1px solid #80f3;border-radius:4px;padding:2px 8px;
  font-size:8px;color:#80f8;letter-spacing:1px}
.mod-badge.active{color:#c0a0ff;border-color:#80f4}

#version{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:50;
  font-size:9px;color:#222;letter-spacing:3px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="voidOverlay"></div>

<div id="hud">
  <div class="hud-l"><div id="score">0</div><div id="combo"></div><div id="blastType">—</div></div>
  <div class="hud-c"><div id="waveLabel">ENTITY 1</div><div id="bossName">—</div><div id="waveSub">Approaching...</div></div>
  <div class="hud-r"></div>
</div>

<div id="bossHPBar"><div id="bossHPLabel"><span id="bossHPName">ENTITY</span><span id="bossHPPct">100%</span></div>
  <div id="bossHPTrack"><div id="bossHPFill"></div></div></div>
<div id="playerHP"><div id="playerHPLabel">YOUR SPIRIT</div>
  <div id="playerHPTrack"><div id="playerHPFill"></div></div></div>
<div id="resHUD"><div id="resKanji">気</div><div id="resLabel">RESONANCE</div>
  <div id="resDepth"></div><div id="resMultiplier">1x</div></div>
<div id="kanjiHUD"><div id="kanjiChar">気</div><div id="kanjiName">Spirit</div><div id="kanjiReading">KI</div></div>
<canvas id="morphBall" width="140" height="140"></canvas>

<script type="module">
// ============================================================
// KI ARENA BOSS VOID — Dark Matter Entity Battles
//
// Cosmic void theme. Bosses are dark matter entities made of
// inverted geometry, particle trails, and gravitational distortion.
// Black hole visual effects. Dark ethereal aesthetic.
// ============================================================

import { KI } from './modules/core.js';
import * as Scene from './modules/hd-scene.js';
import * as Vortex from './modules/hd-vortex.js';
import * as FX from './modules/hd-fx.js';
import * as Resonance from './modules/resonance.js';
import * as ResonanceSynths from './modules/resonance-synths.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as Kanji from './modules/kanji.js';
import * as KiBlasts from './modules/ki-blasts.js';
import * as EmojiSystem from './modules/emoji-system.js';

// ============================================================
// VOID BOSS DEFINITIONS — Dark matter entities
// ============================================================
const BOSSES = [
  {
    name: 'UMBRA WISP', title: 'First Entity — Shadow Fragment',
    hp: 2000, atkInterval: 3.0, atkDmg: 40, atkName: 'SHADOW TOUCH',
    color: 0x6644aa, weakness: 'ah', weakMult: 2.0,
    build: buildWisp,
    desc: 'A fragment of the void given form. Weak to fire (ah) — light dispels shadow.'
  },
  {
    name: 'NETHER WORM', title: 'Second Entity — Dimensional Parasite',
    hp: 3500, atkInterval: 2.4, atkDmg: 55, atkName: 'VOID BITE',
    color: 0x8800aa, weakness: 'ee', weakMult: 2.0,
    build: buildWorm,
    desc: 'A writhing worm from between dimensions. Weak to lightning (ee).'
  },
  {
    name: 'DARK PRISM', title: 'Third Entity — Inverted Crystal',
    hp: 5500, atkInterval: 2.0, atkDmg: 60, atkName: 'ANTI-LIGHT',
    color: 0xaa00ff, weakness: 'oh', weakMult: 1.8,
    build: buildDarkPrism,
    desc: 'Light bends backward around this entity. Weak to spirit (oh).'
  },
  {
    name: 'GRAVITON', title: 'Fourth Entity — Gravity Well',
    hp: 8000, atkInterval: 2.5, atkDmg: 75, atkName: 'CRUSH FIELD',
    color: 0x4400cc, weakness: 'oo', weakMult: 1.8,
    build: buildGraviton,
    desc: 'A sentient gravity well pulling reality inward. Weak to water (oo).'
  },
  {
    name: 'ENTROPY', title: 'Fifth Entity — The Decay',
    hp: 11000, atkInterval: 1.8, atkDmg: 65, atkName: 'ENTROPY WAVE',
    color: 0x660088, weakness: 'mm', weakMult: 2.0,
    build: buildEntropy,
    desc: 'Accelerates the heat death of all matter. Weak to earth (mm) — stability resists entropy.'
  },
  {
    name: 'EVENT HORIZON', title: 'Sixth Entity — The Point of No Return',
    hp: 15000, atkInterval: 1.4, atkDmg: 70, atkName: 'SPAGHETTIFY',
    color: 0x220044, weakness: 'eh', weakMult: 1.5,
    build: buildEventHorizon,
    desc: 'Cross the horizon and nothing returns. Fast, relentless. Weak to wind (eh).'
  },
  {
    name: 'THE SINGULARITY', title: 'Final Entity — Infinite Density',
    hp: 22000, atkInterval: 1.6, atkDmg: 95, atkName: 'ANNIHILATE',
    color: 0x000000, weakness: null, weakMult: 1.0,
    build: buildSingularity,
    desc: 'Infinite mass in zero space. No weakness. Only total resonance mastery can prevail.'
  }
];

// ============================================================
// 3D VOID BOSS BUILDERS
// ============================================================

function buildWisp(scene, color) {
  const group = new THREE.Group();
  // core — small dark sphere with inverted normals
  const coreGeo = new THREE.SphereGeometry(1.5, 16, 16);
  const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.9 });
  group.add(new THREE.Mesh(coreGeo, coreMat));
  // purple glow shell
  const glowGeo = new THREE.SphereGeometry(2.0, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide });
  group.add(new THREE.Mesh(glowGeo, glowMat));
  // orbiting shadow wisps (small spheres on elliptical paths)
  const wisps = [];
  for (let i = 0; i < 8; i++) {
    const wGeo = new THREE.SphereGeometry(0.25, 8, 8);
    const wMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false });
    const w = new THREE.Mesh(wGeo, wMat);
    group.add(w);
    wisps.push({ mesh: w, phase: (i / 8) * Math.PI * 2, radius: 2.5 + Math.random() * 1.5 });
  }
  // outer aura particles
  const partGeo = new THREE.BufferGeometry();
  const partPos = new Float32Array(80 * 3);
  for (let i = 0; i < 80; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 2 + Math.random() * 2;
    partPos[i*3] = Math.cos(a) * r;
    partPos[i*3+1] = (Math.random() - 0.5) * 4;
    partPos[i*3+2] = Math.sin(a) * r;
  }
  partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
  const partMat = new THREE.PointsMaterial({ color, size: 0.12, transparent: true, opacity: 0.3,
    blending: THREE.AdditiveBlending, depthWrite: false });
  group.add(new THREE.Points(partGeo, partMat));

  group._animate = (t, hpPct) => {
    wisps.forEach((w, i) => {
      const a = w.phase + t * (0.8 + i * 0.1);
      w.mesh.position.set(
        Math.cos(a) * w.radius,
        Math.sin(a * 1.5 + i) * 1.5,
        Math.sin(a) * w.radius
      );
      w.mesh.material.opacity = 0.3 + Math.sin(t * 3 + i) * 0.15;
    });
  };
  return group;
}

function buildWorm(scene, color) {
  const group = new THREE.Group();
  // segmented worm — chain of spheres
  const segments = [];
  for (let i = 0; i < 12; i++) {
    const size = 0.8 - i * 0.04;
    const segGeo = new THREE.SphereGeometry(size, 12, 12);
    const segMat = new THREE.MeshBasicMaterial({
      color: i === 0 ? 0x000000 : color,
      transparent: true, opacity: i === 0 ? 0.9 : 0.4 - i * 0.02,
      blending: i > 0 ? THREE.AdditiveBlending : THREE.NormalBlending,
      depthWrite: i === 0
    });
    const seg = new THREE.Mesh(segGeo, segMat);
    group.add(seg);
    segments.push(seg);
  }
  // head — dark icosahedron with fangs (cones)
  const headGeo = new THREE.IcosahedronGeometry(1.2, 1);
  const headMat = new THREE.MeshBasicMaterial({ color: 0x110022, wireframe: true, transparent: true, opacity: 0.6 });
  const head = new THREE.Mesh(headGeo, headMat);
  group.add(head);
  // eyes — two glowing points
  [[-0.3, 0.3, 0.9], [0.3, 0.3, 0.9]].forEach(pos => {
    const eyeGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.8,
      blending: THREE.AdditiveBlending });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(...pos);
    head.add(eye);
  });

  group._animate = (t, hpPct) => {
    // serpentine motion
    segments.forEach((seg, i) => {
      const delay = i * 0.3;
      seg.position.set(
        Math.sin(t * 1.2 - delay) * (2 + i * 0.3),
        Math.cos(t * 0.8 - delay * 0.7) * 1.5,
        -i * 0.8
      );
    });
    head.position.copy(segments[0].position);
    head.lookAt(segments[1]?.position || new THREE.Vector3());
    head.rotation.y += Math.PI;
  };
  return group;
}

function buildDarkPrism(scene, color) {
  const group = new THREE.Group();
  // inverted octahedron — dark inside, glow edges
  const darkGeo = new THREE.OctahedronGeometry(4, 0);
  const darkMat = new THREE.MeshBasicMaterial({ color: 0x000005, transparent: true, opacity: 0.85,
    side: THREE.BackSide });
  group.add(new THREE.Mesh(darkGeo, darkMat));
  // wireframe overlay
  const wireGeo = new THREE.OctahedronGeometry(4.05, 0);
  const wireMat = new THREE.MeshBasicMaterial({ color, wireframe: true, transparent: true, opacity: 0.6 });
  group.add(new THREE.Mesh(wireGeo, wireMat));
  // inner inverted prism
  const innerGeo = new THREE.OctahedronGeometry(2.5, 0);
  const innerMat = new THREE.MeshBasicMaterial({ color, wireframe: true, transparent: true, opacity: 0.3 });
  const inner = new THREE.Mesh(innerGeo, innerMat);
  group.add(inner);
  // refracted light beams (lines shooting from vertices)
  const beamGroup = new THREE.Group();
  const verts = [
    [0,4,0],[0,-4,0],[4,0,0],[-4,0,0],[0,0,4],[0,0,-4]
  ];
  verts.forEach(v => {
    const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(...v).multiplyScalar(1.8)];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.2,
      blending: THREE.AdditiveBlending });
    beamGroup.add(new THREE.Line(geo, mat));
  });
  group.add(beamGroup);
  // anti-light halo
  const haloGeo = new THREE.TorusGeometry(5, 0.06, 8, 48);
  const haloMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.2,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  group.add(halo);

  group._animate = (t, hpPct) => {
    group.rotation.y = t * 0.3;
    group.rotation.x = Math.sin(t * 0.25) * 0.3;
    inner.rotation.y = -t * 0.5;
    inner.rotation.z = t * 0.35;
    halo.rotation.x = t * 0.2 + Math.PI / 3;
    halo.rotation.z = t * 0.15;
    beamGroup.rotation.y = t * 0.1;
    // pulse beams on low HP
    beamGroup.children.forEach((l, i) => {
      l.material.opacity = 0.15 + Math.sin(t * 4 + i) * 0.1 * (2 - hpPct);
    });
  };
  return group;
}

function buildGraviton(scene, color) {
  const group = new THREE.Group();
  // black hole core — pure black sphere
  const coreGeo = new THREE.SphereGeometry(2, 32, 32);
  const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  group.add(new THREE.Mesh(coreGeo, coreMat));
  // accretion disk — flat torus
  const diskGeo = new THREE.TorusGeometry(5, 1.5, 4, 48);
  const diskMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.2,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = Math.PI / 2;
  group.add(disk);
  // inner accretion ring (brighter, thinner)
  const innerDiskGeo = new THREE.TorusGeometry(3.2, 0.4, 4, 48);
  const innerDiskMat = new THREE.MeshBasicMaterial({ color: 0xcc88ff, transparent: true, opacity: 0.3,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
  const innerDisk = new THREE.Mesh(innerDiskGeo, innerDiskMat);
  innerDisk.rotation.x = Math.PI / 2;
  group.add(innerDisk);
  // gravitational lensing ring
  const lensGeo = new THREE.TorusGeometry(2.5, 0.03, 8, 64);
  const lensMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const lens = new THREE.Mesh(lensGeo, lensMat);
  group.add(lens);
  // infalling particle streams
  const streamGeo = new THREE.BufferGeometry();
  const streamPos = new Float32Array(200 * 3);
  for (let i = 0; i < 200; i++) {
    const a = (i / 200) * Math.PI * 2 * 3; // 3 spirals
    const r = 2 + (i / 200) * 6;
    streamPos[i*3] = Math.cos(a) * r;
    streamPos[i*3+1] = (Math.random()-0.5)*0.5;
    streamPos[i*3+2] = Math.sin(a) * r;
  }
  streamGeo.setAttribute('position', new THREE.BufferAttribute(streamPos, 3));
  const streamMat = new THREE.PointsMaterial({ color: 0xcc88ff, size: 0.08, transparent: true,
    opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false });
  const stream = new THREE.Points(streamGeo, streamMat);
  group.add(stream);

  group._animate = (t, hpPct) => {
    disk.rotation.z = t * 0.5;
    innerDisk.rotation.z = -t * 0.8;
    lens.rotation.x = t * 0.3;
    lens.rotation.y = t * 0.2;
    stream.rotation.y = t * 0.3;
    // pulse core on low HP
    const scale = 1 + Math.sin(t * 3) * 0.05 * (2 - hpPct);
    group.children[0].scale.setScalar(scale);
    // update stream particles spiraling inward
    const pos = streamGeo.attributes.position;
    for (let i = 0; i < 200; i++) {
      const a = (i / 200) * Math.PI * 6 + t * 0.6;
      const r = 2 + ((i + t * 30) % 200) / 200 * 6;
      pos.setXYZ(i, Math.cos(a) * r, (Math.random()-0.5)*0.3, Math.sin(a) * r);
    }
    pos.needsUpdate = true;
  };
  return group;
}

function buildEntropy(scene, color) {
  const group = new THREE.Group();
  // fracturing sphere — multiple segments splitting apart
  for (let i = 0; i < 6; i++) {
    const fragGeo = new THREE.IcosahedronGeometry(2, 1);
    const fragMat = new THREE.MeshBasicMaterial({
      color: i < 3 ? 0x000000 : color,
      wireframe: i >= 3, transparent: true, opacity: i < 3 ? 0.8 : 0.4,
      blending: i >= 3 ? THREE.AdditiveBlending : THREE.NormalBlending,
      depthWrite: i < 3
    });
    const frag = new THREE.Mesh(fragGeo, fragMat);
    frag.name = 'frag-' + i;
    group.add(frag);
  }
  // decay particles — slowly drifting outward
  const decayGeo = new THREE.BufferGeometry();
  const decayPos = new Float32Array(150 * 3);
  for (let i = 0; i < 150; i++) {
    const a = Math.random() * Math.PI * 2;
    const b = Math.random() * Math.PI;
    const r = 3 + Math.random() * 4;
    decayPos[i*3] = Math.sin(b) * Math.cos(a) * r;
    decayPos[i*3+1] = Math.cos(b) * r;
    decayPos[i*3+2] = Math.sin(b) * Math.sin(a) * r;
  }
  decayGeo.setAttribute('position', new THREE.BufferAttribute(decayPos, 3));
  const decayMat = new THREE.PointsMaterial({ color: 0x886644, size: 0.1, transparent: true,
    opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false });
  group.add(new THREE.Points(decayGeo, decayMat));

  group._animate = (t, hpPct) => {
    group.children.forEach(c => {
      if (c.name?.startsWith('frag')) {
        const i = parseInt(c.name.split('-')[1]);
        const spread = (1 - hpPct) * 2;
        const a = (i / 6) * Math.PI * 2 + t * 0.2;
        c.position.set(
          Math.cos(a) * spread,
          Math.sin(a * 1.5) * spread * 0.5,
          Math.sin(a) * spread
        );
        c.rotation.y = t * (0.3 + i * 0.1);
        c.rotation.x = t * (0.1 + i * 0.05);
      }
    });
    // decay particles drift outward over time
    const dPos = decayGeo.attributes.position;
    for (let i = 0; i < 150; i++) {
      dPos.setX(i, dPos.getX(i) * (1 + 0.001));
      dPos.setY(i, dPos.getY(i) * (1 + 0.001));
      dPos.setZ(i, dPos.getZ(i) * (1 + 0.001));
      const dist = Math.sqrt(dPos.getX(i)**2 + dPos.getY(i)**2 + dPos.getZ(i)**2);
      if (dist > 10) {
        const a = Math.random() * Math.PI * 2;
        const b = Math.random() * Math.PI;
        dPos.setXYZ(i, Math.sin(b)*Math.cos(a)*3, Math.cos(b)*3, Math.sin(b)*Math.sin(a)*3);
      }
    }
    dPos.needsUpdate = true;
  };
  return group;
}

function buildEventHorizon(scene, color) {
  const group = new THREE.Group();
  // black sphere — the event horizon
  const ehGeo = new THREE.SphereGeometry(3, 48, 48);
  const ehMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  group.add(new THREE.Mesh(ehGeo, ehMat));
  // glowing edge (Fresnel-like)
  const rimGeo = new THREE.SphereGeometry(3.1, 48, 48);
  const rimMat = new THREE.MeshBasicMaterial({ color: 0x4400cc, transparent: true, opacity: 0.2,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide });
  group.add(new THREE.Mesh(rimGeo, rimMat));
  // multiple accretion rings at angles
  for (let i = 0; i < 4; i++) {
    const ringGeo = new THREE.TorusGeometry(4 + i * 0.5, 0.06 - i * 0.01, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: [0xcc88ff, 0x8844cc, 0x4422aa, 0x220066][i],
      transparent: true, opacity: 0.4 - i * 0.08,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.name = 'ring-' + i;
    group.add(ring);
  }
  // hawking radiation particles
  const hawkGeo = new THREE.BufferGeometry();
  const hawkPos = new Float32Array(120 * 3);
  for (let i = 0; i < 120; i++) {
    const a = Math.random() * Math.PI * 2;
    const b = Math.random() * Math.PI;
    const r = 3.2 + Math.random() * 0.5;
    hawkPos[i*3] = Math.sin(b) * Math.cos(a) * r;
    hawkPos[i*3+1] = Math.cos(b) * r;
    hawkPos[i*3+2] = Math.sin(b) * Math.sin(a) * r;
  }
  hawkGeo.setAttribute('position', new THREE.BufferAttribute(hawkPos, 3));
  const hawkMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true,
    opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false });
  group.add(new THREE.Points(hawkGeo, hawkMat));

  group._animate = (t, hpPct) => {
    group.children.forEach(c => {
      if (c.name?.startsWith('ring')) {
        const i = parseInt(c.name.split('-')[1]);
        c.rotation.x = Math.PI / 3 * (i + 1) + t * (0.2 + i * 0.1);
        c.rotation.y = t * (0.15 + i * 0.08);
      }
    });
    // radiation shimmer
    const hPos = hawkGeo.attributes.position;
    for (let i = 0; i < 120; i++) {
      hPos.setX(i, hPos.getX(i) + (Math.random()-0.5)*0.02);
      hPos.setY(i, hPos.getY(i) + (Math.random()-0.5)*0.02);
      hPos.setZ(i, hPos.getZ(i) + (Math.random()-0.5)*0.02);
      const d = Math.sqrt(hPos.getX(i)**2+hPos.getY(i)**2+hPos.getZ(i)**2);
      if (d > 5 || d < 2.8) {
        const a = Math.random()*Math.PI*2, b = Math.random()*Math.PI;
        const r = 3.2 + Math.random()*0.3;
        hPos.setXYZ(i, Math.sin(b)*Math.cos(a)*r, Math.cos(b)*r, Math.sin(b)*Math.sin(a)*r);
      }
    }
    hPos.needsUpdate = true;
  };
  return group;
}

function buildSingularity(scene, color) {
  const group = new THREE.Group();
  // infinitely dense point — tiny black sphere
  const pointGeo = new THREE.SphereGeometry(0.5, 32, 32);
  const pointMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  group.add(new THREE.Mesh(pointGeo, pointMat));
  // massive gravitational distortion field — concentric inverted spheres
  for (let i = 0; i < 5; i++) {
    const shellGeo = new THREE.IcosahedronGeometry(1.5 + i * 1.5, i < 3 ? 2 : 1);
    const shellMat = new THREE.MeshBasicMaterial({
      color: [0x110022, 0x220044, 0x330055, 0x440066, 0x550077][i],
      wireframe: true, transparent: true, opacity: 0.15 - i * 0.02,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const shell = new THREE.Mesh(shellGeo, shellMat);
    shell.name = 'shell-' + i;
    group.add(shell);
  }
  // spacetime curvature grid
  const gridGeo = new THREE.PlaneGeometry(20, 20, 30, 30);
  const gridMat = new THREE.MeshBasicMaterial({
    color: 0x4400cc, wireframe: true, transparent: true, opacity: 0.08,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
  });
  const grid = new THREE.Mesh(gridGeo, gridMat);
  grid.rotation.x = Math.PI / 2;
  grid.position.y = -2;
  group.add(grid);
  // massive particle storm
  const stormGeo = new THREE.BufferGeometry();
  const stormPos = new Float32Array(400 * 3);
  for (let i = 0; i < 400; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 1 + Math.random() * 8;
    stormPos[i*3] = Math.cos(a) * r;
    stormPos[i*3+1] = (Math.random()-0.5) * 6;
    stormPos[i*3+2] = Math.sin(a) * r;
  }
  stormGeo.setAttribute('position', new THREE.BufferAttribute(stormPos, 3));
  const stormMat = new THREE.PointsMaterial({ color: 0x8844cc, size: 0.08, transparent: true,
    opacity: 0.25, blending: THREE.AdditiveBlending, depthWrite: false });
  const storm = new THREE.Points(stormGeo, stormMat);
  group.add(storm);

  group._animate = (t, hpPct) => {
    group.children.forEach(c => {
      if (c.name?.startsWith('shell')) {
        const i = parseInt(c.name.split('-')[1]);
        c.rotation.y = t * (0.15 + i * 0.08) * (i % 2 === 0 ? 1 : -1);
        c.rotation.x = t * (0.1 + i * 0.05);
        // shells pulse
        c.scale.setScalar(1 + Math.sin(t * 2 + i) * 0.08);
      }
    });
    storm.rotation.y = t * 0.2;
    // warp the grid
    const gPos = gridGeo.attributes.position;
    for (let i = 0; i < gPos.count; i++) {
      const x = gPos.getX(i), z = gPos.getZ(i);
      const d = Math.sqrt(x*x + z*z);
      const dip = d < 0.5 ? -3 : -3 / (d * 0.8);
      gPos.setY(i, dip + Math.sin(t + d * 0.5) * 0.2);
    }
    gPos.needsUpdate = true;
    // spiral storm particles inward
    const sPos = stormGeo.attributes.position;
    for (let i = 0; i < 400; i++) {
      const x = sPos.getX(i), z = sPos.getZ(i);
      const a = Math.atan2(z, x) + 0.02;
      const r = Math.sqrt(x*x+z*z) * 0.998;
      sPos.setX(i, Math.cos(a) * r);
      sPos.setZ(i, Math.sin(a) * r);
      if (r < 0.5) {
        const na = Math.random()*Math.PI*2;
        const nr = 4 + Math.random()*5;
        sPos.setX(i, Math.cos(na)*nr);
        sPos.setZ(i, Math.sin(na)*nr);
      }
    }
    sPos.needsUpdate = true;
  };
  return group;
}

const projectiles = [];
function spawnVoidProjectile(from, to, color) {
  const scene = KI.scene;
  if (!scene) return;
  // dark core with inverted glow
  const projGeo = new THREE.SphereGeometry(0.3, 8, 8);
  const projMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const proj = new THREE.Mesh(projGeo, projMat);
  // purple aura
  const auraGeo = new THREE.SphereGeometry(0.7, 8, 8);
  const auraMat = new THREE.MeshBasicMaterial({ color: color || 0x8800aa, transparent: true, opacity: 0.2,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide });
  proj.add(new THREE.Mesh(auraGeo, auraMat));
  proj.position.copy(from);
  scene.add(proj);
  const dir = new THREE.Vector3().subVectors(to, from).normalize();
  projectiles.push({ mesh: proj, dir, speed: 14, life: 3 });
}
function updateProjectiles(dt) {
  const scene = KI.scene;
  if (!scene) return;
  const playerPos = KI._scene?.aura?.position || new THREE.Vector3(0, 2.5, 5);
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.dir, p.speed * dt);
    if (p.mesh.position.distanceTo(playerPos) < 2 || p.life <= 0) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    }
  }
}

// RUSH STATE + COMBAT LOGIC
// ============================================================
const RUSH = {
  wave: 0, bossHP: 0, bossMaxHP: 0,
  playerHP: 1200, maxPlayerHP: 1200,
  boss: null, bossGroup: null,
  phase: 0, atkTimer: 0,
  active: false, totalDmgDealt: 0,
  wavesCleared: 0, bossEnraged: false
};

let currentLayer = -1;
KI.on('resonance:update', data => {
  const resHUD = document.getElementById('resHUD');
  if (data.activeLayer >= 0 || data.sustainTime > 0.1) resHUD.classList.add('on');
  else resHUD.classList.remove('on');
  Resonance.LAYERS.forEach((l, i) => {
    const el = document.getElementById('dL-' + i);
    if (!el) return;
    el.classList.toggle('active', i <= data.activeLayer);
    el.classList.toggle('peak', i === data.peakLayer && data.activeLayer >= 0);
  });
  const multEl = document.getElementById('resMultiplier');
  if (data.multiplier > 1) {
    multEl.classList.add('on');
    multEl.textContent = Math.round(data.multiplier*10)/10 + 'x';
  } else multEl.classList.remove('on');
  const kanji = KI.get('kanji'), KANJI = kanji?.KANJI||{};
  const kj = KANJI[data.vowel];
  if (kj && data.activeLayer >= 0) {
    document.getElementById('resKanji').textContent = kj.char;
    document.getElementById('resKanji').style.color =
      '#' + Resonance.LAYERS[data.activeLayer].color.toString(16).padStart(6,'0');
  }
  currentLayer = data.activeLayer;
});

KI.on('resonance:release', data => {
  if (!RUSH.active || !RUSH.boss) return;
  const auraPos = KI._scene?.aura?.position || new THREE.Vector3(0, 2.5, 5);
  const kanji = KI.get('kanji'), KANJI = kanji?.KANJI||{};
  const kj = KANJI[data.vowel];
  const blastType = kj?.blast || 'kiball';
  KI.voice.chargeLevel = Math.min(1, data.multiplier / 8);
  KI.voice.energy = Math.max(KI.voice.energy, data.multiplier * 0.05);
  const blastMod = KI.get('ki-blasts');
  if (blastMod) blastMod.fireBlast(blastType, Math.min(1, data.multiplier / 4), auraPos);

  let bossDmg = data.multiplier * 35 * (1 + data.coherenceBonus);
  if (RUSH.boss.weakness && data.vowel === RUSH.boss.weakness) {
    bossDmg *= RUSH.boss.weakMult;
    showCmt('LIGHT PIERCES DARK! x' + RUSH.boss.weakMult + '!');
  }
  bossDmg *= (1 + data.layer * 0.3);
  RUSH.bossHP -= bossDmg;
  RUSH.totalDmgDealt += bossDmg;
  KI.player.score += Math.round(bossDmg);
  document.getElementById('score').textContent = KI.player.score.toLocaleString();
  showBossDmg(bossDmg, data.vowel);
  updateBossHP();

  const hpPct = RUSH.bossHP / RUSH.bossMaxHP;
  const phases = RUSH.boss.phases || 3;
  const newPhase = Math.floor((1 - hpPct) * phases);
  if (newPhase > RUSH.phase) {
    RUSH.phase = newPhase;
    RUSH.boss.atkInterval *= 0.85;
    RUSH.boss.atkDmg *= 1.15;
    showCmt(RUSH.boss.name + ' DARKENS! Phase ' + (RUSH.phase + 1));
  }

  if (RUSH.bossHP <= 0) {
    RUSH.bossHP = 0; updateBossHP();
    RUSH.wavesCleared++; RUSH.wave++;
    KI.player.score += 500 * RUSH.wave;
    document.getElementById('score').textContent = KI.player.score.toLocaleString();
    if (RUSH.bossGroup) { KI.scene.remove(RUSH.bossGroup); RUSH.bossGroup = null; }
    if (RUSH.wave >= BOSSES.length) showVictory();
    else {
      showCmt(RUSH.boss.name + ' DISPELLED!');
      RUSH.playerHP = Math.min(RUSH.maxPlayerHP, RUSH.playerHP + 250);
      updatePlayerHP();
      setTimeout(() => startBoss(RUSH.wave), 3000);
    }
    RUSH.active = false;
  }
});

KI.on('charge:update', data => {
  document.getElementById('blastType').textContent = data.blastType.name;
  const kanji = KI.get('kanji'), KANJI = kanji?.KANJI||{};
  const khud = document.getElementById('kanjiHUD');
  if (KI.voice.vowel && KI.voice.sounding && KANJI[KI.voice.vowel]) {
    const kj = KANJI[KI.voice.vowel]; khud.classList.add('on');
    document.getElementById('kanjiChar').textContent = kj.char;
    document.getElementById('kanjiChar').style.color = kj.color;
    document.getElementById('kanjiName').textContent = kj.name;
    document.getElementById('kanjiReading').textContent = kj.reading;
  } else khud.classList.remove('on');
});

KI.on('hit', data => {
  document.getElementById('score').textContent = KI.player.score.toLocaleString();
  document.getElementById('combo').textContent = KI.player.combo > 1 ? KI.player.combo + 'x COMBO' : '';
});

function startBoss(idx) {
  const boss = { ...BOSSES[idx], phases: BOSSES[idx].phases || 3 };
  RUSH.boss = boss; RUSH.bossHP = boss.hp; RUSH.bossMaxHP = boss.hp;
  RUSH.phase = 0; RUSH.atkTimer = boss.atkInterval; RUSH.bossEnraged = false;
  showBossIntro(idx, boss);
}

function showBossIntro(idx, boss) {
  RUSH.active = false;
  const intro = document.getElementById('bossIntro');
  document.getElementById('introWave').textContent = 'ENTITY ' + (idx + 1);
  document.getElementById('introName').textContent = boss.name;
  const c = '#' + boss.color.toString(16).padStart(6, '0');
  document.getElementById('introName').style.color = c;
  document.getElementById('introTitle').textContent = boss.title;
  document.getElementById('introDesc').textContent = boss.desc;
  intro.classList.add('show');

  setTimeout(() => {
    intro.classList.remove('show');
    RUSH.active = true;
    if (RUSH.bossGroup) KI.scene.remove(RUSH.bossGroup);
    RUSH.bossGroup = boss.build(KI.scene, boss.color);
    RUSH.bossGroup.position.set(0, 5, -10);
    KI.scene.add(RUSH.bossGroup);
    document.getElementById('bossHPBar').classList.add('on');
    document.getElementById('bossHPName').textContent = boss.name;
    document.getElementById('bossHPFill').style.background =
      'linear-gradient(90deg,' + c + ',' + c + '88)';
    updateBossHP();
    document.getElementById('waveLabel').textContent = 'ENTITY ' + (idx + 1);
    document.getElementById('bossName').textContent = boss.name;
    document.getElementById('bossName').style.color = c;
    document.getElementById('waveSub').textContent = boss.desc;
  }, 3000);
}

function updateBossHP() {
  const pct = Math.max(0, RUSH.bossHP / RUSH.bossMaxHP);
  document.getElementById('bossHPFill').style.width = (pct * 100) + '%';
  document.getElementById('bossHPPct').textContent = Math.round(pct * 100) + '%';
}
function updatePlayerHP() {
  const pct = Math.max(0, RUSH.playerHP / RUSH.maxPlayerHP);
  document.getElementById('playerHPFill').style.width = (pct * 100) + '%';
  document.getElementById('playerHPFill').style.background =
    pct < 0.3 ? 'linear-gradient(90deg,#f44,#f66)' : 'linear-gradient(90deg,#0a0,#0f0)';
}

function updateBoss(dt, t) {
  if (!RUSH.active || !RUSH.boss) return;
  if (RUSH.bossGroup?._animate) RUSH.bossGroup._animate(t, RUSH.bossHP / RUSH.bossMaxHP);
  if (RUSH.bossGroup) RUSH.bossGroup.position.y = 5 + Math.sin(t * 0.6) * 0.6;

  RUSH.atkTimer -= dt;
  if (RUSH.atkTimer <= 0) {
    RUSH.atkTimer = RUSH.boss.atkInterval;
    const dmg = RUSH.boss.atkDmg * (1 + Math.random() * 0.3);
    RUSH.playerHP -= dmg; updatePlayerHP();
    const bossPos = RUSH.bossGroup?.position || new THREE.Vector3(0, 5, -10);
    const playerPos = KI._scene?.aura?.position || new THREE.Vector3(0, 2.5, 5);
    spawnVoidProjectile(bossPos.clone(), playerPos.clone(), RUSH.boss.color);
    const atk = document.getElementById('bossAtk');
    atk.textContent = RUSH.boss.atkName; atk.classList.remove('show');
    void atk.offsetWidth; atk.classList.add('show');
    setTimeout(() => atk.classList.remove('show'), 800);
    const flash = document.getElementById('hitFlash');
    flash.classList.remove('flash'); void flash.offsetWidth; flash.classList.add('flash');
    showDmg(dmg, 'boss');
    if (KI._scene) KI._scene.screenShake = Math.max(KI._scene.screenShake, dmg / 80);
    if (RUSH.playerHP <= 0) {
      RUSH.playerHP = 0; updatePlayerHP(); RUSH.active = false; showGameOver();
    }
  }
  if (!RUSH.bossEnraged && RUSH.bossHP / RUSH.bossMaxHP < 0.2) {
    RUSH.bossEnraged = true;
    RUSH.boss.atkInterval *= 0.6; RUSH.boss.atkDmg *= 1.5;
    showCmt(RUSH.boss.name + ' COLLAPSES INWARD!');
  }
}

function showGameOver() {
  document.getElementById('bossHPBar').classList.remove('on');
  if (RUSH.bossGroup) { KI.scene.remove(RUSH.bossGroup); RUSH.bossGroup = null; }
  document.getElementById('goScore').textContent = 'Score: ' + KI.player.score.toLocaleString();
  document.getElementById('goWaves').textContent = 'Entities Dispelled: ' + RUSH.wavesCleared + '/' + BOSSES.length;
  document.getElementById('gameOver').classList.add('show');
}
function showVictory() {
  document.getElementById('bossHPBar').classList.remove('on');
  document.getElementById('vicScore').textContent = 'Score: ' + KI.player.score.toLocaleString();
  document.getElementById('victory').classList.add('show');
}
window.restartRush = function() {
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('victory').classList.remove('show');
  if (RUSH.bossGroup) { KI.scene.remove(RUSH.bossGroup); RUSH.bossGroup = null; }
  projectiles.forEach(p => KI.scene.remove(p.mesh)); projectiles.length = 0;
  RUSH.wave = 0; RUSH.playerHP = 1200; RUSH.wavesCleared = 0;
  RUSH.totalDmgDealt = 0; RUSH.bossEnraged = false;
  KI.player.score = 0; document.getElementById('score').textContent = '0';
  updatePlayerHP(); startBoss(0);
};

  const sides=[0,60,5,4,3][layer]; const baseR=30+currentLayer*5,wobble=Math.sin(t*3)*3;
  const grad=mCtx.createRadialGradient(cx,cy,baseR*0.4,cx,cy,baseR*2);
  grad.addColorStop(0,'rgba('+r+','+g+','+b+',0.3)');
  grad.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
  mCtx.fillStyle=grad;mCtx.beginPath();mCtx.arc(cx,cy,baseR*2,0,Math.PI*2);mCtx.fill();
  mCtx.save();mCtx.translate(cx,cy);mCtx.rotate(t*0.5);mCtx.beginPath();
  if(sides===0){mCtx.arc(0,0,baseR+wobble,0,Math.PI*2);}
  else{for(let i=0;i<=sides;i++){const a=(i/sides)*Math.PI*2-Math.PI/2;
    const rr=baseR+wobble+Math.sin(t*5+i)*2;
    if(i===0)mCtx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);
    else mCtx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}mCtx.closePath();}
  mCtx.fillStyle='rgba('+r+','+g+','+b+',0.5)';
  mCtx.strokeStyle='rgb('+r+','+g+','+b+')';mCtx.lineWidth=2;mCtx.fill();mCtx.stroke();
  mCtx.restore();
}

function showDmg(amount, type) {
  const el=document.createElement('div');el.className='dmg';
  el.textContent=(type==='boss'?'-':'')+Math.round(amount);
  el.style.color=type==='boss'?'#80f':'#c0a0ff';
  el.style.fontSize=(18+Math.min(amount/8,30))+'px';
  el.style.left=(KI.W/2+(Math.random()-0.5)*140)+'px';
  el.style.top=(type==='boss'?KI.H*0.6:80+(Math.random()-0.5)*40)+'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(()=>el.remove(),1400);
}
function showBossDmg(amount, vowel) {
  const kanji=KI.get('kanji'),KANJI=kanji?.KANJI||{};
  const kj=KANJI[vowel||'mm'];
  const isWeak=RUSH.boss?.weakness===vowel;
  const el=document.createElement('div');el.className='dmg';
  el.textContent=(kj?kj.char+' ':'')+Math.round(amount)+(isWeak?'!':'');
  el.style.color=isWeak?'#0f0':'#c0a0ff';
  el.style.fontSize=(20+Math.min(amount/6,36)+(isWeak?8:0))+'px';
  el.style.left=(KI.W/2+(Math.random()-0.5)*160)+'px';
  el.style.top=(80+(Math.random()-0.5)*40)+'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(()=>el.remove(),1400);
}

let cmtTimeout=null;
function showCmt(text) {
  if(cmtTimeout)clearTimeout(cmtTimeout);
  if(text.length>80)text=text.slice(0,80)+'...';
  const el=document.getElementById('cmt');el.textContent=text;el.classList.add('show');
  cmtTimeout=setTimeout(()=>{el.classList.remove('show');cmtTimeout=null;},3000);
}
function showModuleBadge(name) {
  const b=document.createElement('div');b.className='mod-badge active';
  b.textContent=name.toUpperCase();document.getElementById('modBadges').appendChild(b);
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 8000, fogColor: 0x050010, fogDensity: 0.012 });
  showModuleBadge('hd-scene');
  Kanji.init(); showModuleBadge('kanji');
  Resonance.init(); buildResHUD(); showModuleBadge('resonance');
  Vortex.init({ count: 3500, particleSize: 0.1 }); showModuleBadge('hd-vortex');
  KiBlasts.init(); showModuleBadge('blasts');
  EmojiSystem.init(); showModuleBadge('emoji');
  FX.init({ aurora: true }); showModuleBadge('hd-fx');
  ResonanceSynths.init(); showModuleBadge('res-synths');
  try { await VoiceEngine.init(); showModuleBadge('voice'); }
  catch(e){ console.warn('Voice init failed:',e); }
  updatePlayerHP();
  setTimeout(() => startBoss(0), 1500);

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    updateBoss(dt, t);
    updateProjectiles(dt);
    drawMorphBall(t);
    KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c KI ARENA BOSS VOID ', 'background:#0a001a;color:#80f;font-size:22px;padding:12px');
}

window.addEventListener('load', boot);
</script>
