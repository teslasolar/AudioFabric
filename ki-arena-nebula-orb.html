<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Nebula Orb</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#nebulaType{font-size:16px;color:#f84;text-shadow:0 0 12px #f84;text-transform:uppercase;letter-spacing:3px}
#cloudDensity{font-size:11px;color:#888}
#shellInfo{font-size:10px;color:#666}
/* Nebula type pills */
#nebulaPills{position:fixed;right:12px;bottom:12px;z-index:55;
  display:flex;gap:4px;pointer-events:none}
.neb-pill{padding:3px 10px;font-size:9px;color:#644;border:1px solid #fff1;
  border-radius:10px;background:rgba(0,0,0,0.4);transition:all 0.3s}
.neb-pill.active{color:#f84;border-color:#f844}
/* Density meter */
#densityMeter{position:fixed;left:12px;bottom:12px;z-index:55;width:6px;height:80px;
  background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;pointer-events:none}
#densityFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#420,#f84,#fca);
  border-radius:3px;transition:height 0.15s}
#densityLabel{position:fixed;left:22px;bottom:12px;z-index:55;font-size:8px;color:#644;
  writing-mode:vertical-rl;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:9px;color:#555;letter-spacing:2px">NEBULA ORB</div>
    <div id="nebulaType">spiral</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="cloudDensity">density 0%</div>
    <div id="shellInfo">5 shells / 200 stars</div>
  </div>
</div>
<div id="nebulaPills">
  <div class="neb-pill active">spiral</div>
  <div class="neb-pill">banded</div>
  <div class="neb-pill">storm</div>
  <div class="neb-pill">ring</div>
  <div class="neb-pill">emission</div>
</div>
<div id="densityMeter"><div id="densityFill" style="height:0%"></div></div>
<div id="densityLabel">GAS</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as NebulaOrb from './modules/nebula-orb.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'NEBL-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

KI.on('nebula-orb:update', data => {
  document.getElementById('nebulaType').textContent = data.nebulaType;
  document.getElementById('cloudDensity').textContent = 'density ' + data.cloudDensity + '%';
  document.getElementById('shellInfo').textContent = data.shellCount + ' shells / ' + data.starCount + ' stars';
  document.getElementById('densityFill').style.height = data.cloudDensity + '%';
  document.querySelectorAll('.neb-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === data.nebulaType);
  });
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 1200 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  NebulaOrb.init({ position: [0, 2.5, -3.5] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c NEBULA ORB BOOTED ', 'background:#000;color:#f84;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
