<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFabric — Zen Garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040810;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

#topBar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.4);border-bottom:1px solid #0ff1}
#gardenName{font-size:14px;color:#0ff;letter-spacing:3px;opacity:0.6}
#gardenInfo{font-size:10px;color:#0884}

/* Breath guide */
#breathGuide{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:55;
  text-align:center;pointer-events:none;opacity:0.6}
#breathCircle{width:80px;height:80px;border:2px solid #0ff3;border-radius:50%;
  margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  transition:all 1s ease-in-out}
#breathCircle.expand{width:120px;height:120px;border-color:#0f06}
#breathText{font-size:10px;color:#0ff6;letter-spacing:3px}
#breathKanji{font-size:28px;opacity:0.4;transition:opacity 0.5s}

/* Growth stats */
#growthStats{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0.5}
.gs-row{font-size:10px;margin:4px 0;display:flex;gap:8px;align-items:center}
.gs-dot{width:6px;height:6px;border-radius:50%}
.gs-label{color:#fff6}
.gs-val{color:#0ff;font-variant-numeric:tabular-nums}

/* Presence list */
#zenPresence{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0.4}
.zp-row{font-size:9px;margin:3px 0;display:flex;align-items:center;gap:6px}
.zp-dot{width:5px;height:5px;border-radius:50%;background:#0f0}
.zp-name{color:#0ff8}

#bottomBar{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:center;gap:12px;padding:10px;background:rgba(0,0,0,0.5);border-top:1px solid #0ff1}
.zen-btn{background:#0001;border:1px solid #0ff2;color:#0ff8;padding:8px 18px;
  cursor:pointer;font-size:10px;font-family:monospace;border-radius:20px;letter-spacing:2px}
.zen-btn:hover{background:#0ff1}

#version{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:45;
  font-size:8px;color:#111;letter-spacing:3px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="topBar">
  <span id="gardenName">ZEN GARDEN</span>
  <span id="gardenInfo"></span>
</div>

<div id="breathGuide">
  <div id="breathCircle"><span id="breathKanji">気</span></div>
  <div id="breathText">BREATHE</div>
</div>

<div id="growthStats">
  <div class="gs-row"><div class="gs-dot" style="background:#44ffaa"></div><span class="gs-label">crystals</span><span class="gs-val" id="gsCrystals">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#44aaff"></div><span class="gs-label">flowers</span><span class="gs-val" id="gsFlowers">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#aa44ff"></div><span class="gs-label">pillars</span><span class="gs-val" id="gsPillars">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#ffaa44"></div><span class="gs-label">orbs</span><span class="gs-val" id="gsOrbs">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#fff"></div><span class="gs-label">depth</span><span class="gs-val" id="gsDepth">0</span></div>
</div>

<div id="zenPresence"></div>

<div id="bottomBar">
  <button class="zen-btn" onclick="copyLink()">INVITE</button>
  <button class="zen-btn" onclick="resetGarden()">CLEAR GARDEN</button>
</div>
<div id="peers" style="display:none"></div>
<div id="lbRows" style="display:none"></div>
<div id="version">AUDIOFABRIC ZEN GARDEN</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
// ============================================================
// AUDIOFABRIC — ZEN GARDEN
// A meditative P2P space. Sustained tones grow structures:
//  ah (fire) -> warm crystal spires
//  ee (lightning) -> electric flower blooms
//  oh (spirit) -> floating light orbs
//  oo (water) -> fluid pillars
//  eh (wind) -> drifting petal clouds
//  mm (earth) -> ground stone formations
//
// Deeper resonance layers grow taller/larger structures.
// All participants' growths are shared and persistent in the scene.
// ============================================================

import { KI } from './modules/core.js';
import * as Scene from './modules/hd-scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as Kanji from './modules/kanji.js';
import * as Resonance from './modules/resonance.js';
import * as ResonanceSynths from './modules/resonance-synths.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Chat from './modules/chat.js';

const urlParams = new URLSearchParams(location.search);
const ROOM = urlParams.get('room') || 'ZEN-' + Math.random().toString(36).slice(2,6).toUpperCase();
if (!urlParams.has('room')) history.replaceState(null, '', '?room=' + ROOM);

KI.player.name = localStorage.getItem('zen_nick') || KI.genHash();
const savedNick = localStorage.getItem('zen_nick');
if (!savedNick) {
  const n = prompt('Name:', KI.player.name);
  if (n?.trim()) { KI.player.name = n.trim().slice(0,16); localStorage.setItem('zen_nick', KI.player.name); }
}

window.copyLink = () => navigator.clipboard.writeText(location.href);

// === GARDEN STATE ===
const garden = {
  structures: [],     // { mesh, type, growthTarget, currentScale, color, vowel, layer }
  crystals: 0,
  flowers: 0,
  pillars: 0,
  orbs: 0,
  totalDepth: 0,
  maxStructures: 200,
  growthCooldown: 0
};

// === STRUCTURE GENERATORS ===
function growStructure(vowel, layer, position) {
  const scene = KI.scene;
  if (!scene || garden.structures.length >= garden.maxStructures) return;
  if (garden.growthCooldown > 0) return;
  garden.growthCooldown = 0.8 - layer * 0.1; // deeper layers grow faster

  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[vowel] || KANJI['mm'];
  const ld = Resonance.LAYERS[Math.max(0, layer)];
  const layerScale = 1 + layer * 0.4;

  let mesh, type;
  const pos = position || randomGardenPos();

  switch (vowel) {
    case 'ah': { // crystal spire cluster
      type = 'crystal';
      const group = new THREE.Group();
      const spireCount = 2 + Math.floor(layer * 1.5);
      for (let s = 0; s < spireCount; s++) {
        const h = (0.4 + layer * 0.5 + Math.random() * 0.3) * layerScale;
        const w = (0.06 + Math.random() * 0.08) * layerScale;
        const geo = new THREE.ConeGeometry(w, h, 5 + Math.floor(Math.random()*3));
        const mat = new THREE.MeshBasicMaterial({
          color: kj.hex, transparent: true, opacity: 0.5 + Math.random()*0.2,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        const spire = new THREE.Mesh(geo, mat);
        spire.position.set((Math.random()-0.5)*0.2*layerScale, h/2, (Math.random()-0.5)*0.2*layerScale);
        spire.rotation.z = (Math.random()-0.5)*0.3;
        // inner glow per spire
        const ig = new THREE.ConeGeometry(w*0.5, h*0.7, 4);
        const im = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15,
          blending: THREE.AdditiveBlending, depthWrite: false });
        spire.add(new THREE.Mesh(ig, im));
        group.add(spire);
      }
      // base glow
      const bg = new THREE.SphereGeometry(0.15*layerScale, 8, 8);
      const bm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending, depthWrite: false });
      group.add(new THREE.Mesh(bg, bm));
      mesh = group;
      garden.crystals++;
      break;
    }
    case 'ee': { // electric flower bloom
      type = 'flower';
      const group = new THREE.Group();
      const petalCount = 5 + layer * 2;
      // double-layer petals with varying sizes
      for (let ring = 0; ring < 2; ring++) {
        const ringR = (0.15 + ring * 0.12) * layerScale;
        const ringPetals = petalCount + ring * 3;
        for (let p = 0; p < ringPetals; p++) {
          const a = (p / ringPetals) * Math.PI * 2 + ring * 0.3;
          const pg = new THREE.SphereGeometry((0.08 + ring * 0.04) * layerScale, 8, 8);
          pg.scale(1, 0.25, 0.6);
          const pm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true,
            opacity: 0.4 - ring * 0.1,
            blending: THREE.AdditiveBlending, depthWrite: false });
          const petal = new THREE.Mesh(pg, pm);
          petal.position.set(Math.cos(a) * ringR, 0.3 + ring * 0.05, Math.sin(a) * ringR);
          petal.rotation.z = a * 0.5;
          petal.rotation.x = ring * 0.3;
          group.add(petal);
        }
      }
      // glowing center orb
      const cg = new THREE.SphereGeometry(0.06 * layerScale, 12, 12);
      const cm = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5,
        blending: THREE.AdditiveBlending, depthWrite: false });
      const center = new THREE.Mesh(cg, cm);
      center.position.y = 0.3;
      group.add(center);
      // stamen sparks
      for (let s = 0; s < 3 + layer; s++) {
        const sa = Math.random() * Math.PI * 2;
        const sr = 0.04 * layerScale;
        const sg2 = new THREE.SphereGeometry(0.015, 4, 4);
        const sm2 = new THREE.MeshBasicMaterial({ color: 0xffff88, transparent: true, opacity: 0.6,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const stamen = new THREE.Mesh(sg2, sm2);
        stamen.position.set(Math.cos(sa)*sr, 0.35 + Math.random()*0.05, Math.sin(sa)*sr);
        group.add(stamen);
      }
      // stem with slight curve
      const stemH = 0.3 + layer * 0.15;
      const sg = new THREE.CylinderGeometry(0.015, 0.025, stemH, 6);
      const sm = new THREE.MeshBasicMaterial({ color: 0x226622, transparent: true, opacity: 0.4 });
      const stem = new THREE.Mesh(sg, sm);
      stem.position.y = stemH * 0.3;
      group.add(stem);
      mesh = group;
      garden.flowers++;
      break;
    }
    case 'oh': { // floating spirit orb
      type = 'orb';
      const group = new THREE.Group();
      // outer shell — soft glow
      const og = new THREE.SphereGeometry(0.18 * layerScale, 24, 24);
      const om = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.25,
        blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
      group.add(new THREE.Mesh(og, om));
      // inner core — bright
      const ig = new THREE.SphereGeometry(0.08 * layerScale, 16, 16);
      const im = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4,
        blending: THREE.AdditiveBlending, depthWrite: false });
      group.add(new THREE.Mesh(ig, im));
      // double halo rings at different angles
      for (let r = 0; r < 2; r++) {
        const rg = new THREE.TorusGeometry((0.22 + r * 0.08) * layerScale, 0.008, 8, 48);
        const rm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.25 - r * 0.08,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const ring = new THREE.Mesh(rg, rm);
        ring.rotation.x = Math.PI / 2 + r * 0.6;
        ring.rotation.z = r * 1.2;
        group.add(ring);
      }
      // orbiting motes
      const moteCount = 4 + layer * 2;
      for (let m = 0; m < moteCount; m++) {
        const mg = new THREE.SphereGeometry(0.02 * layerScale, 4, 4);
        const mm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.5,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const mote = new THREE.Mesh(mg, mm);
        const ma = (m / moteCount) * Math.PI * 2;
        const mr = 0.3 * layerScale;
        mote.position.set(Math.cos(ma)*mr, Math.sin(ma*0.7)*0.1, Math.sin(ma)*mr);
        group.add(mote);
      }
      mesh = group;
      pos.y = 1 + layer * 0.5 + Math.random() * 2;
      garden.orbs++;
      break;
    }
    case 'oo': { // fluid pillar with ring accents
      type = 'pillar';
      const group = new THREE.Group();
      const h = (0.5 + layer * 0.6) * layerScale;
      // main column — tapered
      const geo = new THREE.CylinderGeometry(0.06 * layerScale, 0.12 * layerScale, h, 10);
      const mat = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.4,
        blending: THREE.AdditiveBlending, depthWrite: false });
      const col = new THREE.Mesh(geo, mat);
      col.position.y = h / 2;
      group.add(col);
      // ring accents along height
      const ringCount = 2 + layer;
      for (let r = 0; r < ringCount; r++) {
        const ry = (r + 1) / (ringCount + 1) * h;
        const rr = (0.08 + (1 - r/ringCount) * 0.04) * layerScale;
        const rg = new THREE.TorusGeometry(rr, 0.006, 6, 24);
        const rm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.35,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const ring = new THREE.Mesh(rg, rm);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = ry;
        group.add(ring);
      }
      // glowing cap
      const cg = new THREE.SphereGeometry(0.07 * layerScale, 12, 12);
      const cm = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3,
        blending: THREE.AdditiveBlending, depthWrite: false });
      const cap = new THREE.Mesh(cg, cm);
      cap.position.y = h;
      group.add(cap);
      // base pool
      const bg = new THREE.CircleGeometry(0.15 * layerScale, 16);
      const bm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
      const base = new THREE.Mesh(bg, bm);
      base.rotation.x = -Math.PI / 2;
      base.position.y = 0.01;
      group.add(base);
      mesh = group;
      garden.pillars++;
      break;
    }
    case 'eh': { // wind petal cloud — drifting constellation
      type = 'flower';
      const group = new THREE.Group();
      const cloudSize = (3 + layer * 2);
      // scattered petals in a flowing formation
      for (let p = 0; p < cloudSize; p++) {
        const spread = 0.3 + layer * 0.15;
        const pg = new THREE.SphereGeometry((0.04 + Math.random()*0.05) * layerScale, 6, 6);
        pg.scale(1.2, 0.4, 0.8);
        const pm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true,
          opacity: 0.25 + Math.random() * 0.15,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const petal = new THREE.Mesh(pg, pm);
        const pa = (p / cloudSize) * Math.PI * 2;
        const pr = Math.random() * spread * layerScale;
        petal.position.set(Math.cos(pa)*pr, Math.random()*0.3, Math.sin(pa)*pr);
        petal.rotation.set(Math.random()*0.5, pa, Math.random()*0.3);
        group.add(petal);
      }
      // central wisp
      const wg = new THREE.SphereGeometry(0.03 * layerScale, 6, 6);
      const wm = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2,
        blending: THREE.AdditiveBlending, depthWrite: false });
      const wisp = new THREE.Mesh(wg, wm);
      wisp.position.y = 0.15;
      group.add(wisp);
      // trailing thread
      const tg = new THREE.CylinderGeometry(0.005, 0.002, 0.4 * layerScale, 4);
      const tm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.15 });
      const thread = new THREE.Mesh(tg, tm);
      thread.position.y = -0.15;
      group.add(thread);
      mesh = group;
      pos.y = 0.8 + Math.random() * 2.5;
      garden.flowers++;
      break;
    }
    default: { // earth stone cluster
      type = 'crystal';
      const group = new THREE.Group();
      const stoneCount = 1 + Math.floor(layer * 0.8);
      for (let s = 0; s < stoneCount; s++) {
        const size = (0.08 + Math.random() * 0.08) * layerScale;
        const geo = new THREE.DodecahedronGeometry(size, 0);
        const mat = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true,
          opacity: 0.4 + Math.random() * 0.2,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const stone = new THREE.Mesh(geo, mat);
        stone.position.set((Math.random()-0.5)*0.15*layerScale, size*0.5 + s*0.05, (Math.random()-0.5)*0.15*layerScale);
        stone.rotation.set(Math.random()*0.5, Math.random()*Math.PI, Math.random()*0.5);
        group.add(stone);
      }
      // inner light
      const lg = new THREE.SphereGeometry(0.04 * layerScale, 6, 6);
      const lm = new THREE.MeshBasicMaterial({ color: 0xffddaa, transparent: true, opacity: 0.2,
        blending: THREE.AdditiveBlending, depthWrite: false });
      const light = new THREE.Mesh(lg, lm);
      light.position.y = 0.06;
      group.add(light);
      mesh = group;
      garden.crystals++;
    }
  }

  mesh.position.copy(pos);
  mesh.scale.setScalar(0.01); // start tiny, grow in
  scene.add(mesh);

  const growTarget = layerScale * (0.5 + Math.random() * 0.5);
  garden.structures.push({
    mesh, type, growTarget, currentScale: 0.01,
    color: kj.hex, vowel, layer, born: performance.now(),
    floatOffset: Math.random() * Math.PI * 2,
    floatSpeed: 0.3 + Math.random() * 0.5,
    floatAmp: type === 'orb' ? 0.3 : 0.02
  });

  garden.totalDepth += layer + 1;
  updateStats();

  // broadcast growth
  KI.emit('broadcast', {
    type: 'zen-grow',
    name: KI.player.name,
    vowel, layer,
    x: pos.x, y: pos.y, z: pos.z
  });
}

function randomGardenPos() {
  const angle = Math.random() * Math.PI * 2;
  const r = 1 + Math.random() * 14;
  return new THREE.Vector3(Math.cos(angle) * r, 0.1, Math.sin(angle) * r);
}

function updateStats() {
  document.getElementById('gsCrystals').textContent = garden.crystals;
  document.getElementById('gsFlowers').textContent = garden.flowers;
  document.getElementById('gsPillars').textContent = garden.pillars;
  document.getElementById('gsOrbs').textContent = garden.orbs;
  document.getElementById('gsDepth').textContent = garden.totalDepth;
  document.getElementById('gardenInfo').textContent =
    garden.structures.length + ' growths | depth ' + garden.totalDepth;
}

window.resetGarden = () => {
  garden.structures.forEach(s => KI.scene?.remove(s.mesh));
  garden.structures.length = 0;
  garden.crystals = garden.flowers = garden.pillars = garden.orbs = garden.totalDepth = 0;
  updateStats();
};

// === RESONANCE -> GROWTH ===
KI.on('resonance:layerUp', data => {
  if (data.layer >= 1) { // only grow at layer 1+
    growStructure(data.vowel || KI.voice.vowel || 'mm', data.layer, null);
  }
});

KI.on('resonance:release', data => {
  // final growth burst on release
  if (data.layer >= 0) {
    for (let i = 0; i <= data.layer; i++) {
      setTimeout(() => growStructure(data.vowel || 'mm', data.layer, null), i * 200);
    }
  }
});

// === REMOTE GROWTHS ===
KI.on('rtc:data', d => {
  if (d.type === 'zen-grow' && d.name !== KI.player.name) {
    growStructure(d.vowel, d.layer, new THREE.Vector3(d.x, d.y, d.z));
  }
});

// === BREATH GUIDE ===
let breathPhase = 'in', breathTimer = 0;
const BREATH_IN = 4, BREATH_HOLD = 2, BREATH_OUT = 6;
function updateBreathGuide(dt) {
  breathTimer += dt;
  const circle = document.getElementById('breathCircle');
  const text = document.getElementById('breathText');
  const kanji = document.getElementById('breathKanji');

  if (breathPhase === 'in') {
    circle.classList.add('expand');
    text.textContent = 'BREATHE IN';
    kanji.textContent = '吸'; // inhale
    kanji.style.opacity = 0.3 + (breathTimer / BREATH_IN) * 0.5;
    if (breathTimer >= BREATH_IN) { breathPhase = 'hold'; breathTimer = 0; }
  } else if (breathPhase === 'hold') {
    text.textContent = 'HOLD';
    kanji.textContent = '止'; // stop
    kanji.style.opacity = 0.8;
    if (breathTimer >= BREATH_HOLD) { breathPhase = 'out'; breathTimer = 0; }
  } else {
    circle.classList.remove('expand');
    text.textContent = 'BREATHE OUT';
    kanji.textContent = '吐'; // exhale
    kanji.style.opacity = 0.8 - (breathTimer / BREATH_OUT) * 0.5;
    if (breathTimer >= BREATH_OUT) { breathPhase = 'in'; breathTimer = 0; }
  }
}

// === PRESENCE ===
const zenPeers = {};
function updateZenPresence(data) {
  if (!data.name || data.name === KI.player.name) return;
  zenPeers[data.name] = { lastSeen: Date.now(), sounding: data.sounding };
  renderPresence();
}
function renderPresence() {
  const cont = document.getElementById('zenPresence');
  let html = '';
  Object.keys(zenPeers).forEach(name => {
    const p = zenPeers[name];
    if (Date.now() - p.lastSeen > 15000) return;
    const dotColor = p.sounding ? '#0f0' : '#555';
    html += `<div class="zp-row"><div class="zp-dot" style="background:${dotColor}"></div><span class="zp-name">${escHtml(name)}</span></div>`;
  });
  cont.innerHTML = html;
}

KI.on('rtc:data', d => { if (d.type === 'state') updateZenPresence(d); });
KI.on('remote:state', updateZenPresence);

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// === BROADCAST ===
let bTimer = 0;
function broadcastZen(dt) {
  bTimer += dt;
  if (bTimer < 0.2) return;
  bTimer = 0;
  const res = KI.get('resonance');
  KI.emit('broadcast', {
    type: 'state', name: KI.player.name,
    energy: KI.voice.energy, vowel: KI.voice.vowel,
    layer: res ? res.state.activeLayer : -1,
    sounding: KI.voice.sounding
  });
}

// === BOOT ===
async function boot() {
  document.getElementById('gardenName').textContent = 'GARDEN: ' + ROOM;

  Scene.init({ stars: 10000, fogColor: 0x030610, fogDensity: 0.003 });

  if (KI.camera) {
    KI.camera.position.set(0, 6, 16);
    KI.camera.lookAt(0, 1, 0);
  }

  Kanji.init();
  Resonance.init();
  ResonanceSynths.init();

  try { await VoiceEngine.init(); } catch(e) { console.warn('Mic:', e); }

  MqttNet.init({ room: 'ZEN-' + ROOM });
  WebRTCNet.init({ room: 'ZEN-' + ROOM });
  Chat.init();

  // === WATER PLANE — reflective ground ===
  const waterGeo = new THREE.CircleGeometry(25, 96);
  const waterMat = new THREE.MeshBasicMaterial({
    color: 0x0a1530, transparent: true, opacity: 0.4, side: THREE.DoubleSide
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI / 2;
  water.position.y = -0.05;
  KI.scene.add(water);

  // water ripple rings
  const ripples = [];
  KI.on('resonance:layerUp', () => {
    const rg = new THREE.TorusGeometry(0.3, 0.02, 6, 48);
    const rm = new THREE.MeshBasicMaterial({
      color: 0x2244aa, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = Math.PI / 2;
    ring.position.set(
      (Math.random()-0.5) * 8, 0.02, (Math.random()-0.5) * 8
    );
    KI.scene.add(ring);
    ripples.push({ mesh: ring, life: 3 });
  });

  // === FIREFLIES ===
  const fireflyCount = 120;
  const ffGeo = new THREE.BufferGeometry();
  const ffPos = new Float32Array(fireflyCount * 3);
  const ffCol = new Float32Array(fireflyCount * 3);
  const ffData = [];
  for (let i = 0; i < fireflyCount; i++) {
    ffPos[i*3] = (Math.random()-0.5) * 30;
    ffPos[i*3+1] = 0.5 + Math.random() * 4;
    ffPos[i*3+2] = (Math.random()-0.5) * 30;
    const hue = 0.15 + Math.random() * 0.15; // warm yellow-green
    const rgb = KI.hslToRgb(hue, 0.8, 0.6);
    ffCol[i*3] = rgb[0]; ffCol[i*3+1] = rgb[1]; ffCol[i*3+2] = rgb[2];
    ffData.push({
      baseX: ffPos[i*3], baseY: ffPos[i*3+1], baseZ: ffPos[i*3+2],
      speed: 0.2 + Math.random() * 0.5, phase: Math.random() * Math.PI * 2,
      wanderR: 1 + Math.random() * 3
    });
  }
  ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
  ffGeo.setAttribute('color', new THREE.BufferAttribute(ffCol, 3));
  const ffMat = new THREE.PointsMaterial({
    size: 0.12, vertexColors: true, transparent: true, opacity: 0.6,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const fireflies = new THREE.Points(ffGeo, ffMat);
  KI.scene.add(fireflies);

  // === GROWTH PARTICLE TRAILS ===
  const trailParticles = [];
  KI.on('resonance:layerUp', data => {
    const kanji = KI.get('kanji'); const KANJI = kanji?.KANJI || {};
    const kj = KANJI[data.vowel || KI.voice.vowel];
    if (!kj) return;
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = 0.5 + Math.random() * 2;
      const pg = new THREE.SphereGeometry(0.03 + Math.random()*0.03, 4, 4);
      const pm = new THREE.MeshBasicMaterial({
        color: kj.hex, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending, depthWrite: false
      });
      const p = new THREE.Mesh(pg, pm);
      const pos = KI._scene?.aura?.position || new THREE.Vector3(0,2.5,5);
      p.position.set(pos.x + Math.cos(a)*r, pos.y + Math.random()*2, pos.z + Math.sin(a)*r);
      KI.scene.add(p);
      trailParticles.push({
        mesh: p, life: 2 + Math.random(),
        vy: 0.01 + Math.random() * 0.02,
        vx: (Math.random()-0.5) * 0.01,
        vz: (Math.random()-0.5) * 0.01
      });
    }
  });

  // override scene for calmer camera
  const sceneUpdate = KI.get('scene')?.update;
  if (sceneUpdate) {
    KI.get('scene').update = function(dt, t) {
      KI._scene.camAngle += 0.0006;
      KI.camera.position.x = Math.sin(KI._scene.camAngle) * 4;
      KI.camera.position.y = 5.5 + Math.sin(KI._scene.camAngle * 0.2) * 0.8;
      KI.camera.position.z = 15 + Math.cos(KI._scene.camAngle * 0.3) * 3;
      KI.camera.lookAt(0, 1, 0);

      // water shimmer
      water.material.opacity = 0.35 + Math.sin(t * 0.3) * 0.05;

      // fireflies
      for (let i = 0; i < fireflyCount; i++) {
        const fd = ffData[i];
        ffPos[i*3] = fd.baseX + Math.sin(t * fd.speed + fd.phase) * fd.wanderR;
        ffPos[i*3+1] = fd.baseY + Math.sin(t * fd.speed * 0.7 + fd.phase * 2) * 0.5;
        ffPos[i*3+2] = fd.baseZ + Math.cos(t * fd.speed * 0.8 + fd.phase) * fd.wanderR;
        // brightness pulse
        const bright = 0.3 + Math.sin(t * 2 + fd.phase * 3) * 0.3;
        ffCol[i*3] *= (1 + bright * 0.01);
      }
      fireflies.geometry.attributes.position.needsUpdate = true;
      ffMat.opacity = 0.4 + Math.sin(t * 0.5) * 0.2;

      // ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i]; r.life -= dt;
        r.mesh.scale.multiplyScalar(1 + dt * 3);
        r.mesh.material.opacity = Math.max(0, r.life / 3 * 0.4);
        if (r.life <= 0) { KI.scene.remove(r.mesh); ripples.splice(i, 1); }
      }

      // trail particles
      for (let i = trailParticles.length - 1; i >= 0; i--) {
        const tp = trailParticles[i]; tp.life -= dt;
        tp.mesh.position.y += tp.vy;
        tp.mesh.position.x += tp.vx;
        tp.mesh.position.z += tp.vz;
        tp.mesh.material.opacity = Math.max(0, tp.life / 2 * 0.5);
        tp.mesh.scale.multiplyScalar(1 - dt * 0.1);
        if (tp.life <= 0) { KI.scene.remove(tp.mesh); trailParticles.splice(i, 1); }
      }

      // star twinkle
      if (KI._scene.starMat) KI._scene.starMat.uniforms.uTime.value = t;
    };
  }

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;

    garden.growthCooldown = Math.max(0, garden.growthCooldown - dt);

    KI.runUpdates(dt, t);
    broadcastZen(dt);
    updateBreathGuide(dt);

    // animate structures
    garden.structures.forEach(s => {
      // grow in
      if (s.currentScale < s.growTarget) {
        s.currentScale += (s.growTarget - s.currentScale) * 0.03;
        s.mesh.scale.setScalar(s.currentScale);
      }
      // gentle float/sway
      const age = (performance.now() - s.born) * 0.001;
      s.mesh.position.y += Math.sin(age * s.floatSpeed + s.floatOffset) * s.floatAmp * dt;
      if (s.type === 'orb') {
        s.mesh.position.x += Math.sin(age * 0.3 + s.floatOffset) * 0.003;
        s.mesh.position.z += Math.cos(age * 0.2 + s.floatOffset) * 0.003;
      }
      s.mesh.rotation.y += dt * 0.1;
    });

    KI.renderer.render(KI.scene, KI.camera);
  })();

  console.log('%c AUDIOFABRIC ZEN GARDEN ', 'background:#040810;color:#0ff;font-size:18px;padding:8px');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
