<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFabric — Zen Garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040810;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

#topBar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.4);border-bottom:1px solid #0ff1}
#gardenName{font-size:14px;color:#0ff;letter-spacing:3px;opacity:0.6}
#gardenInfo{font-size:10px;color:#0884}

/* Breath guide */
#breathGuide{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:55;
  text-align:center;pointer-events:none;opacity:0.6}
#breathCircle{width:80px;height:80px;border:2px solid #0ff3;border-radius:50%;
  margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  transition:all 1s ease-in-out}
#breathCircle.expand{width:120px;height:120px;border-color:#0f06}
#breathText{font-size:10px;color:#0ff6;letter-spacing:3px}
#breathKanji{font-size:28px;opacity:0.4;transition:opacity 0.5s}

/* Growth stats */
#growthStats{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0.5}
.gs-row{font-size:10px;margin:4px 0;display:flex;gap:8px;align-items:center}
.gs-dot{width:6px;height:6px;border-radius:50%}
.gs-label{color:#fff6}
.gs-val{color:#0ff;font-variant-numeric:tabular-nums}

/* Presence list */
#zenPresence{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0.4}
.zp-row{font-size:9px;margin:3px 0;display:flex;align-items:center;gap:6px}
.zp-dot{width:5px;height:5px;border-radius:50%;background:#0f0}
.zp-name{color:#0ff8}

#bottomBar{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:center;gap:12px;padding:10px;background:rgba(0,0,0,0.5);border-top:1px solid #0ff1}
.zen-btn{background:#0001;border:1px solid #0ff2;color:#0ff8;padding:8px 18px;
  cursor:pointer;font-size:10px;font-family:monospace;border-radius:20px;letter-spacing:2px}
.zen-btn:hover{background:#0ff1}

#version{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:45;
  font-size:8px;color:#111;letter-spacing:3px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="topBar">
  <span id="gardenName">ZEN GARDEN</span>
  <span id="gardenInfo"></span>
</div>

<div id="breathGuide">
  <div id="breathCircle"><span id="breathKanji">気</span></div>
  <div id="breathText">BREATHE</div>
</div>

<div id="growthStats">
  <div class="gs-row"><div class="gs-dot" style="background:#44ffaa"></div><span class="gs-label">crystals</span><span class="gs-val" id="gsCrystals">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#44aaff"></div><span class="gs-label">flowers</span><span class="gs-val" id="gsFlowers">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#aa44ff"></div><span class="gs-label">pillars</span><span class="gs-val" id="gsPillars">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#ffaa44"></div><span class="gs-label">orbs</span><span class="gs-val" id="gsOrbs">0</span></div>
  <div class="gs-row"><div class="gs-dot" style="background:#fff"></div><span class="gs-label">depth</span><span class="gs-val" id="gsDepth">0</span></div>
</div>

<div id="zenPresence"></div>

<div id="bottomBar">
  <button class="zen-btn" onclick="copyLink()">INVITE</button>
  <button class="zen-btn" onclick="resetGarden()">CLEAR GARDEN</button>
</div>
<div id="peers" style="display:none"></div>
<div id="lbRows" style="display:none"></div>
<div id="version">AUDIOFABRIC ZEN GARDEN</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
// ============================================================
// AUDIOFABRIC — ZEN GARDEN
// A meditative P2P space. Sustained tones grow structures:
//  ah (fire) -> warm crystal spires
//  ee (lightning) -> electric flower blooms
//  oh (spirit) -> floating light orbs
//  oo (water) -> fluid pillars
//  eh (wind) -> drifting petal clouds
//  mm (earth) -> ground stone formations
//
// Deeper resonance layers grow taller/larger structures.
// All participants' growths are shared and persistent in the scene.
// ============================================================

import { KI } from './modules/core.js';
import * as Scene from './modules/hd-scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as Kanji from './modules/kanji.js';
import * as Resonance from './modules/resonance.js';
import * as ResonanceSynths from './modules/resonance-synths.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Chat from './modules/chat.js';

const urlParams = new URLSearchParams(location.search);
const ROOM = urlParams.get('room') || 'ZEN-' + Math.random().toString(36).slice(2,6).toUpperCase();
if (!urlParams.has('room')) history.replaceState(null, '', '?room=' + ROOM);

KI.player.name = localStorage.getItem('zen_nick') || KI.genHash();
const savedNick = localStorage.getItem('zen_nick');
if (!savedNick) {
  const n = prompt('Name:', KI.player.name);
  if (n?.trim()) { KI.player.name = n.trim().slice(0,16); localStorage.setItem('zen_nick', KI.player.name); }
}

window.copyLink = () => navigator.clipboard.writeText(location.href);

// === GARDEN STATE ===
const garden = {
  structures: [],     // { mesh, type, growthTarget, currentScale, color, vowel, layer }
  crystals: 0,
  flowers: 0,
  pillars: 0,
  orbs: 0,
  totalDepth: 0,
  maxStructures: 200,
  growthCooldown: 0
};

// === STRUCTURE GENERATORS ===
function growStructure(vowel, layer, position) {
  const scene = KI.scene;
  if (!scene || garden.structures.length >= garden.maxStructures) return;
  if (garden.growthCooldown > 0) return;
  garden.growthCooldown = 0.8 - layer * 0.1; // deeper layers grow faster

  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[vowel] || KANJI['mm'];
  const ld = Resonance.LAYERS[Math.max(0, layer)];
  const layerScale = 1 + layer * 0.4;

  let mesh, type;
  const pos = position || randomGardenPos();

  switch (vowel) {
    case 'ah': { // crystal spire
      type = 'crystal';
      const h = 0.5 + layer * 0.6;
      const geo = new THREE.ConeGeometry(0.15 * layerScale, h * layerScale, 6);
      const mat = new THREE.MeshBasicMaterial({
        color: kj.hex, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending, depthWrite: false
      });
      mesh = new THREE.Mesh(geo, mat);
      // add inner glow
      const ig = new THREE.ConeGeometry(0.08 * layerScale, h * layerScale * 0.8, 6);
      const im = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2,
        blending: THREE.AdditiveBlending, depthWrite: false });
      mesh.add(new THREE.Mesh(ig, im));
      garden.crystals++;
      break;
    }
    case 'ee': { // electric flower
      type = 'flower';
      const group = new THREE.Group();
      // petals
      for (let p = 0; p < 5 + layer; p++) {
        const a = (p / (5 + layer)) * Math.PI * 2;
        const pg = new THREE.SphereGeometry(0.1 * layerScale, 8, 8);
        pg.scale(1, 0.3, 1);
        const pm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.5,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const petal = new THREE.Mesh(pg, pm);
        petal.position.set(Math.cos(a) * 0.2 * layerScale, 0.3, Math.sin(a) * 0.2 * layerScale);
        petal.rotation.z = a;
        group.add(petal);
      }
      // stem
      const sg = new THREE.CylinderGeometry(0.02, 0.02, 0.3 + layer * 0.15, 4);
      const sm = new THREE.MeshBasicMaterial({ color: 0x226622, transparent: true, opacity: 0.4 });
      group.add(new THREE.Mesh(sg, sm));
      mesh = group;
      garden.flowers++;
      break;
    }
    case 'oh': { // floating orb
      type = 'orb';
      const group = new THREE.Group();
      const og = new THREE.SphereGeometry(0.15 * layerScale, 16, 16);
      const om = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.4,
        blending: THREE.AdditiveBlending, depthWrite: false });
      group.add(new THREE.Mesh(og, om));
      // halo ring
      const rg = new THREE.TorusGeometry(0.25 * layerScale, 0.01, 8, 32);
      const rm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.3,
        blending: THREE.AdditiveBlending, depthWrite: false });
      const ring = new THREE.Mesh(rg, rm);
      ring.rotation.x = Math.PI / 2;
      group.add(ring);
      mesh = group;
      pos.y = 1 + layer * 0.5 + Math.random() * 2;
      garden.orbs++;
      break;
    }
    case 'oo': { // fluid pillar
      type = 'pillar';
      const h = 0.4 + layer * 0.5;
      const geo = new THREE.CylinderGeometry(0.08 * layerScale, 0.12 * layerScale, h * layerScale, 8);
      const mat = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.5,
        blending: THREE.AdditiveBlending, depthWrite: false });
      mesh = new THREE.Mesh(geo, mat);
      garden.pillars++;
      break;
    }
    case 'eh': { // wind petal cloud
      type = 'flower';
      const group = new THREE.Group();
      for (let p = 0; p < 3 + layer * 2; p++) {
        const pg = new THREE.SphereGeometry(0.06 + Math.random()*0.06, 6, 6);
        const pm = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.3,
          blending: THREE.AdditiveBlending, depthWrite: false });
        const petal = new THREE.Mesh(pg, pm);
        petal.position.set((Math.random()-0.5)*0.5, Math.random()*0.3, (Math.random()-0.5)*0.5);
        group.add(petal);
      }
      mesh = group;
      pos.y = 0.5 + Math.random() * 2;
      garden.flowers++;
      break;
    }
    default: { // earth stone
      type = 'crystal';
      const geo = new THREE.DodecahedronGeometry(0.12 * layerScale, 0);
      const mat = new THREE.MeshBasicMaterial({ color: kj.hex, transparent: true, opacity: 0.5,
        blending: THREE.AdditiveBlending, depthWrite: false });
      mesh = new THREE.Mesh(geo, mat);
      garden.crystals++;
    }
  }

  mesh.position.copy(pos);
  mesh.scale.setScalar(0.01); // start tiny, grow in
  scene.add(mesh);

  const growTarget = layerScale * (0.5 + Math.random() * 0.5);
  garden.structures.push({
    mesh, type, growTarget, currentScale: 0.01,
    color: kj.hex, vowel, layer, born: performance.now(),
    floatOffset: Math.random() * Math.PI * 2,
    floatSpeed: 0.3 + Math.random() * 0.5,
    floatAmp: type === 'orb' ? 0.3 : 0.02
  });

  garden.totalDepth += layer + 1;
  updateStats();

  // broadcast growth
  KI.emit('broadcast', {
    type: 'zen-grow',
    name: KI.player.name,
    vowel, layer,
    x: pos.x, y: pos.y, z: pos.z
  });
}

function randomGardenPos() {
  const angle = Math.random() * Math.PI * 2;
  const r = 1 + Math.random() * 14;
  return new THREE.Vector3(Math.cos(angle) * r, 0.1, Math.sin(angle) * r);
}

function updateStats() {
  document.getElementById('gsCrystals').textContent = garden.crystals;
  document.getElementById('gsFlowers').textContent = garden.flowers;
  document.getElementById('gsPillars').textContent = garden.pillars;
  document.getElementById('gsOrbs').textContent = garden.orbs;
  document.getElementById('gsDepth').textContent = garden.totalDepth;
  document.getElementById('gardenInfo').textContent =
    garden.structures.length + ' growths | depth ' + garden.totalDepth;
}

window.resetGarden = () => {
  garden.structures.forEach(s => KI.scene?.remove(s.mesh));
  garden.structures.length = 0;
  garden.crystals = garden.flowers = garden.pillars = garden.orbs = garden.totalDepth = 0;
  updateStats();
};

// === RESONANCE -> GROWTH ===
KI.on('resonance:layerUp', data => {
  if (data.layer >= 1) { // only grow at layer 1+
    growStructure(data.vowel || KI.voice.vowel || 'mm', data.layer, null);
  }
});

KI.on('resonance:release', data => {
  // final growth burst on release
  if (data.layer >= 0) {
    for (let i = 0; i <= data.layer; i++) {
      setTimeout(() => growStructure(data.vowel || 'mm', data.layer, null), i * 200);
    }
  }
});

// === REMOTE GROWTHS ===
KI.on('rtc:data', d => {
  if (d.type === 'zen-grow' && d.name !== KI.player.name) {
    growStructure(d.vowel, d.layer, new THREE.Vector3(d.x, d.y, d.z));
  }
});

// === BREATH GUIDE ===
let breathPhase = 'in', breathTimer = 0;
const BREATH_IN = 4, BREATH_HOLD = 2, BREATH_OUT = 6;
function updateBreathGuide(dt) {
  breathTimer += dt;
  const circle = document.getElementById('breathCircle');
  const text = document.getElementById('breathText');
  const kanji = document.getElementById('breathKanji');

  if (breathPhase === 'in') {
    circle.classList.add('expand');
    text.textContent = 'BREATHE IN';
    kanji.textContent = '吸'; // inhale
    kanji.style.opacity = 0.3 + (breathTimer / BREATH_IN) * 0.5;
    if (breathTimer >= BREATH_IN) { breathPhase = 'hold'; breathTimer = 0; }
  } else if (breathPhase === 'hold') {
    text.textContent = 'HOLD';
    kanji.textContent = '止'; // stop
    kanji.style.opacity = 0.8;
    if (breathTimer >= BREATH_HOLD) { breathPhase = 'out'; breathTimer = 0; }
  } else {
    circle.classList.remove('expand');
    text.textContent = 'BREATHE OUT';
    kanji.textContent = '吐'; // exhale
    kanji.style.opacity = 0.8 - (breathTimer / BREATH_OUT) * 0.5;
    if (breathTimer >= BREATH_OUT) { breathPhase = 'in'; breathTimer = 0; }
  }
}

// === PRESENCE ===
const zenPeers = {};
function updateZenPresence(data) {
  if (!data.name || data.name === KI.player.name) return;
  zenPeers[data.name] = { lastSeen: Date.now(), sounding: data.sounding };
  renderPresence();
}
function renderPresence() {
  const cont = document.getElementById('zenPresence');
  let html = '';
  Object.keys(zenPeers).forEach(name => {
    const p = zenPeers[name];
    if (Date.now() - p.lastSeen > 15000) return;
    const dotColor = p.sounding ? '#0f0' : '#555';
    html += `<div class="zp-row"><div class="zp-dot" style="background:${dotColor}"></div><span class="zp-name">${escHtml(name)}</span></div>`;
  });
  cont.innerHTML = html;
}

KI.on('rtc:data', d => { if (d.type === 'state') updateZenPresence(d); });
KI.on('remote:state', updateZenPresence);

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// === BROADCAST ===
let bTimer = 0;
function broadcastZen(dt) {
  bTimer += dt;
  if (bTimer < 0.2) return;
  bTimer = 0;
  const res = KI.get('resonance');
  KI.emit('broadcast', {
    type: 'state', name: KI.player.name,
    energy: KI.voice.energy, vowel: KI.voice.vowel,
    layer: res ? res.state.activeLayer : -1,
    sounding: KI.voice.sounding
  });
}

// === BOOT ===
async function boot() {
  document.getElementById('gardenName').textContent = 'GARDEN: ' + ROOM;

  Scene.init({ stars: 8000, fogColor: 0x040810, fogDensity: 0.004 });

  // softer camera for zen
  if (KI.camera) {
    KI.camera.position.set(0, 6, 16);
    KI.camera.lookAt(0, 1, 0);
  }

  Kanji.init();
  Resonance.init();
  ResonanceSynths.init();

  try { await VoiceEngine.init(); } catch(e) { console.warn('Mic:', e); }

  MqttNet.init({ room: 'ZEN-' + ROOM });
  WebRTCNet.init({ room: 'ZEN-' + ROOM });
  Chat.init();

  // override scene update for slower, calmer camera
  const sceneUpdate = KI.get('scene')?.update;
  if (sceneUpdate) {
    const origUpdate = sceneUpdate;
    KI.get('scene').update = function(dt, t) {
      // slow orbit
      KI._scene.camAngle += 0.0008;
      KI.camera.position.x = Math.sin(KI._scene.camAngle) * 3;
      KI.camera.position.y = 5 + Math.sin(KI._scene.camAngle * 0.3) * 0.5;
      KI.camera.position.z = 14 + Math.cos(KI._scene.camAngle * 0.5) * 2;
      KI.camera.lookAt(0, 1.5, 0);
    };
  }

  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;

    garden.growthCooldown = Math.max(0, garden.growthCooldown - dt);

    KI.runUpdates(dt, t);
    broadcastZen(dt);
    updateBreathGuide(dt);

    // animate structures
    garden.structures.forEach(s => {
      // grow in
      if (s.currentScale < s.growTarget) {
        s.currentScale += (s.growTarget - s.currentScale) * 0.03;
        s.mesh.scale.setScalar(s.currentScale);
      }
      // gentle float/sway
      const age = (performance.now() - s.born) * 0.001;
      s.mesh.position.y += Math.sin(age * s.floatSpeed + s.floatOffset) * s.floatAmp * dt;
      if (s.type === 'orb') {
        s.mesh.position.x += Math.sin(age * 0.3 + s.floatOffset) * 0.003;
        s.mesh.position.z += Math.cos(age * 0.2 + s.floatOffset) * 0.003;
      }
      s.mesh.rotation.y += dt * 0.1;
    });

    KI.renderer.render(KI.scene, KI.camera);
  })();

  console.log('%c AUDIOFABRIC ZEN GARDEN ', 'background:#040810;color:#0ff;font-size:18px;padding:8px');
}

window.addEventListener('load', boot);
</script>
</body>
</html>
