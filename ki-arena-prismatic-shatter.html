<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena — Prismatic Shatter</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
/* Shatter meter */
#shatterMeter{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:55;
  width:200px;pointer-events:none;text-align:center}
#shatterBar{width:100%;height:6px;background:#111;border-radius:3px;overflow:hidden}
#shatterFill{height:100%;width:0%;border-radius:3px;transition:width 0.1s;
  background:linear-gradient(90deg,#4af,#f4f,#fa4)}
#shatterLabel{font-size:9px;color:#666;margin-top:2px}
#shatterPct{font-size:18px;color:#aef;text-shadow:0 0 10px #48f}
/* Pattern name */
#patternName{font-size:12px;color:#f4f;text-transform:uppercase;letter-spacing:2px}
#shardInfo{font-size:10px;color:#888}
/* Crack flash overlay */
#crackFlash{position:fixed;inset:0;z-index:44;pointer-events:none;opacity:0;
  background:radial-gradient(circle,rgba(170,220,255,0.15),transparent 50%);transition:opacity 0.2s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-l">
    <div style="font-size:10px;color:#555;letter-spacing:2px">PRISMATIC SHATTER</div>
    <div id="patternName">radial</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()"></div>
    <div id="shardInfo"></div>
  </div>
</div>
<div id="shatterMeter">
  <div id="shatterPct">0%</div>
  <div id="shatterBar"><div id="shatterFill"></div></div>
  <div id="shatterLabel">SHATTER</div>
</div>
<div id="crackFlash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
import { KI } from './modules/core.js';
import * as Scene from './modules/scene.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as FreqBands from './modules/freq-bands-12.js';
import * as Synths from './modules/synths.js';
import * as Resonance from './modules/resonance.js';
import * as PrismaticShatter from './modules/prismatic-shatter.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';
import * as Chat from './modules/chat.js';
import * as PlayerProfile from './modules/player-profile.js';
import * as NavOverlay from './modules/nav-overlay.js';

const ROOM = 'PRISM-' + Math.random().toString(36).slice(2, 6).toUpperCase();
KI.player.name = KI.genHash();
document.getElementById('nick').textContent = KI.player.name;
window.changeNick = function() {
  const n = prompt('Nickname:', KI.player.name);
  if (n && n.trim()) { KI.player.name = n.trim().slice(0,16); document.getElementById('nick').textContent = KI.player.name; }
};

let prevShatter = 0;
KI.on('prismatic-shatter:update', data => {
  const pct = parseInt(data.shatterAmount);
  document.getElementById('shatterPct').textContent = pct + '%';
  document.getElementById('shatterFill').style.width = pct + '%';
  document.getElementById('patternName').textContent = data.pattern;
  document.getElementById('shardInfo').textContent = data.shardCount + ' shards / ' + data.beamCount + ' beams';
  // Flash on big shatter changes
  if (pct > prevShatter + 15) {
    const flash = document.getElementById('crackFlash');
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 200);
  }
  prevShatter = pct;
});

async function boot() {
  document.getElementById('hud').classList.add('on');
  Scene.init({ stars: 1200 });
  try { await VoiceEngine.init(); } catch(e) { console.warn('voice:', e); }
  FreqBands.init(); Synths.init(); Resonance.init();
  PrismaticShatter.init({ position: [0, 2.5, -3.5] });
  MqttNet.init({ room: ROOM }); WebRTCNet.init({ room: ROOM });
  Presence.init(); Chat.init(); PlayerProfile.init(); NavOverlay.init();
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return; requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t); KI.renderer.render(KI.scene, KI.camera);
  })();
  console.log('%c PRISMATIC SHATTER BOOTED ', 'background:#000;color:#aef;font-size:22px;padding:12px');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
