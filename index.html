<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFabric — Hub</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
body{overflow-y:auto;overflow-x:hidden;cursor:default}
canvas#c{position:fixed;z-index:0;pointer-events:none}
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0.4) 70%,transparent);pointer-events:none}
#header *{pointer-events:auto}
#logo{font-size:18px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,#0ff,#f0f,#ff0,#0f8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:300% 100%;animation:logoShift 8s ease infinite}
@keyframes logoShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
#logo-sub{font-size:9px;color:#666;letter-spacing:2px;margin-top:2px}
#main{position:relative;z-index:10;padding:80px 24px 40px;max-width:1200px;margin:0 auto}
#voice-prompt{text-align:center;margin:20px 0 30px;opacity:0;animation:afFadeIn 1s 0.5s forwards}
#voice-prompt p{font-size:11px;color:#555;letter-spacing:2px}
#voice-level{width:200px;height:3px;background:#111;border-radius:2px;margin:8px auto 0;overflow:hidden}
#voice-fill{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#0f8);border-radius:2px;transition:width 0.1s}
#search-bar{position:relative;margin:0 auto 30px;max-width:400px}
#search{width:100%;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:8px;padding:10px 16px 10px 36px;color:#fff;font-family:inherit;font-size:12px;outline:none;transition:border-color 0.3s}
#search:focus{border-color:#0ff4}
#search::placeholder{color:#444}
#search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#444;pointer-events:none}
.cat-section{margin-bottom:36px;opacity:0;animation:afFadeIn 0.6s ease forwards}
.cat-title{font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #222}
.cat-count{font-size:9px;color:#444;margin-left:8px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.cat-card{position:relative;background:rgba(255,255,255,0.02);border:1px solid #1a1a2e;border-radius:10px;padding:16px;cursor:pointer;transition:all 0.3s;overflow:hidden}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;opacity:0.6;transition:opacity 0.3s}
.cat-card:hover{border-color:#fff2;transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,255,255,0.1)}
.cat-card:hover::before{opacity:1}
.cat-card .card-name{font-size:14px;font-weight:bold;margin-bottom:4px}
.cat-card .card-desc{font-size:10px;color:#666;line-height:1.4}
.cat-card .card-count{position:absolute;top:12px;right:12px;font-size:9px;color:#555}
#status-bar{position:fixed;bottom:40px;left:0;right:0;z-index:90;padding:0 24px;pointer-events:none}
#status-inner{max-width:1200px;margin:0 auto;display:flex;gap:20px;font-size:9px;color:#555;justify-content:center}
.status-item{display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#0f8;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
#cli-toggle{position:fixed;bottom:8px;right:24px;z-index:200;font-size:10px;color:#444;cursor:pointer;letter-spacing:2px;pointer-events:auto}
#cli-toggle:hover{color:#0ff}
#cli-panel{position:fixed;bottom:0;left:0;right:0;z-index:150;max-height:0;overflow:hidden;transition:max-height 0.3s;background:rgba(0,0,0,0.95);border-top:1px solid #222}
#cli-panel.open{max-height:300px}
#cli-output{padding:12px 20px;font-size:11px;color:#888;max-height:240px;overflow-y:auto;white-space:pre-wrap;line-height:1.6}
#cli-output .cmd{color:#0ff}
#cli-output .ok{color:#0f8}
#cli-output .err{color:#f44}
#cli-output .dir{color:#ff0}
#cli-input-row{display:flex;align-items:center;padding:4px 20px 8px;gap:6px}
#cli-prompt{color:#0f8;font-size:11px}
#cli-input{flex:1;background:none;border:none;color:#fff;font-family:inherit;font-size:11px;outline:none}
#footer{position:relative;z-index:10;text-align:center;padding:40px 20px 80px;border-top:1px solid #111;margin-top:20px}
#footer p{font-size:9px;color:#333;letter-spacing:2px}
</style>
</head>

// Build category grid
const container = document.getElementById('categories');
function buildGrid(filter) {
  container.innerHTML = '';
  const q = (filter || '').toLowerCase();
  for (const [dir, cat] of Object.entries(MANIFEST)) {
    let files = cat.files;
    if (q) files = files.filter(f => f.n.toLowerCase().includes(q) || f.d.toLowerCase().includes(q) || cat.label.toLowerCase().includes(q));
    if (files.length === 0) continue;
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.innerHTML = '<div class="cat-title" style="color:'+cat.color+'">'+cat.icon+' '+cat.label+'<span class="cat-count">'+files.length+'</span></div>';
    const grid = document.createElement('div');
    grid.className = 'cat-grid';
    for (const file of files) {
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.innerHTML = '<div style="position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;background:'+cat.color+';opacity:0.5"></div><div class="card-name" style="color:'+cat.color+'">'+file.n+'</div><div class="card-desc">'+file.d+'</div>';
      card.onclick = () => { document.body.style.opacity='0'; document.body.style.transition='opacity 0.3s'; setTimeout(()=>{location.href=dir+'/'+file.f;},300); };
      card.onmouseenter = () => { card.style.borderColor=cat.color+'44'; card.style.boxShadow='0 4px 20px '+cat.color+'22'; };
      card.onmouseleave = () => { card.style.borderColor='#1a1a2e'; card.style.boxShadow='none'; };
      grid.appendChild(card);
    }
    section.appendChild(grid);
    container.appendChild(section);
  }
}

// ── CLI ──
window.toggleCli = function() {
  document.getElementById('cli-panel').classList.toggle('open');
  if (document.getElementById('cli-panel').classList.contains('open'))
    document.getElementById('cli-input').focus();
};
const cliOut = document.getElementById('cli-output');
function cliPrint(text, cls) {
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = text + '\n';
  cliOut.appendChild(span);
  cliOut.scrollTop = cliOut.scrollHeight;
}
cliPrint('AudioFabric CLI v1.0 — type "help" for commands', 'ok');

document.getElementById('cli-input').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const raw = e.target.value.trim();
  e.target.value = '';
  if (!raw) return;
  cliPrint('> ' + raw, 'cmd');
  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ');
  switch(cmd) {
    case 'help':
      cliPrint('  ls              List all categories');
      cliPrint('  ls <dir>        List files in category');
      cliPrint('  cd <dir>        Navigate to category');
      cliPrint('  open <file>     Open experience');
      cliPrint('  search <query>  Search experiences');
      cliPrint('  tree            Full directory tree');
      cliPrint('  status          ASS-OS status');
      cliPrint('  whoami          Player info');
      cliPrint('  clear           Clear terminal');
      break;
    case 'ls':
      if (!arg) {
        for (const [dir, cat] of Object.entries(MANIFEST))
          cliPrint('  ' + dir.padEnd(14) + cat.label + ' (' + cat.files.length + ')', 'dir');
      } else {
        const cat = MANIFEST[arg];
        if (!cat) { cliPrint('  unknown category: ' + arg, 'err'); break; }
        cliPrint('  ' + cat.icon + ' ' + cat.label + ':', 'dir');
        for (const f of cat.files) cliPrint('    ' + f.f.padEnd(40) + f.n);
      }
      break;
    case 'cd':
      if (!arg) { cliPrint('  usage: cd <dir>', 'err'); break; }
      if (MANIFEST[arg]) { location.href = arg + '/'; }
      else { cliPrint('  unknown category: ' + arg, 'err'); }
      break;
    case 'open': {
      if (!arg) { cliPrint('  usage: open <file>', 'err'); break; }
      let found = null;
      for (const [dir, cat] of Object.entries(MANIFEST))
        for (const f of cat.files)
          if (f.f === arg || f.f.includes(arg) || f.n.toLowerCase().includes(arg.toLowerCase()))
            { found = dir + '/' + f.f; break; }
      if (found) { cliPrint('  opening ' + found + '...', 'ok'); setTimeout(()=>{location.href=found;},500); }
      else cliPrint('  not found: ' + arg, 'err');
      break;
    }
    case 'search': {
      if (!arg) { cliPrint('  usage: search <query>', 'err'); break; }
      const q = arg.toLowerCase();
      let count = 0;
      for (const [dir, cat] of Object.entries(MANIFEST))
        for (const f of cat.files)
          if (f.n.toLowerCase().includes(q) || f.d.toLowerCase().includes(q))
            { cliPrint('  ' + dir + '/' + f.f + '  — ' + f.n, 'ok'); count++; }
      if (!count) cliPrint('  no results for: ' + arg, 'err');
      else cliPrint('  ' + count + ' result(s)', '');
      break;
    }
    case 'tree':
      for (const [dir, cat] of Object.entries(MANIFEST)) {
        cliPrint('  ' + dir + '/', 'dir');
        for (const f of cat.files) cliPrint('    ' + f.f);
      }
      break;
    case 'status':
      cliPrint('  ASS-OS STATUS', 'ok');
      cliPrint('  State:         IDLE');
      cliPrint('  Consciousness: L0 — Reactive');
      cliPrint('  Faults:        0 active');
      cliPrint('  Goals:         0 pending');
      cliPrint('  Uptime:        ' + Math.floor(performance.now()/1000) + 's');
      cliPrint('  Experiences:   ' + totalCount + ' loaded');
      break;
    case 'whoami':
      cliPrint('  Player: ANON', 'ok');
      cliPrint('  Score:  0');
      break;
    case 'clear':
      cliOut.innerHTML = '';
      break;
    default:
      cliPrint('  unknown command: ' + cmd + ' (type "help")', 'err');
  }
});

// Keyboard shortcut: backtick toggles CLI
document.addEventListener('keydown', (e) => { if (e.key === '`') { e.preventDefault(); toggleCli(); } });

// ── Boot ──
async function boot() {
  Scene.init({ stars: 2000 });
  try { await VoiceEngine.init(); } catch(e) {}
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    const energy = KI.voice.energy || KI.voice.rms || 0;
    const fill = document.getElementById('voice-fill');
    if (fill) fill.style.width = (energy * 100) + '%';
    if (energy > 0.1) {
      const hue = (t * 20) % 360;
      document.body.style.background = 'radial-gradient(ellipse at 50% 30%, hsla('+hue+',80%,5%,1) 0%, #000 70%)';
    }
    KI.renderer.render(KI.scene, KI.camera);
  })();
}
window.addEventListener('load', boot);
</script>
