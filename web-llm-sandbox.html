<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WebLLM Sandbox — Voice-Powered Code Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--panel:#111120;--border:#2a2a3a;--accent:#44aaff;
  --green:#44ff88;--orange:#ffaa22;--red:#ff4444;--purple:#aa88ff;
  --text:#dde;--dim:#667;--glow:rgba(68,170,255,.15);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px}

/* ─── Top Bar ─── */
#topbar{height:38px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:12px;z-index:100}
#topbar .logo{color:var(--accent);font-weight:bold;font-size:14px;letter-spacing:1px}
#topbar .repo-name{color:var(--green);font-size:12px}
#topbar .branch{color:var(--orange);font-size:11px;background:#1a1a0a;padding:2px 8px;border-radius:3px}
#topbar .status{margin-left:auto;font-size:11px;color:var(--dim)}
#topbar button{background:#222238;color:var(--text);border:1px solid var(--border);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
#topbar button:hover{border-color:var(--accent);color:var(--accent)}

/* ─── Grid Layout ─── */
#grid{display:grid;grid-template-columns:220px 1fr 340px;grid-template-rows:1fr 1fr;height:calc(100vh - 38px);gap:1px;background:var(--border)}
#file-panel{grid-row:1/3;background:var(--panel);overflow:hidden;display:flex;flex-direction:column}
#preview-area{grid-row:1/2;background:#0d0d18;position:relative;overflow:hidden}
#tool-viz{grid-row:2/2;background:var(--panel);overflow:hidden;display:flex;flex-direction:column}
#chat-panel{grid-row:1/3;background:var(--panel);display:flex;flex-direction:column;overflow:hidden}

/* ─── File Explorer ─── */
#file-panel .panel-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between}
#file-list{flex:1;overflow-y:auto;padding:4px 0}
.file-entry{padding:5px 10px 5px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;border-left:2px solid transparent}
.file-entry:hover{background:rgba(68,170,255,.08)}
.file-entry.active{background:rgba(68,170,255,.12);border-left-color:var(--accent)}
.file-entry .icon{font-size:10px;width:14px;text-align:center}
.file-entry .icon.html{color:#ff6644}
.file-entry .icon.css{color:#44aaff}
.file-entry .icon.js{color:#ffdd44}
.file-entry .icon.other{color:#888}
.file-entry .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-entry .size{color:var(--dim);font-size:10px}

/* Commit Log */
#commit-section{border-top:1px solid var(--border);max-height:180px;overflow-y:auto}
#commit-section .panel-header{padding:6px 10px;font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:1px}
.commit-entry{padding:4px 10px;font-size:11px;border-left:2px solid var(--border);margin-left:8px}
.commit-entry .cid{color:var(--orange);font-size:10px}
.commit-entry .cmsg{color:var(--dim)}

/* ─── Preview Area ─── */
#preview-area .panel-header{position:absolute;top:0;left:0;right:0;height:30px;background:rgba(17,17,32,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;z-index:5;font-size:11px;gap:8px}
#preview-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.preview-tab{padding:4px 10px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;font-size:11px;white-space:nowrap}
.preview-tab:hover{color:var(--text)}
.preview-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#iframe-container{position:absolute;top:30px;left:0;right:0;bottom:0}
#iframe-container iframe{width:100%;height:100%;border:none;background:#fff}
#no-preview{position:absolute;top:30px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;flex-direction:column;gap:8px}
#no-preview .hint{font-size:11px;color:#445}

/* ─── Tool Visualization ─── */
#tool-viz .panel-header{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;color:var(--purple);text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
#tool-log{flex:1;overflow-y:auto;padding:4px 0}
.tool-entry{padding:6px 10px;border-bottom:1px solid rgba(42,42,58,.5);font-size:11px}
.tool-entry .tool-name{color:var(--purple);font-weight:bold}
.tool-entry .tool-args{color:var(--dim);font-size:10px;margin-top:2px;word-break:break-all;max-height:40px;overflow:hidden}
.tool-entry .tool-result{margin-top:3px;font-size:10px}
.tool-entry .tool-result.ok{color:var(--green)}
.tool-entry .tool-result.err{color:var(--red)}
.tool-entry .tool-time{float:right;color:#445;font-size:9px}

/* ─── Chat Panel ─── */
#chat-panel .panel-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
#emotion-bar{display:flex;gap:3px;margin-left:auto}
.emo-dot{width:8px;height:8px;border-radius:50%;opacity:.3;transition:opacity .3s}
.emo-dot.active{opacity:1;box-shadow:0 0 6px currentColor}
#chat-messages{flex:1;overflow-y:auto;padding:8px}
.msg{padding:6px 10px;margin-bottom:6px;border-radius:6px;font-size:12px;line-height:1.5;max-width:95%}
.msg.user{background:rgba(68,170,255,.1);border:1px solid rgba(68,170,255,.2);margin-left:20px}
.msg.ai{background:rgba(68,255,136,.06);border:1px solid rgba(68,255,136,.15)}
.msg.system{background:rgba(170,136,255,.08);border:1px solid rgba(170,136,255,.15);font-size:11px;color:var(--dim)}
.msg .sender{font-size:10px;color:var(--dim);margin-bottom:2px}
.msg .emo-tag{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px}
.msg code{background:rgba(255,255,255,.08);padding:1px 4px;border-radius:2px;font-size:11px}
.msg pre{background:rgba(0,0,0,.3);padding:6px;border-radius:4px;margin:4px 0;overflow-x:auto;font-size:11px}
.msg .tool-badge{display:inline-block;background:rgba(170,136,255,.15);color:var(--purple);padding:1px 6px;border-radius:3px;font-size:10px;margin:2px 0}

/* Chat Input */
#chat-input-area{border-top:1px solid var(--border);padding:8px}
#chat-input-row{display:flex;gap:6px}
#chat-input{flex:1;background:#0a0a16;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:inherit;font-size:12px;resize:none;height:60px}
#chat-input:focus{outline:none;border-color:var(--accent)}
#chat-btns{display:flex;flex-direction:column;gap:4px}
#chat-btns button{width:36px;height:28px;border:1px solid var(--border);background:#1a1a2a;color:var(--text);border-radius:4px;cursor:pointer;font-size:12px}
#chat-btns button:hover{border-color:var(--accent);color:var(--accent)}
#chat-btns button.active{background:var(--accent);color:#000;border-color:var(--accent)}
#voice-status{font-size:10px;color:var(--dim);margin-top:4px;height:14px}

/* ─── Load Overlay ─── */
#load-overlay{position:fixed;inset:0;background:rgba(5,5,10,.97);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#load-overlay h1{color:var(--accent);font-size:22px;letter-spacing:2px}
#load-overlay .sub{color:var(--dim);font-size:12px;margin-bottom:8px}
#model-select{background:#111120;color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-family:inherit;font-size:13px;width:320px}
#load-btn{background:var(--accent);color:#000;border:none;padding:10px 32px;border-radius:6px;font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px}
#load-btn:hover{background:#66ccff}
#load-btn:disabled{opacity:.4;cursor:default}
#load-progress{width:320px;height:6px;background:#1a1a2a;border-radius:3px;overflow:hidden;display:none}
#load-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}
#load-status{font-size:11px;color:var(--dim);height:16px}
#gpu-status{font-size:11px;margin-bottom:4px}
#gpu-status.ok{color:var(--green)}
#gpu-status.fail{color:var(--red)}
#skip-btn{background:transparent;color:var(--dim);border:1px solid var(--border);padding:6px 16px;border-radius:4px;font-family:inherit;cursor:pointer;margin-top:8px;font-size:11px}
#skip-btn:hover{color:var(--text);border-color:var(--text)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
</style>
</head>
<body>

<!-- Load Overlay -->
<div id="load-overlay">
  <h1>WebLLM SANDBOX</h1>
  <div class="sub">Voice-Powered Code Builder — Talk to AI, Build in Browser</div>
  <div id="gpu-status">Detecting WebGPU...</div>
  <select id="model-select">
    <option value="SmolLM2-135M-Instruct-q4f16_1-MLC">SmolLM2-135M — 719MB (fastest)</option>
    <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen2.5-0.5B — 945MB</option>
    <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC" selected>Llama-3.2-1B — 1.2GB (recommended)</option>
    <option value="Gemma-2-2b-it-q4f16_1-MLC">Gemma-2-2B — 2.0GB</option>
    <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen2.5-1.5B — 1.6GB</option>
    <option value="Phi-3.5-mini-instruct-q4f16_1-MLC">Phi-3.5-mini — 3.6GB</option>
    <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama-3.2-3B — 2.9GB</option>
  </select>
  <div id="load-progress"><div id="load-bar"></div></div>
  <div id="load-status"></div>
  <button id="load-btn">Load Model & Enter Sandbox</button>
  <button id="skip-btn">Skip Model — Use Sandbox Only</button>
</div>

<!-- Top Bar -->
<div id="topbar">
  <span class="logo">LLM SANDBOX</span>
  <span class="repo-name" id="repo-name-display">untitled</span>
  <span class="branch" id="branch-display">main</span>
  <button id="btn-new-repo" title="New Repo">New Repo</button>
  <button id="btn-commit" title="Commit All">Commit</button>
  <span class="status" id="model-status">No model loaded</span>
</div>

<!-- Main Grid -->
<div id="grid">
  <!-- File Explorer -->
  <div id="file-panel">
    <div class="panel-header">
      <span>Files</span>
      <span id="file-count">0</span>
    </div>
    <div id="file-list"></div>
    <div id="commit-section">
      <div class="panel-header">Commits</div>
      <div id="commit-log"></div>
    </div>
  </div>

  <!-- Preview Area -->
  <div id="preview-area">
    <div class="panel-header">
      <span style="color:var(--orange)">PREVIEW</span>
      <div id="preview-tabs"></div>
      <button id="btn-refresh-preview" style="margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--dim);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px">Refresh</button>
    </div>
    <div id="iframe-container" style="display:none"></div>
    <div id="no-preview">
      <span>No preview yet</span>
      <span class="hint">Ask the AI to create an HTML file, or create one manually</span>
    </div>
  </div>

  <!-- Tool Visualization -->
  <div id="tool-viz">
    <div class="panel-header">
      <span>Tool Calls</span>
      <span id="tool-count" style="font-size:10px;color:var(--dim)">0</span>
    </div>
    <div id="tool-log"></div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div class="panel-header">
      <span>Chat</span>
      <div id="emotion-bar">
        <div class="emo-dot" style="color:#ffaa22" title="excitement"></div>
        <div class="emo-dot" style="color:#44aaff" title="calm"></div>
        <div class="emo-dot" style="color:#ff4444" title="anger"></div>
        <div class="emo-dot" style="color:#6666cc" title="sadness"></div>
        <div class="emo-dot" style="color:#44ff88" title="joy"></div>
        <div class="emo-dot" style="color:#aa88ff" title="curiosity"></div>
      </div>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div id="chat-input-row">
        <textarea id="chat-input" placeholder="Tell the AI what to build... (Enter to send)"></textarea>
        <div id="chat-btns">
          <button id="btn-send" title="Send">&#9654;</button>
          <button id="btn-mic" title="Voice">&#127908;</button>
        </div>
      </div>
      <div id="voice-status"></div>
    </div>
  </div>
</div>

<script type="module">
import { createFile, editFile, readFile, deleteFile, listFiles, searchFiles,
         commitChanges, getLog, getDiff, checkout, initRepo, getPreviewHTML,
         getPreviewableFiles, executeTool, parseToolCalls, buildToolSystemPrompt,
         getRepoState, getAllFiles, patchFile } from './modules/mcp-tools-engine.js';

// ─── State ───
let engine = null;       // WebLLM engine
let webllm = null;       // WebLLM module
let modelLoaded = false;
let chatHistory = [];
let isGenerating = false;
let currentPreview = null;
let selectedFile = null;
let toolCallCount = 0;
let micActive = false;
let recognition = null;

// Voice analysis state
let audioCtx = null, analyser = null, micStream = null, dataArray = null, freqArray = null;
const voice = { rms: 0, f0: 0, pDelta: 0, sustain: 0, coherence: 0, vowel: '', pulseRate: 0, energy: 0 };
const emotions = { excitement: 0, calm: 0.5, anger: 0, sadness: 0, joy: 0, curiosity: 0 };
let dominantEmo = 'calm';

// ─── DOM refs ───
const $overlay     = document.getElementById('load-overlay');
const $loadBtn     = document.getElementById('load-btn');
const $skipBtn     = document.getElementById('skip-btn');
const $loadBar     = document.getElementById('load-bar');
const $loadProg    = document.getElementById('load-progress');
const $loadStatus  = document.getElementById('load-status');
const $gpuStatus   = document.getElementById('gpu-status');
const $modelSelect = document.getElementById('model-select');
const $modelStatus = document.getElementById('model-status');
const $repoName    = document.getElementById('repo-name-display');
const $branchDisp  = document.getElementById('branch-display');
const $fileList    = document.getElementById('file-list');
const $fileCount   = document.getElementById('file-count');
const $commitLog   = document.getElementById('commit-log');
const $previewTabs = document.getElementById('preview-tabs');
const $iframeBox   = document.getElementById('iframe-container');
const $noPreview   = document.getElementById('no-preview');
const $toolLog     = document.getElementById('tool-log');
const $toolCount   = document.getElementById('tool-count');
const $chatMsgs    = document.getElementById('chat-messages');
const $chatInput   = document.getElementById('chat-input');
const $voiceStatus = document.getElementById('voice-status');
const $emoDots     = document.querySelectorAll('.emo-dot');

// ─── Check WebGPU ───
async function checkGPU() {
  if (!navigator.gpu) {
    $gpuStatus.textContent = 'WebGPU not available — model inference disabled';
    $gpuStatus.className = 'fail';
    $loadBtn.textContent = 'WebGPU Required for LLM';
    $loadBtn.disabled = true;
    return;
  }
  try {
    const adapter = await navigator.gpu.requestAdapter();
    if (adapter) {
      const info = await adapter.requestAdapterInfo?.() || {};
      $gpuStatus.textContent = `WebGPU OK — ${info.vendor || 'GPU'} ${info.architecture || ''}`;
      $gpuStatus.className = 'ok';
    }
  } catch(e) {
    $gpuStatus.textContent = 'WebGPU detection failed';
    $gpuStatus.className = 'fail';
  }
}
checkGPU();

// ─── Load WebLLM ───
$loadBtn.onclick = async () => {
  const modelId = $modelSelect.value;
  $loadBtn.disabled = true;
  $loadProg.style.display = 'block';
  $loadStatus.textContent = 'Importing WebLLM...';
  try {
    webllm = await import('https://esm.run/@mlc-ai/web-llm');
    $loadStatus.textContent = `Loading ${modelId}...`;
    engine = await webllm.CreateMLCEngine(modelId, {
      initProgressCallback: (report) => {
        const pct = Math.round((report.progress || 0) * 100);
        $loadBar.style.width = pct + '%';
        $loadStatus.textContent = report.text || `Loading... ${pct}%`;
      }
    });
    modelLoaded = true;
    $modelStatus.textContent = modelId.split('-').slice(0, 3).join('-');
    $modelStatus.style.color = 'var(--green)';
    $overlay.style.display = 'none';
    startSandbox();
  } catch(e) {
    $loadStatus.textContent = 'Error: ' + e.message;
    $loadBtn.disabled = false;
  }
};

$skipBtn.onclick = () => {
  $overlay.style.display = 'none';
  $modelStatus.textContent = 'No model (sandbox only)';
  startSandbox();
};

// ─── Start Sandbox ───
function startSandbox() {
  initRepo('my-project');
  $repoName.textContent = 'my-project';
  refreshFileList();
  refreshCommitLog();
  addSystemMsg('Sandbox initialized. ' + (modelLoaded
    ? 'AI model loaded — talk or type to start building!'
    : 'No AI model — you can still create files manually.'));
  setupMic();
  setupVoiceRecognition();
}

// ─── File Explorer ───
function refreshFileList() {
  const result = listFiles('/');
  $fileList.innerHTML = '';
  $fileCount.textContent = result.count;
  for (const f of result.files) {
    const div = document.createElement('div');
    div.className = 'file-entry' + (f.path === selectedFile ? ' active' : '');
    const iconClass = f.type === 'html' ? 'html' : f.type === 'css' ? 'css' :
      (f.type === 'javascript' ? 'js' : 'other');
    const icon = f.type === 'html' ? '&#9671;' : f.type === 'css' ? '&#9670;' :
      f.type === 'javascript' ? '&#9674;' : '&#9643;';
    div.innerHTML = `<span class="icon ${iconClass}">${icon}</span>
      <span class="name">${f.path}</span>
      <span class="size">${formatSize(f.size)}</span>`;
    div.onclick = () => selectFile(f.path);
    $fileList.appendChild(div);
  }
  refreshPreviewTabs();
}

function selectFile(path) {
  selectedFile = path;
  refreshFileList();
  const file = readFile(path);
  if (file.ok && file.type === 'html') {
    showPreview(path);
  }
}

function formatSize(b) {
  if (b < 1024) return b + 'B';
  return (b / 1024).toFixed(1) + 'K';
}

// ─── Preview ───
function refreshPreviewTabs() {
  const { files } = getPreviewableFiles();
  $previewTabs.innerHTML = '';
  for (const f of files) {
    const tab = document.createElement('div');
    tab.className = 'preview-tab' + (f === currentPreview ? ' active' : '');
    tab.textContent = f.split('/').pop();
    tab.onclick = () => showPreview(f);
    $previewTabs.appendChild(tab);
  }
}

function showPreview(path) {
  const result = getPreviewHTML(path);
  if (!result.ok) return;
  currentPreview = path;
  $noPreview.style.display = 'none';
  $iframeBox.style.display = 'block';
  // Create sandboxed iframe with the HTML
  $iframeBox.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts allow-same-origin';
  $iframeBox.appendChild(iframe);
  iframe.srcdoc = result.html;
  refreshPreviewTabs();
  refreshFileList();
}

document.getElementById('btn-refresh-preview').onclick = () => {
  if (currentPreview) showPreview(currentPreview);
};

// ─── Commit Log ───
function refreshCommitLog() {
  const { commits } = getLog(10);
  $commitLog.innerHTML = '';
  for (const c of commits) {
    const div = document.createElement('div');
    div.className = 'commit-entry';
    div.innerHTML = `<span class="cid">${c.id}</span> <span class="cmsg">${escHtml(c.message)}</span>`;
    $commitLog.appendChild(div);
  }
  const state = getRepoState();
  $branchDisp.textContent = state.branch;
}

// ─── Tool Viz ───
function logToolCall(name, args, result) {
  toolCallCount++;
  $toolCount.textContent = toolCallCount;
  const div = document.createElement('div');
  div.className = 'tool-entry';
  const argsStr = Object.entries(args || {}).map(([k, v]) => {
    const val = typeof v === 'string' ? (v.length > 60 ? v.slice(0, 60) + '...' : v) : JSON.stringify(v);
    return `${k}=${val}`;
  }).join(', ');
  const resClass = result.ok ? 'ok' : 'err';
  const resText = result.ok
    ? (result.path ? result.path : result.summary || result.count !== undefined ? `${result.count} items` : 'OK')
    : result.error;
  div.innerHTML = `<span class="tool-time">${new Date().toLocaleTimeString()}</span>
    <span class="tool-name">${name}</span>
    <div class="tool-args">${escHtml(argsStr)}</div>
    <div class="tool-result ${resClass}">${result.ok ? '✓' : '✗'} ${escHtml(String(resText))}</div>`;
  $toolLog.prepend(div);
}

// ─── Chat ───
function addMsg(role, text, emoTag = '') {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let senderLabel = role === 'user' ? 'You' : role === 'ai' ? 'AI' : 'System';
  let emoHtml = emoTag ? `<span class="emo-tag" style="background:rgba(255,255,255,.08)">${emoTag}</span>` : '';
  // Process tool badges in AI text
  let processed = escHtml(text)
    .replace(/&lt;tool_call&gt;/g, '<span class="tool-badge">tool_call</span><pre>')
    .replace(/&lt;\/tool_call&gt;/g, '</pre>')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  div.innerHTML = `<div class="sender">${senderLabel}${emoHtml}</div>${processed}`;
  $chatMsgs.appendChild(div);
  $chatMsgs.scrollTop = $chatMsgs.scrollHeight;
  return div;
}

function addSystemMsg(text) { addMsg('system', text); }

function updateMsgText(div, text) {
  let processed = escHtml(text)
    .replace(/&lt;tool_call&gt;/g, '<span class="tool-badge">tool</span><pre>')
    .replace(/&lt;\/tool_call&gt;/g, '</pre>')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  const sender = div.querySelector('.sender').outerHTML;
  div.innerHTML = sender + processed;
  $chatMsgs.scrollTop = $chatMsgs.scrollHeight;
}

// ─── Send Message to LLM ───
async function sendMessage(text) {
  if (!text.trim() || isGenerating) return;
  isGenerating = true;

  // Emotion snapshot
  const emoProfile = { ...emotions };
  const emoTag = dominantEmo + ' ' + (emoProfile[dominantEmo] * 100).toFixed(0) + '%';
  addMsg('user', text, emoTag);
  $chatInput.value = '';

  if (!modelLoaded) {
    addSystemMsg('No model loaded — cannot generate response. Load a model or use skip mode for manual editing.');
    isGenerating = false;
    return;
  }

  // Build messages with tool system prompt and emotion context
  const systemPrompt = buildToolSystemPrompt() + `\n\nUSER EMOTION STATE: The user currently sounds ${dominantEmo} (${(emoProfile[dominantEmo]*100).toFixed(0)}% intensity). Emotions: ${Object.entries(emoProfile).map(([k,v])=>k+':'+Math.round(v*100)+'%').join(', ')}. Adapt your tone accordingly.\n`;

  // Build conversation
  const messages = [
    { role: 'system', content: systemPrompt }
  ];

  // Include repo state context
  const state = getRepoState();
  if (state.fileCount > 0) {
    messages.push({
      role: 'system',
      content: `Current repo has ${state.fileCount} files: ${state.files.join(', ')}. ${state.commitCount} commits on branch '${state.branch}'.`
    });
  }

  // Add chat history (last 16 messages)
  const recentHistory = chatHistory.slice(-16);
  messages.push(...recentHistory);
  messages.push({ role: 'user', content: text });

  const aiDiv = addMsg('ai', '...');

  try {
    let fullResponse = '';
    const completion = await engine.chat.completions.create({
      messages,
      stream: true,
      max_tokens: 2048,
      temperature: 0.7
    });

    for await (const chunk of completion) {
      const delta = chunk.choices[0]?.delta?.content || '';
      fullResponse += delta;
      updateMsgText(aiDiv, fullResponse + ' ▍');
    }
    updateMsgText(aiDiv, fullResponse);

    // Save to history
    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: fullResponse });
    if (chatHistory.length > 32) chatHistory = chatHistory.slice(-32);

    // Parse and execute tool calls
    const toolCalls = parseToolCalls(fullResponse);
    if (toolCalls.length > 0) {
      let toolResults = '';
      for (const tc of toolCalls) {
        const result = executeTool(tc.name, tc.args || {});
        logToolCall(tc.name, tc.args || {}, result);
        toolResults += `\nTool ${tc.name}: ${JSON.stringify(result)}\n`;

        // Auto-preview if a preview tool was called or an HTML file was created/edited
        if (tc.name === 'preview' && result.ok) {
          showPreview(tc.args.path);
        } else if ((tc.name === 'create_file' || tc.name === 'edit_file') && result.ok) {
          const p = tc.args.path || '';
          if (p.endsWith('.html') || p.endsWith('.htm')) {
            showPreview(p);
          }
        }
      }
      refreshFileList();
      refreshCommitLog();

      // Send tool results back to LLM for follow-up
      chatHistory.push({ role: 'user', content: `[Tool Results]\n${toolResults}\n[Continue your response based on these results. If you created HTML files, they are now showing in the preview.]` });

      // Get follow-up response
      const followMsgs = [
        { role: 'system', content: systemPrompt },
        ...chatHistory.slice(-20)
      ];

      let followResponse = '';
      const followDiv = addMsg('ai', '...');
      const follow = await engine.chat.completions.create({
        messages: followMsgs,
        stream: true,
        max_tokens: 1024,
        temperature: 0.7
      });

      for await (const chunk of follow) {
        const delta = chunk.choices[0]?.delta?.content || '';
        followResponse += delta;
        updateMsgText(followDiv, followResponse + ' ▍');
      }
      updateMsgText(followDiv, followResponse);
      chatHistory.push({ role: 'assistant', content: followResponse });

      // Check for more tool calls in follow-up
      const moreCalls = parseToolCalls(followResponse);
      for (const tc of moreCalls) {
        const result = executeTool(tc.name, tc.args || {});
        logToolCall(tc.name, tc.args || {}, result);
        if ((tc.name === 'create_file' || tc.name === 'edit_file' || tc.name === 'preview') && result.ok) {
          const p = tc.args?.path || '';
          if (p.endsWith('.html') || p.endsWith('.htm') || tc.name === 'preview') showPreview(p);
        }
      }
      if (moreCalls.length > 0) {
        refreshFileList();
        refreshCommitLog();
      }
    }
  } catch(e) {
    updateMsgText(aiDiv, 'Error: ' + e.message);
  }

  isGenerating = false;
}

// ─── Chat Input ───
$chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage($chatInput.value);
  }
});
document.getElementById('btn-send').onclick = () => sendMessage($chatInput.value);

// ─── Manual Repo Buttons ───
document.getElementById('btn-new-repo').onclick = () => {
  const name = prompt('Repo name:', 'my-project');
  if (!name) return;
  initRepo(name);
  $repoName.textContent = name;
  currentPreview = null;
  $iframeBox.style.display = 'none';
  $noPreview.style.display = 'flex';
  refreshFileList();
  refreshCommitLog();
  addSystemMsg(`New repo "${name}" initialized.`);
};

document.getElementById('btn-commit').onclick = () => {
  const msg = prompt('Commit message:', 'Update files');
  if (!msg) return;
  const result = commitChanges(msg);
  logToolCall('commit', { message: msg }, result);
  refreshCommitLog();
  addSystemMsg(`Committed: ${msg} (${result.id})`);
};

// ─── Microphone Setup ───
function setupMic() {
  navigator.mediaDevices?.getUserMedia({ audio: true }).then(stream => {
    micStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    dataArray = new Float32Array(analyser.fftSize);
    freqArray = new Uint8Array(analyser.frequencyBinCount);
    requestAnimationFrame(analyzeLoop);
  }).catch(() => {
    $voiceStatus.textContent = 'Mic unavailable';
  });
}

// ─── Voice Analysis Loop ───
let lastF0 = 0, smoothRms = 0, onsetCount = 0, lastOnset = 0;

function analyzeLoop() {
  if (!analyser) return;
  analyser.getFloatTimeDomainData(dataArray);
  analyser.getByteFrequencyData(freqArray);

  // RMS
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
  const rms = Math.sqrt(sum / dataArray.length);
  smoothRms = smoothRms * 0.8 + rms * 0.2;
  voice.rms = smoothRms;
  voice.energy = Math.min(1, smoothRms * 8);

  // F0 via autocorrelation
  const sr = audioCtx.sampleRate;
  let bestCorr = 0, bestLag = 0;
  for (let lag = Math.floor(sr / 500); lag < Math.floor(sr / 60); lag++) {
    let corr = 0;
    for (let i = 0; i < dataArray.length - lag; i++) corr += dataArray[i] * dataArray[i + lag];
    if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
  }
  const f0 = bestLag > 0 ? sr / bestLag : 0;
  voice.pDelta = Math.abs(f0 - voice.f0);
  voice.f0 = f0;
  voice.sustain = f0 > 60 ? Math.min(1, voice.sustain + 0.02) : voice.sustain * 0.95;
  voice.coherence = bestCorr > 0 ? Math.min(1, bestCorr / (dataArray.length * 0.01)) : 0;

  // Onset detection
  if (rms > 0.04 && Date.now() - lastOnset > 120) {
    onsetCount++;
    lastOnset = Date.now();
  }
  voice.pulseRate = Math.min(1, onsetCount / 30);
  if (Date.now() % 2000 < 20) onsetCount = Math.max(0, onsetCount - 5);

  // Formant vowel
  let peakBin = 0, peakVal = 0;
  const binHz = sr / analyser.fftSize;
  for (let i = Math.floor(200 / binHz); i < Math.floor(3000 / binHz); i++) {
    if (freqArray[i] > peakVal) { peakVal = freqArray[i]; peakBin = i; }
  }
  const formant = peakBin * binHz;
  voice.vowel = formant < 400 ? 'oo' : formant < 700 ? 'oh' : formant < 1200 ? 'ah' : formant < 2000 ? 'eh' : 'ee';

  // Emotion analysis
  const pitch = Math.min(1, f0 / 400);
  const vol = Math.min(1, smoothRms * 6);
  const pVar = Math.min(1, voice.pDelta / 60);
  const tempo = voice.pulseRate;
  const steady = voice.coherence;

  emotions.excitement = Math.min(1, pitch * 0.4 + vol * 0.3 + pVar * 0.2 + tempo * 0.1);
  emotions.calm = Math.min(1, (1 - vol) * 0.3 + steady * 0.3 + (1 - pVar) * 0.2 + (1 - tempo) * 0.2);
  emotions.anger = Math.min(1, vol * 0.4 + (1 - pitch) * 0.1 + pVar * 0.2 + tempo * 0.3);
  emotions.sadness = Math.min(1, (1 - vol) * 0.2 + (1 - pitch) * 0.3 + (1 - tempo) * 0.3 + (1 - pVar) * 0.2);
  emotions.joy = Math.min(1, pitch * 0.3 + vol * 0.2 + pVar * 0.1 + steady * 0.2 + tempo * 0.2);
  emotions.curiosity = Math.min(1, pVar * 0.4 + pitch * 0.3 + (1 - vol) * 0.1 + steady * 0.2);

  // Dominant emotion
  let maxE = 0;
  for (const [k, v] of Object.entries(emotions)) {
    if (v > maxE) { maxE = v; dominantEmo = k; }
  }

  // Update emotion dots
  const emoKeys = ['excitement', 'calm', 'anger', 'sadness', 'joy', 'curiosity'];
  $emoDots.forEach((dot, i) => {
    dot.classList.toggle('active', emotions[emoKeys[i]] > 0.4);
    dot.style.opacity = 0.2 + emotions[emoKeys[i]] * 0.8;
  });

  requestAnimationFrame(analyzeLoop);
}

// ─── Voice Recognition ───
function setupVoiceRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { $voiceStatus.textContent = 'Speech recognition unavailable'; return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (interim) $voiceStatus.textContent = '🎤 ' + interim;
    if (final.trim()) {
      $voiceStatus.textContent = '';
      sendMessage(final.trim());
    }
  };

  recognition.onerror = () => {
    micActive = false;
    document.getElementById('btn-mic').classList.remove('active');
    $voiceStatus.textContent = '';
  };

  recognition.onend = () => {
    if (micActive) recognition.start(); // auto-restart
  };
}

document.getElementById('btn-mic').onclick = () => {
  if (!recognition) return;
  micActive = !micActive;
  document.getElementById('btn-mic').classList.toggle('active', micActive);
  if (micActive) {
    recognition.start();
    $voiceStatus.textContent = 'Listening...';
  } else {
    recognition.stop();
    $voiceStatus.textContent = '';
  }
};

// ─── Utilities ───
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
