<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ki Arena ROYALE — Free-For-All Voice Battle Royale</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

/* === TOP HUD === */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;padding:12px 20px;
  background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);pointer-events:none}
#hud.on{display:flex;justify-content:space-between;align-items:flex-start}
.hud-l,.hud-c,.hud-r{display:flex;flex-direction:column;gap:3px}
.hud-c{align-items:center;text-align:center}
.hud-r{align-items:flex-end;text-align:right}
#nick{font-size:11px;color:#0f0;cursor:pointer;pointer-events:auto;text-decoration:underline dotted #0f04}
#nick:hover{color:#ff0}
#score{font-size:32px;color:#ff0;text-shadow:0 0 12px #f80,0 0 24px #f804}
#combo{font-size:18px;color:#f80}
#blastType{font-size:14px;color:#4af}
#room{font-size:11px;color:#0ff}
#peers{font-size:11px;color:#088}

/* === ZONE TIMER (center top) === */
#zoneInfo{font-size:16px;color:#f44;text-shadow:0 0 10px #f44;letter-spacing:2px}
#zoneTimer{font-size:28px;color:#ff0;text-shadow:0 0 10px #ff0;font-variant-numeric:tabular-nums}
#aliveCount{font-size:14px;color:#0f0}

/* === ZONE BORDER WARNING === */
#zoneBorder{position:fixed;inset:0;z-index:3;pointer-events:none;
  border:0px solid rgba(255,0,0,0);transition:border-width 0.5s,border-color 0.5s}
#zoneBorder.danger{border-width:6px;border-color:rgba(255,50,50,0.5);
  animation:zonePulse 1s ease-in-out infinite}
@keyframes zonePulse{0%,100%{border-color:rgba(255,50,50,0.3)}50%{border-color:rgba(255,50,50,0.7)}}

/* === MINIMAP === */
#minimap{position:fixed;right:16px;bottom:16px;z-index:55;border:1px solid #ff03;
  border-radius:4px;background:rgba(0,0,0,0.7);pointer-events:none}

/* === RESONANCE HUD (compact) === */
#resHUD{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:55;
  pointer-events:none;opacity:0;transition:opacity 0.4s}
#resHUD.on{opacity:1}
#resKanji{font-size:70px;line-height:1;text-shadow:0 0 30px currentColor,0 0 60px currentColor;
  text-align:center;transition:color 0.3s}
#resLabel{font-size:9px;color:#fff5;text-align:center;margin-top:3px;letter-spacing:2px}
#resDepth{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.depth-layer{display:flex;align-items:center;gap:6px;opacity:0.2;transition:opacity 0.3s,transform 0.3s}
.depth-layer.active{opacity:1;transform:translateX(4px)}
.depth-layer.peak{opacity:1;transform:translateX(8px)}
.depth-dot{width:10px;height:10px;border-radius:50%;border:1px solid;transition:background 0.3s,box-shadow 0.3s}
.depth-layer.active .depth-dot{box-shadow:0 0 8px currentColor}
.depth-layer.peak .depth-dot{background:currentColor;box-shadow:0 0 12px currentColor,0 0 24px currentColor}
.depth-name{font-size:9px;letter-spacing:1px}
.depth-mult{font-size:8px;color:#ff08;margin-left:auto}
#resMultiplier{font-size:20px;color:#ff0;text-align:center;margin-top:5px;
  text-shadow:0 0 10px #f80;opacity:0;transition:opacity 0.3s}
#resMultiplier.on{opacity:1}

/* === KANJI HUD === */
#kanjiHUD{position:fixed;right:20px;top:45%;transform:translateY(-50%);z-index:55;
  text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s}
#kanjiHUD.on{opacity:1}
#kanjiChar{font-size:55px;line-height:1;text-shadow:0 0 25px currentColor,0 0 50px currentColor}
#kanjiName{font-size:9px;color:#fff8;margin-top:3px}
#kanjiReading{font-size:7px;color:#fff4}

/* === MORPH BALL === */
#morphBall{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:55;
  pointer-events:none;filter:drop-shadow(0 0 16px rgba(255,200,0,0.4))}

/* === ELIMINATIONS FEED === */
#elimFeed{position:fixed;top:60px;right:16px;z-index:60;pointer-events:none;
  display:flex;flex-direction:column;gap:3px;max-height:200px;overflow:hidden}
.elim{font-size:11px;padding:3px 10px;background:rgba(0,0,0,0.7);border-left:2px solid #f44;
  border-radius:0 4px 4px 0;animation:elimFade 4s ease-out forwards;white-space:nowrap}
@keyframes elimFade{0%{opacity:1;transform:translateX(0)}
  80%{opacity:1}100%{opacity:0;transform:translateX(20px)}}

/* === PLACEMENT OVERLAY === */
#placement{position:fixed;inset:0;z-index:200;display:none;
  background:rgba(0,0,0,0.85);align-items:center;justify-content:center;flex-direction:column}
#placement.show{display:flex}
#placementRank{font-size:100px;color:#ff0;text-shadow:0 0 40px #f80,0 0 80px #ff04}
#placementLabel{font-size:24px;color:#fff;margin-top:10px;letter-spacing:4px}
#placementScore{font-size:18px;color:#0ff;margin-top:20px}
#restartBtn{margin-top:30px;padding:12px 32px;font-size:16px;background:#ff0;color:#000;
  border:none;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:2px}
#restartBtn:hover{background:#fc0}

/* === DAMAGE LAYER === */
#dmgLayer{position:fixed;inset:0;z-index:60;pointer-events:none}
.dmg{position:absolute;font-weight:bold;text-shadow:0 0 10px currentColor,0 0 20px currentColor;
  animation:dmgUp 1.4s ease-out forwards;pointer-events:none}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-140px) scale(2)}}

/* === COMMENTARY === */
#cmt{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:70;
  background:rgba(0,0,0,0.85);border:2px solid #ff0;border-radius:14px;padding:10px 24px;
  font-size:18px;color:#ff0;text-shadow:0 0 12px #f80;text-align:center;
  max-width:600px;opacity:0;transition:opacity 0.3s;pointer-events:none}
#cmt.show{opacity:1}

/* === LEADERBOARD === */
#lb{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:48;
  background:rgba(0,0,0,0.6);border:1px solid #ff03;border-radius:8px;padding:10px;
  min-width:200px;display:none;font-size:11px}
#lb.on{display:block}
#lb h3{color:#f44;font-size:14px;margin-bottom:6px;text-align:center;letter-spacing:3px}
#lb .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #ff01}
#lb .row .n{color:#0ff}#lb .row .s{color:#ff0}
#lb .me{color:#0f0 !important}

/* === MODULE BADGES === */
#modBadges{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;gap:6px;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:80%}
.mod-badge{background:#0002;border:1px solid #f443;border-radius:4px;padding:2px 8px;
  font-size:8px;color:#f448;letter-spacing:1px}
.mod-badge.active{color:#f44;border-color:#f444}

#version{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:50;
  font-size:9px;color:#333;letter-spacing:3px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-l">
    <div id="score">0</div>
    <div id="combo"></div>
    <div id="blastType">—</div>
  </div>
  <div class="hud-c">
    <div id="zoneInfo">ZONE SHRINKING</div>
    <div id="zoneTimer">2:00</div>
    <div id="aliveCount">— alive</div>
  </div>
  <div class="hud-r">
    <div id="nick" onclick="changeNick()" title="Click to change name"></div>
    <div id="room">ROYALE</div>
    <div id="peers"></div>
  </div>
</div>

<div id="zoneBorder"></div>

<!-- RESONANCE HUD -->
<div id="resHUD">
  <div id="resKanji">気</div>
  <div id="resLabel">RESONANCE</div>
  <div id="resDepth"></div>
  <div id="resMultiplier">1x</div>
</div>

<!-- KANJI HUD -->
<div id="kanjiHUD">
  <div id="kanjiChar">気</div>
  <div id="kanjiName">Spirit</div>
  <div id="kanjiReading">KI</div>
</div>

<!-- MORPH BALL -->
<canvas id="morphBall" width="140" height="140"></canvas>

<!-- MINIMAP -->
<canvas id="minimap" width="140" height="140"></canvas>

<!-- ELIMINATIONS -->
<div id="elimFeed"></div>

<!-- PLACEMENT OVERLAY -->
<div id="placement">
  <div id="placementRank">#1</div>
  <div id="placementLabel">VICTORY ROYALE</div>
  <div id="placementScore">Score: 0</div>
  <button id="restartBtn" onclick="restartMatch()">PLAY AGAIN</button>
</div>

<div id="dmgLayer"></div>
<div id="cmt"></div>
<div id="lb"><h3>ROYALE STANDINGS</h3><div id="lbRows"></div></div>
<div id="modBadges"></div>
<div id="version">KI ARENA ROYALE — BATTLE ROYALE</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
// ============================================================
// KI ARENA ROYALE — FREE-FOR-ALL BATTLE ROYALE
//
// Features:
//   - Shrinking arena zone with damage to out-of-zone players
//   - Elimination tracking + kill feed
//   - Minimap showing zone + player positions
//   - Last-standing wins (solo or last team)
//   - Placement screen on elimination
//   - Resonance depth combat system
//   - Morphing ki-balls
// ============================================================

import { KI } from './modules/core.js';
import * as Scene from './modules/hd-scene.js';
import * as Vortex from './modules/hd-vortex.js';
import * as FX from './modules/hd-fx.js';
import * as Resonance from './modules/resonance.js';
import * as ResonanceSynths from './modules/resonance-synths.js';
import * as VoiceEngine from './modules/voice-engine.js';
import * as Kanji from './modules/kanji.js';
import * as KiBlasts from './modules/ki-blasts.js';
import * as EmojiSystem from './modules/emoji-system.js';
import * as MqttNet from './modules/mqtt-net.js';
import * as WebRTCNet from './modules/webrtc-net.js';
import * as Presence from './modules/presence.js';

// === PLAYER ===
KI.player.name = KI.genHash();
window.changeNick = function() {
  const n = prompt('Enter nickname (max 16):', KI.player.name);
  if (n && n.trim()) {
    KI.player.name = n.trim().slice(0, 16);
    document.getElementById('nick').textContent = KI.player.name;
    KI.emit('broadcast', { type: 'nick', name: KI.player.name, score: KI.player.score });
  }
};

// ============================================================
// ROYALE GAME STATE
// ============================================================
const ROYALE = {
  zoneRadius: 1.0,          // 1.0 = full arena, 0.0 = center point
  zoneTarget: 1.0,
  zoneShrinkRate: 0.003,     // how fast zone shrinks per second
  zonePhase: 0,              // 0-5 shrink phases
  zonePhaseTimes: [30, 25, 20, 15, 10, 5], // seconds before each shrink
  zoneTimer: 30,
  playerHP: 1000,
  maxHP: 1000,
  alive: true,
  eliminations: 0,
  placement: 0,
  fighters: new Map(),       // remote fighters
  zoneDmgTick: 0,
  zoneCenter: { x: 0, z: 0 }, // zone can shift
  matchTime: 0
};

// simulate some AI fighters for solo play
const AI_FIGHTERS = [];
function spawnAIFighters(count) {
  const names = ['RAIJIN','FUJIN','SUIJIN','KAGUTSUCHI','AMATERASU','TSUKUYOMI',
                 'SUSANOO','IZANAGI','IZANAMI','BISHAMONTEN','BENZAITEN','DAIKOKUTEN'];
  for (let i = 0; i < count; i++) {
    AI_FIGHTERS.push({
      name: names[i % names.length] + (i >= names.length ? '-' + i : ''),
      hp: 800 + Math.random() * 400,
      maxHP: 1000,
      pos: { x: (Math.random() - 0.5) * 18, z: (Math.random() - 0.5) * 18 },
      layer: 0,
      alive: true,
      aggression: 0.3 + Math.random() * 0.7,
      lastBlast: 0,
      vowel: ['ah','ee','oh','oo','eh','mm'][Math.floor(Math.random() * 6)]
    });
  }
}

// === BUILD RESONANCE HUD ===
function buildResHUD() {
  const cont = document.getElementById('resDepth');
  Resonance.LAYERS.forEach((layer, i) => {
    const d = document.createElement('div');
    d.className = 'depth-layer'; d.id = 'dL-' + i;
    const c6 = '#' + layer.color.toString(16).padStart(6, '0');
    d.innerHTML =
      '<div class="depth-dot" style="color:'+c6+';border-color:'+c6+'"></div>' +
      '<span class="depth-name" style="color:'+c6+'">' + layer.name.toUpperCase() + '</span>' +
      '<span class="depth-mult">' + layer.mult + 'x</span>';
    cont.appendChild(d);
  });
}

// === RESONANCE HUD UPDATES ===
let currentLayer = -1;
KI.on('resonance:update', data => {
  const resHUD = document.getElementById('resHUD');
  if (data.activeLayer >= 0 || data.sustainTime > 0.1) resHUD.classList.add('on');
  else resHUD.classList.remove('on');

  Resonance.LAYERS.forEach((layer, i) => {
    const el = document.getElementById('dL-' + i);
    if (!el) return;
    el.classList.toggle('active', i <= data.activeLayer);
    el.classList.toggle('peak', i === data.peakLayer && data.activeLayer >= 0);
  });

  const multEl = document.getElementById('resMultiplier');
  if (data.multiplier > 1) {
    multEl.classList.add('on');
    multEl.textContent = Math.round(data.multiplier * 10) / 10 + 'x';
    multEl.style.color = data.activeLayer >= 0 ?
      '#' + Resonance.LAYERS[data.activeLayer].color.toString(16).padStart(6, '0') : '#ff0';
  } else { multEl.classList.remove('on'); }

  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[data.vowel];
  if (kj && data.activeLayer >= 0) {
    document.getElementById('resKanji').textContent = kj.char;
    document.getElementById('resKanji').style.color =
      '#' + Resonance.LAYERS[data.activeLayer].color.toString(16).padStart(6, '0');
    document.getElementById('resLabel').textContent =
      Resonance.LAYERS[Math.max(0, data.activeLayer)].name.toUpperCase();
  }
  currentLayer = data.activeLayer;
});

// === RESONANCE RELEASE -> BLAST ===
KI.on('resonance:release', data => {
  if (!ROYALE.alive) return;
  const auraPos = KI._scene?.aura?.position || new THREE.Vector3(0, 2.5, 5);
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const kj = KANJI[data.vowel];
  const blastType = kj?.blast || 'kiball';

  KI.voice.chargeLevel = Math.min(1, data.multiplier / 8);
  KI.voice.energy = Math.max(KI.voice.energy, data.multiplier * 0.05);

  const blastMod = KI.get('ki-blasts');
  if (blastMod) blastMod.fireBlast(blastType, Math.min(1, data.multiplier / 4), auraPos);

  const depthBonus = Math.round(data.multiplier * 50 * (1 + data.coherenceBonus));
  KI.player.score += depthBonus;
  document.getElementById('score').textContent = KI.player.score.toLocaleString();

  // damage nearby AI fighters
  const blastDmg = data.multiplier * 40;
  damageNearbyAI(blastDmg, data.vowel);

  if (data.layer >= 4) showCmt('SINGULARITY RELEASE!');
  else if (data.layer >= 3) showCmt('OVERTONE CASCADE!');
});

// === CHARGE HUD ===
KI.on('charge:update', data => {
  document.getElementById('blastType').textContent = data.blastType.name;
  const kanji = KI.get('kanji');
  const KANJI = kanji?.KANJI || {};
  const khud = document.getElementById('kanjiHUD');
  if (KI.voice.vowel && KI.voice.sounding && KANJI[KI.voice.vowel]) {
    const kj = KANJI[KI.voice.vowel];
    khud.classList.add('on');
    document.getElementById('kanjiChar').textContent = kj.char;
    document.getElementById('kanjiChar').style.color = kj.color;
    document.getElementById('kanjiName').textContent = kj.name;
    document.getElementById('kanjiReading').textContent = kj.reading;
  } else { khud.classList.remove('on'); }
});

// === HIT SCORING ===
KI.on('hit', data => {
  document.getElementById('score').textContent = KI.player.score.toLocaleString();
  document.getElementById('combo').textContent = KI.player.combo > 1 ? KI.player.combo + 'x COMBO' : '';
  showDmg(data.dmg, data.type);
  if (data.dmg > 300) showCmt(pickCmt('bigHit'));
});

KI.on('ko', () => {
  ROYALE.eliminations++;
  showElim(KI.player.name, 'AI Fighter');
  showCmt('ELIMINATED!');
});

// === DAMAGE NEARBY AI ===
function damageNearbyAI(dmg, vowel) {
  AI_FIGHTERS.forEach(f => {
    if (!f.alive) return;
    const dist = Math.sqrt(f.pos.x * f.pos.x + f.pos.z * f.pos.z);
    if (dist < 8) {
      const falloff = 1 - (dist / 8);
      f.hp -= dmg * falloff;
      if (f.hp <= 0) {
        f.alive = false;
        ROYALE.eliminations++;
        showElim(KI.player.name, f.name);
        KI.player.score += 200;
        document.getElementById('score').textContent = KI.player.score.toLocaleString();
        showCmt('ELIMINATED ' + f.name + '!');
      }
    }
  });
}

// === AI FIGHTER UPDATE ===
function updateAIFighters(dt, t) {
  AI_FIGHTERS.forEach(f => {
    if (!f.alive) return;
    // zone damage
    const distFromCenter = Math.sqrt(
      (f.pos.x - ROYALE.zoneCenter.x) ** 2 + (f.pos.z - ROYALE.zoneCenter.z) ** 2);
    const zoneEdge = ROYALE.zoneRadius * 10;
    if (distFromCenter > zoneEdge) {
      f.hp -= 15 * dt;
      // try to move toward zone center
      const ax = ROYALE.zoneCenter.x - f.pos.x;
      const az = ROYALE.zoneCenter.z - f.pos.z;
      const ad = Math.sqrt(ax * ax + az * az) || 1;
      f.pos.x += (ax / ad) * 3 * dt;
      f.pos.z += (az / ad) * 3 * dt;
    } else {
      // wander
      f.pos.x += (Math.random() - 0.5) * dt * 2;
      f.pos.z += (Math.random() - 0.5) * dt * 2;
    }

    // random fighting (damage other AI fighters)
    if (t - f.lastBlast > 2 + Math.random() * 3) {
      f.lastBlast = t;
      AI_FIGHTERS.forEach(target => {
        if (target === f || !target.alive) return;
        const d = Math.sqrt((target.pos.x - f.pos.x) ** 2 + (target.pos.z - f.pos.z) ** 2);
        if (d < 6 && Math.random() < f.aggression * 0.3) {
          target.hp -= 30 + Math.random() * 50;
          if (target.hp <= 0) {
            target.alive = false;
            showElim(f.name, target.name);
          }
        }
      });
    }

    // check death
    if (f.hp <= 0 && f.alive) {
      f.alive = false;
      showElim('ZONE', f.name);
    }
  });
}

// === ZONE UPDATE ===
function updateZone(dt) {
  ROYALE.matchTime += dt;
  ROYALE.zoneTimer -= dt;

  if (ROYALE.zoneTimer <= 0 && ROYALE.zonePhase < ROYALE.zonePhaseTimes.length) {
    ROYALE.zonePhase++;
    ROYALE.zoneTarget = Math.max(0.1, 1 - ROYALE.zonePhase * 0.18);
    ROYALE.zoneTimer = ROYALE.zonePhaseTimes[Math.min(ROYALE.zonePhase, ROYALE.zonePhaseTimes.length - 1)] || 10;
    // shift zone center slightly each phase
    ROYALE.zoneCenter.x += (Math.random() - 0.5) * 3;
    ROYALE.zoneCenter.z += (Math.random() - 0.5) * 3;
    showCmt('ZONE SHRINKING! Phase ' + (ROYALE.zonePhase + 1));
  }

  // smoothly shrink zone
  if (ROYALE.zoneRadius > ROYALE.zoneTarget) {
    ROYALE.zoneRadius -= ROYALE.zoneShrinkRate * dt;
    ROYALE.zoneRadius = Math.max(ROYALE.zoneTarget, ROYALE.zoneRadius);
  }

  // zone damage to player (using 3D scene position)
  const playerDist = Math.sqrt(ROYALE.zoneCenter.x ** 2 + ROYALE.zoneCenter.z ** 2);
  const edge = ROYALE.zoneRadius * 10;
  const border = document.getElementById('zoneBorder');
  if (playerDist > edge * 0.8) {
    border.classList.add('danger');
    if (playerDist > edge) {
      ROYALE.zoneDmgTick += dt;
      if (ROYALE.zoneDmgTick >= 0.5) {
        ROYALE.zoneDmgTick = 0;
        ROYALE.playerHP -= 20;
        showDmg(20, 'zone');
        if (ROYALE.playerHP <= 0 && ROYALE.alive) {
          ROYALE.alive = false;
          const aliveCount = AI_FIGHTERS.filter(f => f.alive).length + 1;
          showPlacement(aliveCount);
        }
      }
    }
  } else {
    border.classList.remove('danger');
  }

  // update HUD
  const mins = Math.floor(Math.max(0, ROYALE.zoneTimer) / 60);
  const secs = Math.floor(Math.max(0, ROYALE.zoneTimer) % 60);
  document.getElementById('zoneTimer').textContent =
    mins + ':' + secs.toString().padStart(2, '0');

  const aliveAI = AI_FIGHTERS.filter(f => f.alive).length;
  const totalAlive = aliveAI + (ROYALE.alive ? 1 : 0);
  document.getElementById('aliveCount').textContent = totalAlive + ' alive';

  if (ROYALE.zonePhase > 0) {
    document.getElementById('zoneInfo').textContent = 'PHASE ' + (ROYALE.zonePhase + 1) + ' — ZONE CLOSING';
  }

  // check victory
  if (aliveAI === 0 && ROYALE.alive) {
    showPlacement(1);
    ROYALE.alive = false;
  }
}

// === MINIMAP ===
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');

function drawMinimap() {
  const W = 140;
  mmCtx.clearRect(0, 0, W, W);

  // background
  mmCtx.fillStyle = 'rgba(0,0,0,0.5)';
  mmCtx.fillRect(0, 0, W, W);

  const cx = W / 2, cy = W / 2;
  const scale = W / 22; // arena is roughly 20 units across

  // full arena circle
  mmCtx.beginPath();
  mmCtx.arc(cx, cy, W * 0.45, 0, Math.PI * 2);
  mmCtx.strokeStyle = '#333';
  mmCtx.lineWidth = 1;
  mmCtx.stroke();

  // zone circle
  const zr = ROYALE.zoneRadius * W * 0.45;
  const zcx = cx + ROYALE.zoneCenter.x * scale;
  const zcy = cy + ROYALE.zoneCenter.z * scale;
  mmCtx.beginPath();
  mmCtx.arc(zcx, zcy, zr, 0, Math.PI * 2);
  mmCtx.strokeStyle = 'rgba(255,100,100,0.6)';
  mmCtx.lineWidth = 2;
  mmCtx.stroke();

  // AI fighters
  AI_FIGHTERS.forEach(f => {
    if (!f.alive) return;
    const fx = cx + f.pos.x * scale;
    const fy = cy + f.pos.z * scale;
    mmCtx.beginPath();
    mmCtx.arc(fx, fy, 2, 0, Math.PI * 2);
    mmCtx.fillStyle = '#f44';
    mmCtx.fill();
  });

  // player
  mmCtx.beginPath();
  mmCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  mmCtx.fillStyle = '#0f0';
  mmCtx.fill();
  mmCtx.beginPath();
  mmCtx.arc(cx, cy, 5, 0, Math.PI * 2);
  mmCtx.strokeStyle = '#0f04';
  mmCtx.lineWidth = 1;
  mmCtx.stroke();
}

// === MORPH BALL ===
const morphCanvas = document.getElementById('morphBall');
const mCtx = morphCanvas.getContext('2d');

function drawMorphBall(t) {
  const W = 140, cx = W / 2, cy = W / 2;
  mCtx.clearRect(0, 0, W, W);

  const layer = Math.max(0, currentLayer);
  const lc = Resonance.LAYERS[layer]?.color || 0x4488ff;
  const r = (lc >> 16) & 0xff, g = (lc >> 8) & 0xff, b = lc & 0xff;
  const sides = [0, 60, 5, 4, 3][layer];
  const baseR = 30 + currentLayer * 5;
  const wobble = Math.sin(t * 3) * 3;

  // outer glow
  const grad = mCtx.createRadialGradient(cx, cy, baseR * 0.4, cx, cy, baseR * 2);
  grad.addColorStop(0, 'rgba('+r+','+g+','+b+',0.25)');
  grad.addColorStop(1, 'rgba('+r+','+g+','+b+',0)');
  mCtx.fillStyle = grad;
  mCtx.beginPath(); mCtx.arc(cx, cy, baseR * 2, 0, Math.PI * 2); mCtx.fill();

  // core
  mCtx.save();
  mCtx.translate(cx, cy);
  mCtx.rotate(t * 0.5);
  mCtx.beginPath();
  if (sides === 0) {
    mCtx.arc(0, 0, baseR + wobble, 0, Math.PI * 2);
  } else {
    for (let i = 0; i <= sides; i++) {
      const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
      const rr = baseR + wobble + Math.sin(t * 5 + i) * 2;
      if (i === 0) mCtx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else mCtx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    mCtx.closePath();
  }
  mCtx.fillStyle = 'rgba('+r+','+g+','+b+',0.45)';
  mCtx.strokeStyle = 'rgb('+r+','+g+','+b+')';
  mCtx.lineWidth = 2;
  mCtx.fill(); mCtx.stroke();

  // hot core
  const coreG = mCtx.createRadialGradient(0, 0, 0, 0, 0, baseR * 0.5);
  coreG.addColorStop(0, 'rgba(255,255,255,0.8)');
  coreG.addColorStop(1, 'rgba('+r+','+g+','+b+',0)');
  mCtx.fillStyle = coreG;
  mCtx.beginPath(); mCtx.arc(0, 0, baseR * 0.5, 0, Math.PI * 2); mCtx.fill();

  // sparks
  for (let i = 0; i < 3 + layer * 2; i++) {
    const a = (i / (3 + layer * 2)) * Math.PI * 2 + t * 2;
    const sr = baseR + 10 + Math.sin(t * 4 + i * 2) * 6;
    mCtx.beginPath();
    mCtx.arc(Math.cos(a) * sr, Math.sin(a) * sr, 1.5, 0, Math.PI * 2);
    mCtx.fillStyle = 'rgba(255,255,255,0.6)';
    mCtx.fill();
  }
  mCtx.restore();
}

// === ELIMINATION FEED ===
function showElim(killer, victim) {
  const el = document.createElement('div');
  el.className = 'elim';
  el.innerHTML = '<span style="color:#0ff">' + killer + '</span> <span style="color:#666">eliminated</span> <span style="color:#f44">' + victim + '</span>';
  const feed = document.getElementById('elimFeed');
  feed.appendChild(el);
  setTimeout(() => el.remove(), 4000);
  // keep feed manageable
  while (feed.children.length > 6) feed.firstChild.remove();
}

// === PLACEMENT ===
function showPlacement(rank) {
  document.getElementById('placementRank').textContent = '#' + rank;
  document.getElementById('placementLabel').textContent = rank === 1 ? 'VICTORY ROYALE!' : 'ELIMINATED';
  document.getElementById('placementScore').textContent =
    'Score: ' + KI.player.score.toLocaleString() + ' | Eliminations: ' + ROYALE.eliminations;
  document.getElementById('placement').classList.add('show');
  if (rank === 1) showCmt('VICTORY ROYALE! 勝利!');
}

window.restartMatch = function() {
  document.getElementById('placement').classList.remove('show');
  ROYALE.zoneRadius = 1.0;
  ROYALE.zoneTarget = 1.0;
  ROYALE.zonePhase = 0;
  ROYALE.zoneTimer = 30;
  ROYALE.playerHP = 1000;
  ROYALE.alive = true;
  ROYALE.eliminations = 0;
  ROYALE.matchTime = 0;
  ROYALE.zoneCenter = { x: 0, z: 0 };
  AI_FIGHTERS.length = 0;
  spawnAIFighters(11);
  KI.player.score = 0;
  document.getElementById('score').textContent = '0';
};

// === DAMAGE DISPLAY ===
function showDmg(amount, type) {
  const kanji = KI.get('kanji');
  const blasts = KI.get('ki-blasts');
  const KANJI = kanji?.KANJI || {};
  const BLAST_TYPES = blasts?.BLAST_TYPES || {};
  const el = document.createElement('div'); el.className = 'dmg';
  if (type === 'zone') {
    el.textContent = 'ZONE -' + Math.round(amount);
    el.style.color = '#f44';
  } else {
    const bt = BLAST_TYPES[type];
    const kj = KANJI[bt?.vowel || 'mm'];
    el.textContent = (kj ? kj.char + ' ' : '') + Math.round(amount);
    const c = bt ? '#' + bt.color.toString(16).padStart(6, '0') : '#ff0';
    el.style.color = c;
  }
  el.style.fontSize = (18 + Math.min(amount / 8, 30)) + 'px';
  el.style.left = (KI.W / 2 + (Math.random() - 0.5) * 140) + 'px';
  el.style.top = (KI.H / 2 - 60 + (Math.random() - 0.5) * 50) + 'px';
  document.getElementById('dmgLayer').appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// === COMMENTARY ===
const CMT = {
  bigHit: ["INCREDIBLE!", "DEVASTATING!", "UNREAL POWER!"],
  combo: ["UNSTOPPABLE!", "RELENTLESS!", "CHAIN MASTER!"],
  ko: ["ELIMINATED!", "DESTROYED!", "全滅!"]
};
function pickCmt(ev) { const a = CMT[ev]; return a[Math.floor(Math.random() * a.length)]; }
let cmtTimeout = null;
function showCmt(text) {
  if (cmtTimeout) return;
  if (text.length > 80) text = text.slice(0, 80) + '...';
  const el = document.getElementById('cmt'); el.textContent = text; el.classList.add('show');
  cmtTimeout = setTimeout(() => { el.classList.remove('show'); cmtTimeout = null; }, 3000);
}

function showModuleBadge(name) {
  const b = document.createElement('div'); b.className = 'mod-badge active';
  b.textContent = name.toUpperCase();
  document.getElementById('modBadges').appendChild(b);
}

// BOOT
// ============================================================
async function boot() {
  document.getElementById('nick').textContent = KI.player.name;
  document.getElementById('hud').classList.add('on');

  // 1. HD Scene
  Scene.init({ stars: 6000 });
  showModuleBadge('hd-scene');

  // 2. Kanji
  Kanji.init();
  showModuleBadge('kanji');

  // 3. Resonance
  Resonance.init();
  buildResHUD();
  showModuleBadge('resonance');

  // 4. HD Vortex
  Vortex.init({ count: 3000, particleSize: 0.11 });
  showModuleBadge('hd-vortex');

  // 5. Ki Blasts
  KiBlasts.init();
  showModuleBadge('blasts');

  // 6. Emoji
  EmojiSystem.init();
  showModuleBadge('emoji');

  // 7. HD FX
  FX.init({ aurora: true });
  showModuleBadge('hd-fx');

  // 8. Resonance Synths
  ResonanceSynths.init();
  showModuleBadge('res-synths');

  // 9. Voice engine
  try {
    await VoiceEngine.init();
    showModuleBadge('voice');
  } catch (e) { console.warn('Voice init failed:', e); }

  // 10. Networking
  MqttNet.init({ room: 'ROYALE' });
  showModuleBadge('mqtt');
  WebRTCNet.init({ room: 'ROYALE' });
  showModuleBadge('webrtc');

  // 11. Presence
  Presence.init();
  showModuleBadge('presence');

  // 12. Spawn AI fighters
  spawnAIFighters(11);

  // === MAIN LOOP ===
  KI.running = true;
  const clock = KI.clock;
  (function animate() {
    if (!KI.running) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = clock.elapsedTime;
    KI.runUpdates(dt, t);
    updateZone(dt);
    updateAIFighters(dt, t);
    drawMinimap();
    drawMorphBall(t);
    KI.renderer.render(KI.scene, KI.camera);
  })();

  showCmt('BATTLE ROYALE! 12 fighters — last standing wins!');
  console.log('%c KI ARENA ROYALE ', 'background:#200;color:#f44;font-size:22px;padding:12px;text-shadow:0 0 10px #f44');
}

window.addEventListener('load', boot);
